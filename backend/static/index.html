<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Blind Arena</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=20260417-15">
    <link rel="stylesheet" href="/static/style.css?v=20260508-a05">
</head>
<body>
    <!-- 사이드바 (컨텐츠 페이지에서만 노출) -->
    <button id="hamburger" class="hamburger hidden" onclick="toggleSidebar()">☰</button>
    <div id="sidebar" class="sidebar"></div>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- 고정 헤더 -->
    <header id="main-header" class="header">
        <h1>AI Game Blind Arena</h1>
    </header>

    <main id="main-container">
        <!-- 1. 온보딩 레이어 (닉네임 설정 재배치 전까지 미사용) -->
        <div id="onboarding-layer" class="hidden">
            <div id="onboarding-slider">
                <section id="view-login" class="onboarding-section"></section>
            </div>
        </div>

        <!-- 2. 컨텐츠 레이어 (페이지 이동 방식) -->
        <div id="content-layer" class="hidden">
            <section id="view-category" class="content-section"></section>
            <section id="view-list" class="content-section"></section>
            <section id="view-play" class="content-section"></section>
            <section id="view-results" class="content-section"></section>
            <section id="view-mypage" class="content-section"></section>
            <section id="view-privacy" class="content-section"></section>
        </div>
    </main>

    <footer class="footer">
        <div style="display:flex; flex-direction:column; align-items:center; gap:0.2rem; text-align:center;">
            <p>&copy; 2026 WikiHoney. All rights reserved. Comparing and evaluating games generated by AI models using a single prompt.</p>
            <button type="button" class="secondary" onclick="openPrivacyPolicy()" style="width:auto; padding:0; border:none; text-decoration:underline; font-size:0.92rem; color:var(--text-muted);">
                Privacy Policy / 개인정보처리방침
            </button>
        </div>
    </footer>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="/static/js/i18n.js?v=20260508-a05"></script>
    <script src="/static/js/state.js?v=20260508-a05"></script>
    <script src="/static/js/api.js?v=20260508-a05"></script>
    <script src="/static/js/ui-foundation.js?v=20260508-a05"></script>
    <script src="/static/js/ui-views.js?v=20260508-a05"></script>
    <script src="/static/js/ui-comments.js?v=20260508-a05"></script>
    <script src="/static/js/ui-mypage.js?v=20260508-a05"></script>
    <script src="/static/js/ui-policy.js?v=20260508-a05"></script>
    <script src="/static/js/main-common.js?v=20260508-a05"></script>
    <script src="/static/js/main-actions.js?v=20260508-a05"></script>
    <script src="/static/js/app.js?v=20260508-a05"></script>
</body>
</html>
