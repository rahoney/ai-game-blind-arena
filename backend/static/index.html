<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeilPlays</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=20260605-logo">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png?v=20260605-logo">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=20260605-logo">
    <link rel="stylesheet" href="/static/style.css?v=20260616-section-title-gap1">
</head>
<body>
    <!-- 사이드바 (컨텐츠 페이지에서만 노출) -->
    <button id="hamburger" class="hamburger hidden" onclick="toggleSidebar()">☰</button>
    <div id="sidebar" class="sidebar"></div>
    <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div id="global-modal-root"></div>

    <!-- 고정 헤더 -->
    <header id="main-header" class="header">
        <div class="header-inner">
            <button type="button" class="header-brand" onclick="goToHomeView()" aria-label="VeilPlays">
                <span class="header-brand-veil">Ve</span><span class="header-brand-blend">ilPl</span><span class="header-brand-play">ays</span>
            </button>
            <div id="header-auth-actions" class="header-auth-actions"></div>
        </div>
    </header>

    <main id="main-container">
        <!-- 1. 온보딩 레이어 (닉네임 설정 재배치 전까지 미사용) -->
        <div id="onboarding-layer" class="hidden">
            <div id="onboarding-slider">
                <section id="view-login" class="onboarding-section"></section>
            </div>
        </div>

        <!-- 2. 컨텐츠 레이어 (페이지 이동 방식) -->
        <div id="content-layer" class="hidden">
            <section id="view-home" class="content-section"></section>
            <section id="view-category" class="content-section"></section>
            <section id="view-list" class="content-section"></section>
            <section id="view-play" class="content-section"></section>
            <section id="view-results" class="content-section"></section>
            <section id="view-mypage" class="content-section"></section>
            <section id="view-privacy" class="content-section"></section>
        </div>
    </main>

    <footer class="footer">
        <div style="display:flex; flex-direction:column; align-items:center; gap:0.2rem; text-align:center;">
            <p>&copy; 2026 WikiHoney. All rights reserved.</p>
            <button type="button" class="secondary" onclick="openPrivacyPolicy()" style="width:auto; padding:0; border:none; text-decoration:underline; font-size:0.92rem; color:var(--text-muted);">
                Privacy Policy / 개인정보처리방침
            </button>
        </div>
    </footer>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics-compat.js"></script>
    <script src="/static/js/i18n.js?v=20260616-intro-wrap1"></script>
    <script src="/static/js/state.js?v=20260612-auth-gate1"></script>
    <script src="/static/js/api.js?v=20260611-display-name-change"></script>
    <script src="/static/js/auth-client.js?v=20260612-auth-gate1"></script>
    <script src="/static/js/ui-foundation.js?v=20260616-landing-header1"></script>
    <script src="/static/js/ui-views.js?v=20260616-landing-motion2"></script>
    <script src="/static/js/ui-comments.js?v=20260612-auth-gate1"></script>
    <script src="/static/js/ui-mypage.js?v=20260611-perf-pass5"></script>
    <script src="/static/js/ui-policy.js?v=20260604-display-name-social"></script>
    <script src="/static/js/main-common.js?v=20260612-auth-gate1"></script>
    <script src="/static/js/main-actions.js?v=20260612-auth-gate1"></script>
    <script src="/static/js/app.js?v=20260616-landing-en-hero2"></script>
</body>
</html>
