<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Action</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #0a0a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Noto Sans KR', sans-serif;
        }
        
        #game-container {
            position: relative;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
            border-radius: 16px;
            overflow: hidden;
        }
        
        canvas {
            display: block;
            background: #000;
            image-rendering: crisp-edges;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 0 0 20px #00ffff;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game" width="800" height="600"></canvas>
    </div>

    <script>
        // =============================================
        // LANG_DATA - 모든 문자열 한국어로 집중 관리
        // =============================================
        const LANG_DATA = {
            ko: {
                title: "플랫폼 액션",
                subtitle: "최고의 2D 브라우저 게임",
                startInstruction: "SPACE 키를 눌러 시작",
                controls: "← → 또는 A/D : 이동\n스페이스 · W · ↑ : 점프",
                gameOverTitle: "게임 오버",
                stageClearTitle: "스테이지 클리어!",
                scoreLabel: "점수",
                highScoreLabel: "최고 기록",
                livesLabel: "목숨",
                restartInstruction: "SPACE 키로 재시작",
                finalScore: "최종 점수",
                coinCount: "코인",
                // 게임 내 UI
                uiScore: "점수",
                uiLives: "목숨"
            },
            en: {
                title: "PLATFORM ACTION",
                subtitle: "A polished 2D browser adventure",
                startInstruction: "PRESS SPACE TO START",
                controls: "MOVE: LEFT / RIGHT OR A / D\nJUMP: SPACE, W, OR UP",
                gameOverTitle: "GAME OVER",
                stageClearTitle: "STAGE CLEARED!",
                scoreLabel: "Score",
                highScoreLabel: "Best Score",
                livesLabel: "Lives",
                restartInstruction: "PRESS SPACE TO RESTART",
                finalScore: "Final Score",
                coinCount: "Coins",
                uiScore: "Score",
                uiLives: "Lives"
            }
        };

        // Default to the English locale in the en folder.
        const LANG = LANG_DATA.en;

        // =============================================
        // 메인 게임 코드
        // =============================================
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        // 게임 상수
        const CANVAS_WIDTH = 800;
        const CANVAS_HEIGHT = 600;
        const WORLD_WIDTH = 4200;
        const GRAVITY = 0.78;
        const GROUND_FRICTION = 0.82;
        const AIR_FRICTION = 0.96;
        const PLAYER_ACC = 1.35;
        const PLAYER_MAX_SPEED = 6.8;
        const JUMP_POWER = -16.8;
        const COYOTE_TIME = 8;
        const JUMP_BUFFER_TIME = 8;

        // 게임 상태
        let gameState = 'start'; // start | playing | gameover | cleared
        let score = 0;
        let highScore = localStorage.getItem('platformHighScore') ? parseInt(localStorage.getItem('platformHighScore')) : 0;
        let lives = 3;
        let cameraX = 0;

        // 입력
        let keys = {};
        let lastKeys = {};

        // 오디오 컨텍스트 (Web Audio API)
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSFX(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            gain.gain.value = 0.25;
            
            if (type === 'jump') {
                osc.frequency.setValueAtTime(620, now);
                osc.frequency.exponentialRampToValueAtTime(280, now + 0.22);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
                osc.type = 'sine';
            } 
            else if (type === 'coin') {
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.setValueAtTime(1320, now + 0.05);
                gain.gain.setValueAtTime(0.35, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
                osc.type = 'triangle';
            } 
            else if (type === 'stomp') {
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.type = 'sawtooth';
            } 
            else if (type === 'hit') {
                osc.frequency.setValueAtTime(240, now);
                osc.frequency.exponentialRampToValueAtTime(90, now + 0.3);
                gain.gain.setValueAtTime(0.45, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
                osc.type = 'sine';
            } 
            else if (type === 'clear') {
                // 승리 팡파레
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.setValueAtTime(660, now + 0.1);
                osc.frequency.setValueAtTime(880, now + 0.25);
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                osc.type = 'sine';
            }
            
            osc.start(now);
            osc.stop(now + 1);
        }

        // 플레이어
        let player = {
            x: 150,
            y: 300,
            vx: 0,
            vy: 0,
            width: 38,
            height: 48,
            onGround: false,
            coyote: 0,
            jumpBuffer: 0,
            startX: 150,
            startY: 300
        };

        // 게임 객체들
        let platforms = [];
        let enemies = [];
        let coins = [];
        let flag = { x: 0, y: 0, width: 24, height: 92 };
        let particles = [];

        // 레벨 초기화 (재시작 시 완전 초기화)
        function initLevel() {
            // 플랫폼 (안정적인 플레이 가능한 맵 - 화면 너비의 5배 이상)
            platforms = [
                // 시작 구간
                {x: 0, y: 480, w: 920, h: 140},
                // 첫 점프 구간
                {x: 1100, y: 480, w: 380, h: 140},
                {x: 1580, y: 380, w: 240, h: 20},
                // 중간 상승
                {x: 1900, y: 520, w: 340, h: 100},
                {x: 2320, y: 310, w: 180, h: 20},
                {x: 2580, y: 440, w: 260, h: 20},
                // 긴 점프 구간
                {x: 2920, y: 520, w: 420, h: 100},
                {x: 3450, y: 370, w: 220, h: 20},
                // 마지막 구간
                {x: 3780, y: 480, w: 620, h: 140}
            ];

            // 적 (2종 이상)
            enemies = [
                // 1종: Walker (지상 순찰)
                {x: 1280, y: 400, vx: -1.8, width: 36, height: 36, type: 'walker', alive: true, baseY: 400},
                {x: 2100, y: 320, vx: 2.1, width: 36, height: 36, type: 'walker', alive: true, baseY: 320},
                {x: 3050, y: 450, vx: -2.3, width: 36, height: 36, type: 'walker', alive: true, baseY: 450},
                // 2종: Flier (공중 순찰 + 부드러운 흔들림)
                {x: 2650, y: 210, vx: 2.9, width: 42, height: 28, type: 'flier', alive: true, baseY: 210},
                {x: 3280, y: 140, vx: -2.4, width: 42, height: 28, type: 'flier', alive: true, baseY: 140}
            ];

            // 코인
            coins = [
                {x: 620, y: 380, collected: false},
                {x: 720, y: 320, collected: false},
                {x: 1220, y: 310, collected: false},
                {x: 1680, y: 260, collected: false},
                {x: 2000, y: 420, collected: false},
                {x: 2400, y: 240, collected: false},
                {x: 2550, y: 380, collected: false},
                {x: 2750, y: 210, collected: false},
                {x: 3100, y: 390, collected: false},
                {x: 3350, y: 280, collected: false},
                {x: 3620, y: 310, collected: false},
                {x: 3880, y: 390, collected: false}
            ].map(c => ({...c, r: 14}));

            // 깃발
            flag.x = 3950;
            flag.y = 380;

            // 플레이어 초기 위치
            player.x = player.startX;
            player.y = player.startY;
            player.vx = 0;
            player.vy = 0;
            player.coyote = 0;
            player.jumpBuffer = 0;

            // 파티클 초기화
            particles = [];

            score = 0;
            lives = 3;
            cameraX = 0;
        }

        // 완전 재시작 (모든 상태 초기화)
        function fullReset() {
            initLevel();
            gameState = 'playing';
            initAudio();
        }

        // AABB 충돌 체크
        function rectCollision(a, b) {
            return !(
                a.x + a.width < b.x ||
                b.x + b.width < a.x ||
                a.y + a.height < b.y ||
                b.y + b.height < a.y
            );
        }

        // 플랫폼 충돌 처리 (X/Y 분리)
        function handlePlatformCollisions() {
            // X 이동 먼저
            player.x += player.vx;
            for (let p of platforms) {
                if (rectCollision(player, {x: p.x, y: p.y, width: p.w, height: p.h})) {
                    if (player.vx > 0) player.x = p.x - player.width;
                    else if (player.vx < 0) player.x = p.x + p.w;
                    player.vx = 0;
                }
            }

            // Y 이동
            player.y += player.vy;
            player.onGround = false;

            for (let p of platforms) {
                const plat = {x: p.x, y: p.y, width: p.w, height: p.h};
                if (rectCollision(player, plat)) {
                    if (player.vy > 0) {
                        // 착지
                        player.y = plat.y - player.height;
                        player.vy = 0;
                        player.onGround = true;
                    } else if (player.vy < 0) {
                        // 천장 충돌
                        player.y = plat.y + plat.height;
                        player.vy = 0;
                    }
                }
            }
        }

        // 적 업데이트
        function updateEnemies() {
            for (let i = 0; i < enemies.length; i++) {
                const e = enemies[i];
                if (!e.alive) continue;

                if (e.type === 'walker') {
                    e.x += e.vx;
                    
                    // 벽 충돌
                    for (let p of platforms) {
                        const plat = {x: p.x, y: p.y, width: p.w, height: p.h};
                        if (rectCollision(e, plat)) {
                            if (e.vx > 0) e.x = plat.x - e.width;
                            else e.x = plat.x + plat.width;
                            e.vx *= -1;
                        }
                    }
                    
                    // 낙하 감지 (플랫폼 지지 여부)
                    let supported = false;
                    for (let p of platforms) {
                        if (e.x + e.width > p.x && e.x < p.x + p.w &&
                            Math.abs(e.y + e.height - p.y) < 8) {
                            supported = true;
                            break;
                        }
                    }
                    if (!supported) e.vx *= -1;
                } 
                else if (e.type === 'flier') {
                    e.x += e.vx;
                    // 부드러운 Y 흔들림
                    e.y = e.baseY + Math.sin(Date.now() / 180) * 14;
                    
                    // 벽 충돌 (flier는 천장/바닥 무시)
                    for (let p of platforms) {
                        const plat = {x: p.x, y: p.y, width: p.w, height: p.h};
                        if (rectCollision(e, plat)) {
                            e.vx *= -1;
                            break;
                        }
                    }
                }
            }
        }

        // 파티클 생성
        function createParticles(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 2,
                    life: 28 + Math.random() * 14,
                    color: color,
                    size: 4 + Math.random() * 4
                });
            }
        }

        // 메인 업데이트
        function update() {
            if (gameState !== 'playing') return;

            // 입력 처리
            const left = keys['ArrowLeft'] || keys['a'] || keys['A'];
            const right = keys['ArrowRight'] || keys['d'] || keys['D'];
            const jumpPressed = keys[' '] || keys['w'] || keys['W'] || keys['ArrowUp'];

            // 가속
            if (left) player.vx -= PLAYER_ACC;
            if (right) player.vx += PLAYER_ACC;

            // 최대 속도 제한
            if (player.vx > PLAYER_MAX_SPEED) player.vx = PLAYER_MAX_SPEED;
            if (player.vx < -PLAYER_MAX_SPEED) player.vx = -PLAYER_MAX_SPEED;

            // 마찰
            const friction = player.onGround ? GROUND_FRICTION : AIR_FRICTION;
            player.vx *= friction;

            // 중력
            player.vy += GRAVITY;

            // 코요테 타임
            if (player.onGround) {
                player.coyote = COYOTE_TIME;
            } else if (player.coyote > 0) {
                player.coyote--;
            }

            // 점프 버퍼
            if (jumpPressed && !lastKeys[' '] && !lastKeys['w'] && !lastKeys['W'] && !lastKeys['ArrowUp']) {
                player.jumpBuffer = JUMP_BUFFER_TIME;
            }
            if (player.jumpBuffer > 0) player.jumpBuffer--;

            // 점프 실행 (코요테 + 버퍼)
            if ((player.onGround || player.coyote > 0) && player.jumpBuffer > 0) {
                player.vy = JUMP_POWER;
                player.coyote = 0;
                player.jumpBuffer = 0;
                player.onGround = false;
                playSFX('jump');
                // 점프 파티클
                createParticles(player.x + player.width / 2, player.y + player.height, 12, '#aaffff');
            }

            // 가변 점프 높이 (키 릴리즈)
            if (!jumpPressed && player.vy < 0) {
                player.vy *= 0.65;
            }

            // 플랫폼 충돌
            handlePlatformCollisions();

            // 적 업데이트
            updateEnemies();

            // 코인 수집
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (c.collected) continue;
                const dx = player.x + player.width / 2 - (c.x + c.r);
                const dy = player.y + player.height / 2 - (c.y + c.r);
                if (Math.sqrt(dx * dx + dy * dy) < player.width / 2 + c.r + 6) {
                    c.collected = true;
                    score += 120;
                    playSFX('coin');
                    createParticles(c.x + c.r, c.y + c.r, 18, '#ffee00');
                }
            }

            // 적 충돌
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (!e.alive) continue;
                
                if (rectCollision(player, e)) {
                    // 스톰프 체크 (위에서 내려오는 경우)
                    if (player.vy > 0 && player.y + player.height - player.vy * 1.2 < e.y + 8) {
                        e.alive = false;
                        player.vy = JUMP_POWER * 0.65;
                        score += 280;
                        playSFX('stomp');
                        createParticles(e.x + e.width / 2, e.y, 22, '#ff2266');
                    } 
                    // 일반 피격
                    else {
                        playSFX('hit');
                        lives--;
                        createParticles(player.x + player.width / 2, player.y + player.height / 2, 16, '#ff0000');
                        
                        if (lives > 0) {
                            // 목숨 남았을 때 리스폰 (위치만 초기화)
                            player.x = player.startX;
                            player.y = player.startY;
                            player.vx = 0;
                            player.vy = 0;
                        } else {
                            gameState = 'gameover';
                            if (score > highScore) {
                                highScore = score;
                                localStorage.setItem('platformHighScore', highScore);
                            }
                        }
                    }
                }
            }

            // 깃발 도달
            if (rectCollision(player, flag)) {
                gameState = 'cleared';
                score += 800; // 클리어 보너스
                playSFX('clear');
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('platformHighScore', highScore);
                }
                // 승리 파티클 폭죽
                for (let i = 0; i < 6; i++) {
                    setTimeout(() => {
                        createParticles(flag.x + 12 + Math.random() * 30, flag.y + 40, 28, '#ffff00');
                    }, i * 60);
                }
            }

            // 낙사
            if (player.y > CANVAS_HEIGHT + 120) {
                lives--;
                playSFX('hit');
                if (lives > 0) {
                    player.x = player.startX;
                    player.y = player.startY;
                    player.vx = 0;
                    player.vy = 0;
                } else {
                    gameState = 'gameover';
                    if (score > highScore) {
                        highScore = score;
                        localStorage.setItem('platformHighScore', highScore);
                    }
                }
            }

            // 카메라 (부드럽게 따라감)
            const targetCam = Math.max(0, Math.min(player.x - CANVAS_WIDTH * 0.45, WORLD_WIDTH - CANVAS_WIDTH));
            cameraX += (targetCam - cameraX) * 0.12;

            // 파티클 업데이트
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.28;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // 키 상태 백업
            lastKeys = {...keys};
        }

        // 그리기 함수
        function draw() {
            ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 배경 그라데이션 (하늘)
            const sky = ctx.createLinearGradient(0, 0, 0, CANVAS_HEIGHT);
            sky.addColorStop(0, '#112244');
            sky.addColorStop(1, '#66aaff');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

            // 구름 (패럴랙스)
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            const cloudOffset = cameraX * 0.15;
            ctx.fillRect(120 - cloudOffset % 900, 110, 140, 38);
            ctx.fillRect(380 - cloudOffset % 900, 68, 110, 32);
            ctx.fillRect(680 - cloudOffset % 900, 135, 155, 35);
            ctx.fillRect(1050 - cloudOffset % 900, 95, 125, 30);

            // 플랫폼 그리기
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 12;
            for (let p of platforms) {
                // 플랫폼 본체
                ctx.fillStyle = '#3a2a1f';
                ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
                
                // 상단 잔디
                ctx.fillStyle = '#1a9e3e';
                ctx.fillRect(p.x - cameraX, p.y, p.w, 14);
                
                // 하이라이트
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(p.x - cameraX, p.y, p.w, 4);
            }
            ctx.shadowBlur = 0;

            // 코인 그리기
            const time = Date.now() / 160;
            for (let c of coins) {
                if (c.collected) continue;
                const cx = c.x + c.r - cameraX;
                const cy = c.y + c.r;
                
                // 코인 회전 효과
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(Math.sin(time) * 0.3);
                
                // 금색 원
                ctx.fillStyle = '#ffdd00';
                ctx.beginPath();
                ctx.arc(0, 0, c.r, 0, Math.PI * 2);
                ctx.fill();
                
                // 안쪽
                ctx.fillStyle = '#ffee88';
                ctx.beginPath();
                ctx.arc(0, 0, c.r * 0.6, 0, Math.PI * 2);
                ctx.fill();
                
                // C 문자
                ctx.fillStyle = '#112233';
                ctx.font = 'bold 18px Noto Sans KR';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('C', 0, 3);
                ctx.restore();
            }

            // 적 그리기
            for (let e of enemies) {
                if (!e.alive) continue;
                const ex = e.x - cameraX;
                const ey = e.y;
                
                if (e.type === 'walker') {
                    // Walker - 빨간 버섯형
                    ctx.fillStyle = '#e22';
                    ctx.fillRect(ex, ey, e.width, e.height);
                    // 눈
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(ex + 8, ey + 10, 8, 8);
                    ctx.fillRect(ex + 24, ey + 10, 8, 8);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(ex + 11, ey + 13, 3, 3);
                    ctx.fillRect(ex + 27, ey + 13, 3, 3);
                    // 다리
                    ctx.fillStyle = '#111';
                    ctx.fillRect(ex + 6, ey + e.height - 6, 8, 8);
                    ctx.fillRect(ex + 22, ey + e.height - 6, 8, 8);
                } 
                else if (e.type === 'flier') {
                    // Flier - 보라색 날개
                    ctx.fillStyle = '#a22aff';
                    ctx.beginPath();
                    ctx.ellipse(ex + e.width / 2, ey + e.height / 2, e.width / 2 + 4, e.height / 2 + 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                    // 눈
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(ex + 9, ey + 8, 10, 10);
                    ctx.fillRect(ex + 25, ey + 8, 10, 10);
                    ctx.fillStyle = '#000';
                    ctx.fillRect(ex + 12, ey + 11, 4, 4);
                    ctx.fillRect(ex + 28, ey + 11, 4, 4);
                    // 날개
                    ctx.fillStyle = '#c55aff';
                    ctx.fillRect(ex - 6, ey + 12, 12, 8);
                    ctx.fillRect(ex + e.width - 6, ey + 12, 12, 8);
                }
            }

            // 깃발 그리기
            const fx = flag.x - cameraX;
            ctx.fillStyle = '#ccc';
            ctx.fillRect(fx, flag.y, 12, flag.height); // 기둥
            ctx.fillStyle = '#e22';
            ctx.beginPath();
            ctx.moveTo(fx + 12, flag.y);
            ctx.lineTo(fx + 52, flag.y + 22);
            ctx.lineTo(fx + 12, flag.y + 44);
            ctx.fill();

            // 플레이어 그리기 (간단한 캐릭터)
            const px = player.x - cameraX;
            const py = player.y;
            
            // 몸통
            ctx.fillStyle = '#00aaff';
            ctx.fillRect(px + 4, py + 12, player.width - 8, player.height - 18);
            
            // 머리
            ctx.fillStyle = '#ffdd88';
            ctx.beginPath();
            ctx.arc(px + player.width / 2, py + 18, 14, 0, Math.PI * 2);
            ctx.fill();
            
            // 모자
            ctx.fillStyle = '#ff2222';
            ctx.fillRect(px + 6, py + 6, player.width - 12, 10);
            
            // 눈
            ctx.fillStyle = '#fff';
            ctx.fillRect(px + 14, py + 13, 8, 8);
            ctx.fillRect(px + player.width - 20, py + 13, 8, 8);
            ctx.fillStyle = '#112233';
            ctx.fillRect(px + 17, py + 16, 4, 4);
            ctx.fillRect(px + player.width - 17, py + 16, 4, 4);
            
            // 팔
            ctx.strokeStyle = '#00aaff';
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(px + 10, py + 28);
            ctx.quadraticCurveTo(px + 2, py + 38, px + 4, py + 48);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(px + player.width - 10, py + 28);
            ctx.quadraticCurveTo(px + player.width - 2, py + 38, px + player.width - 6, py + 48);
            ctx.stroke();

            // 파티클 그리기
            for (let p of particles) {
                const alpha = p.life / 30;
                ctx.globalAlpha = alpha;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - cameraX, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;

            // UI (플레이 중)
            if (gameState === 'playing') {
                // 점수
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 26px Noto Sans KR';
                ctx.textAlign = 'left';
                ctx.fillText(`${LANG.uiScore} ${score}`, 24, 48);
                
                // 목숨
                ctx.fillStyle = '#ff3366';
                ctx.font = 'bold 26px Noto Sans KR';
                ctx.fillText(LANG.uiLives, 24, 88);
                ctx.fillStyle = '#fff';
                ctx.fillText('♥'.repeat(lives), 110, 88);
                
                // 코인 카운트
                let collectedCoins = coins.filter(c => c.collected).length;
                ctx.fillStyle = '#ffee00';
                ctx.font = 'bold 22px Noto Sans KR';
                ctx.fillText(`🪙 ${collectedCoins}/${coins.length}`, 620, 48);
            }

            // 메뉴 화면
            if (gameState === 'start') {
                ctx.fillStyle = 'rgba(10, 15, 45, 0.85)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 30;
                ctx.fillStyle = '#00ffff';
                ctx.font = '900 68px Noto Sans KR';
                ctx.textAlign = 'center';
                ctx.fillText(LANG.title, CANVAS_WIDTH / 2, 170);
                ctx.shadowBlur = 0;
                
                ctx.fillStyle = '#aaffff';
                ctx.font = '700 28px Noto Sans KR';
                ctx.fillText(LANG.subtitle, CANVAS_WIDTH / 2, 225);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 32px Noto Sans KR';
                ctx.fillText(LANG.startInstruction, CANVAS_WIDTH / 2, 340);
                
                ctx.font = '400 22px Noto Sans KR';
                ctx.fillText(LANG.controls, CANVAS_WIDTH / 2, 410);
                
                // 최고 기록 표시
                ctx.fillStyle = '#ffee00';
                ctx.font = 'bold 24px Noto Sans KR';
                ctx.fillText(`${LANG.highScoreLabel} ${highScore}`, CANVAS_WIDTH / 2, 490);
            }
            
            if (gameState === 'gameover') {
                ctx.fillStyle = 'rgba(30, 0, 0, 0.9)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                
                ctx.fillStyle = '#ff4444';
                ctx.font = '900 72px Noto Sans KR';
                ctx.textAlign = 'center';
                ctx.fillText(LANG.gameOverTitle, CANVAS_WIDTH / 2, 210);
                
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 32px Noto Sans KR';
                ctx.fillText(`${LANG.finalScore} ${score}`, CANVAS_WIDTH / 2, 290);
                
                ctx.fillStyle = '#ffee00';
                ctx.fillText(`${LANG.highScoreLabel} ${highScore}`, CANVAS_WIDTH / 2, 340);
                
                ctx.fillStyle = '#aaffff';
                ctx.font = 'bold 30px Noto Sans KR';
                ctx.fillText(LANG.restartInstruction, CANVAS_WIDTH / 2, 460);
            }
            
            if (gameState === 'cleared') {
                ctx.fillStyle = 'rgba(0, 40, 20, 0.9)';
                ctx.fillRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);
                
                ctx.fillStyle = '#00ff88';
                ctx.font = '900 68px Noto Sans KR';
                ctx.textAlign = 'center';
                ctx.fillText(LANG.stageClearTitle, CANVAS_WIDTH / 2, 190);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 34px Noto Sans KR';
                ctx.fillText(`${LANG.finalScore} ${score}`, CANVAS_WIDTH / 2, 280);
                
                ctx.fillStyle = '#ffee00';
                ctx.fillText(`${LANG.highScoreLabel} ${highScore}`, CANVAS_WIDTH / 2, 330);
                
                ctx.fillStyle = '#aaffff';
                ctx.font = 'bold 30px Noto Sans KR';
                ctx.fillText(LANG.restartInstruction, CANVAS_WIDTH / 2, 440);
                
                // 승리 효과
                ctx.globalAlpha = 0.6 + Math.sin(Date.now() / 120) * 0.4;
                ctx.fillStyle = '#ffff00';
                ctx.font = '900 42px Noto Sans KR';
                ctx.fillText('🏆', CANVAS_WIDTH / 2 - 140, 150);
                ctx.fillText('🏆', CANVAS_WIDTH / 2 + 140, 150);
                ctx.globalAlpha = 1;
            }
        }

        // 게임 루프
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // 키 입력
        function setupInput() {
            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                
                if (gameState === 'start' && (e.key === ' ' || e.key === 'Spacebar')) {
                    fullReset();
                }
                
                if ((gameState === 'gameover' || gameState === 'cleared') && (e.key === ' ' || e.key === 'Spacebar')) {
                    fullReset();
                }
            });
            
            window.addEventListener('keyup', e => {
                keys[e.key] = false;
            });
            
            // 모바일 터치 지원 (간단히 SPACE 대체)
            canvas.addEventListener('touchstart', () => {
                if (gameState === 'start') fullReset();
                if (gameState === 'gameover' || gameState === 'cleared') fullReset();
            });
        }

        // 시작
        function startGame() {
            canvas.width = CANVAS_WIDTH;
            canvas.height = CANVAS_HEIGHT;
            initLevel();
            setupInput();
            initAudio();
            gameLoop();
            
            console.log('%c✅ 플랫폼 액션 완성! 브라우저에서 바로 플레이 가능합니다.', 'color:#00ffff; font-size:18px; font-weight:bold');
        }

        // 즉시 시작
        window.onload = startGame;
    </script>
</body>
</html>
