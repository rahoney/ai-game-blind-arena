<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Platform Action Game</title>
  <style>
    :root {
      --bg1: #0a1020;
      --bg2: #16223f;
      --panel: rgba(10, 15, 28, 0.78);
      --line: rgba(255,255,255,0.1);
      --text: #eef4ff;
      --sub: #a9b6d4;
      --accent: #7ef9d8;
      --accent2: #72a8ff;
      --danger: #ff6f91;
      --gold: #ffd86b;
      --shadow: 0 20px 60px rgba(0,0,0,0.38);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, #203156 0%, #0e1527 40%, #060913 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .shell {
      position: relative;
      width: min(1280px, 100vw - 24px);
      aspect-ratio: 16 / 9;
      max-height: calc(100vh - 24px);
      border-radius: 22px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.1);
      background: linear-gradient(180deg, #6ab1ff 0%, #8dd1ff 24%, #bfebff 52%, #eef8ff 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
      background: linear-gradient(180deg, #6ab1ff 0%, #8dd1ff 24%, #bfebff 52%, #eef8ff 100%);
    }

    .hud {
      position: absolute;
      left: 18px;
      top: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      pointer-events: none;
      z-index: 5;
    }

    .hud-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-start;
    }

    .chip {
      min-width: 112px;
      padding: 10px 12px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .chip .label {
      display: block;
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .chip .value {
      display: block;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(3,7,16,0.30), rgba(3,7,16,0.62));
      z-index: 10;
      padding: 24px;
    }

    .overlay.hidden { display: none; }

    .panel {
      width: min(720px, 94%);
      padding: 28px 28px 24px;
      border-radius: 24px;
      background: rgba(8, 12, 24, 0.84);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .title {
      margin: 0 0 10px;
      font-size: clamp(30px, 4.2vw, 54px);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 auto 20px;
      max-width: 560px;
      line-height: 1.7;
      color: var(--sub);
      font-size: clamp(14px, 1.8vw, 18px);
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin: 18px 0 22px;
      text-align: left;
    }

    .control-card {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text);
      line-height: 1.5;
    }

    .control-card strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 14px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #061018;
      background: linear-gradient(180deg, var(--accent), #56e8c0);
      box-shadow: 0 10px 24px rgba(126,249,216,0.25);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.05); }
    button:active { transform: translateY(1px) scale(0.99); }

    .secondary {
      background: linear-gradient(180deg, #8ec1ff, #6fa6ff);
      box-shadow: 0 10px 24px rgba(114,168,255,0.26);
    }

    .footer-note {
      margin-top: 16px;
      color: var(--sub);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="shell">
    <canvas id="game" width="1280" height="720"></canvas>

    <div class="hud" id="hud">
      <div class="hud-group">
        <div class="chip"><span class="label" id="labelHealth"></span><span class="value" id="valueHealth"></span></div>
        <div class="chip"><span class="label" id="labelScore"></span><span class="value" id="valueScore"></span></div>
        <div class="chip"><span class="label" id="labelCoins"></span><span class="value" id="valueCoins"></span></div>
      </div>
      <div class="hud-group">
        <div class="chip"><span class="label" id="labelProgress"></span><span class="value" id="valueProgress"></span></div>
        <div class="chip"><span class="label" id="labelBest"></span><span class="value" id="valueBest"></span></div>
      </div>
    </div>

    <div class="overlay" id="overlayStart">
      <div class="panel">
        <h1 class="title" id="startTitle"></h1>
        <p class="subtitle" id="startSubtitle"></p>
        <div class="controls">
          <div class="control-card"><strong id="controlMoveTitle"></strong><span id="controlMoveText"></span></div>
          <div class="control-card"><strong id="controlJumpTitle"></strong><span id="controlJumpText"></span></div>
          <div class="control-card"><strong id="controlGoalTitle"></strong><span id="controlGoalText"></span></div>
          <div class="control-card"><strong id="controlTipTitle"></strong><span id="controlTipText"></span></div>
        </div>
        <div class="buttons">
          <button id="startBtn"></button>
        </div>
        <div class="footer-note" id="startFooter"></div>
      </div>
    </div>

    <div class="overlay hidden" id="overlayClear">
      <div class="panel">
        <h2 class="title" id="clearTitle"></h2>
        <p class="subtitle" id="clearSubtitle"></p>
        <div class="buttons">
          <button id="clearRestartBtn"></button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="overlayGameOver">
      <div class="panel">
        <h2 class="title" id="gameOverTitle"></h2>
        <p class="subtitle" id="gameOverSubtitle"></p>
        <div class="buttons">
          <button class="secondary" id="gameOverRestartBtn"></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LANG = 'en';
    const LANG_DATA = {
      ko: {
        gameTitle: '스카이 루인 러너',
        startSubtitle: '긴 고대 유적 스테이지를 돌파해 코인을 모으고 적을 피하거나 밟아 쓰러뜨린 뒤, 마지막 깃발에 도달하세요.',
        startButton: '게임 시작',
        clearTitle: '스테이지 클리어!',
        clearSubtitle: (score, best) => `최종 점수 ${score}점 · 최고 기록 ${best}점`,
        gameOverTitle: '게임 오버',
        gameOverSubtitle: (best) => `모든 체력을 잃었습니다. 최고 기록 ${best}점`,
        restartButton: '다시 시작',
        labelHealth: '체력',
        labelScore: '점수',
        labelCoins: '코인',
        labelProgress: '진행률',
        labelBest: '최고 기록',
        controlMoveTitle: '이동',
        controlMoveText: '방향키 ← → 또는 A / D',
        controlJumpTitle: '점프',
        controlJumpText: '스페이스바 / W / ↑',
        controlGoalTitle: '목표',
        controlGoalText: '적과 구덩이를 넘고 끝의 깃발 도달',
        controlTipTitle: '팁',
        controlTipText: '점프를 짧게 누르면 낮게, 길게 누르면 높게 뜁니다.',
        startFooter: '코요테 타임, 점프 버퍼링, 최고 기록 저장(LocalStorage), 완전 재시작 초기화 지원',
        statusReady: '준비',
        statusPlaying: '진행 중',
        statusClear: '클리어',
        statusGameOver: '게임 오버',
        percent: (v) => `${v}%`,
        hearts: (v) => '♥'.repeat(v),
        ofCoins: (got, total) => `${got} / ${total}`,
        bestScorePrefix: (v) => `${v}`,
        scoreSuffix: (v) => `${v}`,
        stageClearToast: '깃발 도착!',
        hitToast: '피격!',
        stompToast: '적 처치!',
        coinToast: '코인 획득!',
        checkpointToast: '체크포인트 갱신',
      },
      en: {
        gameTitle: 'Sky Ruin Runner',
        startSubtitle: 'Cross the long ancient ruin stage, collect coins, avoid or stomp enemies, and reach the final flag.',
        startButton: 'Start Game',
        clearTitle: 'Stage Cleared!',
        clearSubtitle: (score, best) => `Final Score ${score} · Best Score ${best}`,
        gameOverTitle: 'Game Over',
        gameOverSubtitle: (best) => `You lost all HP. Best Score ${best}`,
        restartButton: 'Restart',
        labelHealth: 'HP',
        labelScore: 'Score',
        labelCoins: 'Coins',
        labelProgress: 'Progress',
        labelBest: 'Best Score',
        controlMoveTitle: 'Move',
        controlMoveText: 'Arrow Keys Left/Right or A / D',
        controlJumpTitle: 'Jump',
        controlJumpText: 'Space / W / Up',
        controlGoalTitle: 'Goal',
        controlGoalText: 'Get past enemies and pits, then reach the final flag',
        controlTipTitle: 'Tip',
        controlTipText: 'Tap jump for a low hop, hold it for a higher jump.',
        startFooter: 'Includes coyote time, jump buffering, best score saving (LocalStorage), and full reset support',
        statusReady: 'Ready',
        statusPlaying: 'Playing',
        statusClear: 'Clear',
        statusGameOver: 'Game Over',
        percent: (v) => `${v}%`,
        hearts: (v) => '♥'.repeat(v),
        ofCoins: (got, total) => `${got} / ${total}`,
        bestScorePrefix: (v) => `${v}`,
        scoreSuffix: (v) => `${v}`,
        stageClearToast: 'Flag Reached!',
        hitToast: 'Hit!',
        stompToast: 'Enemy Down!',
        coinToast: 'Coin Collected!',
        checkpointToast: 'Checkpoint Updated',
      }
    };

    const T = LANG_DATA[LANG];

    const STORAGE_KEY = 'platform_action_best_score_v1';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const ui = {
      overlayStart: document.getElementById('overlayStart'),
      overlayClear: document.getElementById('overlayClear'),
      overlayGameOver: document.getElementById('overlayGameOver'),
      startBtn: document.getElementById('startBtn'),
      clearRestartBtn: document.getElementById('clearRestartBtn'),
      gameOverRestartBtn: document.getElementById('gameOverRestartBtn'),
      valueHealth: document.getElementById('valueHealth'),
      valueScore: document.getElementById('valueScore'),
      valueCoins: document.getElementById('valueCoins'),
      valueProgress: document.getElementById('valueProgress'),
      valueBest: document.getElementById('valueBest'),
      labelHealth: document.getElementById('labelHealth'),
      labelScore: document.getElementById('labelScore'),
      labelCoins: document.getElementById('labelCoins'),
      labelProgress: document.getElementById('labelProgress'),
      labelBest: document.getElementById('labelBest'),
      startTitle: document.getElementById('startTitle'),
      startSubtitle: document.getElementById('startSubtitle'),
      controlMoveTitle: document.getElementById('controlMoveTitle'),
      controlMoveText: document.getElementById('controlMoveText'),
      controlJumpTitle: document.getElementById('controlJumpTitle'),
      controlJumpText: document.getElementById('controlJumpText'),
      controlGoalTitle: document.getElementById('controlGoalTitle'),
      controlGoalText: document.getElementById('controlGoalText'),
      controlTipTitle: document.getElementById('controlTipTitle'),
      controlTipText: document.getElementById('controlTipText'),
      startFooter: document.getElementById('startFooter'),
      clearTitle: document.getElementById('clearTitle'),
      clearSubtitle: document.getElementById('clearSubtitle'),
      gameOverTitle: document.getElementById('gameOverTitle'),
      gameOverSubtitle: document.getElementById('gameOverSubtitle'),
    };

    function bindStaticText() {
      ui.startTitle.textContent = T.gameTitle;
      ui.startSubtitle.textContent = T.startSubtitle;
      ui.startBtn.textContent = T.startButton;
      ui.clearRestartBtn.textContent = T.restartButton;
      ui.gameOverRestartBtn.textContent = T.restartButton;
      ui.clearTitle.textContent = T.clearTitle;
      ui.gameOverTitle.textContent = T.gameOverTitle;
      ui.labelHealth.textContent = T.labelHealth;
      ui.labelScore.textContent = T.labelScore;
      ui.labelCoins.textContent = T.labelCoins;
      ui.labelProgress.textContent = T.labelProgress;
      ui.labelBest.textContent = T.labelBest;
      ui.controlMoveTitle.textContent = T.controlMoveTitle;
      ui.controlMoveText.textContent = T.controlMoveText;
      ui.controlJumpTitle.textContent = T.controlJumpTitle;
      ui.controlJumpText.textContent = T.controlJumpText;
      ui.controlGoalTitle.textContent = T.controlGoalTitle;
      ui.controlGoalText.textContent = T.controlGoalText;
      ui.controlTipTitle.textContent = T.controlTipTitle;
      ui.controlTipText.textContent = T.controlTipText;
      ui.startFooter.textContent = T.startFooter;
    }
    bindStaticText();

    const keys = Object.create(null);
    let gamepadState = { left: false, right: false, jump: false };

    const audio = {
      ctx: null,
      master: null,
      enabled: false,
      init() {
        if (this.ctx) return;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return;
        this.ctx = new AC();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.05;
        this.master.connect(this.ctx.destination);
        this.enabled = true;
      },
      beep(freq, duration, type = 'square', volume = 0.35, slide = 0) {
        if (!this.enabled || !this.ctx) return;
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, now);
        if (slide) osc.frequency.linearRampToValueAtTime(freq + slide, now + duration);
        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
        osc.connect(gain);
        gain.connect(this.master);
        osc.start(now);
        osc.stop(now + duration + 0.02);
      }
    };

    function loadBestScore() {
      const raw = localStorage.getItem(STORAGE_KEY);
      const value = Number(raw);
      return Number.isFinite(value) ? value : 0;
    }

    function saveBestScore(v) {
      localStorage.setItem(STORAGE_KEY, String(v));
    }

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }
    function pointInRect(px, py, r) {
      return px >= r.x && px <= r.x + r.w && py >= r.y && py <= r.y + r.h;
    }

    function createLevel() {
      const floorY = 620;
      const level = {
        width: 7200,
        height: 720,
        floorY,
        platforms: [],
        coins: [],
        enemies: [],
        checkpoints: [],
        goal: { x: 6900, y: 300, w: 70, h: 220 },
        decorations: [],
        totalCoins: 0,
        spawn: { x: 110, y: 520 }
      };

      // 바닥 스트립은 구덩이 구간을 제외하고 생성
      const pits = [
        { x: 870, w: 180 },
        { x: 1600, w: 150 },
        { x: 2520, w: 210 },
        { x: 3360, w: 170 },
        { x: 4240, w: 240 },
        { x: 5100, w: 170 },
        { x: 6080, w: 220 }
      ];

      let cursor = 0;
      for (const pit of pits) {
        if (pit.x > cursor) level.platforms.push({ x: cursor, y: floorY, w: pit.x - cursor, h: 100, type: 'ground' });
        cursor = pit.x + pit.w;
      }
      if (cursor < level.width) level.platforms.push({ x: cursor, y: floorY, w: level.width - cursor, h: 100, type: 'ground' });

      const raised = [
        [330, 520, 120, 24], [500, 460, 150, 24], [680, 410, 130, 24],
        [1110, 520, 140, 24], [1300, 470, 150, 24], [1510, 415, 110, 24],
        [1810, 560, 130, 24], [1980, 500, 150, 24], [2200, 430, 170, 24],
        [2410, 360, 110, 24], [2810, 540, 110, 24], [2980, 480, 150, 24],
        [3180, 430, 120, 24], [3430, 370, 130, 24], [3660, 510, 160, 24],
        [3880, 450, 110, 24], [4080, 390, 150, 24], [4510, 520, 150, 24],
        [4720, 460, 140, 24], [4910, 400, 130, 24], [5310, 540, 120, 24],
        [5490, 480, 140, 24], [5710, 420, 160, 24], [5940, 360, 140, 24],
        [6370, 520, 150, 24], [6570, 460, 160, 24], [6760, 390, 140, 24]
      ];
      raised.forEach(p => level.platforms.push({ x: p[0], y: p[1], w: p[2], h: p[3], type: 'platform' }));

      const coinSpots = [
        [365, 478], [530, 418], [570, 418], [710, 368],
        [1140, 488], [1340, 438], [1540, 383],
        [1840, 528], [2010, 468], [2250, 398], [2290, 398], [2440, 328],
        [2840, 508], [3015, 448], [3220, 398], [3470, 338],
        [3700, 478], [3920, 418], [4120, 358],
        [4540, 488], [4755, 428], [4940, 368],
        [5340, 508], [5530, 448], [5760, 388], [5795, 388], [5970, 328],
        [6400, 488], [6610, 428], [6800, 358], [6920, 300]
      ];
      coinSpots.forEach(([x, y]) => level.coins.push({ x, y, w: 24, h: 24, taken: false, bob: Math.random() * Math.PI * 2 }));
      level.totalCoins = level.coins.length;

      level.checkpoints.push(
        { x: 2300, y: 300, w: 20, h: 320, active: false },
        { x: 4750, y: 300, w: 20, h: 320, active: false }
      );

      level.enemies.push(
        { type: 'walker', x: 560, y: 572, w: 42, h: 48, vx: -90, vy: 0, dir: -1, dead: false, stun: 0 },
        { type: 'walker', x: 1390, y: 422, w: 42, h: 48, vx: 90, vy: 0, dir: 1, dead: false, stun: 0 },
        { type: 'hopper', x: 2100, y: 452, w: 42, h: 48, vx: 0, vy: 0, dir: 1, dead: false, timer: 0.8, stun: 0 },
        { type: 'walker', x: 3050, y: 432, w: 42, h: 48, vx: 75, vy: 0, dir: 1, dead: false, stun: 0 },
        { type: 'hopper', x: 3950, y: 402, w: 42, h: 48, vx: 0, vy: 0, dir: -1, dead: false, timer: 1.2, stun: 0 },
        { type: 'walker', x: 4620, y: 572, w: 42, h: 48, vx: -95, vy: 0, dir: -1, dead: false, stun: 0 },
        { type: 'walker', x: 5560, y: 432, w: 42, h: 48, vx: 85, vy: 0, dir: 1, dead: false, stun: 0 },
        { type: 'hopper', x: 6460, y: 472, w: 42, h: 48, vx: 0, vy: 0, dir: 1, dead: false, timer: 0.5, stun: 0 }
      );

      for (let i = 0; i < 60; i++) {
        level.decorations.push({
          x: 100 + i * 120 + (i % 3) * 25,
          y: floorY - 40,
          h: 20 + (i % 5) * 18,
          hue: i % 2 ? '#7dc37d' : '#68b86f'
        });
      }

      return level;
    }

    const game = {
      mode: 'start',
      cameraX: 0,
      time: 0,
      bestScore: loadBestScore(),
      toast: '',
      toastTimer: 0,
      particles: [],
      level: null,
      player: null,
      checkpoints: [],
      score: 0,
      coinsCollected: 0,
      totalCoins: 0,
      jumpHeld: false,
      reset() {
        this.mode = 'start';
        this.cameraX = 0;
        this.time = 0;
        this.toast = '';
        this.toastTimer = 0;
        this.particles = [];
        this.level = createLevel();
        this.score = 0;
        this.coinsCollected = 0;
        this.totalCoins = this.level.totalCoins;
        this.checkpoints = [{ x: this.level.spawn.x, y: this.level.spawn.y }];
        this.player = {
          x: this.level.spawn.x,
          y: this.level.spawn.y,
          w: 40,
          h: 56,
          vx: 0,
          vy: 0,
          onGround: false,
          facing: 1,
          hp: 3,
          invuln: 0,
          maxHp: 3,
          coyote: 0,
          jumpBuffer: 0,
          jumpCut: false,
          jumpGraceUsed: false,
          hasControl: true
        };
        this.syncOverlays();
        this.updateUI();
      },
      startRun() {
        this.reset();
        this.mode = 'playing';
        this.syncOverlays();
        audio.init();
        if (audio.ctx && audio.ctx.state === 'suspended') audio.ctx.resume();
        audio.beep(400, 0.09, 'triangle', 0.2, 60);
      },
      restartFromMenu() {
        this.startRun();
      },
      syncOverlays() {
        ui.overlayStart.classList.toggle('hidden', this.mode !== 'start');
        ui.overlayClear.classList.toggle('hidden', this.mode !== 'clear');
        ui.overlayGameOver.classList.toggle('hidden', this.mode !== 'gameover');
      },
      setToast(text) {
        this.toast = text;
        this.toastTimer = 1.2;
      },
      award(points) {
        this.score += points;
        if (this.score > this.bestScore) {
          this.bestScore = this.score;
          saveBestScore(this.bestScore);
        }
      },
      respawn() {
        const cp = this.checkpoints[this.checkpoints.length - 1];
        this.player.x = cp.x;
        this.player.y = cp.y;
        this.player.vx = 0;
        this.player.vy = 0;
        this.player.invuln = 1.8;
        this.player.onGround = false;
      },
      damagePlayer() {
        const p = this.player;
        if (p.invuln > 0 || this.mode !== 'playing') return;
        p.hp -= 1;
        p.invuln = 1.8;
        this.setToast(T.hitToast);
        audio.beep(170, 0.16, 'sawtooth', 0.22, -60);
        this.spawnBurst(p.x + p.w / 2, p.y + p.h / 2, '#ff6f91', 10);
        if (p.hp <= 0) {
          p.hp = 0;
          this.mode = 'gameover';
          ui.gameOverSubtitle.textContent = T.gameOverSubtitle(this.bestScore);
          this.syncOverlays();
        } else {
          this.respawn();
        }
      },
      clearStage() {
        if (this.mode !== 'playing') return;
        this.mode = 'clear';
        this.award(500);
        this.setToast(T.stageClearToast);
        audio.beep(520, 0.12, 'triangle', 0.2, 140);
        audio.beep(700, 0.16, 'triangle', 0.18, 120);
        ui.clearSubtitle.textContent = T.clearSubtitle(this.score, this.bestScore);
        this.syncOverlays();
      },
      spawnBurst(x, y, color, count) {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 50 + Math.random() * 180;
          this.particles.push({
            x, y,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 30,
            life: 0.45 + Math.random() * 0.35,
            maxLife: 0.45 + Math.random() * 0.35,
            size: 3 + Math.random() * 4,
            color
          });
        }
      },
      updateUI() {
        ui.valueHealth.textContent = `${T.hearts(this.player.hp)} ${this.player.hp}/${this.player.maxHp}`;
        ui.valueScore.textContent = T.scoreSuffix(this.score);
        ui.valueCoins.textContent = T.ofCoins(this.coinsCollected, this.totalCoins);
        const progress = clamp(Math.round((this.player.x / this.level.goal.x) * 100), 0, 100);
        ui.valueProgress.textContent = T.percent(progress);
        ui.valueBest.textContent = T.bestScorePrefix(this.bestScore);
      }
    };

    function getInput() {
      return {
        left: !!(keys['ArrowLeft'] || keys['KeyA'] || gamepadState.left),
        right: !!(keys['ArrowRight'] || keys['KeyD'] || gamepadState.right),
        jump: !!(keys['Space'] || keys['KeyW'] || keys['ArrowUp'] || gamepadState.jump)
      };
    }

    function getNearbyPlatforms(entity, margin = 120) {
      return game.level.platforms.filter(p =>
        p.x < entity.x + entity.w + margin && p.x + p.w > entity.x - margin &&
        p.y < entity.y + entity.h + margin && p.y + p.h > entity.y - margin
      );
    }

    function moveAndCollide(entity, dt, platforms) {
      entity.x += entity.vx * dt;
      for (const p of platforms) {
        if (!rectsOverlap(entity, p)) continue;
        if (entity.vx > 0) entity.x = p.x - entity.w;
        else if (entity.vx < 0) entity.x = p.x + p.w;
        entity.vx = 0;
      }

      entity.onGround = false;
      entity.y += entity.vy * dt;
      for (const p of platforms) {
        if (!rectsOverlap(entity, p)) continue;
        if (entity.vy > 0) {
          entity.y = p.y - entity.h;
          entity.vy = 0;
          entity.onGround = true;
        } else if (entity.vy < 0) {
          entity.y = p.y + p.h;
          entity.vy = 0;
        }
      }
    }

    function updatePlayer(dt) {
      const p = game.player;
      const input = getInput();
      const accel = 2600;
      const maxSpeed = 320;
      const frictionGround = 1900;
      const frictionAir = 320;
      const gravity = 1800;
      const jumpSpeed = 690;
      const coyoteTime = 0.11;
      const jumpBufferTime = 0.12;

      if (game.mode !== 'playing') return;

      if (input.jump && !game.jumpHeld) {
        p.jumpBuffer = jumpBufferTime;
      }
      game.jumpHeld = input.jump;

      p.jumpBuffer = Math.max(0, p.jumpBuffer - dt);
      p.coyote = p.onGround ? coyoteTime : Math.max(0, p.coyote - dt);
      p.invuln = Math.max(0, p.invuln - dt);

      // 좌우 가속/감속 처리
      if (input.left && !input.right) {
        p.vx -= accel * dt;
        p.facing = -1;
      } else if (input.right && !input.left) {
        p.vx += accel * dt;
        p.facing = 1;
      } else {
        const fr = p.onGround ? frictionGround : frictionAir;
        if (p.vx > 0) p.vx = Math.max(0, p.vx - fr * dt);
        if (p.vx < 0) p.vx = Math.min(0, p.vx + fr * dt);
      }
      p.vx = clamp(p.vx, -maxSpeed, maxSpeed);

      // 코요테 타임 + 점프 버퍼링
      if (p.jumpBuffer > 0 && p.coyote > 0) {
        p.vy = -jumpSpeed;
        p.onGround = false;
        p.coyote = 0;
        p.jumpBuffer = 0;
        p.jumpCut = false;
        audio.beep(360, 0.08, 'square', 0.18, 80);
      }

      // 점프 버튼을 빨리 떼면 높이를 줄임
      if (!input.jump && p.vy < 0 && !p.jumpCut) {
        p.vy *= 0.48;
        p.jumpCut = true;
      }
      if (input.jump && p.vy >= 0) p.jumpCut = false;

      p.vy += gravity * dt;
      p.vy = Math.min(p.vy, 1200);

      const nearby = getNearbyPlatforms(p);
      moveAndCollide(p, dt, nearby);

      if (p.y > game.level.height + 160) {
        game.damagePlayer();
      }

      p.x = clamp(p.x, 0, game.level.width - p.w);

      for (const cp of game.level.checkpoints) {
        if (!cp.active && rectsOverlap(p, cp)) {
          cp.active = true;
          game.checkpoints.push({ x: cp.x - 20, y: cp.y + cp.h - p.h });
          game.setToast(T.checkpointToast);
          audio.beep(620, 0.1, 'triangle', 0.18, 70);
          game.spawnBurst(cp.x, cp.y + 40, '#7ef9d8', 12);
        }
      }

      for (const coin of game.level.coins) {
        if (coin.taken) continue;
        const coinRect = { x: coin.x, y: coin.y + Math.sin(game.time * 5 + coin.bob) * 4, w: coin.w, h: coin.h };
        if (rectsOverlap(p, coinRect)) {
          coin.taken = true;
          game.coinsCollected += 1;
          game.award(100);
          game.setToast(T.coinToast);
          audio.beep(800, 0.06, 'triangle', 0.16, 70);
          game.spawnBurst(coin.x + coin.w / 2, coin.y + coin.h / 2, '#ffd86b', 8);
        }
      }

      if (rectsOverlap(p, game.level.goal)) {
        game.clearStage();
      }
    }

    function updateEnemies(dt) {
      if (game.mode !== 'playing') return;

      for (const e of game.level.enemies) {
        if (e.dead) continue;
        e.stun = Math.max(0, e.stun - dt);

        if (e.type === 'walker') {
          if (e.stun <= 0) e.vx = 110 * e.dir;
        } else if (e.type === 'hopper') {
          e.timer -= dt;
          if (e.timer <= 0 && e.stun <= 0) {
            e.vy = -560;
            e.vx = 120 * e.dir;
            e.timer = 1.5 + Math.random() * 0.5;
            e.dir *= -1;
          }
        }

        e.vy += 1700 * dt;
        e.vy = Math.min(e.vy, 1200);
        const nearby = getNearbyPlatforms(e, 160);
        const prevX = e.x;
        moveAndCollide(e, dt, nearby);

        if (e.type === 'walker' && e.stun <= 0) {
          if (e.x === prevX) e.dir *= -1;
          const frontX = e.dir > 0 ? e.x + e.w + 4 : e.x - 4;
          const footY = e.y + e.h + 6;
          const supported = game.level.platforms.some(p => pointInRect(frontX, footY, p));
          if (!supported) e.dir *= -1;
        }

        if (e.y > game.level.height + 220) {
          e.dead = true;
        }
      }
    }

    function handleEnemyCollisions() {
      if (game.mode !== 'playing') return;
      const p = game.player;

      for (const e of game.level.enemies) {
        if (e.dead) continue;
        if (!rectsOverlap(p, e)) continue;

        const stomp = p.vy > 160 && (p.y + p.h - e.y) < 28;
        if (stomp) {
          e.dead = true;
          p.vy = -460;
          game.award(220);
          game.setToast(T.stompToast);
          audio.beep(260, 0.1, 'square', 0.18, 30);
          game.spawnBurst(e.x + e.w / 2, e.y + e.h / 2, '#72a8ff', 12);
        } else {
          game.damagePlayer();
          if (p.x < e.x) p.vx = -220;
          else p.vx = 220;
        }
      }
    }

    function updateParticles(dt) {
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const p = game.particles[i];
        p.life -= dt;
        if (p.life <= 0) {
          game.particles.splice(i, 1);
          continue;
        }
        p.vy += 520 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
      }
    }

    function updateCamera(dt) {
      const target = clamp(game.player.x - canvas.width * 0.36, 0, game.level.width - canvas.width);
      game.cameraX = lerp(game.cameraX, target, 1 - Math.pow(0.0001, dt));
    }

    function renderBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, '#6ab1ff');
      sky.addColorStop(0.45, '#bfe7ff');
      sky.addColorStop(1, '#f4fcff');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const parallax1 = game.cameraX * 0.18;
      const parallax2 = game.cameraX * 0.34;

      drawMountains('#d5e9f9', 500, 180, 140, parallax1);
      drawMountains('#b9d8ef', 560, 260, 180, parallax2);

      for (let i = 0; i < 9; i++) {
        const cx = ((i * 290 - game.cameraX * 0.12) % (canvas.width + 260)) - 120;
        drawCloud(cx, 120 + (i % 3) * 55, 0.8 + (i % 4) * 0.15);
      }
    }

    function drawMountains(color, baseY, widthStep, maxH, offset) {
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);
      for (let i = -2; i < Math.ceil(canvas.width / widthStep) + 3; i++) {
        const x = i * widthStep - (offset % widthStep);
        const peak = baseY - (i % 2 === 0 ? maxH : maxH * 0.58);
        ctx.lineTo(x, baseY);
        ctx.lineTo(x + widthStep * 0.5, peak);
        ctx.lineTo(x + widthStep, baseY);
      }
      ctx.lineTo(canvas.width, canvas.height);
      ctx.closePath();
      ctx.fill();
    }

    function drawCloud(x, y, scale) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.arc(0, 0, 24, 0, Math.PI * 2);
      ctx.arc(30, -10, 30, 0, Math.PI * 2);
      ctx.arc(65, 0, 26, 0, Math.PI * 2);
      ctx.arc(25, 10, 28, 0, Math.PI * 2);
      ctx.arc(55, 12, 22, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function renderLevel() {
      const cam = game.cameraX;
      const visibleLeft = cam - 80;
      const visibleRight = cam + canvas.width + 80;

      for (const d of game.level.decorations) {
        if (d.x < visibleLeft || d.x > visibleRight) continue;
        const x = d.x - cam;
        const y = d.y;
        ctx.fillStyle = d.hue;
        ctx.fillRect(x, y, 8, d.h);
        ctx.beginPath();
        ctx.arc(x - 8, y + 10, 14, 0, Math.PI * 2);
        ctx.arc(x + 4, y, 18, 0, Math.PI * 2);
        ctx.arc(x + 16, y + 12, 14, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const p of game.level.platforms) {
        if (p.x + p.w < visibleLeft || p.x > visibleRight) continue;
        const x = p.x - cam;
        if (p.type === 'ground') {
          const grd = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
          grd.addColorStop(0, '#6d5c47');
          grd.addColorStop(0.18, '#8b7558');
          grd.addColorStop(0.19, '#76c95b');
          grd.addColorStop(0.28, '#66b64e');
          grd.addColorStop(1, '#594635');
          ctx.fillStyle = grd;
          ctx.fillRect(x, p.y, p.w, p.h);
          ctx.fillStyle = 'rgba(0,0,0,0.08)';
          for (let i = 0; i < p.w; i += 28) ctx.fillRect(x + i, p.y + 24, 3, p.h - 24);
        } else {
          const grd = ctx.createLinearGradient(0, p.y, 0, p.y + p.h);
          grd.addColorStop(0, '#a88662');
          grd.addColorStop(0.18, '#f0d2a2');
          grd.addColorStop(0.2, '#7cdb67');
          grd.addColorStop(1, '#7c5e45');
          ctx.fillStyle = grd;
          roundRect(ctx, x, p.y, p.w, p.h, 8, true);
        }
      }

      for (const cp of game.level.checkpoints) {
        const x = cp.x - cam;
        if (x < -40 || x > canvas.width + 40) continue;
        ctx.fillStyle = cp.active ? '#7ef9d8' : '#cfd9ea';
        ctx.fillRect(x, cp.y, 6, cp.h);
        ctx.beginPath();
        ctx.moveTo(x + 6, cp.y + 10);
        ctx.lineTo(x + 56, cp.y + 34);
        ctx.lineTo(x + 6, cp.y + 58);
        ctx.closePath();
        ctx.fill();
      }

      const gx = game.level.goal.x - cam;
      ctx.fillStyle = '#55463d';
      ctx.fillRect(gx, game.level.goal.y, 8, game.level.goal.h);
      ctx.fillStyle = '#ff7b7b';
      ctx.beginPath();
      ctx.moveTo(gx + 8, game.level.goal.y + 10);
      ctx.lineTo(gx + 72, game.level.goal.y + 40);
      ctx.lineTo(gx + 8, game.level.goal.y + 70);
      ctx.closePath();
      ctx.fill();

      for (const coin of game.level.coins) {
        if (coin.taken) continue;
        const y = coin.y + Math.sin(game.time * 5 + coin.bob) * 4;
        const x = coin.x - cam;
        if (x < -30 || x > canvas.width + 30) continue;
        ctx.save();
        ctx.translate(x + 12, y + 12);
        ctx.rotate(game.time * 4 + coin.bob);
        ctx.fillStyle = '#ffd86b';
        ctx.beginPath();
        ctx.arc(0, 0, 11, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff0b0';
        ctx.beginPath();
        ctx.arc(-2, -2, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function renderEnemies() {
      const cam = game.cameraX;
      for (const e of game.level.enemies) {
        if (e.dead) continue;
        const x = e.x - cam;
        if (x < -80 || x > canvas.width + 80) continue;
        ctx.save();
        ctx.translate(x, e.y);

        if (e.type === 'walker') {
          ctx.fillStyle = '#6b4ee6';
          roundRect(ctx, 0, 8, e.w, e.h - 8, 10, true);
          ctx.fillStyle = '#b7a6ff';
          roundRect(ctx, 6, 0, e.w - 12, 18, 8, true);
          ctx.fillStyle = '#fff';
          ctx.fillRect(10, 10, 6, 6);
          ctx.fillRect(26, 10, 6, 6);
          ctx.fillStyle = '#1d1739';
          ctx.fillRect(12 + (e.dir > 0 ? 1 : -1), 12, 2, 2);
          ctx.fillRect(28 + (e.dir > 0 ? 1 : -1), 12, 2, 2);
        } else {
          ctx.fillStyle = '#ff8b50';
          roundRect(ctx, 0, 8, e.w, e.h - 8, 12, true);
          ctx.fillStyle = '#ffd5b2';
          ctx.beginPath();
          ctx.arc(12, 18, 8, 0, Math.PI * 2);
          ctx.arc(30, 18, 8, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#2d1b10';
          ctx.fillRect(10, 17, 3, 3);
          ctx.fillRect(29, 17, 3, 3);
        }

        ctx.restore();
      }
    }

    function renderPlayer() {
      const p = game.player;
      const x = p.x - game.cameraX;
      const blink = p.invuln > 0 && Math.floor(game.time * 18) % 2 === 0;
      if (blink) return;

      ctx.save();
      ctx.translate(x, p.y);

      ctx.fillStyle = '#203759';
      roundRect(ctx, 8, 0, 24, 18, 9, true);
      ctx.fillStyle = '#ffd9b6';
      roundRect(ctx, 10, 4, 20, 18, 9, true);

      ctx.fillStyle = '#17a2ff';
      roundRect(ctx, 4, 20, 32, 24, 8, true);
      ctx.fillStyle = '#0c76bf';
      ctx.fillRect(15, 20, 10, 24);
      ctx.fillStyle = '#2b3d66';
      ctx.fillRect(7, 44, 10, 12);
      ctx.fillRect(23, 44, 10, 12);
      ctx.fillStyle = '#1b2640';
      ctx.fillRect(5, 52, 12, 4);
      ctx.fillRect(23, 52, 12, 4);

      ctx.fillStyle = '#1d243c';
      ctx.fillRect(14, 10, 3, 3);
      ctx.fillRect(23, 10, 3, 3);
      ctx.fillRect(p.facing > 0 ? 27 : 7, 26, 12, 4);

      ctx.restore();
    }

    function renderParticles() {
      const cam = game.cameraX;
      for (const p of game.particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - cam, p.y, p.size, p.size);
      }
      ctx.globalAlpha = 1;
    }

    function renderToast() {
      if (game.toastTimer <= 0) return;
      ctx.save();
      ctx.globalAlpha = Math.min(1, game.toastTimer * 1.5);
      ctx.fillStyle = 'rgba(6,16,24,0.72)';
      roundRect(ctx, canvas.width / 2 - 120, 84, 240, 40, 12, true);
      ctx.fillStyle = '#fff';
      ctx.font = '700 20px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText(game.toast, canvas.width / 2, 111);
      ctx.restore();
    }

    function renderScanlines() {
      ctx.save();
      ctx.globalAlpha = 0.04;
      ctx.fillStyle = '#000';
      for (let y = 0; y < canvas.height; y += 4) ctx.fillRect(0, y, canvas.width, 1);
      ctx.restore();
    }

    function render() {
      renderBackground();
      renderLevel();
      renderEnemies();
      renderPlayer();
      renderParticles();
      renderToast();
      renderScanlines();
    }

    function roundRect(ctx, x, y, w, h, r, fill) {
      const rr = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + rr, y);
      ctx.arcTo(x + w, y, x + w, y + h, rr);
      ctx.arcTo(x + w, y + h, x, y + h, rr);
      ctx.arcTo(x, y + h, x, y, rr);
      ctx.arcTo(x, y, x + w, y, rr);
      ctx.closePath();
      if (fill) ctx.fill();
    }

    function updateGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      const p = pads && pads[0];
      if (!p) {
        gamepadState.left = false;
        gamepadState.right = false;
        gamepadState.jump = false;
        return;
      }
      const axisX = p.axes[0] || 0;
      gamepadState.left = axisX < -0.35 || !!(p.buttons[14] && p.buttons[14].pressed);
      gamepadState.right = axisX > 0.35 || !!(p.buttons[15] && p.buttons[15].pressed);
      gamepadState.jump = !!((p.buttons[0] && p.buttons[0].pressed) || (p.buttons[12] && p.buttons[12].pressed));
    }

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(1 / 30, (now - last) / 1000);
      last = now;
      game.time += dt;
      updateGamepad();

      if (game.mode === 'playing') {
        updatePlayer(dt);
        updateEnemies(dt);
        handleEnemyCollisions();
        updateParticles(dt);
        updateCamera(dt);
        game.toastTimer = Math.max(0, game.toastTimer - dt);
        game.updateUI();
      } else {
        updateParticles(dt);
        game.toastTimer = Math.max(0, game.toastTimer - dt);
        game.updateUI();
      }

      render();
      requestAnimationFrame(loop);
    }

    function onKeyDown(e) {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) e.preventDefault();
      keys[e.code] = true;
      if (game.mode === 'start' && (e.code === 'Enter' || e.code === 'Space')) game.startRun();
      if ((game.mode === 'clear' || game.mode === 'gameover') && (e.code === 'Enter' || e.code === 'Space')) game.restartFromMenu();
    }

    function onKeyUp(e) {
      keys[e.code] = false;
    }

    window.addEventListener('keydown', onKeyDown, { passive: false });
    window.addEventListener('keyup', onKeyUp);

    ui.startBtn.addEventListener('click', () => game.startRun());
    ui.clearRestartBtn.addEventListener('click', () => game.restartFromMenu());
    ui.gameOverRestartBtn.addEventListener('click', () => game.restartFromMenu());

    window.addEventListener('pointerdown', () => {
      audio.init();
      if (audio.ctx && audio.ctx.state === 'suspended') audio.ctx.resume();
    });

    game.reset();
    requestAnimationFrame(loop);
  </script>
</body>
