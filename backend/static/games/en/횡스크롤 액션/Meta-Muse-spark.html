<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    color: white;
  }
  #gameWrap {
    position: relative;
    width: 960px;
    height: 540px;
    box-shadow: 0 0 40px rgba(138, 43, 226, 0.5);
    border-radius: 8px;
    overflow: hidden;
  }
  canvas {
    display: block;
    background: #0f0f1e;
    width: 100%;
    height: 100%;
  }
  .overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(10,10,20,0.95), rgba(20,10,40,0.9));
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    text-align: center;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  .hidden { display: none !important; }
  h1 {
    font-size: 64px; font-weight: 900;
    background: linear-gradient(90deg, #00f5ff, #8a2be2);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
    text-shadow: 0 0 30px rgba(138,43,226,0.5);
  }
  h2 { font-size: 28px; margin-bottom: 30px; opacity: 0.8; }
  .btn {
    margin-top: 20px; padding: 14px 36px;
    font-size: 20px; font-weight: 700;
    background: linear-gradient(90deg, #8a2be2, #00f5ff);
    border: none; border-radius: 50px;
    color: white; cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 0 20px rgba(138,43,226,0.6);
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,245,255,0.8); }
  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 16px 24px;
    display: flex; justify-content: space-between;
    font-size: 18px; font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    z-index: 5; pointer-events: none;
  }
  .ui-left, .ui-right { display: flex; gap: 24px; align-items: center; }
  .hearts { display: flex; gap: 4px; }
  .heart { width: 24px; height: 24px; }
  #controls { margin-top: 30px; opacity: 0.6; font-size: 14px; }
</style>
</head>
<body>
<div id="gameWrap">
  <canvas id="game" width="960" height="540"></canvas>
  
  <div id="ui">
    <div class="ui-left">
      <div id="hpDisplay"></div>
      <div id="coinDisplay">💰 0</div>
    </div>
    <div class="ui-right">
      <div id="scoreDisplay">0</div>
    </div>
  </div>

  <div id="startScreen" class="overlay">
    <h1 id="t_title">네온 플랫폼</h1>
    <h2 id="t_subtitle">중력을 이겨라!</h2>
    <button class="btn" id="startBtn">게임 시작 [Enter]</button>
    <div id="controls">← → or A D 이동 | SPACE / W / ↑ 점프</div>
    <div style="margin-top:16px; opacity:0.7" id="t_highscore">최고 기록: 0</div>
  </div>

  <div id="gameOverScreen" class="overlay hidden">
    <h1 id="t_gameover" style="-webkit-text-fill-color:#ff3b5c">게임 오버</h1>
    <h2 id="finalScoreGO"></h2>
    <button class="btn" id="restartBtn1">다시 시작 [R]</button>
  </div>

  <div id="clearScreen" class="overlay hidden">
    <h1 id="t_clear" style="-webkit-text-fill-color:#00ffaa">스테이지 클리어!</h1>
    <h2 id="finalScoreClear"></h2>
    <button class="btn" id="restartBtn2">다시 시작 [R]</button>
  </div>
</div>

<script>
// ==================== 언어 데이터 ====================
const LANG_DATA = {
  ko: {
    GAME_TITLE: "네온 플랫폼",
    GAME_SUBTITLE: "중력을 이겨라!",
    START_BUTTON: "게임 시작 [Enter]",
    RESTART_BUTTON: "다시 시작 [R]",
    GAME_OVER: "게임 오버",
    GAME_CLEAR: "스테이지 클리어!",
    HP: "체력",
    SCORE: "점수",
    COINS: "코인",
    HIGH_SCORE: "최고 기록",
    CONTROLS: "← → or A D 이동 | SPACE / W / ↑ 점프",
    FINAL_SCORE: "최종 점수"
  },
  en: {
    GAME_TITLE: "NEON PLATFORM",
    GAME_SUBTITLE: "Defy Gravity!",
    START_BUTTON: "START [Enter]",
    RESTART_BUTTON: "RETRY [R]",
    GAME_OVER: "GAME OVER",
    GAME_CLEAR: "STAGE CLEAR!",
    HP: "HP",
    SCORE: "SCORE",
    COINS: "COINS",
    HIGH_SCORE: "HIGH SCORE",
    CONTROLS: "← → or A D Move | SPACE / W / ↑ Jump",
    FINAL_SCORE: "FINAL SCORE"
  }
};
const LANG = LANG_DATA.en;

// DOM 텍스트 적용
document.getElementById('t_title').textContent = LANG.GAME_TITLE;
document.getElementById('t_subtitle').textContent = LANG.GAME_SUBTITLE;
document.getElementById('startBtn').textContent = LANG.START_BUTTON;
document.getElementById('t_gameover').textContent = LANG.GAME_OVER;
document.getElementById('t_clear').textContent = LANG.GAME_CLEAR;
document.getElementById('restartBtn1').textContent = LANG.RESTART_BUTTON;
document.getElementById('restartBtn2').textContent = LANG.RESTART_BUTTON;
document.getElementById('controls').textContent = LANG.CONTROLS;

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let audioCtx;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
function playSound(freq, dur, type='square', vol=0.08) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

// ==================== 게임 상태 ====================
const GAME = {
  state: 'START', // START, PLAYING, GAMEOVER, CLEAR
  score: 0,
  coins: 0,
  highScore: parseInt(localStorage.getItem('neonPlatformHS') || '0'),
  time: 0
};

const PLAYER = {
  x: 0, y: 0, w: 28, h: 36,
  vx: 0, vy: 0,
  speed: 0.7, maxSpeed: 5.2, friction: 0.82,
  gravity: 0.65, jumpPower: -14.5,
  onGround: false,
  coyote: 0, coyoteMax: 7,
  jumpBuffer: 0, jumpBufferMax: 7,
  facing: 1,
  health: 3, maxHealth: 3,
  invuln: 0,
  dead: false
};

let keys = {};
let cameraX = 0;
let particles = [];
let platforms = [], coins = [], enemies = [], flag = {};

// 레벨 데이터 (화면 4배 길이)
function buildLevel() {
  platforms = [
    {x:0, y:500, w:4800, h:60}, // 바닥
    {x:200, y:420, w:120, h:20},
    {x:380, y:360, w:100, h:20},
    {x:560, y:300, w:140, h:20},
    {x:780, y:380, w:90, h:20},
    {x:960, y:320, w:120, h:20},
    {x:1180, y:260, w:100, h:20},
    {x:1400, y:340, w:160, h:20},
    {x:1650, y:400, w:80, h:20},
    {x:1820, y:320, w:120, h:20},
    {x:2020, y:250, w:100, h:20},
    {x:2250, y:380, w:200, h:20},
    {x:2520, y:300, w:90, h:20},
    {x:2700, y:420, w:140, h:20},
    {x:2930, y:340, w:110, h:20},
    {x:3150, y:260, w:130, h:20},
    {x:3380, y:380, w:100, h:20},
    {x:3580, y:300, w:120, h:20},
    {x:3800, y:420, w:200, h:20},
    {x:4100, y:360, w:150, h:20},
    {x:4350, y:440, w:300, h:20},
  ];
  coins = [
    {x:240,y:380},{x:420,y:320},{x:600,y:260},{x:820,y:340},
    {x:1000,y:280},{x:1220,y:220},{x:1450,y:300},{x:1480,y:300},
    {x:1690,y:360},{x:1860,y:280},{x:2060,y:210},{x:2300,y:340},
    {x:2560,y:260},{x:2740,y:380},{x:2970,y:300},{x:3200,y:220},
    {x:3420,y:340},{x:3620,y:260},{x:3880,y:380},{x:4150,y:320}
  ].map(c => ({...c, collected:false, bob:Math.random()*6}));
  
  enemies = [
    {type:'slime', x:500, y:470, w:32, h:24, vx:1.2, left:450, right:650, dir:1, alive:true},
    {type:'slime', x:1450, y:310, w:32, h:24, vx:1.5, left:1400, right:1550, dir:-1, alive:true},
    {type:'slime', x:2750, y:390, w:32, h:24, vx:1.3, left:2700, right:2830, dir:1, alive:true},
    {type:'fly', x:900, y:200, w:30, h:22, baseY:200, t:0, amp:60, speed:0.02, alive:true},
    {type:'fly', x:2100, y:150, w:30, h:22, baseY:150, t:2, amp:80, speed:0.025, alive:true},
    {type:'fly', x:3300, y:180, w:30, h:22, baseY:180, t:4, amp:70, speed:0.022, alive:true},
  ];
  flag = {x:4450, y:380, w:40, h:60, reached:false};
}

function resetGame() {
  GAME.score = 0;
  GAME.coins = 0;
  GAME.time = 0;
  GAME.state = 'PLAYING';
  PLAYER.x = 80; PLAYER.y = 400;
  PLAYER.vx = 0; PLAYER.vy = 0;
  PLAYER.health = PLAYER.maxHealth;
  PLAYER.invuln = 0; PLAYER.dead = false;
  PLAYER.onGround = false;
  cameraX = 0;
  particles = [];
  buildLevel();
  updateUI();
}

function updateUI() {
  document.getElementById('scoreDisplay').textContent = `${LANG.SCORE} ${GAME.score}`;
  document.getElementById('coinDisplay').textContent = `💰 ${GAME.coins}/20`;
  const hpEl = document.getElementById('hpDisplay');
  hpEl.innerHTML = '';
  const hearts = document.createElement('div');
  hearts.className = 'hearts';
  for(let i=0;i<PLAYER.maxHealth;i++){
    const h = document.createElement('canvas');
    h.width=24; h.height=24; h.className='heart';
    const hc = h.getContext('2d');
    hc.fillStyle = i < PLAYER.health ? '#ff3b6a' : '#333';
    hc.beginPath();
    hc.moveTo(12,20); hc.bezierCurveTo(2,14,0,8,6,4); hc.bezierCurveTo(9,2,12,5,12,8);
    hc.bezierCurveTo(12,5,15,2,18,4); hc.bezierCurveTo(24,8,22,14,12,20);
    hc.fill();
    hearts.appendChild(h);
  }
  hpEl.appendChild(hearts);
  document.getElementById('t_highscore').textContent = `${LANG.HIGH_SCORE}: ${GAME.highScore}`;
}

// ==================== 입력 ====================
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') PLAYER.jumpBuffer = PLAYER.jumpBufferMax;
  if (e.code === 'Enter' && GAME.state === 'START') startGame();
  if (e.code === 'KeyR' && (GAME.state === 'GAMEOVER' || GAME.state === 'CLEAR')) startGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function getInput() {
  let left = keys['ArrowLeft'] || keys['KeyA'];
  let right = keys['ArrowRight'] || keys['KeyD'];
  let jump = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
  // Gamepad
  const gp = navigator.getGamepads()[0];
  if (gp) {
    if (gp.axes[0] < -0.4) left = true;
    if (gp.axes[0] > 0.4) right = true;
    if (gp.buttons[0].pressed || gp.buttons[1].pressed) { jump = true; PLAYER.jumpBuffer = PLAYER.jumpBufferMax; }
  }
  return {left, right, jump};
}

// ==================== 물리 & 업데이트 ====================
function rectCollide(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

function updatePlayer() {
  const inp = getInput();
  
  // 이동
  if (inp.left) { PLAYER.vx -= PLAYER.speed; PLAYER.facing = -1; }
  if (inp.right) { PLAYER.vx += PLAYER.speed; PLAYER.facing = 1; }
  PLAYER.vx *= PLAYER.friction;
  PLAYER.vx = Math.max(-PLAYER.maxSpeed, Math.min(PLAYER.maxSpeed, PLAYER.vx));
  
  // 코요테 타임
  if (PLAYER.onGround) PLAYER.coyote = PLAYER.coyoteMax; else PLAYER.coyote--;
  if (PLAYER.jumpBuffer > 0) PLAYER.jumpBuffer--;
  
  // 점프
  if (PLAYER.jumpBuffer > 0 && PLAYER.coyote > 0) {
    PLAYER.vy = PLAYER.jumpPower;
    PLAYER.onGround = false;
    PLAYER.coyote = 0;
    PLAYER.jumpBuffer = 0;
    playSound(520, 0.08, 'sawtooth', 0.07);
    spawnParticles(PLAYER.x+PLAYER.w/2, PLAYER.y+PLAYER.h, 6, '#00f5ff');
  }
  // 가변 점프
  if (!inp.jump && PLAYER.vy < -4) PLAYER.vy *= 0.55;
  
  PLAYER.vy += PLAYER.gravity;
  
  // X 이동 & 충돌
  PLAYER.x += PLAYER.vx;
  for (const p of platforms) {
    if (rectCollide(PLAYER, p)) {
      if (PLAYER.vx > 0) PLAYER.x = p.x - PLAYER.w;
      else if (PLAYER.vx < 0) PLAYER.x = p.x + p.w;
      PLAYER.vx = 0;
    }
  }
  
  // Y 이동 & 충돌
  PLAYER.y += PLAYER.vy;
  PLAYER.onGround = false;
  for (const p of platforms) {
    if (rectCollide(PLAYER, p)) {
      if (PLAYER.vy > 0) { PLAYER.y = p.y - PLAYER.h; PLAYER.vy = 0; PLAYER.onGround = true; }
      else if (PLAYER.vy < 0) { PLAYER.y = p.y + p.h; PLAYER.vy = 0; }
    }
  }
  
  // 무적 시간
  if (PLAYER.invuln > 0) PLAYER.invuln--;
  
  // 낙사
  if (PLAYER.y > 650) hurtPlayer(3);
  
  // 카메라
  const targetCam = PLAYER.x - canvas.width * 0.35;
  cameraX += (targetCam - cameraX) * 0.1;
  cameraX = Math.max(0, Math.min(4800 - canvas.width, cameraX));
}

function updateEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    if (e.type === 'slime') {
      e.x += e.vx * e.dir;
      if (e.x < e.left || e.x + e.w > e.right) e.dir *= -1;
    } else {
      e.t += e.speed;
      e.y = e.baseY + Math.sin(e.t * Math.PI * 2) * e.amp;
      e.x -= 0.8;
      if (e.x < cameraX - 100) e.x = cameraX + canvas.width + 100;
    }
    // 플레이어와 충돌
    if (PLAYER.invuln === 0 && rectCollide(PLAYER, e)) {
      const fromTop = PLAYER.vy > 0 && PLAYER.y + PLAYER.h - 12 < e.y;
      if (fromTop) {
        e.alive = false;
        PLAYER.vy = -10;
        GAME.score += 200;
        playSound(700, 0.06, 'triangle', 0.08);
        spawnParticles(e.x+e.w/2, e.y+e.h/2, 10, '#ff3b6a');
      } else {
        hurtPlayer(1);
      }
    }
  }
}

function hurtPlayer(dmg) {
  if (PLAYER.invuln > 0 || PLAYER.dead) return;
  PLAYER.health -= dmg;
  PLAYER.invuln = 90;
  PLAYER.vy = -8;
  PLAYER.vx = -PLAYER.facing * 4;
  playSound(180, 0.15, 'sawtooth', 0.1);
  spawnParticles(PLAYER.x+PLAYER.w/2, PLAYER.y+PLAYER.h/2, 12, '#ff3b5c');
  updateUI();
  if (PLAYER.health <= 0) {
    PLAYER.dead = true;
    setTimeout(() => gameOver(), 600);
  }
}

function updateCoins() {
  for (const c of coins) {
    if (c.collected) continue;
    c.bob += 0.1;
    const coinRect = {x:c.x, y:c.y+Math.sin(c.bob)*4, w:20, h:20};
    if (rectCollide(PLAYER, coinRect)) {
      c.collected = true;
      GAME.coins++; GAME.score += 100;
      playSound(880, 0.05, 'sine', 0.07); setTimeout(()=>playSound(1320,0.05,'sine',0.06),60);
      spawnParticles(c.x+10, c.y+10, 8, '#ffd700');
      updateUI();
    }
  }
}

function updateFlag() {
  if (flag.reached) return;
  if (Math.abs((PLAYER.x+PLAYER.w/2) - (flag.x+20)) < 30 && PLAYER.y + PLAYER.h > flag.y) {
    flag.reached = true;
    GAME.score += 1000;
    playSound(600,0.1,'triangle'); setTimeout(()=>playSound(800,0.1),120); setTimeout(()=>playSound(1000,0.2),240);
    spawnParticles(flag.x, flag.y, 30, '#00ffaa');
    setTimeout(() => gameClear(), 800);
  }
}

function spawnParticles(x,y,count,color) {
  for(let i=0;i<count;i++){
    particles.push({
      x, y,
      vx: (Math.random()-0.5)*5,
      vy: (Math.random()-1.5)*5,
      life: 30+Math.random()*20,
      color
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life--; }
}

// ==================== 렌더링 ====================
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  // 배경 그라디언트
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#0f0f2a'); g.addColorStop(1,'#1a0f2e');
  ctx.fillStyle = g; ctx.fillRect(0,0,canvas.width,canvas.height);
  
  // 별 패럴랙스
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for(let i=0;i<80;i++){
    const sx = (i*123 % 2000 - cameraX*0.2) % canvas.width;
    const sy = (i*57 % 400) + 20;
    ctx.fillRect(sx, sy, 2, 2);
  }
  
  ctx.save(); ctx.translate(-cameraX, 0);
  
  // 플랫폼
  for(const p of platforms){
    ctx.fillStyle = '#1e1e3a';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.strokeStyle = '#8a2be2'; ctx.lineWidth = 3;
    ctx.strokeRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = 'rgba(0,245,255,0.15)';
    ctx.fillRect(p.x, p.y, p.w, 4);
  }
  
  // 깃발
  ctx.fillStyle = '#444'; ctx.fillRect(flag.x+18, flag.y-40, 4, 100);
  ctx.fillStyle = flag.reached ? '#00ffaa' : '#ff3b5c';
  ctx.beginPath(); ctx.moveTo(flag.x+22, flag.y-40); ctx.lineTo(flag.x+22+36, flag.y-25); ctx.lineTo(flag.x+22, flag.y-10); ctx.fill();
  
  // 코인
  for(const c of coins){
    if(c.collected) continue;
    const y = c.y + Math.sin(c.bob)*4;
    ctx.save(); ctx.translate(c.x+10 - cameraX*0, y+10);
    ctx.rotate(GAME.time*0.05);
    ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(0,0,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffaa00'; ctx.beginPath(); ctx.arc(0,0,5,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  
  // 적
  for(const e of enemies){
    if(!e.alive) continue;
    if(e.type==='slime'){
      ctx.fillStyle = '#39ff6a'; ctx.beginPath();
      ctx.arc(e.x+e.w/2, e.y+e.h/2, e.w/2, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#0a0'; ctx.fillRect(e.x+6, e.y+6, 5,5); ctx.fillRect(e.x+20, e.y+6, 5,5);
    } else {
      ctx.fillStyle = '#ff3b6a'; ctx.save(); ctx.translate(e.x+e.w/2, e.y+e.h/2);
      ctx.rotate(Math.sin(GAME.time*0.1)*0.2);
      ctx.beginPath(); ctx.moveTo(-15,0); ctx.lineTo(15,-8); ctx.lineTo(15,8); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }
  
  // 플레이어
  if (!(PLAYER.invuln > 0 && Math.floor(GAME.time/4)%2===0)) {
    ctx.fillStyle = '#00f5ff';
    ctx.fillRect(PLAYER.x, PLAYER.y, PLAYER.w, PLAYER.h);
    ctx.fillStyle = '#fff';
    ctx.fillRect(PLAYER.x + (PLAYER.facing>0?18:6), PLAYER.y+8, 6,6);
    ctx.fillStyle = '#8a2be2';
    ctx.fillRect(PLAYER.x, PLAYER.y+PLAYER.h-6, PLAYER.w, 6);
  }
  
  // 파티클
  for(const p of particles){
    ctx.globalAlpha = p.life/50;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  }
  ctx.globalAlpha = 1;
  
  ctx.restore();
  
  // 진행 바
  const progress = Math.min(1, PLAYER.x / flag.x);
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(20, canvas.height-18, 200, 8);
  ctx.fillStyle = '#00f5ff'; ctx.fillRect(20, canvas.height-18, 200*progress, 8);
}

function gameLoop() {
  if (GAME.state === 'PLAYING') {
    GAME.time++;
    updatePlayer();
    updateEnemies();
    updateCoins();
    updateFlag();
    updateParticles();
  }
  draw();
  requestAnimationFrame(gameLoop);
}

// ==================== 화면 전환 ====================
function showScreen(id) {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('clearScreen').classList.add('hidden');
  if (id) document.getElementById(id).classList.remove('hidden');
}

function startGame() {
  initAudio();
  resetGame();
  showScreen(null);
  GAME.state = 'PLAYING';
}

function gameOver() {
  GAME.state = 'GAMEOVER';
  document.getElementById('finalScoreGO').textContent = `${LANG.FINAL_SCORE}: ${GAME.score}`;
  showScreen('gameOverScreen');
  updateHighScore();
}

function gameClear() {
  GAME.state = 'CLEAR';
  document.getElementById('finalScoreClear').textContent = `${LANG.FINAL_SCORE}: ${GAME.score}`;
  showScreen('clearScreen');
  updateHighScore();
}

function updateHighScore() {
  if (GAME.score > GAME.highScore) {
    GAME.highScore = GAME.score;
    localStorage.setItem('neonPlatformHS', GAME.highScore);
  }
  updateUI();
}

// 버튼 이벤트
document.getElementById('startBtn').onclick = startGame;
document.getElementById('restartBtn1').onclick = startGame;
document.getElementById('restartBtn2').onclick = startGame;

// 초기화
buildLevel();
updateUI();
showScreen('startScreen');
gameLoop();
</script>
</body>
</html>
