<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Starlight Platform Adventure</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(8, 17, 31, 0.82);
      --line: rgba(255,255,255,0.18);
      --text: #eef7ff;
      --muted: #a9bdd6;
      --accent: #53e0ff;
      --accent2: #ffd45d;
      --danger: #ff5d7a;
      --good: #71f6a1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(83, 224, 255, 0.18), transparent 28%),
        radial-gradient(circle at 80% 70%, rgba(255, 212, 93, 0.12), transparent 30%),
        linear-gradient(180deg, #07101e 0%, #0c1830 60%, #05070d 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    .game-shell {
      width: min(96vw, 1060px);
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255,255,255,0.07);
      box-shadow: 0 16px 40px rgba(0,0,0,0.26);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, #53e0ff, #7769ff);
      box-shadow: 0 0 24px rgba(83,224,255,0.35);
    }

    .hud {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .chip {
      min-width: 86px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(0,0,0,0.22);
      color: var(--text);
      text-align: center;
      font-weight: 800;
    }

    .canvas-wrap {
      position: relative;
      width: 960px;
      max-width: 96vw;
      aspect-ratio: 16 / 9;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 28px 80px rgba(0,0,0,0.52),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      background: #06101f;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: auto;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 20%, rgba(83,224,255,0.18), transparent 32%),
        rgba(3, 7, 15, 0.70);
      backdrop-filter: blur(6px);
      z-index: 5;
    }

    .overlay.active { display: grid; }

    .menu-card {
      width: min(640px, 92%);
      padding: 28px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 28px;
      background: var(--panel);
      box-shadow: 0 22px 80px rgba(0,0,0,0.5);
      text-align: center;
    }

    .menu-card h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .menu-card p {
      margin: 10px auto;
      max-width: 520px;
      color: var(--muted);
      line-height: 1.7;
      word-break: keep-all;
    }

    .menu-card .result {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.08);
      color: var(--text);
      font-weight: 900;
    }

    .buttons {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      padding: 12px 18px;
      border-radius: 999px;
      color: #04101d;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 10px 24px rgba(83,224,255,0.22);
      transition: transform 120ms ease, filter 120ms ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.08); }
    button:active { transform: translateY(1px) scale(0.98); }

    .sub-button {
      color: var(--text);
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--line);
      box-shadow: none;
    }

    .help {
      width: 100%;
      text-align: center;
      color: rgba(238,247,255,0.72);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      .topbar {
        align-items: stretch;
        flex-direction: column;
      }
      .hud { justify-content: center; }
      .chip { min-width: 72px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">⭐</div>
        <div id="brandTitle"></div>
      </div>
      <div class="hud">
        <div class="chip" id="lifeChip"></div>
        <div class="chip" id="scoreChip"></div>
        <div class="chip" id="coinChip"></div>
        <div class="chip" id="progressChip"></div>
        <div class="chip" id="bestChip"></div>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game" width="960" height="540"></canvas>

      <div class="overlay active" id="menuOverlay">
        <div class="menu-card">
          <h1 id="menuTitle"></h1>
          <p id="menuDesc"></p>
          <p id="menuControl"></p>
          <div class="buttons">
            <button id="startButton"></button>
          </div>
        </div>
      </div>

      <div class="overlay" id="endOverlay">
        <div class="menu-card">
          <h1 id="endTitle"></h1>
          <p id="endDesc"></p>
          <div class="result" id="endResult"></div>
          <div class="buttons">
            <button id="restartButton"></button>
            <button class="sub-button" id="menuButton"></button>
          </div>
        </div>
      </div>
    </div>

    <div class="help" id="footerHelp"></div>
  </div>

  <script>
    const LANG_DATA = {
      ko: {
        gameTitle: "Starlight Platform Adventure",
        startTitle: "Starlight Platform Adventure",
        startDesc: "A 2D platform action game with acceleration, friction, variable jump height, and coyote time. Collect coins, stomp or avoid enemies, and reach the goal flag.",
        startControl: "Controls: ←/→ or A/D Move · Space/W/↑ Jump · R Restart · P Paused",
        startButton: "Start Game",
        restartButton: "Restart",
        menuButton: "Main Menu",
        clearTitle: "Stage Clear!",
        clearDesc: "You reached the flag. Your record has been saved.",
        gameOverTitle: "Game Over",
        gameOverDesc: "You ran out of health or fell into a pit.",
        resultScore: "Score",
        resultCoins: "Coins",
        resultBest: "Best",
        life: "Health",
        score: "Score",
        coins: "Coins",
        progress: "Progress",
        best: "Best",
        paused: "Paused",
        ready: "Ready",
        playing: "Playing",
        cleared: "Clear",
        failed: "Failed",
        footerHelp: "Fully playable with keyboard, with basic gamepad support.",
        hintJump: "Tap for a low jump, hold for a higher jump.",
        hintStomp: "Stomp enemies from above to defeat them.",
        hintFlag: "Reach the flag at the far right."
      }
    };

    const TEXT = LANG_DATA.ko;

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const dom = {
      brandTitle: document.getElementById("brandTitle"),
      lifeChip: document.getElementById("lifeChip"),
      scoreChip: document.getElementById("scoreChip"),
      coinChip: document.getElementById("coinChip"),
      progressChip: document.getElementById("progressChip"),
      bestChip: document.getElementById("bestChip"),
      menuOverlay: document.getElementById("menuOverlay"),
      endOverlay: document.getElementById("endOverlay"),
      menuTitle: document.getElementById("menuTitle"),
      menuDesc: document.getElementById("menuDesc"),
      menuControl: document.getElementById("menuControl"),
      startButton: document.getElementById("startButton"),
      endTitle: document.getElementById("endTitle"),
      endDesc: document.getElementById("endDesc"),
      endResult: document.getElementById("endResult"),
      restartButton: document.getElementById("restartButton"),
      menuButton: document.getElementById("menuButton"),
      footerHelp: document.getElementById("footerHelp")
    };

    dom.brandTitle.textContent = TEXT.gameTitle;
    dom.menuTitle.textContent = TEXT.startTitle;
    dom.menuDesc.textContent = TEXT.startDesc;
    dom.menuControl.textContent = TEXT.startControl;
    dom.startButton.textContent = TEXT.startButton;
    dom.restartButton.textContent = TEXT.restartButton;
    dom.menuButton.textContent = TEXT.menuButton;
    dom.footerHelp.textContent = TEXT.footerHelp;

    const STORAGE_KEY = "star_platformer_best_score_v1";
    const W = canvas.width;
    const H = canvas.height;
    const WORLD_W = 4300;
    const GRAVITY = 2300;
    const PLAYER_MAX_SPEED = 310;
    const PLAYER_ACCEL = 1900;
    const PLAYER_FRICTION = 1700;
    const JUMP_VELOCITY = -760;
    const JUMP_CUT = 0.48;
    const COYOTE_TIME = 0.105;
    const JUMP_BUFFER = 0.13;

    let audioCtx = null;
    let lastTime = performance.now();
    let state = "start";
    let paused = false;
    let camera = { x: 0, y: 0 };
    let keys = {};
    let prevJumpPressed = false;
    let game = null;

    function getBestScore() {
      return Number(localStorage.getItem(STORAGE_KEY) || "0");
    }

    function setBestScore(score) {
      const best = getBestScore();
      if (score > best) localStorage.setItem(STORAGE_KEY, String(score));
    }

    function playTone(freq, duration = 0.06, type = "sine", gain = 0.04) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const amp = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        amp.gain.value = gain;
        osc.connect(amp);
        amp.connect(audioCtx.destination);
        osc.start();
        amp.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
      } catch (e) {}
    }

    function rectsOverlap(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function makePlatform(x, y, w, h, type = "ground") {
      return { x, y, w, h, type };
    }

    function makeStage() {
      return {
        platforms: [
          makePlatform(0, 486, 620, 54),
          makePlatform(700, 455, 330, 85),
          makePlatform(1120, 430, 310, 110),
          makePlatform(1510, 486, 520, 54),
          makePlatform(2120, 450, 340, 90),
          makePlatform(2550, 410, 350, 130),
          makePlatform(2980, 475, 470, 65),
          makePlatform(3560, 445, 720, 95),

          makePlatform(420, 370, 155, 24, "grass"),
          makePlatform(850, 330, 150, 24, "grass"),
          makePlatform(1240, 300, 150, 24, "grass"),
          makePlatform(1650, 365, 170, 24, "grass"),
          makePlatform(1920, 310, 150, 24, "grass"),
          makePlatform(2280, 320, 165, 24, "grass"),
          makePlatform(2710, 285, 145, 24, "grass"),
          makePlatform(3160, 340, 165, 24, "grass"),
          makePlatform(3450, 270, 160, 24, "grass")
        ],
        coins: [
          {x: 450, y: 325}, {x: 520, y: 325}, {x: 790, y: 405}, {x: 890, y: 285},
          {x: 1235, y: 255}, {x: 1305, y: 255}, {x: 1615, y: 438}, {x: 1700, y: 320},
          {x: 1930, y: 265}, {x: 2220, y: 395}, {x: 2340, y: 275}, {x: 2630, y: 360},
          {x: 2735, y: 240}, {x: 2810, y: 240}, {x: 3130, y: 430}, {x: 3200, y: 295},
          {x: 3480, y: 225}, {x: 3580, y: 400}, {x: 3740, y: 390}, {x: 3920, y: 390}
        ].map(c => ({ ...c, w: 22, h: 22, got: false, bob: Math.random() * 10 })),
        enemies: [
          { kind: "walker", x: 760, y: 406, w: 42, h: 42, vx: 80, alive: true, patrol: [715, 990] },
          { kind: "walker", x: 1590, y: 438, w: 42, h: 42, vx: -95, alive: true, patrol: [1510, 2000] },
          { kind: "walker", x: 3050, y: 427, w: 42, h: 42, vx: 105, alive: true, patrol: [2990, 3430] },
          { kind: "flyer", x: 1180, baseY: 230, y: 230, w: 44, h: 34, vx: 75, alive: true, patrol: [1080, 1440], t: 0 },
          { kind: "flyer", x: 2430, baseY: 245, y: 245, w: 44, h: 34, vx: -85, alive: true, patrol: [2220, 2560], t: 2 },
          { kind: "flyer", x: 3330, baseY: 250, y: 250, w: 44, h: 34, vx: 90, alive: true, patrol: [3100, 3520], t: 4 }
        ],
        spikes: [
          { x: 650, y: 510, w: 70, h: 30 },
          { x: 2055, y: 510, w: 75, h: 30 },
          { x: 3485, y: 510, w: 75, h: 30 }
        ],
        flag: { x: 4100, y: 335, w: 50, h: 110 }
      };
    }

    function createGame() {
      const stage = makeStage();
      return {
        stage,
        player: {
          x: 80, y: 390, w: 34, h: 48,
          vx: 0, vy: 0,
          lives: 3,
          maxLives: 3,
          onGround: false,
          facing: 1,
          invuln: 0,
          coyote: 0,
          jumpBuffer: 0,
          wasOnGround: false
        },
        score: 0,
        coins: 0,
        time: 0,
        particles: [],
        status: TEXT.ready,
        clear: false,
        over: false
      };
    }

    function fullReset(nextState = "playing") {
      game = createGame();
      camera.x = 0;
      camera.y = 0;
      paused = false;
      state = nextState;
      prevJumpPressed = false;
      dom.menuOverlay.classList.toggle("active", state === "start");
      dom.endOverlay.classList.remove("active");
      updateHUD();
    }

    function showStart() {
      fullReset("start");
    }

    function finishGame(won) {
      state = won ? "clear" : "gameover";
      game.status = won ? TEXT.cleared : TEXT.failed;
      if (won) {
        game.score += Math.max(0, Math.floor((WORLD_W - game.time * 26)));
        playTone(740, 0.12, "triangle", 0.06);
        setTimeout(() => playTone(1040, 0.16, "triangle", 0.06), 110);
      } else {
        playTone(130, 0.16, "sawtooth", 0.045);
      }
      setBestScore(game.score);
      updateHUD();

      dom.endTitle.textContent = won ? TEXT.clearTitle : TEXT.gameOverTitle;
      dom.endDesc.textContent = won ? TEXT.clearDesc : TEXT.gameOverDesc;
      dom.endResult.textContent =
        `${TEXT.resultScore}: ${game.score} · ${TEXT.resultCoins}: ${game.coins} · ${TEXT.resultBest}: ${getBestScore()}`;
      dom.endOverlay.classList.add("active");
    }

    function updateHUD() {
      if (!game) game = createGame();
      const p = game.player;
      const progress = Math.round(clamp((p.x / (WORLD_W - 200)) * 100, 0, 100));
      const statusText = state === "playing" ? (paused ? TEXT.paused : TEXT.playing) :
        state === "clear" ? TEXT.cleared :
        state === "gameover" ? TEXT.failed : TEXT.ready;

      dom.lifeChip.textContent = `${TEXT.life} ${p.lives}/${p.maxLives}`;
      dom.scoreChip.textContent = `${TEXT.score} ${game.score}`;
      dom.coinChip.textContent = `${TEXT.coins} ${game.coins}`;
      dom.progressChip.textContent = `${TEXT.progress} ${progress}%`;
      dom.bestChip.textContent = `${TEXT.best} ${getBestScore()}`;
      game.status = statusText;
    }

    function getInput() {
      const gp = navigator.getGamepads ? Array.from(navigator.getGamepads()).find(Boolean) : null;
      const axisX = gp ? gp.axes[0] || 0 : 0;
      const gpLeft = axisX < -0.35 || (gp && gp.buttons[14] && gp.buttons[14].pressed);
      const gpRight = axisX > 0.35 || (gp && gp.buttons[15] && gp.buttons[15].pressed);
      const gpJump = gp && ((gp.buttons[0] && gp.buttons[0].pressed) || (gp.buttons[12] && gp.buttons[12].pressed));

      return {
        left: keys.ArrowLeft || keys.KeyA || gpLeft,
        right: keys.ArrowRight || keys.KeyD || gpRight,
        jump: keys.Space || keys.KeyW || keys.ArrowUp || gpJump
      };
    }

    function applyPlayerPhysics(dt, input) {
      const p = game.player;

      if (input.left) {
        p.vx -= PLAYER_ACCEL * dt;
        p.facing = -1;
      }
      if (input.right) {
        p.vx += PLAYER_ACCEL * dt;
        p.facing = 1;
      }
      if (!input.left && !input.right) {
        const sign = Math.sign(p.vx);
        const mag = Math.max(0, Math.abs(p.vx) - PLAYER_FRICTION * dt);
        p.vx = mag * sign;
      }

      p.vx = clamp(p.vx, -PLAYER_MAX_SPEED, PLAYER_MAX_SPEED);
      p.vy += GRAVITY * dt;

      const jumpJustPressed = input.jump && !prevJumpPressed;
      if (jumpJustPressed) p.jumpBuffer = JUMP_BUFFER;
      else p.jumpBuffer = Math.max(0, p.jumpBuffer - dt);

      if (p.onGround) p.coyote = COYOTE_TIME;
      else p.coyote = Math.max(0, p.coyote - dt);

      if (p.jumpBuffer > 0 && p.coyote > 0) {
        p.vy = JUMP_VELOCITY;
        p.onGround = false;
        p.coyote = 0;
        p.jumpBuffer = 0;
        spawnParticles(p.x + p.w / 2, p.y + p.h, 9, "#d7f8ff");
        playTone(420, 0.055, "square", 0.035);
      }

      if (!input.jump && prevJumpPressed && p.vy < 0) {
        p.vy *= JUMP_CUT;
      }

      prevJumpPressed = input.jump;
    }

    function moveAndCollide(dt) {
      const p = game.player;
      p.wasOnGround = p.onGround;
      p.onGround = false;

      p.x += p.vx * dt;
      for (const plat of game.stage.platforms) {
        if (rectsOverlap(p, plat)) {
          if (p.vx > 0) p.x = plat.x - p.w;
          else if (p.vx < 0) p.x = plat.x + plat.w;
          p.vx = 0;
        }
      }

      p.y += p.vy * dt;
      for (const plat of game.stage.platforms) {
        if (rectsOverlap(p, plat)) {
          if (p.vy > 0) {
            p.y = plat.y - p.h;
            p.vy = 0;
            p.onGround = true;
          } else if (p.vy < 0) {
            p.y = plat.y + plat.h;
            p.vy = 0;
          }
        }
      }

      p.x = clamp(p.x, 0, WORLD_W - p.w);
    }

    function updateEnemies(dt) {
      for (const e of game.stage.enemies) {
        if (!e.alive) continue;

        if (e.kind === "walker") {
          e.x += e.vx * dt;
          if (e.x < e.patrol[0]) {
            e.x = e.patrol[0];
            e.vx *= -1;
          }
          if (e.x + e.w > e.patrol[1]) {
            e.x = e.patrol[1] - e.w;
            e.vx *= -1;
          }
        } else if (e.kind === "flyer") {
          e.t += dt;
          e.x += e.vx * dt;
          e.y = e.baseY + Math.sin(e.t * 3) * 34;
          if (e.x < e.patrol[0]) {
            e.x = e.patrol[0];
            e.vx *= -1;
          }
          if (e.x + e.w > e.patrol[1]) {
            e.x = e.patrol[1] - e.w;
            e.vx *= -1;
          }
        }
      }
    }

    function damagePlayer() {
      const p = game.player;
      if (p.invuln > 0 || state !== "playing") return;

      p.lives -= 1;
      p.invuln = 1.15;
      p.vy = -470;
      p.vx = -p.facing * 240;
      spawnParticles(p.x + p.w / 2, p.y + p.h / 2, 16, "#ff5d7a");
      playTone(180, 0.12, "sawtooth", 0.05);

      if (p.lives <= 0) finishGame(false);
    }

    function checkInteractions() {
      const p = game.player;

      for (const coin of game.stage.coins) {
        if (!coin.got && rectsOverlap(p, coin)) {
          coin.got = true;
          game.coins += 1;
          game.score += 100;
          spawnParticles(coin.x + coin.w / 2, coin.y + coin.h / 2, 12, "#ffd45d");
          playTone(740, 0.055, "triangle", 0.04);
        }
      }

      for (const e of game.stage.enemies) {
        if (!e.alive || !rectsOverlap(p, e)) continue;
        const playerBottomPrev = p.y + p.h - p.vy * 0.016;
        const stomp = p.vy > 70 && playerBottomPrev <= e.y + 18;
        if (stomp) {
          e.alive = false;
          p.vy = -520;
          game.score += e.kind === "flyer" ? 220 : 160;
          spawnParticles(e.x + e.w / 2, e.y + e.h / 2, 18, "#71f6a1");
          playTone(560, 0.08, "square", 0.045);
        } else {
          damagePlayer();
        }
      }

      for (const s of game.stage.spikes) {
        if (rectsOverlap(p, s)) damagePlayer();
      }

      if (rectsOverlap(p, game.stage.flag)) {
        finishGame(true);
      }

      if (p.y > H + 180) {
        finishGame(false);
      }
    }

    function spawnParticles(x, y, count, color) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 80 + Math.random() * 260;
        game.particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 80,
          r: 2 + Math.random() * 4,
          life: 0.45 + Math.random() * 0.45,
          max: 0.9,
          color
        });
      }
    }

    function updateParticles(dt) {
      for (const par of game.particles) {
        par.life -= dt;
        par.x += par.vx * dt;
        par.y += par.vy * dt;
        par.vy += 780 * dt;
      }
      game.particles = game.particles.filter(p => p.life > 0);
    }

    function updateCamera() {
      const p = game.player;
      const target = clamp(p.x + p.w / 2 - W * 0.42, 0, WORLD_W - W);
      camera.x += (target - camera.x) * 0.11;
    }

    function update(dt) {
      if (state !== "playing" || paused) return;

      dt = Math.min(dt, 0.033);
      game.time += dt;
      const input = getInput();

      game.player.invuln = Math.max(0, game.player.invuln - dt);

      applyPlayerPhysics(dt, input);
      moveAndCollide(dt);
      updateEnemies(dt);
      checkInteractions();
      updateParticles(dt);
      updateCamera();
      updateHUD();
    }

    function drawRoundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    }

    function drawBackground() {
      const g = ctx.createLinearGradient(0, 0, 0, H);
      g.addColorStop(0, "#11284c");
      g.addColorStop(0.5, "#1b3760");
      g.addColorStop(1, "#071321");
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);

      ctx.save();
      ctx.globalAlpha = 0.85;
      for (let i = 0; i < 70; i++) {
        const x = (i * 193 - camera.x * 0.18) % (W + 200) - 100;
        const y = 26 + ((i * 53) % 190);
        ctx.fillStyle = i % 7 === 0 ? "rgba(255,212,93,0.95)" : "rgba(238,247,255,0.72)";
        ctx.beginPath();
        ctx.arc(x, y, i % 7 === 0 ? 1.8 : 1.2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      drawCloudLayer(0.22, 90, "rgba(255,255,255,0.12)");
      drawCloudLayer(0.38, 170, "rgba(255,255,255,0.10)");

      ctx.save();
      ctx.translate(-camera.x * 0.18, 0);
      ctx.fillStyle = "rgba(4,10,20,0.35)";
      for (let x = -200; x < WORLD_W + 300; x += 320) {
        ctx.beginPath();
        ctx.moveTo(x, H);
        ctx.lineTo(x + 160, 245 + Math.sin(x) * 20);
        ctx.lineTo(x + 340, H);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();

      ctx.save();
      ctx.translate(-camera.x * 0.45, 0);
      ctx.fillStyle = "rgba(5,12,24,0.55)";
      for (let x = -200; x < WORLD_W + 400; x += 260) {
        ctx.beginPath();
        ctx.moveTo(x, H);
        ctx.lineTo(x + 130, 320 + Math.cos(x) * 18);
        ctx.lineTo(x + 290, H);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawCloudLayer(speed, yBase, color) {
      ctx.save();
      ctx.translate(-camera.x * speed, 0);
      ctx.fillStyle = color;
      for (let x = -300; x < WORLD_W + 400; x += 460) {
        const y = yBase + Math.sin(x * 0.01) * 24;
        ctx.beginPath();
        ctx.arc(x, y, 28, 0, Math.PI * 2);
        ctx.arc(x + 34, y - 12, 34, 0, Math.PI * 2);
        ctx.arc(x + 76, y, 26, 0, Math.PI * 2);
        ctx.rect(x - 8, y, 96, 22);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawPlatforms() {
      for (const p of game.stage.platforms) {
        const x = Math.round(p.x - camera.x);
        if (x + p.w < -40 || x > W + 40) continue;

        ctx.save();
        const top = p.type === "grass" ? "#65f0a5" : "#53e0ff";
        const body = p.type === "grass" ? "#244b43" : "#182d4f";

        ctx.fillStyle = body;
        drawRoundedRect(x, p.y, p.w, p.h, 10);

        ctx.fillStyle = top;
        drawRoundedRect(x, p.y, p.w, Math.min(16, p.h), 8);

        ctx.fillStyle = "rgba(255,255,255,0.13)";
        for (let tx = x + 22; tx < x + p.w - 10; tx += 54) {
          ctx.fillRect(tx, p.y + 25, 30, 4);
        }

        ctx.restore();
      }
    }

    function drawSpikes() {
      for (const s of game.stage.spikes) {
        const x = s.x - camera.x;
        if (x + s.w < -30 || x > W + 30) continue;

        ctx.fillStyle = "#ff5d7a";
        const n = Math.max(2, Math.floor(s.w / 18));
        for (let i = 0; i < n; i++) {
          const sx = x + i * (s.w / n);
          ctx.beginPath();
          ctx.moveTo(sx, s.y + s.h);
          ctx.lineTo(sx + s.w / n / 2, s.y);
          ctx.lineTo(sx + s.w / n, s.y + s.h);
          ctx.closePath();
          ctx.fill();
        }
      }
    }

    function drawCoins() {
      const time = performance.now() * 0.004;
      for (const c of game.stage.coins) {
        if (c.got) continue;
        const x = c.x - camera.x;
        if (x < -40 || x > W + 40) continue;
        const bob = Math.sin(time + c.bob) * 4;

        ctx.save();
        ctx.translate(x + c.w / 2, c.y + c.h / 2 + bob);
        ctx.scale(0.72 + Math.sin(time + c.bob) * 0.18, 1);
        ctx.fillStyle = "#ffd45d";
        ctx.beginPath();
        ctx.arc(0, 0, 13, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255,255,255,0.38)";
        ctx.beginPath();
        ctx.arc(-4, -5, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawEnemies() {
      for (const e of game.stage.enemies) {
        if (!e.alive) continue;
        const x = e.x - camera.x;
        if (x + e.w < -50 || x > W + 50) continue;

        ctx.save();
        ctx.translate(x, e.y);

        if (e.kind === "walker") {
          ctx.fillStyle = "#ff8a5d";
          drawRoundedRect(0, 8, e.w, e.h - 8, 14);
          ctx.fillStyle = "#fff7e8";
          ctx.beginPath();
          ctx.arc(13, 23, 5, 0, Math.PI * 2);
          ctx.arc(29, 23, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#10131e";
          ctx.beginPath();
          ctx.arc(13 + Math.sign(e.vx) * 1.5, 23, 2, 0, Math.PI * 2);
          ctx.arc(29 + Math.sign(e.vx) * 1.5, 23, 2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#4a1922";
          ctx.fillRect(10, 38, 22, 4);
        } else {
          ctx.fillStyle = "#b76bff";
          drawRoundedRect(0, 4, e.w, e.h, 16);
          ctx.fillStyle = "rgba(255,255,255,0.32)";
          ctx.beginPath();
          ctx.ellipse(-6, 17, 15, 8, -0.4, 0, Math.PI * 2);
          ctx.ellipse(e.w + 6, 17, 15, 8, 0.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#fff7e8";
          ctx.beginPath();
          ctx.arc(16, 17, 5, 0, Math.PI * 2);
          ctx.arc(30, 17, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#10131e";
          ctx.beginPath();
          ctx.arc(16 + Math.sign(e.vx) * 1.4, 17, 2, 0, Math.PI * 2);
          ctx.arc(30 + Math.sign(e.vx) * 1.4, 17, 2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }
    }

    function drawFlag() {
      const f = game.stage.flag;
      const x = f.x - camera.x;

      ctx.save();
      ctx.translate(x, f.y);
      ctx.fillStyle = "#e9f5ff";
      ctx.fillRect(7, 0, 8, f.h);
      ctx.fillStyle = "#71f6a1";
      ctx.beginPath();
      ctx.moveTo(15, 7);
      ctx.lineTo(78, 28);
      ctx.lineTo(15, 50);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(0, f.h - 6, 42, 8);
      ctx.restore();
    }

    function drawPlayer() {
      const p = game.player;
      const x = p.x - camera.x;
      const blink = p.invuln > 0 && Math.floor(p.invuln * 18) % 2 === 0;
      if (blink) return;

      ctx.save();
      ctx.translate(x + p.w / 2, p.y + p.h / 2);
      ctx.scale(p.facing, 1);

      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.ellipse(0, 28, 22, 7, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#53e0ff";
      drawRoundedRect(-17, -19, 34, 38, 12);

      ctx.fillStyle = "#ffd45d";
      ctx.beginPath();
      ctx.arc(0, -25, 16, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#10131e";
      ctx.beginPath();
      ctx.arc(6, -27, 2.5, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "#10131e";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(2, -21, 5, 0.1, Math.PI - 0.1);
      ctx.stroke();

      ctx.fillStyle = "#eef7ff";
      ctx.fillRect(-12, 18, 8, 10);
      ctx.fillRect(5, 18, 8, 10);

      ctx.restore();
    }

    function drawParticles() {
      for (const p of game.particles) {
        ctx.save();
        ctx.globalAlpha = clamp(p.life / p.max, 0, 1);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x - camera.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawHints() {
      const hints = [
        { x: 250, y: 280, text: TEXT.hintJump },
        { x: 1120, y: 190, text: TEXT.hintStomp },
        { x: 3730, y: 300, text: TEXT.hintFlag }
      ];

      ctx.save();
      ctx.font = "700 15px system-ui";
      ctx.textAlign = "center";
      for (const h of hints) {
        const x = h.x - camera.x;
        if (x < -220 || x > W + 220) continue;
        ctx.fillStyle = "rgba(8,17,31,0.62)";
        ctx.beginPath();
        ctx.roundRect(x - 150, h.y - 22, 300, 42, 16);
        ctx.fill();
        ctx.fillStyle = "#eef7ff";
        ctx.fillText(h.text, x, h.y + 5);
      }
      ctx.restore();
    }

    function drawPause() {
      if (!paused || state !== "playing") return;
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.44)";
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#eef7ff";
      ctx.font = "900 54px system-ui";
      ctx.textAlign = "center";
      ctx.fillText(TEXT.paused, W / 2, H / 2);
      ctx.restore();
    }

    function render() {
      drawBackground();

      if (!game) game = createGame();

      ctx.save();
      drawHints();
      drawPlatforms();
      drawSpikes();
      drawCoins();
      drawFlag();
      drawEnemies();
      drawPlayer();
      drawParticles();
      ctx.restore();

      drawPause();
    }

    function loop(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;

      if (["ArrowLeft", "ArrowRight", "ArrowUp", "Space"].includes(e.code)) {
        e.preventDefault();
      }

      if (e.code === "KeyR") {
        fullReset("playing");
        playTone(520, 0.05, "triangle", 0.035);
      }

      if (e.code === "KeyP" && state === "playing") {
        paused = !paused;
        updateHUD();
      }

      if ((e.code === "Enter" || e.code === "Space") && state === "start") {
        fullReset("playing");
      }
    }, { passive: false });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    window.addEventListener("blur", () => {
      keys = {};
      if (state === "playing") {
        paused = true;
        updateHUD();
      }
    });

    dom.startButton.addEventListener("click", () => {
      fullReset("playing");
      playTone(660, 0.08, "triangle", 0.04);
    });

    dom.restartButton.addEventListener("click", () => {
      fullReset("playing");
      playTone(660, 0.08, "triangle", 0.04);
    });

    dom.menuButton.addEventListener("click", () => {
      showStart();
    });

    CanvasRenderingContext2D.prototype.roundRect ??= function(x, y, w, h, r) {
      const rr = Math.min(r, w / 2, h / 2);
      this.beginPath();
      this.moveTo(x + rr, y);
      this.arcTo(x + w, y, x + w, y + h, rr);
      this.arcTo(x + w, y + h, x, y + h, rr);
      this.arcTo(x, y + h, x, y, rr);
      this.arcTo(x, y, x + w, y, rr);
      this.closePath();
      return this;
    };

    fullReset("start");
    requestAnimationFrame(loop);
  </script>
</body>
