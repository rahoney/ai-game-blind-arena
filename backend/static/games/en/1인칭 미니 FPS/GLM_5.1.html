<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon FPS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif;cursor:default}
canvas{display:block}
#start-screen,#gameover-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse at center,#1a0a0a 0%,#000 70%)}
#start-screen h1{font-size:4rem;color:#c0392b;text-shadow:0 0 30px rgba(192,57,43,0.6);margin-bottom:1rem;font-weight:900;letter-spacing:4px}
#start-screen .subtitle{color:#888;font-size:1rem;margin-bottom:2rem}
#start-screen .controls-info{color:#666;font-size:0.85rem;margin-bottom:2rem;text-align:center;line-height:1.8}
.game-btn{padding:14px 48px;font-size:1.2rem;background:linear-gradient(135deg,#c0392b,#8e2218);color:#fff;border:none;border-radius:8px;cursor:pointer;transition:all 0.3s;font-weight:700;letter-spacing:2px}
.game-btn:hover{transform:scale(1.05);box-shadow:0 0 25px rgba(192,57,43,0.5)}
#game-container{position:fixed;inset:0;display:none}
#game-canvas{width:100%;height:100%}
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10}
#crosshair div{position:absolute;background:rgba(255,255,255,0.7);transition:background 0.1s}
#crosshair.hit div{background:#ff3333 !important}
#crosshair .h{width:20px;height:2px;top:50%;left:50%;transform:translate(-50%,-50%)}
#crosshair .v{width:2px;height:20px;top:50%;left:50%;transform:translate(-50%,-50%)}
#crosshair .dot{width:4px;height:4px;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,255,255,0.9)}
#hud{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;pointer-events:none;z-index:10}
#hud .left,#hud .right{display:flex;flex-direction:column;gap:4px}
#hud .right{text-align:right}
.hud-text{color:#fff;font-size:0.9rem;text-shadow:1px 1px 3px #000;opacity:0.9}
.hud-val{color:#f1c40f;font-weight:700}
.hp-bar{width:200px;height:14px;background:#333;border-radius:7px;overflow:hidden;margin-top:2px;border:1px solid #555}
.hp-fill{height:100%;background:linear-gradient(90deg,#e74c3c,#27ae60);transition:width 0.3s;border-radius:7px}
#weapon-display{position:fixed;bottom:20px;left:24px;color:#fff;font-size:0.85rem;z-index:10;pointer-events:none;text-shadow:1px 1px 3px #000}
#weapon-display .wname{font-weight:700;font-size:1.1rem;color:#f39c12}
#minimap{position:fixed;top:16px;right:16px;border:2px solid rgba(255,255,255,0.2);border-radius:4px;z-index:10;opacity:0.8}
#damage-overlay{position:fixed;inset:0;pointer-events:none;z-index:9;transition:opacity 0.15s;background:radial-gradient(ellipse at center,transparent 50%,rgba(255,0,0,0.6) 100%);opacity:0}
#wave-announce{position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:2.5rem;font-weight:900;text-shadow:0 0 20px rgba(255,100,0,0.8);pointer-events:none;z-index:11;opacity:0;transition:opacity 0.5s}
#pause-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:none;align-items:center;justify-content:center;z-index:50}
#pause-overlay p{color:#fff;font-size:1.5rem;text-shadow:0 0 10px rgba(255,255,255,0.3)}
#gameover-screen h2{font-size:3rem;color:#c0392b;text-shadow:0 0 20px rgba(192,57,43,0.5);margin-bottom:1rem}
#gameover-screen .stat{color:#ccc;font-size:1.2rem;margin:4px 0}
#gameover-screen .stat span{color:#f1c40f;font-weight:700}
#gameover-screen .new-record{color:#e74c3c;font-size:1.1rem;margin:8px 0;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
#gameover-screen .game-btn{margin-top:1.5rem}
#start-screen .high-score-display{color:#f1c40f;font-size:1rem;margin-bottom:2rem}
</style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
  <h1 id="title-text"></h1>
  <p class="subtitle" id="subtitle-text"></p>
  <div class="controls-info" id="controls-text"></div>
  <p class="high-score-display" id="menu-highscore"></p>
  <button class="game-btn" id="start-btn"></button>
</div>

<!-- localized comment -->
<div id="game-container">
  <canvas id="game-canvas"></canvas>
  <div id="crosshair"><div class="h"></div><div class="v"></div><div class="dot"></div></div>
  <div id="hud">
    <div class="left">
      <div class="hud-text" id="hud-hp-label"></div>
      <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:100%"></div></div>
      <div class="hud-text" id="hud-weapon-info"></div>
    </div>
    <div class="right">
      <div class="hud-text" id="hud-score"></div>
      <div class="hud-text" id="hud-wave"></div>
      <div class="hud-text" id="hud-enemies"></div>
      <div class="hud-text" id="hud-highscore"></div>
    </div>
  </div>
  <div id="weapon-display"></div>
  <canvas id="minimap" width="180" height="180"></canvas>
  <div id="damage-overlay"></div>
  <div id="wave-announce"></div>
  <div id="pause-overlay"><p id="pause-text"></p></div>
</div>

<!-- localized comment -->
<div id="gameover-screen" style="display:none">
  <h2 id="gameover-title"></h2>
  <p class="stat" id="go-score"></p>
  <p class="stat" id="go-wave"></p>
  <p class="stat" id="go-highscore"></p>
  <p class="new-record" id="go-newrecord" style="display:none"></p>
  <button class="game-btn" id="restart-btn"></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

const G = {

let scene, camera, renderer, clock;

let minimapCtx, audioCtx;

// localized comment
function initAudio(){
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playSound(type){
  if(!audioCtx) return;
  const ctx = audioCtx, now = ctx.currentTime;
  if(ctx.state==='suspended') ctx.resume();
  try{
    if(type==='pistol'){
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.12,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.015));
      const s=ctx.createBufferSource(); s.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(4000,now); f.frequency.exponentialRampToValueAtTime(200,now+0.1);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(now);
    } else if(type==='shotgun'){
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.2,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.025));
      const s=ctx.createBufferSource(); s.buffer=buf;
      const f=ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.setValueAtTime(2000,now); f.frequency.exponentialRampToValueAtTime(100,now+0.2);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.6,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(now);
    } else if(type==='hit'){
      const o=ctx.createOscillator(); o.frequency.setValueAtTime(800,now); o.frequency.exponentialRampToValueAtTime(200,now+0.08);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.08);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.1);
    } else if(type==='enemyDie'){
      const buf=ctx.createBuffer(1,ctx.sampleRate*0.3,ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.06))*Math.sin(i*0.05);
      const s=ctx.createBufferSource(); s.buffer=buf;
      const g=ctx.createGain(); g.gain.setValueAtTime(0.35,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
      s.connect(g); g.connect(ctx.destination); s.start(now);
    } else if(type==='hurt'){
      const o=ctx.createOscillator(); o.type='sawtooth'; o.frequency.setValueAtTime(150,now); o.frequency.exponentialRampToValueAtTime(50,now+0.15);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.3,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.15);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.2);
    } else if(type==='pickup'){
      const o=ctx.createOscillator(); o.frequency.setValueAtTime(523,now); o.frequency.setValueAtTime(659,now+0.08); o.frequency.setValueAtTime(784,now+0.16);
      const g=ctx.createGain(); g.gain.setValueAtTime(0.2,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.25);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.3);
    } else if(type==='wave'){
      const o1=ctx.createOscillator(); const o2=ctx.createOscillator();
      o1.frequency.value=440; o2.frequency.value=554;
      const g=ctx.createGain(); g.gain.setValueAtTime(0.15,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.5);
      o1.connect(g); o2.connect(g); g.connect(ctx.destination);
      o1.start(now); o2.start(now); o1.stop(now+0.5); o2.stop(now+0.5);
    } else if(type==='empty'){
      const o=ctx.createOscillator(); o.frequency.value=200;
      const g=ctx.createGain(); g.gain.setValueAtTime(0.1,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.05);
      o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+0.06);
    }
  }catch(e){}
}

// localized comment
function generateMaze(size){
  const grid=[];
  for(let y=0;y<size;y++){grid[y]=[]; for(let x=0;x<size;x++) grid[y][x]=0;}
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*i+1|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
  function carve(x,y){
    grid[y][x]=1;
    const dirs=shuffle([[0,-2],[0,2],[-2,0],[2,0]]);
    for(const[dx,dy]of dirs){
      const nx=x+dx, ny=y+dy;
      if(nx>0&&nx<size-1&&ny>0&&ny<size-1&&grid[ny][nx]===0){
        grid[y+dy/2][x+dx/2]=1;
        carve(nx,ny);
      }
    }
  }
  carve(1,1);
  // localized comment
  for(let r=0;r<3;r++){
    const rx=Math.floor(Math.random()*((size-4)/2))*2+2;
    const ry=Math.floor(Math.random()*((size-4)/2))*2+2;
    for(let dy=0;dy<3;dy++) for(let dx=0;dx<3;dx++){
      const gx=rx+dx, gy=ry+dy;
      if(gx>0&&gx<size-1&&gy>0&&gy<size-1) grid[gy][gx]=1;
    }
  }
  return grid;
}

// localized comment
function initThree(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x050505);
  scene.fog=new THREE.FogExp2(0x050505, 0.04);
  camera=new THREE.PerspectiveCamera(CFG.FOV,window.innerWidth/window.innerHeight,0.1,100);
  camera.rotation.order='YXZ';
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('game-canvas'),antialias:true});
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled=false;
  clock=new THREE.Clock();
  // localized comment
  const amb=new THREE.AmbientLight(0x1a1a2e,0.3);scene.add(amb);
  // localized comment
  flashlight=new THREE.SpotLight(0xffeedd,1.5,35,Math.PI/5,0.4);
  flashlight.position.set(0,0,0);
  flashlight.target.position.set(0,0,-1);
  camera.add(flashlight);camera.add(flashlight.target);
  scene.add(camera);
  // localized comment
  weaponGrp=new THREE.Group();
  camera.add(weaponGrp);
  createWeaponModels();
  window.addEventListener('resize',()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
  });
}

// localized comment
function createWeaponModels(){
  const mat1=new THREE.MeshStandardMaterial({color:0x333333,roughness:0.3,metalness:0.8});
  const mat2=new THREE.MeshStandardMaterial({color:0x553311,roughness:0.7});
  const matGun=new THREE.MeshStandardMaterial({color:0x222222,roughness:0.2,metalness:0.9});
  // Pistol
  pistolMdl=new THREE.Group();
  const pBody=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.05,0.18),matGun);
  pBody.position.set(0,0,-0.09);
  pistolMdl.add(pBody);
  const pBarrel=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.1),mat1);
  pBarrel.position.set(0,0.01,-0.22);
  pistolMdl.add(pBarrel);
  const pGrip=new THREE.Mesh(new THREE.BoxGeometry(0.035,0.08,0.04),mat2);
  pGrip.position.set(0,-0.05,0.01);pGrip.rotation.x=0.3;
  pistolMdl.add(pGrip);
  pistolMdl.position.set(0.28,-0.26,-0.4);
  pistolMdl.visible=true;
  weaponGrp.add(pistolMdl);
  // Shotgun
  shotgunMdl=new THREE.Group();
  const sBarrel1=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.35),matGun);
  sBarrel1.position.set(-0.02,0,-0.17);
  shotgunMdl.add(sBarrel1);
  const sBarrel2=new THREE.Mesh(new THREE.BoxGeometry(0.03,0.03,0.35),matGun);
  sBarrel2.position.set(0.02,0,-0.17);
  shotgunMdl.add(sBarrel2);
  const sBody=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.06,0.12),mat1);
  sBody.position.set(0,-0.01,0.02);
  shotgunMdl.add(sBody);
  const sGrip=new THREE.Mesh(new THREE.BoxGeometry(0.04,0.1,0.04),mat2);
  sGrip.position.set(0,-0.07,0.03);sGrip.rotation.x=0.3;
  shotgunMdl.add(sGrip);
  const sStock=new THREE.Mesh(new THREE.BoxGeometry(0.05,0.06,0.14),mat2);
  sStock.position.set(0,-0.02,0.13);
  shotgunMdl.add(sStock);
  shotgunMdl.position.set(0.3,-0.28,-0.4);
  shotgunMdl.visible=false;
  weaponGrp.add(shotgunMdl);
  // localized comment
  const flashGeo=new THREE.SphereGeometry(0.06,6,6);
  const flashMat=new THREE.MeshBasicMaterial({color:0xffaa00,transparent:true,opacity:0});
  const muzzleFlash=new THREE.Mesh(flashGeo,flashMat);
  muzzleFlash.position.set(0.28,-0.26,-0.65);
  muzzleFlash.userData.isFlash=true;
  weaponGrp.add(muzzleFlash);
}

// localized comment
function buildDungeon(){
  const C=CFG.CELL, H=CFG.WALL_H, S=CFG.GRID;
  // floor
  const floorGeo=new THREE.PlaneGeometry(S*C,S*C);
  const floorMat=new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:0.9});
  const floor=new THREE.Mesh(floorGeo,floorMat);
  floor.rotation.x=-Math.PI/2;
  floor.position.set(S*C/2,0,S*C/2);
  scene.add(floor);
  // localized comment
  const ceilGeo=new THREE.PlaneGeometry(S*C,S*C);
  const ceilMat=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:1});
  const ceil=new THREE.Mesh(ceilGeo,ceilMat);
  ceil.rotation.x=Math.PI/2;
  ceil.position.set(S*C/2,H,S*C/2);
  scene.add(ceil);
  // Wall (InstancedMesh)
  let wc=0;
  for(let y=0;y<S;y++) for(let x=0;x<S;x++) if(G.grid[y][x]===0) wc++;
  const wallGeo=new THREE.BoxGeometry(C,H,C);
  const wallMat=new THREE.MeshStandardMaterial({color:0x4a3a2a,roughness:0.85});
  const walls=new THREE.InstancedMesh(wallGeo,wallMat,wc);
  const mtx=new THREE.Matrix4();
  let idx=0;
  for(let y=0;y<S;y++) for(let x=0;x<S;x++) if(G.grid[y][x]===0){
    mtx.setPosition(x*C+C/2,H/2,y*C+C/2);
    walls.setMatrixAt(idx++,mtx);
  }
  walls.instanceMatrix.needsUpdate=true;
  scene.add(walls);
  // localized comment
  G.torches=[];
  const floorCells=[];
  for(let y=1;y<S-1;y++) for(let x=1;x<S-1;x++) if(G.grid[y][x]===1) floorCells.push([x,y]);
  const torchCount=Math.min(10,Math.floor(floorCells.length/15));
  const used=new Set();
  for(let i=0;i<torchCount;i++){
    let cell;
    for(let t=0;t<50;t++){
      cell=floorCells[Math.floor(Math.random()*floorCells.length)];
      const k=cell[0]+','+cell[1];
      if(!used.has(k)){used.add(k);break;}
    }
    const lx=cell[0]*C+C/2, lz=cell[1]*C+C/2;
    const pl=new THREE.PointLight(0xff6600,0.8,18);
    pl.position.set(lx,H*0.75,lz);
    scene.add(pl);
    // localized comment
    const tMesh=new THREE.Mesh(new THREE.ConeGeometry(0.08,0.3,6),new THREE.MeshBasicMaterial({color:0xff8800}));
    tMesh.position.set(lx,H*0.75,lz);
    scene.add(tMesh);
    // localized comment
    const pole=new THREE.Mesh(new THREE.BoxGeometry(0.1,H*0.3,0.1),new THREE.MeshStandardMaterial({color:0x553311}));
    pole.position.set(lx,H*0.15,lz);
    scene.add(pole);
    G.torches.push({light:pl,mesh:tMesh,base:0.8});
  }
}

// localized comment
function disposeObj(obj){
  if(obj.geometry) obj.geometry.dispose();
  if(obj.material){
    if(Array.isArray(obj.material)) obj.material.forEach(m=>{if(m.map)m.map.dispose();m.dispose();});
    else{if(obj.material.map)obj.material.map.dispose();obj.material.dispose();}
  }
  if(obj.children) obj.children.forEach(c=>disposeObj(c));
}
function clearScene(){
  for(let i=scene.children.length-1;i>=0;i--){
    const obj=scene.children[i];
    if(obj===camera) continue;
    scene.remove(obj);
    disposeObj(obj);
  }
}

// localized comment
function createEnemy(type,pos){
  const cfg=CFG.ENEMY[type];
  const grp=new THREE.Group();
  // localized comment
  const bMat=new THREE.MeshStandardMaterial({
    color:cfg.color,
    transparent:!!cfg.alpha,
    opacity:cfg.alpha||1,
    roughness:0.6
  });
  const bodyW=type==='skeleton'?0.35:0.55;
  const bodyH=type==='ghost'?0.9:1.15;
  const body=new THREE.Mesh(new THREE.BoxGeometry(bodyW,bodyH,0.3),bMat);
  body.position.y=0.8;grp.add(body);
  // localized comment
  const hSize=type==='ghost'?0.28:0.22;
  const head=new THREE.Mesh(new THREE.SphereGeometry(hSize,8,8),bMat);
  head.position.y=1.55;grp.add(head);
  // localized comment

// localized comment
function bfsPath(sx,sy,ex,ey){
  const S=CFG.GRID, grid=G.grid;
  if(sx===ex&&sy===ey) return[];
  const vis=[];for(let i=0;i<S;i++){vis[i]=[];for(let j=0;j<S;j++) vis[i][j]=false;}
  const par=[];for(let i=0;i<S;i++){par[i]=[];for(let j=0;j<S;j++) par[i][j]=null;}
  const q=[[sx,sy]]; vis[sy][sx]=true;
  const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
  while(q.length){
    const[cx,cy]=q.shift();
    if(cx===ex&&cy===ey){
      const path=[];
      let px=ex,py=ey;
      while(px!==sx||py!==sy){
        path.unshift([px,py]);
        const p=par[py][px]; px=p[0]; py=p[1];
      }
      return path;
    }
    for(const[dx,dy] of dirs){
      const nx=cx+dx,ny=cy+dy;
      if(nx>=0&&nx<S&&ny>=0&&ny<S&&!vis[ny][nx]&&grid[ny][nx]===1){
        vis[ny][nx]=true;
        par[ny][nx]=[cx,cy];
        q.push([nx,ny]);
      }
    }
  }
  return null;
}

// localized comment
function updateEnemies(dt){
  const px=G.player.x, pz=G.player.z;
  const C=CFG.CELL;
  const pgx=Math.round(px/C), pgz=Math.round(pz/C);
  
  G.enemies.forEach(e=>{
    if(e.dead) return;
    // localized comment
    if(e.flashTimer>0){
      e.flashTimer-=dt;
      if(e.flashTimer<=0){
        e.mesh.traverse(c=>{
          if(c.isMesh&&c.material&&c.material.emissive&&c.userData.enemyRef){
            c.material.emissive.setHex(0x000000);
          }
        });
      }
    }
    const ex=e.mesh.position.x, ez=e.mesh.position.z;
    const dx=px-ex, dz=pz-ez;
    const dist=Math.sqrt(dx*dx+dz*dz);
    
    // localized comment
    if(e.cfg.phase){
      if(dist>1.0){
        const nx=ex+dx/dist*e.cfg.spd*dt;
        const nz=ez+dz/dist*e.cfg.spd*dt;
        e.mesh.position.x=nx;
        e.mesh.position.z=nz;
      }
      e.mesh.position.y=0.3+Math.sin(Date.now()*0.004+e.id)*0.3;
    } else {
      // localized comment
      const egx=Math.round(ex/C), egz=Math.round(ez/C);
      e.pathTimer-=dt;
      if(e.pathTimer<=0||!e.path.length){
        e.path=bfsPath(egx,egz,pgx,pgz)||[];
        e.pathTimer=0.5;
      }
      if(e.path.length>0){
        const[tx,ty]=e.path[0];
        const twx=tx*C+C/2, twz=ty*C+C/2;
        const tdx=twx-ex, tdz=twz-ez;
        const td=Math.sqrt(tdx*tdx+tdz*tdz);
        if(td<0.5){
          e.path.shift();
        } else {
          const spd=e.cfg.spd*dt;
          e.mesh.position.x+=tdx/td*spd;
          e.mesh.position.z+=tdz/td*spd;
          // localized comment
          const nx=Math.round(e.mesh.position.x/C);
          const nz=Math.round(e.mesh.position.z/C);
          if(nx<0||nx>=CFG.GRID||nz<0||nz>=CFG.GRID||G.grid[nz][nx]===0){
            e.mesh.position.x=ex;e.mesh.position.z=ez;
            e.path=[];
          }
        }
      }
    }
    // localized comment
    e.mesh.rotation.y=Math.atan2(dx,dz);
    // Attack
    e.atkTimer-=dt;
    if(e.atkTimer<=0&&dist<=e.cfg.range){
      if(e.cfg.ranged){
        fireEnemyProjectile(e);
      } else {
        if(dist<=e.cfg.range) damagePlayer(e.cfg.dmg);
      }
      e.atkTimer=e.cfg.cd;
    }
  });
}

  if(w==='shotgun'&&G.weapon.sAmmo<=0){playSound('empty');return;}
  
  // localized comment

  } else {
    G.weapon.sAmmo--;
    G.weapon.cd=CFG.SHOT_CD;
    playSound('shotgun');

function fireRay(spread){
  const rc=new THREE.Raycaster();
  const dir=new THREE.Vector3(
    (Math.random()-0.5)*spread,
    (Math.random()-0.5)*spread,-1
  ).normalize();
  dir.applyQuaternion(camera.quaternion);
  rc.set(camera.position,dir);
  rc.far=100;
  // localized comment
  const meshes=[];
  G.enemies.forEach(e=>{if(!e.dead) e.mesh.traverse(c=>{if(c.isMesh)meshes.push(c);});});
  const hits=rc.intersectObjects(meshes);
  if(hits.length>0){
    const e=hits[0].object.userData.enemyRef;
    if(e&&!e.dead){
      const dmg=G.weapon.cur==='pistol'?CFG.PISTOL_DMG:CFG.SHOT_DMG;
      damageEnemy(e,dmg);
    }
  }
}

function updateWeapon(dt){

  if(G.weapon.recoil>0){
    G.weapon.recoil=Math.max(0,G.weapon.recoil-dt*2);
    const t=G.weapon.recoil/0.15;
    if(G.weapon.cur==='pistol'){
      pistolMdl.position.z=-0.4+0.06*t;

    }
  }
  if(G.muzzleT>0){
    G.muzzleT-=dt;
    const flash=weaponGrp.children.find(c=>c.userData.isFlash);
    if(flash) flash.material.opacity=Math.max(0,G.muzzleT/0.06);
  }
  // localized comment
  const bx=G.weapon.cur==='pistol'?0.28:0.3;
  const by=G.weapon.cur==='pistol'?-0.26:-0.28;
  const moving=G.keys['w']||G.keys['a']||G.keys['s']||G.keys['d'];
  if(moving) G.bobT+=dt*8;
  const bobX=Math.cos(G.bobT*0.5)*0.005;
  const bobY=Math.sin(G.bobT)*0.008;
  if(G.weapon.recoil<=0){
    if(pistolMdl.visible){pistolMdl.position.x=bx+bobX;pistolMdl.position.y=by+bobY;pistolMdl.position.z=-0.4;}
    if(shotgunMdl.visible){shotgunMdl.position.x=bx+bobX;shotgunMdl.position.y=by+bobY;shotgunMdl.position.z=-0.4;}
  }
}

// localized comment
function updatePlayer(dt){
  const k=G.keys;
  const fwd=new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
  fwd.y=0;fwd.normalize();
  const right=new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
  right.y=0;right.normalize();
  let mx=0,mz=0;
  if(k['w']){mx+=fwd.x;mz+=fwd.z;}
  if(k['s']){mx-=fwd.x;mz-=fwd.z;}
  if(k['a']){mx-=right.x;mz-=right.z;}
  if(k['d']){mx+=right.x;mz+=right.z;}
  const len=Math.sqrt(mx*mx+mz*mz);
  if(len>0){mx/=len;mz/=len;}
  const spd=CFG.PLAYER_SPD*dt;
  const nx=G.player.x+mx*spd;
  const nz=G.player.z+mz*spd;
  // localized comment
  const R=CFG.PLAYER_R;
  if(!isWall(nx+R,G.player.z+R)&&!isWall(nx+R,G.player.z-R)&&
     !isWall(nx-R,G.player.z+R)&&!isWall(nx-R,G.player.z-R)){
    G.player.x=nx;
  }
  if(!isWall(G.player.x+R,nz+R)&&!isWall(G.player.x+R,nz-R)&&
     !isWall(G.player.x-R,nz+R)&&!isWall(G.player.x-R,nz-R)){
    G.player.z=nz;
  }
  camera.position.set(G.player.x,CFG.PLAYER_H,G.player.z);
  camera.rotation.y=G.player.yaw;
  camera.rotation.x=G.player.pitch;
}
function isWall(wx,wz){
  const gx=Math.floor(wx/CFG.CELL);
  const gz=Math.floor(wz/CFG.CELL);
  if(gx<0||gx>=CFG.GRID||gz<0||gz>=CFG.GRID) return true;
  return G.grid[gz][gx]===0;
}

// localized comment
function startNextWave(){
  G.wave++;
  const total=2+G.wave*2;
  const types=[];
  for(let i=0;i<total;i++){
    if(G.wave>=3&&Math.random()<0.2) types.push('ghost');
    else if(G.wave>=2&&Math.random()<0.35) types.push('skeleton');
    else types.push('zombie');
  }
  // localized comment
  const floorCells=[];
  for(let y=0;y<CFG.GRID;y++) for(let x=0;x<CFG.GRID;x++){
    if(G.grid[y][x]===1){
      const wx=x*CFG.CELL+CFG.CELL/2, wz=y*CFG.CELL+CFG.CELL/2;
      const dx=wx-G.player.x, dz=wz-G.player.z;
      if(Math.sqrt(dx*dx+dz*dz)>=CFG.MIN_SPAWN_DIST) floorCells.push({x:wx,z:wz});
    }
  }
  types.forEach(t=>{
    if(floorCells.length===0) return;
    const cell=floorCells[Math.floor(Math.random()*floorCells.length)];
    // localized comment
    const e=createEnemy(t,cell);
    const scale=1+(G.wave-1)*0.12;
    e.hp=Math.floor(e.hp*scale);
    e.maxHp=e.hp;
    updateHealthBar(e);
    G.enemies.push(e);
  });
  // localized comment
  const itemCount=1+Math.floor(G.wave/2);
  for(let i=0;i<itemCount;i++){
    if(floorCells.length===0) break;
    const cell=floorCells[Math.floor(Math.random()*floorCells.length)];
    const type=Math.random()<0.5?'health':'ammo';
    G.items.push(createItem(type,cell));
  }
  announceWave(G.wave);
  playSound('wave');
}
function updateWave(dt){
  if(G.phase==='waveTransition'){
    G.waveTimer-=dt;
    if(G.waveTimer<=0){
      G.phase='playing';
      startNextWave();
    }
    return;
  }
  if(G.phase==='playing'){
    const alive=G.enemies.filter(e=>!e.dead).length;
    if(alive===0&&G.enemies.length>0){
      // localized comment
      G.enemies=[];
      G.phase='waveTransition';
      G.waveTimer=CFG.WAVE_DELAY;
      announceWaveClear(G.wave);
    }
  }
}

  G.enemies.forEach(e=>{
    if(e.dead) return;
    const gx=e.mesh.position.x/CFG.CELL, gz=e.mesh.position.z/CFG.CELL;
    ctx.fillStyle=e.type==='zombie'?'#2ecc71':e.type==='skeleton'?'#ecf0f1':'#9b59b6';
    ctx.fillRect(gx*cellPx-1.5,gz*cellPx-1.5,3,3);
  });
  // Player
  const px=G.player.x/CFG.CELL, pz=G.player.z/CFG.CELL;
  ctx.fillStyle='#3498db';
  ctx.beginPath();ctx.arc(px*cellPx,pz*cellPx,3,0,Math.PI*2);ctx.fill();
  // localized comment
  const dirLen=8;
  const mdx=-Math.sin(G.player.yaw), mdz=-Math.cos(G.player.yaw);
  ctx.strokeStyle='#3498db';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px*cellPx,pz*cellPx);
  ctx.lineTo(px*cellPx+mdx*dirLen,pz*cellPx+mdz*dirLen);
  ctx.stroke();
}

// localized comment
function startGame(){
  if(!audioCtx) initAudio();
  // localized comment
  G.phase='playing';
  G.player={x:0,z:0,yaw:0,pitch:0,hp:CFG.MAX_HP};
  G.score=0;G.wave=0;
  G.enemies=[];G.items=[];G.projectiles=[];G.particles=[];
  G.weapon={cur:'pistol',sAmmo:CFG.INIT_SHOT_AMMO,cd:0,recoil:0};
  G.waveTimer=0;G.bobT=0;G.dmgFlash=0;G.muzzleT=0;G.eidC=0;
  G.keys={};
  // localized comment
  G.grid=generateMaze(CFG.GRID);
  // localized comment
  clearScene();
  // localized comment
  scene.add(new THREE.AmbientLight(0x1a1a2e,0.3));
  scene.add(camera);
  buildDungeon();
  // localized comment
  G.player.x=1*CFG.CELL+CFG.CELL/2;
  G.player.z=1*CFG.CELL+CFG.CELL/2;
  camera.position.set(G.player.x,CFG.PLAYER_H,G.player.z);
  camera.rotation.set(0,0,0);
  G.player.yaw=0;G.player.pitch=0;
  // localized comment
  pistolMdl.visible=true;shotgunMdl.visible=false;
  // localized comment
  document.getElementById('start-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='none';
  document.getElementById('game-container').style.display='block';
  // localized comment
  document.getElementById('game-canvas').requestPointerLock();
  // localized comment
  startNextWave();
  // localized comment
  if(!clock.running) clock.start();
  if(!G.loopRunning){G.loopRunning=true;gameLoop();}
}

function gameOver(){
  G.phase='gameover';
  document.exitPointerLock();
  const isNew=G.score>G.highScore;
  if(isNew){
    G.highScore=G.score;
    try{localStorage.setItem('dungeon_fps_highscore',G.highScore);}catch(e){}
  }
  document.getElementById('go-score').innerHTML=LANG.finalScore+': <span>'+G.score+'</span>';
  document.getElementById('go-wave').innerHTML=LANG.reachedWave+': <span>'+G.wave+'</span>';
  document.getElementById('go-highscore').innerHTML=LANG.bestScore+': <span>'+G.highScore+'</span>';
  document.getElementById('go-newrecord').style.display=isNew?'block':'none';
  document.getElementById('go-newrecord').textContent=LANG.newRecord;
  document.getElementById('gameover-screen').style.display='flex';
}

// localized comment
function gameLoop(){
  requestAnimationFrame(gameLoop);
  const dt=Math.min(clock.getDelta(),0.05);
  if(G.phase==='playing'||G.phase==='waveTransition'){
    updatePlayer(dt);
    updateWeapon(dt);
    updateEnemies(dt);
    updateProjectiles(dt);
    updateParticles(dt);
    updateItems(dt);
    updateWave(dt);
    checkItemPickup();
    updateDamageFlash(dt);
    updateHUD();
    drawMinimap();
    // localized comment
    G.torches.forEach((t,i)=>{
      t.light.intensity=t.base+Math.sin(Date.now()*0.008+i*2.1)*0.2+Math.sin(Date.now()*0.013+i*3.7)*0.1;
    });
  }
  renderer.render(scene,camera);
}

// localized comment
document.addEventListener('keydown',e=>{
  G.keys[e.key.toLowerCase()]=true;
  if(e.key==='1') switchWeapon('pistol');
  if(e.key==='2') switchWeapon('shotgun');
  if(e.key==='r'&&G.weapon.cur==='shotgun'){
    // localized comment
  }
});
document.addEventListener('keyup',e=>{G.keys[e.key.toLowerCase()]=false;});
document.addEventListener('mousemove',e=>{
  if(!G.ptrLocked) return;
  G.player.yaw-=e.movementX*CFG.MOUSE_SENS;
  G.player.pitch-=e.movementY*CFG.MOUSE_SENS;
  G.player.pitch=Math.max(-Math.PI/2+0.05,Math.min(Math.PI/2-0.05,G.player.pitch));
});
document.addEventListener('mousedown',e=>{
  if(e.button===0&&G.ptrLocked&&(G.phase==='playing'||G.phase==='waveTransition')){
    shoot();
  }
});
document.addEventListener('pointerlockchange',()=>{
  G.ptrLocked=document.pointerLockElement===document.getElementById('game-canvas');
  if(!G.ptrLocked&&G.phase==='playing'){
    document.getElementById('pause-overlay').style.display='flex';
  } else {
    document.getElementById('pause-overlay').style.display='none';
  }
});
document.getElementById('game-canvas').addEventListener('click',()=>{
  if(G.phase==='playing'||G.phase==='waveTransition'){
    document.getElementById('game-canvas').requestPointerLock();
  }
});

// localized comment
function initUI(){
  // localized comment
  try{G.highScore=parseInt(localStorage.getItem('dungeon_fps_highscore'))||0;}catch(e){G.highScore=0;}
  // localized comment
  document.getElementById('title-text').textContent=LANG.title;
  document.getElementById('subtitle-text').textContent=LANG.subtitle;
  document.getElementById('controls-text').innerHTML=LANG.controls.replace(/\|/g,'<br>');
  document.getElementById('menu-highscore').textContent=LANG.bestRecordLabel.replace('{n}',G.highScore);
  document.getElementById('start-btn').textContent=LANG.startBtn;
  document.getElementById('restart-btn').textContent=LANG.restartBtn;
  document.getElementById('gameover-title').textContent=LANG.gameOver;
  document.getElementById('pause-text').textContent=LANG.clickContinue;
  // localized comment
  document.getElementById('start-btn').addEventListener('click',()=>{
    initThree();
    startGame();
  });
  document.getElementById('restart-btn').addEventListener('click',()=>{
    startGame();
  });
}

// localized comment
initUI();
</script>
