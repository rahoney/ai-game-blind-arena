<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon FPS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #gameWrapper {
    position: relative;
    width: 800px;
    height: 600px;
  }
  #gameCanvas {
    display: block;
    width: 800px;
    height: 600px;
    cursor: crosshair;
  }
  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    display: none;
  }
  .hud-top {
    position: absolute;
    top: 12px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 16px;
  }
  .hud-box {
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 6px;
    padding: 6px 14px;
    color: #e8e8e8;
    font-size: 13px;
    min-width: 110px;
    text-align: center;
  }
  .hud-box span { color: #ffd700; font-size: 15px; font-weight: bold; }
  /* Health바 */
  #healthBarWrap {
    position: absolute;
    bottom: 70px; left: 16px;
    width: 180px;
  }
  #healthLabel { color: #ccc; font-size: 12px; margin-bottom: 3px; }
  #healthBarBg {
    width: 100%; height: 14px;
    background: rgba(0,0,0,0.5);
    border-radius: 7px;
    border: 1px solid rgba(255,255,255,0.2);
    overflow: hidden;
  }
  #healthBar {
    height: 100%;
    background: linear-gradient(90deg, #e74c3c, #ff6b6b);
    border-radius: 7px;
    transition: width 0.2s;
  }
  /* Ammo */
  #ammoDisplay {
    position: absolute;
    bottom: 70px; right: 16px;
    color: #e8e8e8;
    font-size: 14px;
    text-align: right;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 6px;
    padding: 6px 12px;
  }
  #ammoDisplay span { color: #ffd700; font-size: 17px; font-weight: bold; }
  /* 크로스헤어 */
  #crosshair {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 20px; height: 20px;
    pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.85);
  }
  #crosshair::before {
    width: 2px; height: 100%;
    left: 50%; top: 0;
    transform: translateX(-50%);
  }
  #crosshair::after {
    width: 100%; height: 2px;
    top: 50%; left: 0;
    transform: translateY(-50%);
  }
  /* 데미지 플래시 */
  #damageFlash {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(220, 30, 30, 0);
    pointer-events: none;
    transition: background 0.1s;
  }
  /* 메시지 */
  #waveMsg {
    position: absolute;
    top: 45%; left: 50%;
    transform: translate(-50%, -50%);
    color: #ffd700;
    font-size: 26px;
    font-weight: bold;
    text-shadow: 0 0 16px #ff8c00;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s;
    text-align: center;
  }
  /* 총기 UI */
  #gunDisplay {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 160px; height: 60px;
    pointer-events: none;
  }
  /* 아이템 알림 */
  #itemMsg {
    position: absolute;
    top: 35%; left: 50%;
    transform: translate(-50%, -50%);
    color: #7fff00;
    font-size: 17px;
    font-weight: bold;
    text-shadow: 0 0 10px #3c0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  /* 화면들 */
  .screen {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    z-index: 10;
  }
  #startScreen {
    background: linear-gradient(160deg, #0d0d1a 0%, #1a0d2e 50%, #0d1a1a 100%);
  }
  #gameOverScreen {
    background: rgba(5, 0, 0, 0.92);
    display: none;
  }
  #pauseScreen {
    background: rgba(0, 0, 20, 0.82);
    display: none;
  }
  .screen-title {
    font-size: 42px;
    font-weight: 900;
    color: #ff4444;
    text-shadow: 0 0 30px #ff0000, 0 0 60px #aa0000;
    margin-bottom: 10px;
    letter-spacing: 4px;
  }
  .screen-subtitle {
    font-size: 15px;
    color: #888;
    margin-bottom: 36px;
    letter-spacing: 2px;
  }
  .btn {
    padding: 13px 40px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    border: 2px solid #ff4444;
    border-radius: 4px;
    background: transparent;
    color: #ff6666;
    cursor: pointer;
    letter-spacing: 3px;
    transition: all 0.2s;
    margin: 6px;
  }
  .btn:hover {
    background: #ff4444;
    color: #fff;
    box-shadow: 0 0 20px #ff0000;
  }
  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 24px;
    margin: 18px 0 28px 0;
    text-align: left;
    font-size: 13px;
    color: #aaa;
  }
  .info-grid .key { color: #ffd700; }
  .go-stats {
    color: #ccc;
    font-size: 15px;
    margin: 8px 0;
  }
  .go-stats span { color: #ffd700; font-size: 18px; }
  .go-best { color: #7fff00; font-size: 14px; margin-bottom: 24px; }
  .pause-title { font-size: 30px; color: #ffd700; font-weight: bold; margin-bottom: 20px; }
  /* 포인터락 안내 */
  #lockMsg {
    position: absolute;
    bottom: 16px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-top">
      <div class="hud-box" id="hudScore"></div>
      <div class="hud-box" id="hudWave"></div>
      <div class="hud-box" id="hudBest"></div>
    </div>
    <div id="healthBarWrap">
      <div id="healthLabel"></div>
      <div id="healthBarBg"><div id="healthBar"></div></div>
    </div>
    <div id="ammoDisplay"></div>
    <div id="crosshair"></div>
    <div id="damageFlash"></div>
    <div id="waveMsg"></div>
    <div id="itemMsg"></div>
    <canvas id="gunDisplay" width="160" height="60"></canvas>
  </div>

  <!-- Start 화면 -->
  <div class="screen" id="startScreen">
    <div class="screen-title" id="titleText"></div>
    <div class="screen-subtitle" id="subtitleText"></div>
    <div class="info-grid" id="controlsGrid"></div>
    <button class="btn" id="startBtn"></button>
  </div>

  <!-- Game Over 화면 -->
  <div class="screen" id="gameOverScreen">
    <div class="screen-title" id="goTitle"></div>
    <div class="go-stats" id="goScore"></div>
    <div class="go-stats" id="goWave"></div>
    <div class="go-best" id="goBest"></div>
    <button class="btn" id="restartBtn"></button>
  </div>

  <!-- Pause 화면 -->
  <div class="screen" id="pauseScreen">
    <div class="pause-title" id="pauseTitle"></div>
    <button class="btn" id="resumeBtn"></button>
  </div>

  <div id="lockMsg"></div>
</div>

<script>
// ============================================================
// LANG_DATA: 모든 UI 문자열 한국어 집중 관리
// ============================================================
const LANG_DATA = {
  gameTitle:        'Dungeon FPS',
  gameSubtitle:     'Survive in the Dark',
  ctrlMove:         'WASD',
  ctrlMoveDesc:     'Move',
  ctrlLook:         'Mouse',
  ctrlLookDesc:     'Rotate View',
  ctrlShoot:        'Left Click',
  ctrlShootDesc:    'Fire',
  ctrlReload:       'R',
  ctrlReloadDesc:   'Reload',
  ctrlGunSwitch:    '1 / 2',
  ctrlGunSwitchDesc:'Switch Weapon',
  ctrlPause:        'ESC',
  ctrlPauseDesc:    'Pause',
  startBtn:         '[ Start Game ]',
  hudScore:         'Score',
  hudWave:          'Wave',
  hudBest:          'Best',
  hudHealth:        'Health',
  hudAmmo:          'Ammo',
  waveStart:        'Wave {n} Start!',
  waveClear:        'Wave {n} Cleared!',
  gameOver:         'GAME OVER',
  goScore:          'Score: {n}',
  goWave:           'Wave Reached: {n}',
  goBest:           'High Score: {n}pts',
  goNewBest:        '🏆 New Record! {n}pts',
  restartBtn:       '[ Restart ]',
  pauseTitle:       'Pause',
  resumeBtn:        '[ Continue ]',
  lockMsg:          'Click to lock Mouse | ESC: Unlock/Pause',
  ammoLabel:        '{cur} / {max}',
  gunPistol:        'Pistol',
  gunShotgun:       'Shotgun',
  itemHealth:       '💊 Health Recovered!',
  itemAmmo:         '🔋 Ammo Refilled!',
  reloading:        'Reloading...',
  enemyGrunt:       'Grunt',
  enemyBrute:       'Brute',
  enemySpecter:     'Specter',
};

function L(key, vars) {
  let s = LANG_DATA[key] || key;
  if (vars) Object.keys(vars).forEach(k => { s = s.replace('{' + k + '}', vars[k]); });
  return s;
}

// ============================================================
// 오디오 엔진 (Web Audio API)
// ============================================================
const AudioEngine = (() => {
  let ctx = null;
  function init() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  }
  function resume() { if (ctx && ctx.state === 'suspended') ctx.resume(); }

  function playTone(freq, type, dur, vol, decay) {
    if (!ctx) return;
    try {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type || 'square';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ctx.currentTime + dur);
      gain.gain.setValueAtTime(vol || 0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (decay || dur));
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + (decay || dur) + 0.01);
    } catch(e) {}
  }

  function noise(dur, vol) {
    if (!ctx) return;
    try {
      const bufLen = ctx.sampleRate * dur;
      const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1);
      const src = ctx.createBufferSource();
      src.buffer = buf;
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.value = 800;
      src.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
      gain.gain.setValueAtTime(vol || 0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      src.start(ctx.currentTime);
      src.stop(ctx.currentTime + dur + 0.01);
    } catch(e) {}
  }

  return {
    init, resume,
    // Pistol Fire
    shootPistol() {
      noise(0.08, 0.5);
      playTone(200, 'sawtooth', 0.1, 0.2, 0.12);
    },
    // Shotgun Fire
    shootShotgun() {
      noise(0.18, 0.8);
      playTone(120, 'sawtooth', 0.2, 0.3, 0.22);
    },
    // 적 피격
    enemyHit() { playTone(600, 'square', 0.06, 0.15, 0.08); },
    // 플레이어 피격
    playerHit() { playTone(150, 'sawtooth', 0.15, 0.4, 0.2); },
    // 적 사망
    enemyDie() {
      playTone(300, 'square', 0.1, 0.2, 0.15);
      playTone(200, 'square', 0.12, 0.15, 0.18);
    },
    // Reload
    reload() { playTone(400, 'sine', 0.08, 0.2, 0.1); setTimeout(()=>playTone(500,'sine',0.06,0.2,0.08),150); },
    // 아이템 획득
    itemPickup() { playTone(660,'sine',0.1,0.3); playTone(880,'sine',0.1,0.3); },
    // Wave Start
    waveStart() { [440,550,660].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.15,0.25),i*120)); },
    // 빈 총
    emptyGun() { playTone(120,'square',0.05,0.1,0.07); },
    // 걷기 발소리
    footstep() { noise(0.04,0.08); playTone(80,'sine',0.04,0.05); },
  };
})();

// ============================================================
// 맵 생성 (절차적 던전)
// ============================================================
const MAP_W = 25, MAP_H = 25;
const CELL = 2.0; // 월드 유닛당 셀 크기

function generateDungeon() {
  // 1: 벽, 0: 바닥
  const grid = [];
  for (let y = 0; y < MAP_H; y++) {
    grid[y] = [];
    for (let x = 0; x < MAP_W; x++) grid[y][x] = 1;
  }

  // 재귀 분할 미로 생성
  function carve(x, y) {
    const dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-0.5);
    for (const [dx, dy] of dirs) {
      const nx = x + dx, ny = y + dy;
      if (nx > 0 && nx < MAP_W-1 && ny > 0 && ny < MAP_H-1 && grid[ny][nx] === 1) {
        grid[ny][nx] = 0;
        grid[y + dy/2][x + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  grid[1][1] = 0;
  carve(1, 1);

  // Startpts 주변 공간 확보
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++)
      if (grid[1+dy] && grid[1+dy][1+dx] !== undefined) grid[1+dy][1+dx] = 0;

  return grid;
}

// ============================================================
// 레이캐스터 (Raycasting 3D 렌더링)
// ============================================================
const RC = {
  canvas: null, ctx: null,
  W: 800, H: 600,
  // 벽 색상 팔레트
  wallColors: [
    null,
    { r:80, g:60, b:100 },  // 기본 돌벽
    { r:100, g:70, b:50 },  // 나무
    { r:60, g:90, b:80 },   // 이끼
  ],

  init(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.imgData = this.ctx.createImageData(this.W, this.H);
    this.zbuffer = new Float32Array(this.W);
  },

  // 배경(천장/바닥) 그리기
  drawBackground() {
    const d = this.imgData.data;
    const halfH = this.H >> 1;
    for (let y = 0; y < this.H; y++) {
      const isCeiling = y < halfH;
      const factor = isCeiling
        ? (halfH - y) / halfH
        : (y - halfH) / halfH;
      for (let x = 0; x < this.W; x++) {
        const idx = (y * this.W + x) * 4;
        if (isCeiling) {
          d[idx]   = Math.floor(10 + factor * 20);
          d[idx+1] = Math.floor(8 + factor * 15);
          d[idx+2] = Math.floor(18 + factor * 25);
        } else {
          d[idx]   = Math.floor(18 + factor * 15);
          d[idx+1] = Math.floor(14 + factor * 12);
          d[idx+2] = Math.floor(10 + factor * 8);
        }
        d[idx+3] = 255;
      }
    }
  },

  // 레이캐스팅으로 벽 렌더링
  castWalls(player, map) {
    const d = this.imgData.data;
    const halfH = this.H >> 1;

    for (let col = 0; col < this.W; col++) {
      // 카메라 공간의 레이 방향 계산
      const camX = 2 * col / this.W - 1;
      const rayDX = player.dirX + player.planeX * camX;
      const rayDY = player.dirY + player.planeY * camX;

      let mapX = Math.floor(player.x), mapY = Math.floor(player.y);
      const dDistX = Math.abs(rayDX) < 1e-10 ? 1e30 : Math.abs(1 / rayDX);
      const dDistY = Math.abs(rayDY) < 1e-10 ? 1e30 : Math.abs(1 / rayDY);

      let stepX, stepY, sideDistX, sideDistY;
      if (rayDX < 0) { stepX = -1; sideDistX = (player.x - mapX) * dDistX; }
      else { stepX = 1; sideDistX = (mapX + 1 - player.x) * dDistX; }
      if (rayDY < 0) { stepY = -1; sideDistY = (player.y - mapY) * dDistY; }
      else { stepY = 1; sideDistY = (mapY + 1 - player.y) * dDistY; }

      let hit = false, side = 0;
      let loopCount = 0;
      while (!hit && loopCount++ < 64) {
        if (sideDistX < sideDistY) { sideDistX += dDistX; mapX += stepX; side = 0; }
        else { sideDistY += dDistY; mapY += stepY; side = 1; }
        if (mapY >= 0 && mapY < MAP_H && mapX >= 0 && mapX < MAP_W && map[mapY][mapX] > 0) hit = true;
      }

      const perpWallDist = side === 0
        ? (mapX - player.x + (1 - stepX) / 2) / rayDX
        : (mapY - player.y + (1 - stepY) / 2) / rayDY;

      this.zbuffer[col] = perpWallDist;

      const lineH = Math.min(this.H, Math.floor(this.H / (perpWallDist || 0.001)));
      const drawStart = Math.max(0, halfH - (lineH >> 1));
      const drawEnd   = Math.min(this.H - 1, halfH + (lineH >> 1));

      // 벽 타입별 색상 (맵 값 기반 변형)
      const wallType = (map[mapY] && map[mapY][mapX]) || 1;
      const wc = this.wallColors[Math.min(wallType, this.wallColors.length - 1)] || this.wallColors[1];

      // 거리에 따른 안개 효과
      const fog = Math.max(0, 1 - perpWallDist / 12);
      // 측면 어둡게
      const shade = side === 1 ? 0.6 : 1.0;

      const r = Math.floor(wc.r * fog * shade);
      const g = Math.floor(wc.g * fog * shade);
      const b = Math.floor(wc.b * fog * shade);

      for (let row = drawStart; row <= drawEnd; row++) {
        const idx = (row * this.W + col) * 4;
        d[idx]   = r;
        d[idx+1] = g;
        d[idx+2] = b;
        d[idx+3] = 255;
      }
    }
  },

  // 스프라이트(적/아이템) 렌더링
  renderSprites(player, sprites) {
    const d = this.imgData.data;
    const halfH = this.H >> 1;

    // 거리 정렬 (먼 것부터)
    const sorted = sprites
      .map(s => ({ ...s, dist: (player.x - s.x)**2 + (player.y - s.y)**2 }))
      .sort((a, b) => b.dist - a.dist);

    for (const sp of sorted) {
      const sprX = sp.x - player.x;
      const sprY = sp.y - player.y;
      const invDet = 1 / (player.planeX * player.dirY - player.dirX * player.planeY);
      const transformX = invDet * (player.dirY * sprX - player.dirX * sprY);
      const transformY = invDet * (-player.planeY * sprX + player.planeX * sprY);

      if (transformY <= 0.1) continue; // 등 뒤 제외

      const sprScreenX = Math.floor((this.W / 2) * (1 + transformX / transformY));
      const sprH = Math.min(this.H * 2, Math.abs(Math.floor(this.H / transformY)));
      const sprW = Math.floor(sprH * (sp.w || 1));
      const drawStartY = Math.max(0, halfH - (sprH >> 1));
      const drawEndY   = Math.min(this.H - 1, halfH + (sprH >> 1));
      const drawStartX = Math.max(0, sprScreenX - (sprW >> 1));
      const drawEndX   = Math.min(this.W - 1, sprScreenX + (sprW >> 1));

      const fog = Math.max(0, 1 - transformY / 10);
      const alpha = Math.floor(255 * fog * (sp.alpha || 1));

      for (let sx = drawStartX; sx <= drawEndX; sx++) {
        if (transformY >= this.zbuffer[sx]) continue; // z-버퍼 체크
        const texX = Math.floor((sx - (sprScreenX - sprW / 2)) / sprW * (sp.texW || 16));
        for (let sy = drawStartY; sy <= drawEndY; sy++) {
          const texY = Math.floor((sy - (halfH - sprH / 2)) / sprH * (sp.texH || 16));
          const col = sp.getPixel ? sp.getPixel(texX, texY) : null;
          if (!col || col[3] < 10) continue;
          const idx = (sy * this.W + sx) * 4;
          const a = (col[3] / 255) * (alpha / 255);
          d[idx]   = Math.floor(d[idx]   * (1-a) + col[0] * a);
          d[idx+1] = Math.floor(d[idx+1] * (1-a) + col[1] * a);
          d[idx+2] = Math.floor(d[idx+2] * (1-a) + col[2] * a);
          d[idx+3] = 255;
        }
      }
    }
  },

  flush() { this.ctx.putImageData(this.imgData, 0, 0); },
};

// ============================================================
// 스프라이트 텍스처 생성 (픽셀 아트 방식)
// ============================================================
function makeEnemyTexture(type) {
  // type: 'grunt'|'brute'|'specter'
  const SIZE = 16;
  const pixels = new Uint8Array(SIZE * SIZE * 4);
  const set = (x, y, r, g, b, a=255) => {
    if (x<0||x>=SIZE||y<0||y>=SIZE) return;
    const i = (y*SIZE+x)*4;
    pixels[i]=r; pixels[i+1]=g; pixels[i+2]=b; pixels[i+3]=a;
  };

  if (type === 'grunt') {
    // 빨간 해골형 적
    for (let y=2;y<=5;y++) for (let x=5;x<=10;x++) set(x,y,180,40,40);
    // 눈
    set(6,3,255,255,50,255); set(9,3,255,255,50,255);
    // 몸통
    for (let y=6;y<=12;y++) for (let x=4;x<=11;x++) set(x,y,150,30,30);
    // 팔
    for (let y=7;y<=10;y++) { set(2,y,130,25,25); set(13,y,130,25,25); }
    // 다리
    for (let y=13;y<=15;y++) { set(5,y,120,20,20); set(10,y,120,20,20); }
  } else if (type === 'brute') {
    // 파란 거대 적
    for (let y=1;y<=6;y++) for (let x=4;x<=11;x++) set(x,y,40,60,180);
    set(5,3,255,50,50); set(10,3,255,50,50);
    for (let y=7;y<=13;y++) for (let x=3;x<=12;x++) set(x,y,30,50,160);
    for (let y=7;y<=11;y++) { set(1,y,30,45,140); set(2,y,30,45,140); set(13,y,30,45,140); set(14,y,30,45,140); }
    for (let y=14;y<=15;y++) { set(5,y,25,40,130); set(6,y,25,40,130); set(9,y,25,40,130); set(10,y,25,40,130); }
  } else {
    // 유령형 (투명, 녹색)
    for (let y=2;y<=8;y++) for (let x=4;x<=11;x++) {
      const a = Math.random() < 0.3 ? 0 : 170;
      set(x,y,80,220,120,a);
    }
    set(6,4,255,255,255,220); set(9,4,255,255,255,220);
    for (let y=9;y<=14;y++) for (let x=4;x<=11;x++) {
      const a = y>12 ? Math.floor(170*(15-y)/3) : 150;
      set(x,y,60,200,100,a);
    }
  }

  return {
    texW: SIZE, texH: SIZE,
    getPixel(tx, ty) {
      const i = (Math.max(0,Math.min(SIZE-1,ty)) * SIZE + Math.max(0,Math.min(SIZE-1,tx))) * 4;
      return [pixels[i], pixels[i+1], pixels[i+2], pixels[i+3]];
    }
  };
}

function makeItemTexture(type) {
  const SIZE = 12;
  const pixels = new Uint8Array(SIZE * SIZE * 4);
  const set = (x, y, r, g, b, a=255) => {
    if (x<0||x>=SIZE||y<0||y>=SIZE) return;
    const i = (y*SIZE+x)*4;
    pixels[i]=r; pixels[i+1]=g; pixels[i+2]=b; pixels[i+3]=a;
  };
  if (type === 'health') {
    // 빨간 십자
    for (let i=2;i<=9;i++) { set(5,i,220,50,50); set(6,i,220,50,50); }
    for (let i=2;i<=9;i++) { set(i,5,220,50,50); set(i,6,220,50,50); }
  } else {
    // 노란 Ammo 상자
    for (let y=3;y<=9;y++) for (let x=2;x<=9;x++) set(x,y,200,180,30);
    for (let i=2;i<=9;i++) { set(i,3,255,220,50); set(i,9,160,140,20); }
    set(5,6,255,255,100); set(6,6,255,255,100);
  }
  return {
    texW: SIZE, texH: SIZE,
    getPixel(tx,ty) {
      const i=(Math.max(0,Math.min(SIZE-1,ty))*SIZE+Math.max(0,Math.min(SIZE-1,tx)))*4;
      return [pixels[i],pixels[i+1],pixels[i+2],pixels[i+3]];
    }
  };
}

// Wave별 적 구성
function getWaveComposition(wave) {
  const list = [];
  const base = 3 + wave * 2;
  const grunts   = Math.max(2, base - Math.floor(wave/2));
  const brutes   = Math.floor(wave / 2);
  const specters = Math.floor(wave / 3);
  for (let i=0;i<grunts;i++) list.push('grunt');
  for (let i=0;i<brutes;i++) list.push('brute');
  for (let i=0;i<specters;i++) list.push('specter');
  return list;
}

function spawnEnemy(typeName) {
  const def = ENEMY_TYPES[typeName];
  // 플레이어에서 먼 빈 셀에 스폰
  let ex, ey, attempts = 0;
  do {
    ex = 1 + Math.floor(Math.random() * (MAP_W - 2));
    ey = 1 + Math.floor(Math.random() * (MAP_H - 2));
    attempts++;
  } while (
    (G.map[ey][ex] !== 0 ||
     Math.abs(ex - G.player.x) < 5 ||
     Math.abs(ey - G.player.y) < 5) &&
    attempts < 200
  );

  const tex = def.tex();
  G.enemies.push({
    ...def,
    hp: def.hp + Math.floor(G.wave * def.hp * 0.15),
    maxHp: def.hp + Math.floor(G.wave * def.hp * 0.15),
    x: ex + 0.5, y: ey + 0.5,
    lastAttack: 0,
    flashTimer: 0,
    tex,
    texW: tex.texW, texH: tex.texH,
    getPixel: tex.getPixel.bind(tex),
    w: def.scale,
    alpha: 1,
    dead: false,
  });
}

function startNextWave() {
  G.wave++;
  G.waveActive = true;
  const types = getWaveComposition(G.wave);
  types.forEach(t => spawnEnemy(t));
  AudioEngine.waveStart();
  showWaveMsg(L('waveStart', { n: G.wave }));

  // 아이템 스폰
  spawnItems();
}

function spawnItems() {
  const count = 1 + Math.floor(G.wave / 2);
  for (let i = 0; i < count; i++) {
    let ix, iy, attempts = 0;
    do {
      ix = 1 + Math.floor(Math.random() * (MAP_W - 2));
      iy = 1 + Math.floor(Math.random() * (MAP_H - 2));
      attempts++;
    } while (G.map[iy][ix] !== 0 && attempts < 100);
    const type = Math.random() < 0.6 ? 'health' : 'ammo';
    const tex = TEXTURES[type];
    G.items.push({
      x: ix+0.5, y: iy+0.5,
      type,
      tex,
      texW: tex.texW, texH: tex.texH,
      getPixel: tex.getPixel.bind(tex),
      w: 0.5, alpha: 1,
      bob: Math.random() * Math.PI * 2,
    });
  }
}

// ============================================================
// 충돌 검사
// ============================================================
function isWall(x, y, map, margin) {
  margin = margin || 0.25;
  const checks = [
    [x - margin, y - margin],
    [x + margin, y - margin],
    [x - margin, y + margin],
    [x + margin, y + margin],
  ];
  for (const [cx, cy] of checks) {
    const mx = Math.floor(cx), my = Math.floor(cy);
    if (mx < 0 || my < 0 || mx >= MAP_W || my >= MAP_H) return true;
    if (G.map[my][mx] !== 0) return true;
  }
  return false;
}

// ============================================================
// 플레이어 Move
// ============================================================
function movePlayer(dt) {
  const p = G.player;
  const spd = p.speed * dt * 60;
  const rotSpd = p.rotSpeed;

  let moved = false;
  let moveX = 0, moveY = 0;

  if (G.keys['w'] || G.keys['arrowup']) {
    moveX += p.dirX * spd;
    moveY += p.dirY * spd;
    moved = true;
  }
  if (G.keys['s'] || G.keys['arrowdown']) {
    moveX -= p.dirX * spd;
    moveY -= p.dirY * spd;
    moved = true;
  }
  if (G.keys['a'] || G.keys['arrowleft']) {
    moveX += p.dirY * spd;
    moveY -= p.dirX * spd;
    moved = true;
  }
  if (G.keys['d'] || G.keys['arrowright']) {
    moveX -= p.dirY * spd;
    moveY += p.dirX * spd;
    moved = true;
  }

  // 충돌 분리 Move (슬라이딩)
  if (!isWall(p.x + moveX, p.y, G.map)) p.x += moveX;
  if (!isWall(p.x, p.y + moveY, G.map)) p.y += moveY;

  // Mouse Rotate View
  const rot = G.mouse.dx * rotSpd;
  G.mouse.dx = 0; G.mouse.dy = 0;

  if (Math.abs(rot) > 0) {
    const cos = Math.cos(rot), sin = Math.sin(rot);
    const oldDirX = p.dirX;
    p.dirX = p.dirX * cos - p.dirY * sin;
    p.dirY = oldDirX * sin + p.dirY * cos;
    const oldPlaneX = p.planeX;
    p.planeX = p.planeX * cos - p.planeY * sin;
    p.planeY = oldPlaneX * sin + p.planeY * cos;
  }

  p.moving = moved;

  // 발소리
  if (moved) {
    p.footTimer = (p.footTimer || 0) + dt;
    if (p.footTimer > 0.35) { AudioEngine.footstep(); p.footTimer = 0; }
  } else {
    p.footTimer = 0;
  }
}

// ============================================================
// 적 AI 업데이트
// ============================================================
function updateEnemies(dt, now) {
  const p = G.player;
  const spd = dt * 60;
  let allDead = true;

  for (const e of G.enemies) {
    if (e.dead) continue;
    allDead = false;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    const dx = p.x - e.x, dy = p.y - e.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // attack 범위 안이면 attack
    if (dist < e.attackRange) {
      if (now - e.lastAttack > e.attackCooldown) {
        e.lastAttack = now;
        if (p.invincible <= 0) {
          p.hp -= e.damage;
          p.invincible = 0.5;
          AudioEngine.playerHit();
          showDamageFlash();
          if (p.hp <= 0) { p.hp = 0; triggerGameOver(); return; }
        }
      }
    } else {
      // 추적 Move
      const nx = dx / dist, ny = dy / dist;
      const ex = e.x + nx * e.speed * spd;
      const ey = e.y + ny * e.speed * spd;

      if (e.phasing) {
        // Specter: 벽 반쯤 통과
        if (!isWall(ex, e.y, G.map, 0.1)) e.x = ex;
        if (!isWall(e.x, ey, G.map, 0.1)) e.y = ey;
      } else {
        if (!isWall(ex, e.y, G.map)) e.x = ex;
        if (!isWall(e.x, ey, G.map)) e.y = ey;
      }
    }
  }

  // 무적 타이머
  if (p.invincible > 0) p.invincible -= dt;

  // 모든 적 처치 → 다음 Wave
  const living = G.enemies.filter(e => !e.dead);
  if (living.length === 0 && G.waveActive) {
    G.waveActive = false;
    G.waveClearTimer = 2.5;
    showWaveMsg(L('waveClear', { n: G.wave }));
    AudioEngine.waveStart();
  }
  if (!G.waveActive && G.waveClearTimer > 0) {
    G.waveClearTimer -= dt;
    if (G.waveClearTimer <= 0) startNextWave();
  }
}

// ============================================================
// Fire 처리
// ============================================================
function handleShoot(now) {
  const p = G.player;
  const gun = G.guns[p.currentGun];
  const def = GUNS[p.currentGun];

  if (gun.reloading) return;
  if (now - gun.lastShot < def.fireRate) return;
  if (gun.ammo <= 0) {
    AudioEngine.emptyGun();
    gun.lastShot = now;
    startReload(p.currentGun, now);
    return;
  }

  gun.ammo--;
  gun.lastShot = now;
  gun.kickY = 12; // 반동

  if (p.currentGun === 'pistol') AudioEngine.shootPistol();
  else AudioEngine.shootShotgun();

  // 여러 펠릿 Fire (Shotgun)
  for (let pel = 0; pel < def.pellets; pel++) {
    const spread = (Math.random() - 0.5) * def.spread;
    const rayDX = p.dirX + p.planeX * spread;
    const rayDY = p.dirY + p.planeY * spread;
    raycastShot(rayDX, rayDY, def.damage, now);
  }

  // 파티클 효과
  spawnMuzzleFlash(p.x, p.y);
}

function raycastShot(rdx, rdy, damage, now) {
  const p = G.player;
  let mx = Math.floor(p.x), my = Math.floor(p.y);
  const ddx = Math.abs(rdx) < 1e-10 ? 1e30 : Math.abs(1/rdx);
  const ddy = Math.abs(rdy) < 1e-10 ? 1e30 : Math.abs(1/rdy);
  let sx = rdx < 0 ? -1 : 1, sy = rdy < 0 ? -1 : 1;
  let sdx = rdx < 0 ? (p.x-mx)*ddx : (mx+1-p.x)*ddx;
  let sdy = rdy < 0 ? (p.y-my)*ddy : (my+1-p.y)*ddy;
  let dist = 0;

  for (let i=0;i<40;i++) {
    if (sdx < sdy) { sdx+=ddx; mx+=sx; dist=sdx-ddx; }
    else { sdy+=ddy; my+=sy; dist=sdy-ddy; }
    if (mx<0||my<0||mx>=MAP_W||my>=MAP_H||G.map[my][mx]!==0) break;

    // 적 히트 체크
    for (const e of G.enemies) {
      if (e.dead) continue;
      const edx = e.x - p.x, edy = e.y - p.y;
      const eDist = Math.sqrt(edx*edx+edy*edy);
      if (Math.abs(edx-rdx*eDist)<0.5 && Math.abs(edy-rdy*eDist)<0.5 && eDist < dist+1) {
        e.hp -= damage;
        e.flashTimer = 0.15;
        AudioEngine.enemyHit();
        spawnBloodParticle(e.x, e.y);
        if (e.hp <= 0 && !e.dead) {
          e.dead = true;
          G.player.score += e.score * G.wave;
          AudioEngine.enemyDie();
        }
        return; // 한 적만 피격
      }
    }
  }
}

function startReload(gunName, now) {
  const gun = G.guns[gunName];
  const def = GUNS[gunName];
  if (gun.reloading || gun.ammo >= def.maxAmmo) return;
  gun.reloading = true;
  AudioEngine.reload();
  setTimeout(() => {
    if (G.state === 'playing') {
      gun.ammo = def.maxAmmo;
      gun.reloading = false;
    }
  }, def.reloadTime);
}

// ============================================================
// 아이템 충돌
// ============================================================
function checkItems() {
  const p = G.player;
  for (let i = G.items.length - 1; i >= 0; i--) {
    const item = G.items[i];
    const d = Math.sqrt((item.x-p.x)**2 + (item.y-p.y)**2);
    if (d < 0.8) {
      if (item.type === 'health') {
        p.hp = Math.min(p.maxHp, p.hp + 40);
        showItemMsg(L('itemHealth'));
      } else {
        const gun = G.guns[p.currentGun];
        gun.ammo = GUNS[p.currentGun].maxAmmo;
        showItemMsg(L('itemAmmo'));
      }
      AudioEngine.itemPickup();
      G.items.splice(i, 1);
    }
  }
}

// ============================================================
// 파티클 시스템
// ============================================================
function spawnMuzzleFlash(x, y) {
  for (let i=0;i<4;i++) {
    G.particles.push({
      x: x + G.player.dirX * 0.3,
      y: y + G.player.dirY * 0.3,
      vx: (Math.random()-0.5)*0.08,
      vy: (Math.random()-0.5)*0.08,
      life: 0.08,
      maxLife: 0.08,
      r:255, g:200, b:50, a:200,
      w: 0.3,
    });
  }
}

function spawnBloodParticle(ex, ey) {
  for (let i=0;i<5;i++) {
    G.particles.push({
      x: ex + (Math.random()-0.5)*0.3,
      y: ey + (Math.random()-0.5)*0.3,
      vx: (Math.random()-0.5)*0.06,
      vy: (Math.random()-0.5)*0.06,
      life: 0.3,
      maxLife: 0.3,
      r:200, g:20, b:20, a:180,
      w: 0.25,
    });
  }
}

function updateParticles(dt) {
  for (let i = G.particles.length-1; i >= 0; i--) {
    const p = G.particles[i];
    p.life -= dt;
    if (p.life <= 0) { G.particles.splice(i,1); continue; }
    p.x += p.vx; p.y += p.vy;
    p.a = Math.floor((p.life / p.maxLife) * 180);
  }
}

// ============================================================
// 총기 시각 렌더링 (Canvas 2D)
// ============================================================
function renderGun(now) {
  const gc = document.getElementById('gunDisplay');
  const ctx2 = gc.getContext('2d');
  const W = gc.width, H = gc.height;
  ctx2.clearRect(0, 0, W, H);

  const gun = G.guns[G.player.currentGun];
  const isPistol = G.player.currentGun === 'pistol';

  // 반동 애니메이션
  if (gun.kickY > 0) gun.kickY *= 0.7;
  // 걷기 흔들림
  const bob = G.player.moving ? Math.sin(now * 0.008) * 4 : 0;
  const offsetY = Math.floor(gun.kickY + bob);

  ctx2.save();
  ctx2.translate(W/2, H + offsetY);

  if (isPistol) {
    // Pistol 모양
    ctx2.fillStyle = '#444';
    ctx2.fillRect(-8, -28, 16, 20); // 몸통
    ctx2.fillStyle = '#333';
    ctx2.fillRect(-6, -10, 12, 8);  // 손잡이
    ctx2.fillStyle = '#555';
    ctx2.fillRect(-3, -36, 6, 12);  // 총신
    ctx2.fillStyle = '#222';
    ctx2.fillRect(-3, -40, 6, 4);   // 총구
    if (gun.kickY > 3) {
      ctx2.fillStyle = 'rgba(255,220,80,0.7)';
      ctx2.beginPath(); ctx2.arc(0, -44, 5, 0, Math.PI*2); ctx2.fill();
    }
  } else {
    // Shotgun 모양
    ctx2.fillStyle = '#5a3a1a';
    ctx2.fillRect(-14, -32, 28, 18); // 몸통
    ctx2.fillStyle = '#3a2a0a';
    ctx2.fillRect(-10, -14, 20, 12); // 손잡이
    ctx2.fillStyle = '#666';
    ctx2.fillRect(-5, -46, 10, 18);  // 총신
    ctx2.fillStyle = '#444';
    ctx2.fillRect(-5, -50, 10, 4);
    if (gun.kickY > 5) {
      ctx2.fillStyle = 'rgba(255,200,60,0.8)';
      ctx2.beginPath(); ctx2.arc(0, -54, 7, 0, Math.PI*2); ctx2.fill();
    }
  }
  ctx2.restore();

  // 장전 중 표시
  if (gun.reloading) {
    ctx2.fillStyle = 'rgba(255,200,0,0.85)';
    ctx2.font = 'bold 11px Courier New';
    ctx2.textAlign = 'center';
    ctx2.fillText(L('reloading'), W/2, H - 4);
  }
}

function updateHUD() {
  const p = G.player;
  const gun = G.guns[p.currentGun];
  const best = getBestScore();

  document.getElementById('hudScore').innerHTML = `${L('hudScore')}<br><span>${p.score}</span>`;
  document.getElementById('hudWave').innerHTML  = `${L('hudWave')}<br><span>${G.wave}</span>`;
  document.getElementById('hudBest').innerHTML  = `${L('hudBest')}<br><span>${best}</span>`;
  document.getElementById('healthLabel').textContent = L('hudHealth');
  document.getElementById('healthBar').style.width = (p.hp / p.maxHp * 100) + '%';

  const ammoLabel = gun.reloading
    ? L('reloading')
    : L('ammoLabel', { cur: gun.ammo, max: GUNS[p.currentGun].maxAmmo });
  document.getElementById('ammoDisplay').innerHTML =
    `${L(G.player.currentGun === 'pistol' ? 'gunPistol' : 'gunShotgun')}<br><span>${ammoLabel}</span>`;
}

// ============================================================
// 메시지 표시 유틸
// ============================================================
let waveMsgTimer = null;
function showWaveMsg(text) {
  const el = document.getElementById('waveMsg');
  el.textContent = text;
  el.style.opacity = '1';
  if (waveMsgTimer) clearTimeout(waveMsgTimer);
  waveMsgTimer = setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

let itemMsgTimer = null;
function showItemMsg(text) {
  const el = document.getElementById('itemMsg');
  el.textContent = text;
  el.style.opacity = '1';
  if (itemMsgTimer) clearTimeout(itemMsgTimer);
  itemMsgTimer = setTimeout(() => { el.style.opacity = '0'; }, 1400);
}

let flashTimer = null;
function showDamageFlash() {
  const el = document.getElementById('damageFlash');
  el.style.background = 'rgba(220,30,30,0.35)';
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => { el.style.background = 'rgba(220,30,30,0)'; }, 200);
}

// ============================================================
// Score 저장/불러오기
// ============================================================
const BEST_KEY = 'dungeonFPS_best';
function getBestScore() { return parseInt(localStorage.getItem(BEST_KEY) || '0', 10); }
function saveBestScore(s) { if (s > getBestScore()) localStorage.setItem(BEST_KEY, s); }

// ============================================================
// Game Over
// ============================================================
function triggerGameOver() {
  G.state = 'gameover';
  G.running = false;
  const best = getBestScore();
  const isNew = G.player.score > best;
  saveBestScore(G.player.score);

  document.getElementById('gameOverScreen').style.display = 'flex';
  document.getElementById('goTitle').textContent = L('gameOver');
  document.getElementById('goScore').innerHTML = L('goScore', { n: G.player.score });
  document.getElementById('goWave').innerHTML  = L('goWave',  { n: G.wave });
  document.getElementById('goBest').textContent = isNew
    ? L('goNewBest', { n: G.player.score })
    : L('goBest', { n: getBestScore() });

  if (document.pointerLockElement) document.exitPointerLock();
}

// ============================================================
// Pause
// ============================================================
function pauseGame() {
  if (G.state !== 'playing') return;
  G.state = 'paused';
  document.getElementById('pauseScreen').style.display = 'flex';
  if (document.pointerLockElement) document.exitPointerLock();
}
function resumeGame() {
  G.state = 'playing';
  document.getElementById('pauseScreen').style.display = 'none';
  document.getElementById('gameCanvas').requestPointerLock();
}

// ============================================================
// 메인 게임 루프
// ============================================================
let animId = null;
function gameLoop(now) {
  if (!G.running) return;
  animId = requestAnimationFrame(gameLoop);
  if (G.state !== 'playing') return;

  const dt = Math.min((now - G.lastTime) / 1000, 0.05); // 최대 50ms
  G.lastTime = now;
  G.frameCount++;

  // 업데이트
  movePlayer(dt);
  updateEnemies(dt, now);
  updateParticles(dt);
  checkItems();

  // Fire
  if (G.mouse.shooting) handleShoot(now);

  // 아이템 밥 애니메이션
  for (const item of G.items) item.bob += dt * 2;

  // 렌더링
  RC.drawBackground();
  RC.castWalls(G.player, G.map);

  // 스프라이트 목록 (적 + 아이템 + 파티클)
  const sprites = [];
  for (const e of G.enemies) {
    if (!e.dead) sprites.push(e);
  }
  for (const item of G.items) {
    // 아이템 밥 (Y축 위아래 Move 시뮬레이션)
    sprites.push(item);
  }
  for (const part of G.particles) {
    sprites.push({
      x: part.x, y: part.y,
      texW: 4, texH: 4, w: part.w,
      alpha: part.a / 255,
      getPixel: (tx, ty) => [part.r, part.g, part.b, part.a],
    });
  }

  RC.renderSprites(G.player, sprites);
  RC.flush();

  // HUD
  updateHUD();
  renderGun(now);

  // 키보드 Reload
  if (G.keys['r'] && !G.guns[G.player.currentGun].reloading) {
    startReload(G.player.currentGun, now);
  }
}

// ============================================================
// 입력 처리
// ============================================================
function setupInput() {
  // 키보드
  document.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    G.keys[k] = true;
    if (k === 'escape') {
      if (G.state === 'playing') pauseGame();
      else if (G.state === 'paused') resumeGame();
    }
    if (k === '1') G.player.currentGun = 'pistol';
    if (k === '2') G.player.currentGun = 'shotgun';
    e.preventDefault && ['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k) && e.preventDefault();
  });
  document.addEventListener('keyup', e => {
    G.keys[e.key.toLowerCase()] = false;
  });

  // Mouse
  document.addEventListener('mousemove', e => {
    if (G.state !== 'playing') return;
    if (document.pointerLockElement === document.getElementById('gameCanvas')) {
      G.mouse.dx += e.movementX;
      G.mouse.dy += e.movementY;
    }
  });
  document.getElementById('gameCanvas').addEventListener('mousedown', e => {
    if (e.button === 0) {
      AudioEngine.init();
      AudioEngine.resume();
      if (document.pointerLockElement !== document.getElementById('gameCanvas')) {
        document.getElementById('gameCanvas').requestPointerLock();
        return;
      }
      G.mouse.shooting = true;
    }
  });
  document.getElementById('gameCanvas').addEventListener('mouseup', e => {
    if (e.button === 0) G.mouse.shooting = false;
  });

  // 포인터 락
  document.addEventListener('pointerlockchange', () => {
    if (!document.pointerLockElement && G.state === 'playing') {
      // 락 해제시 Pause
      pauseGame();
    }
  });
}

// ============================================================
// UI 초기화 및 버튼 이벤트
// ============================================================
function initUI() {
  document.getElementById('titleText').textContent = L('gameTitle');
  document.getElementById('subtitleText').textContent = L('gameSubtitle');
  document.getElementById('startBtn').textContent = L('startBtn');
  document.getElementById('restartBtn').textContent = L('restartBtn');
  document.getElementById('resumeBtn').textContent = L('resumeBtn');
  document.getElementById('pauseTitle').textContent = L('pauseTitle');
  document.getElementById('lockMsg').textContent = L('lockMsg');

  // Controls 표
  const grid = document.getElementById('controlsGrid');
  const controls = [
    [L('ctrlMove'), L('ctrlMoveDesc')],
    [L('ctrlLook'), L('ctrlLookDesc')],
    [L('ctrlShoot'), L('ctrlShootDesc')],
    [L('ctrlReload'), L('ctrlReloadDesc')],
    [L('ctrlGunSwitch'), L('ctrlGunSwitchDesc')],
    [L('ctrlPause'), L('ctrlPauseDesc')],
  ];
  grid.innerHTML = controls.map(([k,v]) =>
    `<span class="key">[${k}]</span><span>${v}</span>`
  ).join('');

  // 버튼 이벤트
  document.getElementById('startBtn').addEventListener('click', () => {
    AudioEngine.init();
    AudioEngine.resume();
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('hud').style.display = 'block';
    resetGame();
    setupInput();
    G.lastTime = performance.now();
    animId = requestAnimationFrame(gameLoop);
    document.getElementById('gameCanvas').requestPointerLock();
  });

  document.getElementById('restartBtn').addEventListener('click', () => {
    AudioEngine.resume();
    document.getElementById('gameOverScreen').style.display = 'none';
    // 전체 게임 상태 초기화
    cancelAnimationFrame(animId);
    resetGame();
    G.lastTime = performance.now();
    G.running = true;
    animId = requestAnimationFrame(gameLoop);
    document.getElementById('gameCanvas').requestPointerLock();
  });

  document.getElementById('resumeBtn').addEventListener('click', () => {
    resumeGame();
  });
}

// ============================================================
// 진입pts
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  RC.init(document.getElementById('gameCanvas'));
  initUI();
});
</script>
