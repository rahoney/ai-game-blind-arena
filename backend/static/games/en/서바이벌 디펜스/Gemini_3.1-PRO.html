<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survival Nexus</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        #gameContainer {
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            background-color: #1e1e1e;
        }
        canvas {
            display: block;
        }
        /* UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.75);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        h1 { margin: 0 0 20px 0; font-size: 48px; text-align: center; }
        h2 { margin: 0 0 15px 0; font-size: 32px; color: #ffeb3b; }
        p { font-size: 20px; margin: 10px 0; }
        
        button {
            padding: 12px 30px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            background-color: #d32f2f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            margin-top: 20px;
        }
        button:hover { background-color: #f44336; transform: scale(1.05); }
        button:active { transform: scale(0.95); }

        /* Level Up Choices */
        #upgradeContainer {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .upgrade-card {
            background: #2c3e50;
            border: 2px solid #34495e;
            border-radius: 10px;
            padding: 20px;
            width: 180px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        .upgrade-card:hover {
            transform: translateY(-5px);
            background: #34495e;
            border-color: #ffeb3b;
        }
        .upgrade-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #ffeb3b; }
        .upgrade-desc { font-size: 14px; color: #bdc3c7; }

        /* HUD */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .hud-bar {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 300px;
            background: #333;
            border: 2px solid #555;
            border-radius: 10px;
            overflow: hidden;
            height: 24px;
        }
        .hud-hp-fill { height: 100%; background: #e74c3c; width: 100%; transition: width 0.1s; }
        .hud-exp-fill { height: 100%; background: #3498db; width: 0%; transition: width 0.2s; }
        
        .hud-exp-bar { top: 45px; height: 16px; width: 250px; }
        .hud-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            font-size: 14px;
            font-weight: bold;
            line-height: 24px;
            text-shadow: 1px 1px 2px #000;
        }
        .hud-exp-text { line-height: 16px; font-size: 12px; }

        #statsHUD {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="1024" height="768"></canvas>
    
    <div id="hud">
        <div class="hud-bar">
            <div id="hpFill" class="hud-hp-fill"></div>
            <div id="hpText" class="hud-text">HP</div>
        </div>
        <div class="hud-bar hud-exp-bar">
            <div id="expFill" class="hud-exp-fill"></div>
            <div id="expText" class="hud-text hud-exp-text">EXP</div>
        </div>
        <div id="statsHUD">
            <div id="scoreText"></div>
            <div id="waveText"></div>
            <div id="bestScoreText"></div>
        </div>
    </div>

    <div id="startScreen" class="overlay active">
        <h1 id="startTitle"></h1>
        <p id="startDesc"></p>
        <button id="startBtn" onclick="startGame()"></button>
    </div>

    <div id="gameOverScreen" class="overlay">
        <h1 id="gameOverTitle"></h1>
        <h2 id="finalScoreText"></h2>
        <p id="newRecordText" style="color: #4CAF50; display: none; font-weight: bold;"></p>
        <button id="restartBtn" onclick="startGame()"></button>
    </div>

    <div id="levelUpScreen" class="overlay">
        <h1 id="levelUpTitle"></h1>
        <p id="levelUpDesc"></p>
        <div id="upgradeContainer"></div>
    </div>
</div>

<script>
    /**
     *      Management (LANG_DATA)
     */
    const LANG_DATA = {
        title: "Survival Nexus",
        desc: "Move: WASD / Auto Attack. Survive until the end.",
        startBtn: "Start Game",
        restartBtn: "Restart",
        gameOver: "Mission Failed",
        score: "Kills: ",
        bestScore: "Best Score: ",
        wave: "Current Wave: ",
        hp: "HP",
        lv: "Lv.",
        levelUp: "LEVEL UP!",
        chooseUpgrade: "Enhance your combat abilities",
        newRecord: "New Best Score Reached!",
        upgrades: {
            maxHp: { name: "Exoskeleton", desc: "Max HP +25 and heals." },
            moveSpeed: { name: "Mobility", desc: "Movement Speed +15%." },
            atkSpeed: { name: "Fire Rate", desc: "Attack Cooldown -15%." },
            damage: { name: "Firepower", desc: "Base Damage +5." },
            pierce: { name: "Piercing Rounds", desc: "Projectiles pierce +1 enemy." },
            multiShot: { name: "Scatter Shot", desc: "Projectiles +1." },
            projSpeed: { name: "Bullet Speed", desc: "Projectile Speed +20%." },
            heal: { name: "Emergency Repair", desc: "Heals 30 HP." }
        }
    };

    // --- DOM Elements ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const ui = {
        start: document.getElementById('startScreen'),
        gameOver: document.getElementById('gameOverScreen'),
        levelUp: document.getElementById('levelUpScreen'),
        hpFill: document.getElementById('hpFill'),
        hpText: document.getElementById('hpText'),
        expFill: document.getElementById('expFill'),
        expText: document.getElementById('expText'),
        score: document.getElementById('scoreText'),
        wave: document.getElementById('waveText'),
        bestScore: document.getElementById('bestScoreText'),
        upgrades: document.getElementById('upgradeContainer')
    };

    // Initial  Binding
    document.getElementById('startTitle').innerText = LANG_DATA.title;
    document.getElementById('startDesc').innerText = LANG_DATA.desc;
    document.getElementById('startBtn').innerText = LANG_DATA.startBtn;
    document.getElementById('gameOverTitle').innerText = LANG_DATA.gameOver;
    document.getElementById('restartBtn').innerText = LANG_DATA.restartBtn;
    document.getElementById('levelUpTitle').innerText = LANG_DATA.levelUp;
    document.getElementById('levelUpDesc').innerText = LANG_DATA.chooseUpgrade;

    // --- Game State & Variables ---
    let animationId;
    let gameState = 'START'; // START, PLAYING, LEVEL_UP, GAMEOVER
    let lastTime = 0;
    
    const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };
    
    let game = {
        score: 0,
        bestScore: parseInt(localStorage.getItem('survivalBestScore')) || 0,
        wave: 1,
        time: 0,
        spawnTimer: 0,
        spawnInterval: 1500
    };

    let player, enemies, projectiles, gems, floatingTexts;

    // --- Classes ---

    class Player {
        constructor() {
            this.x = canvas.width / 2;
            this.y = canvas.height / 2;
            this.radius = 16;
            this.color = '#3498db';
            
            // Base Stats
            this.maxHp = 100;
            this.hp = this.maxHp;
            this.speed = 4;
            
            // Attack Stats
            this.damage = 15;
            this.attackCooldown = 500; // ms
            this.lastAttackTime = 0;
            this.projectileSpeed = 8;
            this.pierce = 1; //  1 (Pierce )
            this.multiShot = 1;
            
            // Progression
            this.level = 1;
            this.exp = 0;
            this.maxExp = 10;
        }

        update(dt) {
            // Movement
            let dx = 0;
            let dy = 0;
            if (keys.w || keys.ArrowUp) dy -= 1;
            if (keys.s || keys.ArrowDown) dy += 1;
            if (keys.a || keys.ArrowLeft) dx -= 1;
            if (keys.d || keys.ArrowRight) dx += 1;

            if (dx !== 0 && dy !== 0) {
                const length = Math.sqrt(dx * dx + dy * dy);
                dx /= length;
                dy /= length;
            }

            this.x += dx * this.speed * (dt / 16.6);
            this.y += dy * this.speed * (dt / 16.6);

            // Boundary clamping
            this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
            this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

            // Auto Attack
            game.time += dt;
            if (game.time - this.lastAttackTime > this.attackCooldown) {
                this.attack();
            }
        }

        attack() {
            if (enemies.length === 0) return;

            //   Enemy 
            let target = null;
            let minDistance = Infinity;

            enemies.forEach(enemy => {
                const dist = Math.hypot(enemy.x - this.x, enemy.y - this.y);
                if (dist < minDistance) {
                    minDistance = dist;
                    target = enemy;
                }
            });

            if (target && minDistance < 500) { //  
                this.lastAttackTime = game.time;
                const baseAngle = Math.atan2(target.y - this.y, target.x - this.x);
                
                //    (1 0,   )
                const spread = 0.2; 
                const startAngle = baseAngle - (spread * (this.multiShot - 1)) / 2;

                for (let i = 0; i < this.multiShot; i++) {
                    const angle = startAngle + (spread * i);
                    const vx = Math.cos(angle) * this.projectileSpeed;
                    const vy = Math.sin(angle) * this.projectileSpeed;
                    
                    projectiles.push(new Projectile(this.x, this.y, vx, vy, this.damage, this.pierce));
                }
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#fff';
            ctx.stroke();
            
            // () Display -   Enemy 
            let targetAngle = 0;
            if (enemies.length > 0) {
                let target = enemies.reduce((prev, curr) => 
                    Math.hypot(curr.x - this.x, curr.y - this.y) < Math.hypot(prev.x - this.x, prev.y - this.y) ? curr : prev
                );
                targetAngle = Math.atan2(target.y - this.y, target.x - this.x);
            }

            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x + Math.cos(targetAngle) * (this.radius + 5), this.y + Math.sin(targetAngle) * (this.radius + 5));
            ctx.strokeStyle = '#e74c3c';
            ctx.lineWidth = 4;
            ctx.stroke();
        }

        addExp(amount) {
            this.exp += amount;
            if (this.exp >= this.maxExp) {
                this.exp -= this.maxExp;
                this.level++;
                this.maxExp = Math.floor(this.maxExp * 1.5);
                triggerLevelUp();
            }
            updateHUD();
        }

        takeDamage(amount) {
            this.hp -= amount;
            updateHUD();
            if (this.hp <= 0) {
                triggerGameOver();
            }
        }
    }

    class Enemy {
        constructor(x, y, type) {
            this.x = x;
            this.y = y;
            this.type = type; // 0: Basic, 1: Fast, 2: Tank
            
            // 
            this.radius = 12;
            this.speed = 1.5;
            this.hp = 20 + (game.wave * 10);
            this.damage = 10;
            this.color = '#e74c3c';
            this.expValue = 1;

            // Star  
            if (type === 1) { // Fast
                this.radius = 10;
                this.speed = 2.5 + (game.wave * 0.1);
                this.hp = 10 + (game.wave * 5);
                this.color = '#f39c12';
                this.expValue = 2;
            } else if (type === 2) { // Tank
                this.radius = 20;
                this.speed = 0.8 + (game.wave * 0.05);
                this.hp = 50 + (game.wave * 25);
                this.damage = 25;
                this.color = '#8e44ad';
                this.expValue = 5;
            }
        }

        update(dt) {
            // Player Enemy
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed * (dt / 16.6);
            this.y += Math.sin(angle) * this.speed * (dt / 16.6);

            // Player Collision  (  )
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < this.radius + player.radius) {
                player.takeDamage(this.damage);
                
                // Enemy    (  )
                this.x -= Math.cos(angle) * 30;
                this.y -= Math.sin(angle) * 30;
            }
            
            // Enemy    (  )
            for (let i = 0; i < enemies.length; i++) {
                if (enemies[i] !== this) {
                    const eDist = Math.hypot(enemies[i].x - this.x, enemies[i].y - this.y);
                    const minDist = this.radius + enemies[i].radius;
                    if (eDist < minDist) {
                        const pushAngle = Math.atan2(this.y - enemies[i].y, this.x - enemies[i].x);
                        const pushForce = (minDist - eDist) / 2;
                        this.x += Math.cos(pushAngle) * pushForce;
                        this.y += Math.sin(pushAngle) * pushForce;
                    }
                }
            }
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#c0392b';
            ctx.stroke();
        }
    }

    class Projectile {
        constructor(x, y, vx, vy, damage, pierce) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.radius = 4;
            this.damage = damage;
            this.pierce = pierce; // Pierce  
            this.hitEnemies = new Set(); //   Enemy Enemy
            this.color = '#f1c40f';
        }

        update(dt) {
            this.x += this.vx * (dt / 16.6);
            this.y += this.vy * (dt / 16.6);
        }

        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
            
            //  Effect
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.vx * 2, this.y - this.vy * 2);
            ctx.strokeStyle = this.color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }
    }

    class ExpGem {
        constructor(x, y, value) {
            this.x = x;
            this.y = y;
            this.radius = 4 + Math.min(value, 6);
            this.value = value;
            this.color = value > 2 ? '#9b59b6' : '#2ecc71';
        }

        update(dt) {
            // Player  Magnet Effect
            const dist = Math.hypot(player.x - this.x, player.y - this.y);
            if (dist < 100) { // Magnet Area
                const angle = Math.atan2(player.y - this.y, player.x - this.x);
                this.x += Math.cos(angle) * 8 * (dt / 16.6);
                this.y += Math.sin(angle) * 8 * (dt / 16.6);
            }
        }

        draw() {
            ctx.beginPath();
            ctx.moveTo(this.x, this.y - this.radius);
            ctx.lineTo(this.x + this.radius, this.y);
            ctx.lineTo(this.x, this.y + this.radius);
            ctx.lineTo(this.x - this.radius, this.y);
            ctx.closePath();
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }

    class FloatingText {
        constructor(x, y, text, color) {
            this.x = x;
            this.y = y;
            this.text = text;
            this.color = color || '#fff';
            this.life = 1.0;
        }

        update(dt) {
            this.y -= 1 * (dt / 16.6); //  
            this.life -= 0.02 * (dt / 16.6);
        }

        draw() {
            ctx.globalAlpha = Math.max(0, this.life);
            ctx.fillStyle = this.color;
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(this.text, this.x, this.y);
            ctx.globalAlpha = 1.0;
        }
    }

    // --- Input Handling ---
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
    });
    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
    });

    // --- Core Game Functions ---

    function startGame() {
        //  State  Reset
        player = new Player();
        enemies = [];
        projectiles = [];
        gems = [];
        floatingTexts = [];
        
        game.score = 0;
        game.wave = 1;
        game.time = 0;
        game.spawnTimer = 0;
        game.spawnInterval = 1500;
        game.bestScore = parseInt(localStorage.getItem('survivalBestScore')) || 0;

        ui.start.classList.remove('active');
        ui.gameOver.classList.remove('active');
        ui.levelUp.classList.remove('active');
        
        document.getElementById('newRecordText').style.display = 'none';

        gameState = 'PLAYING';
        updateHUD();
        
        lastTime = performance.now();
        if (animationId) cancelAnimationFrame(animationId);
        gameLoop(lastTime);
    }

    function spawnEnemy() {
        // Screen  Creation
        let x, y;
        if (Math.random() < 0.5) {
            x = Math.random() < 0.5 ? -30 : canvas.width + 30;
            y = Math.random() * canvas.height;
        } else {
            x = Math.random() * canvas.width;
            y = Math.random() < 0.5 ? -30 : canvas.height + 30;
        }

        // WaveStar Enemy  
        let type = 0;
        const rand = Math.random();
        if (game.wave >= 2 && rand < 0.2) type = 1; // 2Wave Fast 
        if (game.wave >= 3 && rand > 0.85) type = 2; // 3Wave Tank 

        enemies.push(new Enemy(x, y, type));
    }

    function triggerLevelUp() {
        gameState = 'LEVEL_UP';
        ui.levelUp.classList.add('active');
        
        // 3  Upgrade Select Creation
        const keys = Object.keys(LANG_DATA.upgrades);
        const shuffled = keys.sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 3);

        ui.upgrades.innerHTML = '';
        choices.forEach(key => {
            const data = LANG_DATA.upgrades[key];
            const card = document.createElement('div');
            card.className = 'upgrade-card';
            card.innerHTML = `
                <div class="upgrade-title">${data.name}</div>
                <div class="upgrade-desc">${data.desc}</div>
            `;
            card.onclick = () => applyUpgrade(key);
            ui.upgrades.appendChild(card);
        });
    }

    function applyUpgrade(type) {
        switch (type) {
            case 'maxHp': player.maxHp += 25; player.hp += 25; break;
            case 'moveSpeed': player.speed *= 1.15; break;
            case 'atkSpeed': player.attackCooldown *= 0.85; break;
            case 'damage': player.damage += 5; break;
            case 'pierce': player.pierce += 1; break;
            case 'multiShot': player.multiShot += 1; break;
            case 'projSpeed': player.projectileSpeed *= 1.2; break;
            case 'heal': player.hp = Math.min(player.maxHp, player.hp + 30); break;
        }
        
        ui.levelUp.classList.remove('active');
        updateHUD();
        gameState = 'PLAYING';
        lastTime = performance.now();
        gameLoop(lastTime);
    }

    function triggerGameOver() {
        gameState = 'GAMEOVER';
        ui.gameOver.classList.add('active');
        
        document.getElementById('finalScoreText').innerText = LANG_DATA.score + game.score;
        
        //  Record Update 
        if (game.score > game.bestScore) {
            game.bestScore = game.score;
            try {
                localStorage.setItem('survivalBestScore', game.bestScore);
            } catch (e) { console.warn("LocalStorage  "); }
            
            const newRecText = document.getElementById('newRecordText');
            newRecText.innerText = LANG_DATA.newRecord;
            newRecText.style.display = 'block';
        }
        updateHUD();
    }

    function updateHUD() {
        const hpPercent = Math.max(0, (player.hp / player.maxHp) * 100);
        const expPercent = Math.min(100, (player.exp / player.maxExp) * 100);
        
        ui.hpFill.style.width = hpPercent + '%';
        ui.hpText.innerText = `${LANG_DATA.hp} ${Math.floor(player.hp)} / ${player.maxHp}`;
        
        ui.expFill.style.width = expPercent + '%';
        ui.expText.innerText = `${LANG_DATA.lv}${player.level} (${Math.floor(expPercent)}%)`;
        
        ui.score.innerText = LANG_DATA.score + game.score;
        ui.wave.innerText = LANG_DATA.wave + game.wave;
        ui.bestScore.innerText = LANG_DATA.bestScore + game.bestScore;
    }

    // --- Main Game Loop ---
    function update(dt) {
        player.update(dt);

        //  
        game.spawnTimer += dt;
        if (game.spawnTimer > game.spawnInterval) {
            spawnEnemy();
            game.spawnTimer = 0;
            //     
            if (game.score > 0 && game.score % 20 === 0 && game.spawnInterval > 400) {
                game.wave++;
                game.spawnInterval *= 0.9; //  Speed 
                updateHUD();
            }
        }

        // Projectiles   Collision
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.update(dt);

            // Screen  
            if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                projectiles.splice(i, 1);
                continue;
            }

            // Enemy Collision 
            let pDestroyed = false;
            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                //   Enemy Pierce  
                if (p.hitEnemies.has(e)) continue;

                if (Math.hypot(p.x - e.x, p.y - e.y) < p.radius + e.radius) {
                    e.hp -= p.damage;
                    p.hitEnemies.add(e);
                    floatingTexts.push(new FloatingText(e.x, e.y - 10, Math.floor(p.damage), '#ffeb3b'));

                    if (e.hp <= 0) {
                        // Enemy 
                        game.score++;
                        gems.push(new ExpGem(e.x, e.y, e.expValue));
                        enemies.splice(j, 1);
                        updateHUD();
                    }
                    
                    p.pierce--;
                    if (p.pierce <= 0) {
                        projectiles.splice(i, 1);
                        pDestroyed = true;
                        break;
                    }
                }
            }
        }

        // Enemy 
        enemies.forEach(e => e.update(dt));

        //     
        for (let i = gems.length - 1; i >= 0; i--) {
            let g = gems[i];
            g.update(dt);
            if (Math.hypot(player.x - g.x, player.y - g.y) < player.radius + g.radius) {
                player.addExp(g.value);
                floatingTexts.push(new FloatingText(g.x, g.y, `+${g.value} EXP`, '#2ecc71'));
                gems.splice(i, 1);
            }
        }

        //   
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
            floatingTexts[i].update(dt);
            if (floatingTexts[i].life <= 0) {
                floatingTexts.splice(i, 1);
            }
        }
    }

    function draw() {
        // Background  (  )
        ctx.fillStyle = '#1e1e1e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.width; i += 40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for (let i = 0; i < canvas.height; i += 40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        gems.forEach(g => g.draw());
        projectiles.forEach(p => p.draw());
        enemies.forEach(e => e.draw());
        player.draw();
        floatingTexts.forEach(t => t.draw());
    }

    function gameLoop(timestamp) {
        if (gameState !== 'PLAYING') return;

        let dt = timestamp - lastTime;
        //      delta time  ( 50ms)
        if (dt > 50) dt = 50; 
        lastTime = timestamp;

        update(dt);
        draw();

        if (gameState === 'PLAYING') {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    // UI   
    updateHUD(); // Initial Display Enemy (  Start  UI Reset)
    ui.hpText.innerText = LANG_DATA.hp;
    ui.expText.innerText = LANG_DATA.lv + "1";
    ui.score.innerText = LANG_DATA.score + "0";
    ui.wave.innerText = LANG_DATA.wave + "1";
    ui.bestScore.innerText = LANG_DATA.bestScore + game.bestScore;

</script>
