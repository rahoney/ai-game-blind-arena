<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>2D Roguelike Dungeon · Fog of War</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c0f;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Courier New', monospace;
      padding: 1rem;
      margin: 0;
    }

    .game-container {
      background: #1e1e2f;
      border: 3px solid #4e3b5e;
      border-radius: 2rem;
      padding: 2rem 2rem 1.8rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), inset 0 0 15px #3c2a44;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      max-width: 650px;
      width: fit-content;
      margin: auto;
    }

    .status-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: #2a2435;
      border: 2px solid #5b4b6b;
      border-radius: 3rem;
      padding: 0.7rem 2rem;
      color: #f3e3c9;
      font-weight: bold;
      font-size: 1.2rem;
      letter-spacing: 0.5px;
      box-shadow: 0 6px 0 #3a2e44;
      flex-wrap: wrap;
      gap: 0.8rem;
    }

    .hp {
      background: #1f1a24;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      color: #f5b895;
      text-shadow: 0 0 6px #b45f3a;
    }

    .enemy-hp {
      background: #1f1a24;
      padding: 0.4rem 1.2rem;
      border-radius: 2rem;
      color: #d49b9b;
      text-shadow: 0 0 6px #a13d3d;
    }

    .grid-wrapper {
      background: #17141c;
      border: 4px solid #5e4b66;
      border-radius: 1.8rem;
      padding: 0.7rem;
      box-shadow: inset 0 0 20px #000000, 0 10px 15px rgba(0,0,0,0.6);
    }

    .dungeon-grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      gap: 3px;
      background: #2e2537;
      padding: 3px;
      border-radius: 1.2rem;
      aspect-ratio: 1 / 1;
      width: min(65vw, 65vh, 450px);
      max-width: 450px;
      margin: 0 auto;
    }

    .cell {
      background: #1b1620;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.2rem, 4vw, 2rem);
      transition: all 0.08s ease;
      box-shadow: inset 0 0 0 1px #3f3347;
      aspect-ratio: 1 / 1;
      color: #d8cfc0;
      text-shadow: 0 0 8px currentColor;
      user-select: none;
    }

    .cell.visible {
      background: #2b2335;
      box-shadow: inset 0 0 0 1px #7b5f88, 0 0 12px #3b2c42;
    }

    .cell.player {
      background: #3c5a4b;
      color: #d4ffb0;
      text-shadow: 0 0 16px #b9f57b, 0 0 5px black;
      font-weight: bold;
      filter: drop-shadow(0 0 6px #83c98b);
    }

    .cell.enemy {
      background: #5a3e3e;
      color: #ffb4a2;
      text-shadow: 0 0 14px #e35f4f;
    }

    .cell.item {
      background: #3b4a5c;
      color: #b2e0fa;
      text-shadow: 0 0 12px #5fa3d1;
    }

    .cell.exit {
      background: #5b4c3b;
      color: #ffd966;
      text-shadow: 0 0 18px #f5b042, 0 0 6px black;
    }

    .cell.hidden {
      background: #0f0c14;
      color: transparent;
      text-shadow: none;
      box-shadow: inset 0 0 0 1px #2a2230;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 0.3rem;
    }

    .direction-pad {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .dir-row {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .dir-btn {
      background: #2f263a;
      border: none;
      color: #ecd7bc;
      font-size: 1.8rem;
      font-weight: bold;
      width: 3rem;
      height: 3rem;
      border-radius: 1rem;
      box-shadow: 0 5px 0 #1a1420, 0 4px 8px black;
      cursor: pointer;
      transition: all 0.06s linear;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      background: #362d40;
    }

    .dir-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #0f0b14, 0 6px 10px black;
      background: #4b3c5c;
    }

    .restart-btn {
      background: #382e3f;
      border: none;
      font-size: 1.4rem;
      font-weight: bold;
      color: #f2d9b1;
      padding: 0.7rem 1.8rem;
      border-radius: 3rem;
      box-shadow: 0 5px 0 #1f1827, 0 5px 12px black;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: 0.08s;
      background: #3d3148;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .restart-btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #100b16, 0 6px 12px black;
    }

    .message-area {
      color: #ebd6b0;
      font-weight: bold;
      font-size: 1.1rem;
      background: #231d2b;
      padding: 0.3rem 1.8rem;
      border-radius: 2rem;
      text-align: center;
      min-height: 2.5rem;
      display: flex;
      align-items: center;
    }

    .screen-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
    }

    .hidden {
      display: none !important;
    }

    button {
      user-select: none;
    }
  </style>
</head>
<body>
<div class="game-container" id="gameContainer">
  <!-- localized comment -->
  <div id="startScreen" class="screen-overlay">
    <div style="font-size: 2.5rem; color:#f7e3b2; text-shadow:0 0 20px #c28b4b;">⚔️ Dark Roguelike ⚔️</div>
    <div style="color:#cbb9d9; font-size:1.2rem; text-align:center;">8x8 Dungeon · Fog of War</div>
    <button id="startGameBtn" class="restart-btn" style="font-size:2rem; padding:0.8rem 2.5rem;">🏁 Start Adventure</button>
    <div style="color:#9b8cac; margin-top:0.5rem;">⬆️⬇️⬅️➡️ or WASD</div>
  </div>

  <!-- localized comment -->
  <div id="gameScreen" class="hidden" style="display: flex; flex-direction: column; align-items: center; gap: 1rem; width: 100%;">
    <div class="status-panel">
      <span class="hp">❤️ <span id="playerHpDisplay">20</span></span>
      <span class="enemy-hp">👾 Enemy <span id="enemyHpDisplay">?/?</span></span>
      <span>📍 <span id="turnInfo">1</span>Turn</span>
    </div>
    <div class="grid-wrapper">
      <div class="dungeon-grid" id="dungeonGrid"></div>
    </div>
    <div class="controls">
      <div class="direction-pad">
        <div class="dir-row">
          <button class="dir-btn" data-dir="up">▲</button>
        </div>
        <div class="dir-row">
          <button class="dir-btn" data-dir="left">◀</button>
          <button class="dir-btn" data-dir="down">▼</button>
          <button class="dir-btn" data-dir="right">▶</button>
        </div>
      </div>
      <button id="restartFromGameBtn" class="restart-btn">🔄 Restart</button>
    </div>
    <div class="message-area" id="gameMessage">⬆️ Move with arrow keys</div>
  </div>

  <!-- localized comment -->
  <div id="endScreen" class="hidden screen-overlay" style="position: absolute; background: rgba(10, 8, 15, 0.9); border-radius: 2rem; padding: 2.5rem; z-index: 10;">
    <div id="endTitle" style="font-size: 2.8rem; font-weight: bold; color:#f3cd81;"></div>
    <div id="endSub" style="color:#ccbbdd; font-size:1.3rem;"></div>
    <button id="playAgainBtn" class="restart-btn" style="font-size:1.8rem;">🔁 Try Again</button>
  </div>
</div>

<script>
  (function() {
    // localized comment
    const SIZE = 8;
    const WALL_PROBABILITY = 0.22; // wall probability adjusted to keep path reachable
    
    // localized comment
    const TILE = {
      FLOOR: '·',
      WALL: '🪨',
      PLAYER: '🧙',
      ENEMY: '👾',
      ITEM: '💚',
      EXIT: '🚪'
    };

    // localized comment
    let grid = [];                 // 2D tile array
    let fogMask = [];            // boolean 2D: true means visible
    let playerPos = { r: 0, c: 0 };
    let playerHp = 20;
    let maxPlayerHp = 20;
    
    let enemyPos = { r: -1, c: -1 };
    let enemyHp = 12;
    let maxEnemyHp = 12;
    let enemyAlive = true;
    
    let itemPos = { r: -1, c: -1 };
    let itemActive = true;
    
    let exitPos = { r: -1, c: -1 };
    
    let turnCount = 0;
    let gameOver = false;
    let gameResult = null; // 'win', 'lose', null
    
    // localized comment
    const startScreen = document.getElementById('startScreen');
    const gameScreen = document.getElementById('gameScreen');
    const endScreen = document.getElementById('endScreen');
    const dungeonGridEl = document.getElementById('dungeonGrid');
    const playerHpSpan = document.getElementById('playerHpDisplay');
    const enemyHpSpan = document.getElementById('enemyHpDisplay');
    const turnInfoSpan = document.getElementById('turnInfo');
    const gameMessageEl = document.getElementById('gameMessage');
    const endTitleEl = document.getElementById('endTitle');
    const endSubEl = document.getElementById('endSub');
    
    // localized comment
    function randomInt(max) {
      return Math.floor(Math.random() * max);
    }
    
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = randomInt(i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }
    
    // localized comment
    function manhattan(r1, c1, r2, c2) {
      return Math.abs(r1 - r2) + Math.abs(c1 - c2);
    }
    
    // localized comment
    function inBounds(r, c) {
      return r >= 0 && r < SIZE && c >= 0 && c < SIZE;
    }
    
    // localized comment
    function isWalkable(r, c, gridData) {
      return inBounds(r, c) && gridData[r][c] !== TILE.WALL;
    }
    
    // localized comment
    function isPathExists(startR, startC, endR, endC, gridData) {
      if (!isWalkable(startR, startC, gridData) || !isWalkable(endR, endC, gridData)) return false;
      const visited = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
      const queue = [{r: startR, c: startC}];
      visited[startR][startC] = true;
      const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
      
      while (queue.length > 0) {
        const {r, c} = queue.shift();
        if (r === endR && c === endC) return true;
        for (let [dr, dc] of dirs) {
          const nr = r + dr, nc = c + dc;
          if (isWalkable(nr, nc, gridData) && !visited[nr][nc]) {
            visited[nr][nc] = true;
            queue.push({r: nr, c: nc});
          }
        }
      }
      return false;
    }
    
    // localized comment
    function updateFogMask() {
      // localized comment
      for (let r = 0; r < SIZE; r++) {
        fogMask[r].fill(false);
      }
      if (!playerPos) return;
      const pr = playerPos.r, pc = playerPos.c;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          const nr = pr + dr, nc = pc + dc;
          if (inBounds(nr, nc)) {
            fogMask[nr][nc] = true;
          }
        }
      }
      // localized comment
    }
    
    // localized comment
    function renderGrid() {
      // localized comment
      updateFogMask();
      
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.querySelector(`.cell[data-r='${r}'][data-c='${c}']`);
          if (!cell) continue;
          
          const visible = fogMask[r][c];
          // localized comment
          cell.classList.remove('visible', 'hidden', 'player', 'enemy', 'item', 'exit');
          
          if (!visible) {
            cell.classList.add('hidden');
            cell.textContent = '';  // show nothing while hidden
            continue;
          }
          
          // localized comment
          cell.classList.add('visible');
          const tileChar = grid[r][c];
          
          // localized comment
          if (r === playerPos.r && c === playerPos.c) {
            cell.textContent = TILE.PLAYER;
            cell.classList.add('player');
          } else if (enemyAlive && r === enemyPos.r && c === enemyPos.c) {
            cell.textContent = TILE.ENEMY;
            cell.classList.add('enemy');
          } else if (itemActive && r === itemPos.r && c === itemPos.c) {
            cell.textContent = TILE.ITEM;
            cell.classList.add('item');
          } else if (r === exitPos.r && c === exitPos.c) {
            cell.textContent = TILE.EXIT;
            cell.classList.add('exit');
          } else {
            // localized comment
            cell.textContent = tileChar;
            if (tileChar === TILE.WALL) {
              cell.style.color = '#6b5b7c';
            } else {
              cell.style.color = '#d8cfc0';
            }
          }
        }
      }
      
      // localized comment
      playerHpSpan.textContent = playerHp;
      if (enemyAlive) {
        enemyHpSpan.textContent = `${enemyHp}/${maxEnemyHp}`;
      } else {
        enemyHpSpan.textContent = `Defeated`;
      }
      turnInfoSpan.textContent = turnCount;
    }
    
    // localized comment
    function engageCombat() {
      if (!enemyAlive) return;
      // localized comment
      const playerDamage = Math.floor(Math.random() * 5) + 3; // 3~7
      const enemyDamage = Math.floor(Math.random() * 4) + 2;  // 2~5
      
      playerHp = Math.max(0, playerHp - enemyDamage);
      enemyHp = Math.max(0, enemyHp - playerDamage);
      
      let combatMsg = `⚔️ Battle! Player -${enemyDamage}, Enemy -${playerDamage}`;
      
      if (enemyHp <= 0) {
        enemyAlive = false;
        combatMsg += ' | Enemy Defeated!';
      }
      if (playerHp <= 0) {
        gameOver = true;
        gameResult = 'lose';
        combatMsg += ' | 💀 Player died...';
      }
      
      gameMessageEl.textContent = combatMsg;
      
      if (gameOver) {
        showEndScreen();
      }
      renderGrid();
    }
    
    // localized comment
    function collectItem() {
      if (!itemActive) return;
      const healAmount = Math.floor(Math.random() * 8) + 5; // 5~12
      playerHp = Math.min(maxPlayerHp, playerHp + healAmount);
      itemActive = false;
      gameMessageEl.textContent = `💚 Heal +${healAmount}! Current Health ${playerHp}`;
      renderGrid();
    }
    
    // localized comment
    function reachExit() {
      gameOver = true;
      gameResult = 'win';
      gameMessageEl.textContent = '✨ Escape Successful! You escaped the darkness.';
      showEndScreen();
      renderGrid();
    }
    
    // localized comment
    function attemptMove(dr, dc) {
      if (gameOver) {
        return;
      }
      
      const newR = playerPos.r + dr;
      const newC = playerPos.c + dc;
      
      if (!inBounds(newR, newC)) {
        gameMessageEl.textContent = '🗻 You cannot go beyond the wall.';
        renderGrid();
        return;
      }
      
      if (grid[newR][newC] === TILE.WALL) {
        gameMessageEl.textContent = '🪨 Blocked by a wall.';
        renderGrid();
        return;
      }
      
      // localized comment
      playerPos = { r: newR, c: newC };
      turnCount++;
      
      // localized comment
      // localized comment
      if (enemyAlive && playerPos.r === enemyPos.r && playerPos.c === enemyPos.c) {
        engageCombat();
        renderGrid();
        return;
      }
      
      // localized comment
      if (itemActive && playerPos.r === itemPos.r && playerPos.c === itemPos.c) {
        collectItem();
        // localized comment
        renderGrid();
        return;
      }
      
      // localized comment
      if (playerPos.r === exitPos.r && playerPos.c === exitPos.c) {
        reachExit();
        return;
      }
      
      // localized comment
      gameMessageEl.textContent = `Moved. (${turnCount}Turn)`;
      renderGrid();
    }
    
    // localized comment
    function showEndScreen() {
      if (!gameOver) return;
      endScreen.classList.remove('hidden');
      if (gameResult === 'win') {
        endTitleEl.textContent = '🏆 Victory!';
        endSubEl.textContent = `🎉 ${turnCount}escaped in turns!`;
      } else if (gameResult === 'lose') {
        endTitleEl.textContent = '💔 Defeat';
        endSubEl.textContent = 'The darkness swallowed you...';
      }
    }
    
    function hideEndScreen() {
      endScreen.classList.add('hidden');
    }
    
    // localized comment
    function generateDungeon() {
      // localized comment
      const newGrid = Array(SIZE).fill().map(() => Array(SIZE).fill(TILE.FLOOR));
      
      // localized comment
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (Math.random() < WALL_PROBABILITY) {
            newGrid[r][c] = TILE.WALL;
          }
        }
      }
      
      // localized comment
      let startCandidates = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (newGrid[r][c] !== TILE.WALL) startCandidates.push({r, c});
        }
      }
      if (startCandidates.length === 0) {
        // localized comment
        for (let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) newGrid[r][c]=TILE.FLOOR;
        startCandidates = [{r:0,c:0}];
      }
      const playerStart = startCandidates[randomInt(startCandidates.length)];
      
      // localized comment
      let exitCandidates = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (newGrid[r][c] !== TILE.WALL && !(r === playerStart.r && c === playerStart.c)) {
            if (manhattan(r, c, playerStart.r, playerStart.c) >= 6) {
              exitCandidates.push({r, c});
            }
          }
        }
      }
      // localized comment
      if (exitCandidates.length === 0) {
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (newGrid[r][c] !== TILE.WALL && !(r === playerStart.r && c === playerStart.c)) {
              exitCandidates.push({r, c});
            }
          }
        }
      }
      const exitPosLocal = exitCandidates[randomInt(exitCandidates.length)];
      newGrid[exitPosLocal.r][exitPosLocal.c] = TILE.FLOOR; // ensure floor
      
      // localized comment
      let safety = 0;
      const maxAttempts = 200;
      while (!isPathExists(playerStart.r, playerStart.c, exitPosLocal.r, exitPosLocal.c, newGrid) && safety < maxAttempts) {
        // localized comment
        const wallCells = [];
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            if (newGrid[r][c] === TILE.WALL && !(r === playerStart.r && c === playerStart.c) && !(r === exitPosLocal.r && c === exitPosLocal.c)) {
              wallCells.push({r, c});
            }
          }
        }
        if (wallCells.length === 0) break;
        const toRemove = wallCells[randomInt(wallCells.length)];
        newGrid[toRemove.r][toRemove.c] = TILE.FLOOR;
        safety++;
      }
      
      // localized comment
      if (!isPathExists(playerStart.r, playerStart.c, exitPosLocal.r, exitPosLocal.c, newGrid)) {
        for (let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) newGrid[r][c]=TILE.FLOOR;
      }
      
      // localized comment
      let enemyCandidates = [];
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (newGrid[r][c] !== TILE.WALL && 
              !(r === playerStart.r && c === playerStart.c) && 
              !(r === exitPosLocal.r && c === exitPosLocal.c)) {
            if (manhattan(r, c, playerStart.r, playerStart.c) >= 3) {
              enemyCandidates.push({r, c});
            }
          }
        }
      }
      if (enemyCandidates.length === 0) {
        for (let r=0;r<SIZE;r++) for(let c=0;c<SIZE;c++) {
          if (newGrid[r][c]!==TILE.WALL && !(r===playerStart.r&&c===playerStart.c) && !(r===exitPosLocal.r&&c===exitPosLocal.c))
            enemyCandidates.push({r,c});
        }
      }
      const enemyPosLocal = enemyCandidates.length > 0 ? enemyCandidates[randomInt(enemyCandidates.length)] : {r:0,c:1};
      
      // localized comment
      let itemCandidates = [];
      for (let r=0;r<SIZE;r++) {
        for (let c=0;c<SIZE;c++) {
          if (newGrid[r][c]!==TILE.WALL &&
              !(r===playerStart.r&&c===playerStart.c) &&
              !(r===exitPosLocal.r&&c===exitPosLocal.c) &&
              !(r===enemyPosLocal.r&&c===enemyPosLocal.c)) {
            itemCandidates.push({r,c});
          }
        }
      }
      const itemPosLocal = itemCandidates.length > 0 ? itemCandidates[randomInt(itemCandidates.length)] : {r:2,c:2};
      
      return {
        grid: newGrid,
        playerStart,
        exitPos: exitPosLocal,
        enemyPos: enemyPosLocal,
        itemPos: itemPosLocal
      };
    }
    
    // localized comment
    function resetAndStart() {
      hideEndScreen();
      const dungeonData = generateDungeon();
      grid = dungeonData.grid.map(row => [...row]);
      playerPos = { ...dungeonData.playerStart };
      exitPos = { ...dungeonData.exitPos };
      enemyPos = { ...dungeonData.enemyPos };
      itemPos = { ...dungeonData.itemPos };
      
      playerHp = maxPlayerHp;
      enemyHp = maxEnemyHp;
      enemyAlive = true;
      itemActive = true;
      turnCount = 0;
      gameOver = false;
      gameResult = null;
      
      // localized comment
      fogMask = Array(SIZE).fill().map(() => Array(SIZE).fill(false));
      
      // localized comment
      dungeonGridEl.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.r = r;
          cell.dataset.c = c;
          dungeonGridEl.appendChild(cell);
        }
      }
      
      // localized comment
      startScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      endScreen.classList.add('hidden');
      
      gameMessageEl.textContent = 'Adventure started! Move with arrow keys';
      renderGrid();
    }
    
    // localized comment
    function handleDirection(dir) {
      if (gameOver) return;
      switch(dir) {
        case 'up': attemptMove(-1, 0); break;
        case 'down': attemptMove(1, 0); break;
        case 'left': attemptMove(0, -1); break;
        case 'right': attemptMove(0, 1); break;
        default: break;
      }
    }
    
    // localized comment
    window.addEventListener('keydown', (e) => {
      // localized comment
      if (!gameScreen.classList.contains('hidden') && !gameOver) {
        const key = e.key;
        e.preventDefault();
        if (key === 'ArrowUp' || key === 'w' || key === 'W') handleDirection('up');
        else if (key === 'ArrowDown' || key === 's' || key === 'S') handleDirection('down');
        else if (key === 'ArrowLeft' || key === 'a' || key === 'A') handleDirection('left');
        else if (key === 'ArrowRight' || key === 'd' || key === 'D') handleDirection('right');
      }
    });
    
    // localized comment
    document.querySelectorAll('.dir-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const dir = e.currentTarget.getAttribute('data-dir');
        handleDirection(dir);
      });
    });
    
    // localized comment
    document.getElementById('startGameBtn').addEventListener('click', resetAndStart);
    
    // localized comment
    document.getElementById('restartFromGameBtn').addEventListener('click', resetAndStart);
    
    // localized comment
    document.getElementById('playAgainBtn').addEventListener('click', resetAndStart);
    
    // localized comment
    startScreen.classList.remove('hidden');
    gameScreen.classList.add('hidden');
    endScreen.classList.add('hidden');
    
    // localized comment
  })();
</script>
</body>
</html>
