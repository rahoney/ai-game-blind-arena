<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Roguelike Dungeon</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --grid-size: 8;
            --cell-size: 60px;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            text-align: center;
        }

        #stats {
            margin-bottom: 10px;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-around;
            width: 100%;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-size), var(--cell-size));
            grid-template-rows: repeat(var(--grid-size), var(--cell-size));
            gap: 2px;
            border: 4px solid #333;
            background-color: #333;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            user-select: none;
        }

        .wall { background-color: #111; }
        .fog { background-color: #000; color: transparent; }

        /* 오버레이 화면 (시작, 게임오버, 승리) */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        button {
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 20px;
        }

        button:hover { background: #c0392b; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="stats">
        <span>HP: <span id="hp">10</span></span>
        <span>Score: <span id="score">0</span></span>
    </div>

    <div id="grid"></div>

    <div id="start-screen" class="overlay">
        <h1>Emoji Dungeon</h1>
        <p>Use WASD or Arrow keys to move.</p>
        <p>E: Enemy, I: Potion, O: Exit</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="end-screen" class="overlay hidden">
        <h1 id="end-title">Game Over</h1>
        <p id="end-msg">You have fallen in the dungeon.</p>
        <button onclick="startGame()">Restart</button>
    </div>
</div>

<script>
    const GRID_SIZE = 8;
    const gridElement = document.getElementById('grid');
    const hpElement = document.getElementById('hp');
    const scoreElement = document.getElementById('score');
    
    let gameState = {
        player: { x: 0, y: 0, hp: 10 },
        exit: { x: 7, y: 7 },
        enemy: { x: -1, y: -1, hp: 3 },
        item: { x: -1, y: -1 },
        walls: [],
        score: 0,
        isGameOver: false
    };

    // 맵 생성 및 경로 보장 (BFS)
    function generateMap() {
        while (true) {
            gameState.walls = [];
            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    if ((x === 0 && y === 0) || (x === 7 && y === 7)) continue;
                    if (Math.random() < 0.25) gameState.walls.push(`${x},${y}`);
                }
            }
            if (isPathable(0, 0, 7, 7)) break; // Exit 도달 가능할 때까지 반복
        }
    }

    function isPathable(sx, sy, ex, ey) {
        let queue = [[sx, sy]];
        let visited = new Set([`${sx},${sy}`]);
        while (queue.length > 0) {
            let [x, y] = queue.shift();
            if (x === ex && y === ey) return true;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => {
                let nx = x + dx, ny = y + dy;
                let key = `${nx},${ny}`;
                if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && 
                    !gameState.walls.includes(key) && !visited.has(key)) {
                    visited.add(key);
                    queue.push([nx, ny]);
                }
            });
        }
        return false;
    }

    // 엔티티 배치 (Enemy, 아이템)
    function placeEntities() {
        const getEmptyPos = () => {
            while (true) {
                let x = Math.floor(Math.random() * GRID_SIZE);
                let y = Math.floor(Math.random() * GRID_SIZE);
                let key = `${x},${y}`;
                if (!gameState.walls.includes(key) && key !== "0,0" && key !== "7,7") return {x, y};
            }
        };
        gameState.enemy = { ...getEmptyPos(), hp: 3 };
        gameState.item = getEmptyPos();
    }

    function startGame() {
        // Status 초기화
        gameState = {
            player: { x: 0, y: 0, hp: 10 },
            exit: { x: 7, y: 7 },
            score: 0,
            isGameOver: false
        };
        generateMap();
        placeEntities();
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('end-screen').classList.add('hidden');
        render();
    }

    function render() {
        gridElement.innerHTML = '';
        hpElement.innerText = gameState.player.hp;
        scoreElement.innerText = gameState.score;

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                const dist = Math.abs(x - gameState.player.x) + Math.abs(y - gameState.player.y);
                
                // Fog of War (인접한 칸만 보임)
                if (dist > 1) {
                    cell.classList.add('fog');
                } else {
                    if (gameState.walls.includes(`${x},${y}`)) cell.classList.add('wall');
                    else if (x === gameState.player.x && y === gameState.player.y) cell.innerText = '👤';
                    else if (x === gameState.enemy.x && y === gameState.enemy.y) cell.innerText = '👹';
                    else if (x === gameState.item.x && y === gameState.item.y) cell.innerText = '🍷';
                    else if (x === gameState.exit.x && y === gameState.exit.y) cell.innerText = '🚪';
                }
                gridElement.appendChild(cell);
            }
        }
    }

    function movePlayer(dx, dy) {
        if (gameState.isGameOver) return;

        let nx = gameState.player.x + dx;
        let ny = gameState.player.y + dy;

        // Wall 및 경계 체크
        if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE || gameState.walls.includes(`${nx},${ny}`)) return;

        // 전투 로직
        if (nx === gameState.enemy.x && ny === gameState.enemy.y) {
            gameState.enemy.hp--;
            gameState.player.hp--;
            if (gameState.enemy.hp <= 0) {
                gameState.enemy = { x: -1, y: -1 };
                gameState.score += 100;
            }
        } else {
            gameState.player.x = nx;
            gameState.player.y = ny;
        }

        // 아이템 획득
        if (gameState.player.x === gameState.item.x && gameState.player.y === gameState.item.y) {
            gameState.player.hp += 3;
            gameState.item = { x: -1, y: -1 };
            gameState.score += 50;
        }

        // 승리 판정
        if (gameState.player.x === gameState.exit.x && gameState.player.y === gameState.exit.y) {
            endGame(true);
            return;
        }

        // Defeat 판정
        if (gameState.player.hp <= 0) {
            endGame(false);
            return;
        }

        // Enemy 이동 (턴제)
        moveEnemy();
        render();
    }

    function moveEnemy() {
        if (gameState.enemy.x === -1) return;
        const dx = Math.sign(gameState.player.x - gameState.enemy.x);
        const dy = Math.sign(gameState.player.y - gameState.enemy.y);
        
        // 간단한 추Enemy AI (랜덤하게 X or Y축 이동)
        let nx = gameState.enemy.x, ny = gameState.enemy.y;
        if (Math.random() > 0.5) nx += dx; else ny += dy;

        if (!gameState.walls.includes(`${nx},${ny}`) && !(nx === gameState.exit.x && ny === gameState.exit.y)) {
            // Enemy이 Player와 겹치면 attack
            if (nx === gameState.player.x && ny === gameState.player.y) {
                gameState.player.hp--;
            } else {
                gameState.enemy.x = nx;
                gameState.enemy.y = ny;
            }
        }
    }

    function endGame(isWin) {
        gameState.isGameOver = true;
        const screen = document.getElementById('end-screen');
        const title = document.getElementById('end-title');
        const msg = document.getElementById('end-msg');
        
        screen.classList.remove('hidden');
        if (isWin) {
            title.innerText = "Victory!";
            title.style.color = "#2ecc71";
            msg.innerText = `Escaped successfully! Final Score: ${gameState.score + gameState.player.hp * 10}`;
        } else {
            title.innerText = "Game Over";
            title.style.color = "#e74c3c";
            msg.innerText = "You vanished into the dungeon dew.";
        }
    }

    window.addEventListener('keydown', (e) => {
        switch(e.key.toUpperCase()) {
            case 'W': case 'ARROWUP': movePlayer(0, -1); break;
            case 'S': case 'ARROWDOWN': movePlayer(0, 1); break;
            case 'A': case 'ARROWLEFT': movePlayer(-1, 0); break;
            case 'D': case 'ARROWRIGHT': movePlayer(1, 0); break;
        }
    });
</script>

</body>
</html>
