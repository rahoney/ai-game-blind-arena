<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Dungeon Crawler 8x8</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --grid-bg: #000;
            --text-color: #eee;
            --accent: #f1c40f;
            --danger: #e74c3c;
            --heal: #2ecc71;
            --fog: #0d0d0d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: fit-content;
            text-align: center;
        }

        /* 헤더 정보 */
        #hud {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 10px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .stat-box span {
            color: var(--accent);
        }

        /* 게임 그리드 (Canvas 대신 Div 기반) */
        #grid {
            display: grid;
            grid-template-columns: repeat(8, 50px);
            grid-template-rows: repeat(8, 50px);
            gap: 2px;
            background-color: var(--grid-bg);
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .cell {
            width: 50px;
            height: 50px;
            background-color: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            cursor: default;
            transition: background-color 0.2s;
        }

        /* 포그 오브 워 */
        .cell.fog {
            background-color: var(--fog);
            color: transparent;
            border: none;
        }
        .cell.visited {
            background-color: #151515; /* 이미 방문했던 곳 */
            opacity: 0.6;
        }
        
        /* Status 스타일 */
        .cell.player { color: #fff; text-shadow: 0 0 5px var(--accent); z-index: 10; }
        .cell.enemy { animation: shake 0.5s infinite alternate; }
        .cell.wall::after { content: ''; width: 60%; height: 60%; background: #444; box-shadow: inset 0 0 10px #000; }
        .wall .cell-icon { display: none; } /* Wall 위 텍스트 숨김 */

        /* UI 오버레이 (시작, 승리, Defeat) */
        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 3px; }
        p { margin-bottom: 20px; max-width: 300px; line-height: 1.5; }

        button {
            padding: 12px 24px;
            font-size: 1.2rem;
            background: var(--accent);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: transform 0.1s;
            border-radius: 4px;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }
        button:active { transform: scale(0.95); }

        /* 애니메이션 */
        @keyframes shake {
            from { transform: translateX(-2px); }
            to { transform: translateX(2px); }
        }

        @media (max-width: 500px) {
            #grid {
                grid-template-columns: repeat(8, 1fr);
                grid-template-rows: repeat(8, 1fr);
                width: 90vw;
                height: 90vw;
            }
            .cell { width: auto; height: auto; font-size: 1.5rem; }
            #hud { width: 90vw; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div class="stat-box">Level: <span id="level-disp">1</span></div>
        <div class="stat-box">HP: <span id="hp-disp">20/20</span></div>
    </div>

    <div id="grid">
        <!-- JS 로 생성됨 -->
    </div>

    <div id="overlay">
        <h1 id="msg-title">DUNGEON</h1>
        <p id="msg-desc">Move with Arrow keys or WASD.<br>Break walls, defeat enemies (👾), and find the exit (🚪).</p>
        <button onclick="startGame()">Start Game</button>
    </div>
</div>

<script>
/**
 * 게임 상수 및 설정
 */
const GRID_SIZE = 8;
const TILE_COUNT = GRID_SIZE * GRID_SIZE;
const VIEW_RADIUS = 2; // 시야 범위
const MAX_HP = 20;

// 게임 객체 및 Status
const state = {
    running: false,
    level: 1,
    player: { x: 0, y: 0, hp: MAX_HP },
    enemies: [],
    items: [],
    walls: [],
    exit: { x: 0, y: 0 },
    map: [], // 0=空地，1=Wall
    explored: [] // 포그 오브 워 메모리
};

// 도메인 요소들
const gridEl = document.getElementById('grid');
const overlayEl = document.getElementById('overlay');
const titleEl = document.getElementById('msg-title');
const descEl = document.getElementById('msg-desc');
const btnEl = document.querySelector('#overlay button');
const hpDisp = document.getElementById('hp-disp');
const lvlDisp = document.getElementById('level-disp');

/**
 * 유틸리티: 랜덤 정수 반환
 */
const rnd = (max) => Math.floor(Math.random() * max);

/**
 * 초기화
 */
function startGame() {
    // 모든 Status 재설정
    state.level = 1;
    state.player.hp = MAX_HP;
    state.running = true;
    
    overlayEl.style.display = 'none';
    updateHUD();
    loadLevel(1);
}

/**
 * 레벨 로드 ( 맵 생성 )
 */
function loadLevel(lvl) {
    state.level = lvl;
    state.map = new Array(TILE_COUNT).fill(0);
    state.explored = new Array(TILE_COUNT).fill(false);
    state.enemies = [];
    state.items = [];
    state.walls = [];
    
    // 1. Player 시작pts (왼쪽 위 영역 고정)
    let startNode = { x: 1, y: 1 };
    state.player.x = startNode.x;
    state.player.y = startNode.y;

    // 2. Wall 배치 (약 30% 확률로 무작위 배치)
    for(let i=0; i<TILE_COUNT; i++) {
        if(rnd(100) < 30) state.map[i] = 1;
    }
    state.map[startNode.y*GRID_SIZE + startNode.x] = 0; // 시작pts은 빈 공간
    
    // 3. Exit 위치 설정 (오른쪽 아래 영역 중 비어있는 곳 찾기)
    let exitFound = false;
    let attempts = 0;
    while(!exitFound && attempts < 100) {
        let ex = rnd(GRID_SIZE - 2) + 3;
        let ey = rnd(GRID_SIZE - 2) + 3;
        if(state.map[ey*GRID_SIZE + ex] === 0) {
            state.exit = {x: ex, y: ey};
            exitFound = true;
        }
        attempts++;
    }
    // 만약 Exit를 못 찾거나 길 막힘 처리를 위해 강제 개방 (단순 버전은 여기선 생략하고 경로 보장 로직 필요)

    // 4. Player와 Exit 연결성 확인 (BFS 사용)
    if(!ensurePath(startNode, state.exit)) {
        console.warn("Path generation failed, retrying");
        loadLevel(lvl);
        return;
    }

    // 5. Enemy과 아이템 배치
    const entityCount = 2 + Math.floor(lvl / 2); // 레벨당 Enemy 증가
    for(let i=0; i<entityCount; i++) {
        let pos = getFreePos();
        if(pos) state.enemies.push({ x: pos.x, y: pos.y, hp: 10 + (lvl * 2) });
        
        pos = getFreePos();
        if(pos) state.items.push({ x: pos.x, y: pos.y, type: 'heal' });
    }

    updateFogOfWar();
    render();
}

/**
 * BFS 를 사용하여 두 pts 사이의 경로가 있는지 확인하고 없음 thì Wall 제거
 */
function ensurePath(start, end) {
    let queue = [start];
    let visited = new Set([`${start.x},${start.y}`]);
    
    while(queue.length > 0) {
        let curr = queue.shift();
        if(curr.x === end.x && curr.y === end.y) return true;

        const dirs = [[0,1], [0,-1], [1,0], [-1,0]];
        for(let d of dirs) {
            let nx = curr.x + d[0];
            let ny = curr.y + d[1];
            
            if(nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE) {
                if(state.map[ny*GRID_SIZE + nx] === 0 && !visited.has(`${nx},${ny}`)) {
                    visited.add(`${nx},${ny}`);
                    queue.push({x:nx, y:ny});
                } else if (state.map[ny*GRID_SIZE + nx] === 1 && curr.x !== 0 || curr.y !== 0) { 
                    // 경로 찾다가 Wall에 부딪히면 이 Wall을 제거해볼까? 
                    // 간단한 해결책: Wall이 많으면 일부 랜덤 제거
                }
            }
        }
    }

    // 경로가 없다면 가장자리 Wall을 하나씩 제거하며 재확인 (여기서는 단순하게 일단 전체 재생성을 유도하거나 최소한의 터널 파기)
    // 이 코드는 복잡도를 줄이기 위해 재귀 호출 방식으로 해결 (loadLevel 내부에서 다시 실행되게 함)
    
    // 아주 단순한 백업 플랜: 중앙 Wall 3개 제거
    let cleared = false;
    for(let y=3; y<5; y++) {
        for(let x=3; x<5; x++) {
             if(state.map[y*GRID_SIZE+x] === 1) {
                 state.map[y*GRID_SIZE+x] = 0;
                 cleared = true;
             }
        }
    }
    return cleared ? bfsCheck(start, end) : false; // 한번 더 확인
}

function bfsCheck(s, e) {
    let q = [s]; let v = new Set([`${s.x},${s.y}`]);
    while(q.length) {
        let c = q.shift();
        if(c.x===e.x && c.y===e.y) return true;
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(d=>{
            let nx=c.x+d[0], ny=c.y+d[1];
            if(nx>=0&&nx<8&&ny>=0&&ny<8 && state.map[ny*8+nx]==0 && !v.has(`${nx},${ny}`)){
                v.add(`${nx},${ny}`); q.push({x:nx,y:ny});
            }
        });
    }
    return false;
}

/**
 * 빈 자리의 좌표를 반환
 */
function getFreePos() {
    let attempts = 0;
    while(attempts < 50) {
        let x = rnd(GRID_SIZE), y = rnd(GRID_SIZE);
        let idx = y*GRID_SIZE + x;
        if(state.map[idx] === 0 && !(x === state.player.x && y === state.player.y)) {
            let occupied = state.enemies.some(e => e.x === x && e.y === y) ||
                          state.items.some(i => i.x === x && i.y === y) ||
                          (x === state.exit.x && y === state.exit.y);
            if(!occupied) return {x, y};
        }
        attempts++;
    }
    return null;
}

/**
 * 렌더링 핵심 함수
 */
function render() {
    gridEl.innerHTML = '';
    
    for(let y=0; y<GRID_SIZE; y++) {
        for(let x=0; x<GRID_SIZE; x++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            const idx = y * GRID_SIZE + x;
            
            // 포그 오브 워 처리
            if (!state.explored[idx]) {
                cell.classList.add('fog');
            } else {
                // 보임
                const mapType = state.map[idx];
                
                // 1. Player
                if(x === state.player.x && y === state.player.y) {
                    cell.textContent = '🧙‍♂️';
                    cell.classList.add('player');
                }
                // 2. Enemy
                else if(state.enemies.some(e => e.x === x && e.y === y)) {
                    cell.textContent = '👾';
                    cell.classList.add('enemy');
                }
                // 3. 아이템
                else if(state.items.some(i => i.x === x && i.y === y)) {
                    cell.textContent = '❤️';
                    cell.style.color = 'var(--heal)';
                }
                // 4. Exit (현재 시야 안에 있을 때만 보이게 하려면 distance 계산 필요. 여기선 visited 후에도 흔Enemy을 남긴다 가정)
                else if(x === state.exit.x && y === state.exit.y) {
                    cell.textContent = '🚪';
                    cell.style.color = 'gold';
                }
                // 5. Wall
                else if (mapType === 1) {
                    cell.classList.add('wall');
                }
                
                // 이미 지나간 땅 (방문 기록이 있더라도 Wall/Enemy 외엔 어둡게)
                if(mapType === 0 && !(x === state.player.x && y === state.player.y)) {
                   if(!isInView(x, y)) {
                       cell.classList.add('visited');
                       // 이미 봤던 Wall이라도 visited 처리
                   }
                }
            }
            gridEl.appendChild(cell);
        }
    }
}

/**
 * 시야 거리 계산
 */
function isInView(tx, ty) {
    return Math.abs(tx - state.player.x) <= VIEW_RADIUS && Math.abs(ty - state.player.y) <= VIEW_RADIUS;
}

/**
 * 포그 업데이트
 */
function updateFogOfWar() {
    for(let i=0; i<TILE_COUNT; i++) {
        // 기존에는 안 본 것만 업데이트
        if(!state.explored[i]) {
            let cx = i % GRID_SIZE;
            let cy = Math.floor(i / GRID_SIZE);
            if(isInView(cx, cy)) {
                state.explored[i] = true; // 처음 발견!
            }
        }
    }
}

/**
 * 게임 루프: 입력 처리 -> 행동 -> 렌더링
 */
document.addEventListener('keydown', (e) => {
    if(!state.running) return;
    
    let dx = 0, dy = 0;
    if(e.key === 'ArrowUp' || e.key === 'w') dy = -1;
    else if(e.key === 'ArrowDown' || e.key === 's') dy = 1;
    else if(e.key === 'ArrowLeft' || e.key === 'a') dx = -1;
    else if(e.key === 'ArrowRight' || e.key === 'd') dx = 1;
    else return;

    e.preventDefault();
    tryMove(dx, dy);
});

/**
 * 이동 로직
 */
function tryMove(dx, dy) {
    const nx = state.player.x + dx;
    const ny = state.player.y + dy;

    // 범위 체크
    if(nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return;

    const idx = ny * GRID_SIZE + nx;

    // 1. Wall 충돌
    if(state.map[idx] === 1) return;

    // 2. Enemy 충돌 (attack)
    const enemyIdx = state.enemies.findIndex(e => e.x === nx && e.y === ny);
    if(enemyIdx !== -1) {
        attackEnemy(enemyIdx);
        return; // 이동 없이 턴 종료
    }

    // 실제로 이동
    state.player.x = nx;
    state.player.y = ny;

    // 3. 아이템 획득
    const itemIdx = state.items.findIndex(i => i.x === nx && i.y === ny);
    if(itemIdx !== -1) {
        state.items.splice(itemIdx, 1);
        healPlayer(5);
        showFloatText(nx, ny, "+5HP", "green");
    }

    // 4. 탈출
    if(nx === state.exit.x && ny === state.exit.y) {
        nextLevel();
        return;
    }

    // 턴 갱신 (Enemy 행동 등)
    enemyTurn();
    updateFogOfWar();
    render();
    updateHUD();
}

/**
 * Enemy attack
 */
function attackEnemy(idx) {
    const dmg = 3 + state.level; // Player 피해량
    state.enemies[idx].hp -= dmg;
    
    // 피드백 효과 (간단)
    // 실제로는 floatText 등을 사용할 수 있음
    
    if(state.enemies[idx].hp <= 0) {
        state.enemies.splice(idx, 1);
    } else {
        // Enemy의 반격
        const enemyDmg = 1 + Math.floor(state.level / 2);
        takeDamage(enemyDmg);
    }
}

/**
 * Enemy AI (매우 단순: 랜덤 한 번 행동)
 */
function enemyTurn() {
    const dirs = [[0,1],[0,-1],[1,0],[-1,0]];
    state.enemies.forEach(en => {
        // Player를 향해 간다는 로직보다는 단순히 살아있음 유지
        const targetDir = dirs[rnd(4)];
        let nx = en.x + targetDir[0];
        let ny = en.y + targetDir[1];

        // 기본 충돌 체크
        if(nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE) return;
        if(state.map[ny*GRID_SIZE + nx] === 1) return; // Wall 무시
        
        // 다른 Enemy 위에 탑승 방지
        if(state.enemies.some(e => e !== en && e.x === nx && e.y === ny)) return;

        // Player에게 충돌 (attack)
        if(nx === state.player.x && ny === state.player.y) {
            takeDamage(1 + Math.floor(state.level/2));
        } else {
            // 이동
            en.x = nx;
            en.y = ny;
        }
    });
}

/**
 * Health 감소
 */
function takeDamage(amount) {
    state.player.hp -= amount;
    updateHUD();
    if(state.player.hp <= 0) gameOver(false);
}

function healPlayer(amount) {
    state.player.hp = Math.min(state.player.hp + amount, MAX_HP);
    updateHUD();
}

/**
 * Next Level
 */
function nextLevel() {
    loadLevel(state.level + 1);
    updateHUD();
}

/**
 * Game Over / 승리
 */
function gameOver(win) {
    state.running = false;
    overlayEl.style.display = 'flex';
    if(win) {
        titleEl.textContent = "VICTORY";
        titleEl.style.color = "var(--heal)";
        descEl.textContent = "Escaped all dungeons successfully!";
    } else {
        titleEl.textContent = "GAME OVER";
        titleEl.style.color = "var(--danger)";
        descEl.textContent = `Max Reached Level: ${state.level}`;
    }
    btnEl.textContent = "Try again";
    btnEl.onclick = startGame;
}

/**
 * HUD 업데이트
 */
function updateHUD() {
    hpDisp.textContent = `${state.player.hp}/${MAX_HP}`;
    lvlDisp.textContent = state.level;
    if(state.player.hp < 10) hpDisp.style.color = 'red';
    else hpDisp.style.color = '#eee';
}

/**
 * 화면에 잠시 떠다니는 텍스트 (간단한 CSS 트릭이나 div 동Enemy 생성 활용 - 여기선 생략하되 렌더링 리프레시를 기대함)
 */
function showFloatText(x, y, text, color) {
    // 구현은 복잡하므로 현재 구조상 바로 렌더링된 그리드에 반영되는 것이 아님
    // 하지만 아이템 획득 시 자동으로 Health이 올라가므로 시각Enemy 피드백보다 Status 변화가 우선됨.
}

// 초기 화면 세팅
updateHUD();

</script>
</body>
</html>
