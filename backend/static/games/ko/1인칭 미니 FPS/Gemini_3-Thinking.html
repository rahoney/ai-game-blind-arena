<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Blind Arena - FPS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        
        /* UI 레이아웃 */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #fff; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 2px; height: 2px; background: red; transform: translate(-50%, -50%); }
        
        .stats-top { position: absolute; top: 20px; left: 20px; font-size: 1.2rem; text-shadow: 2px 2px 4px #000; }
        .stats-top div { margin-bottom: 5px; }
        
        #health-bar-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 300px; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid #fff; }
        #health-bar { width: 100%; height: 100%; background: #ff3333; transition: width 0.2s; }
        
        /* 화면 메시지 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; z-index: 10; }
        .overlay h1 { font-size: 3rem; margin-bottom: 10px; color: #00ffcc; text-transform: uppercase; letter-spacing: 5px; }
        .overlay p { font-size: 1.2rem; margin-bottom: 30px; }
        .btn { padding: 15px 40px; font-size: 1.5rem; background: #00ffcc; color: #000; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; transition: transform 0.2s; }
        .btn:hover { transform: scale(1.1); background: #fff; }
        
        #game-over { display: none; }
        #instructions { font-size: 0.9rem; color: #aaa; margin-top: 20px; text-align: center; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div id="crosshair"></div>
        <div class="stats-top">
            <div id="ui-wave">WAVE: 1</div>
            <div id="ui-score">SCORE: 0</div>
            <div id="ui-highscore" style="font-size: 0.9rem; color: #00ffcc;">BEST: 0</div>
        </div>
        <div id="health-bar-container">
            <div id="health-bar"></div>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1 id="txt-title">ARENA</h1>
        <p id="txt-subtitle">제로샷 프롬프트 FPS 성능 평가</p>
        <button class="btn" id="btn-start">START</button>
        <div id="instructions">
            WASD: 이동 | MOUSE: 조준 & 공격<br>
            마우스를 클릭하여 게임을 시작하세요.
        </div>
    </div>

    <div id="game-over" class="overlay">
        <h1 id="txt-gameover">GAME OVER</h1>
        <p id="txt-final-score">최종 점수: 0</p>
        <button class="btn" id="btn-restart">RESTART</button>
    </div>

    <script>
        /**
         * LANG_DATA: 모든 텍스트 문자열 관리
         */
        const LANG_DATA = {
            KO: {
                title: "AI Game Blind Arena",
                subtitle: "LLM 성능 평가용 FPS 엔진 v1.0",
                start: "게임 시작",
                gameover: "작전 실패",
                finalScore: "최종 점수: ",
                wave: "웨이브: ",
                score: "점수: ",
                best: "최고 기록: ",
                instructions: "WASD: 이동 | MOUSE: 시점 & 사격 | ESC: 해제",
                loading: "데이터 로딩 중..."
            }
        };
        const L = LANG_DATA.KO;

        // UI 텍스트 초기화
        document.getElementById('txt-title').innerText = L.title;
        document.getElementById('txt-subtitle').innerText = L.subtitle;
        document.getElementById('btn-start').innerText = L.start;
        document.getElementById('btn-restart').innerText = L.start;
        document.getElementById('instructions').innerHTML = L.instructions;

        /**
         * 게임 상태 관리 객체
         */
        const state = {
            playing: false,
            score: 0,
            highscore: localStorage.getItem('fps_highscore') || 0,
            wave: 1,
            hp: 100,
            maxHp: 100,
            enemies: [],
            bullets: [],
            keys: {},
            lastSpawnTime: 0,
            enemySpawnRate: 3000, // ms
            waveActive: true
        };

        /**
         * Three.js 설정
         */
        let scene, camera, renderer, clock, controls;
        let mapSize = 40;
        const wallSize = 4;
        const walls = [];
        
        // 사운드 합성을 위한 Audio Context
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.FogExp2(0x050505, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // 조명
            const ambient = new THREE.AmbientLight(0x404040, 2);
            scene.add(ambient);
            const sun = new THREE.DirectionalLight(0x00ffcc, 0.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            createMap();
            setupControls();
            
            window.addEventListener('resize', onWindowResize);
            updateUI();
        }

        // 절차적 텍스처 생성 (Canvas)
        function createTexturedMaterial(color1, color2) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color1;
            ctx.fillRect(0,0,64,64);
            ctx.strokeStyle = color2;
            ctx.lineWidth = 4;
            ctx.strokeRect(4,4,56,56);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return new THREE.MeshStandardMaterial({ map: tex });
        }

        function createMap() {
            // 바닥
            const floorGeo = new THREE.PlaneGeometry(mapSize * 2, mapSize * 2);
            const floorMat = createTexturedMaterial('#111', '#222');
            floorMat.map.repeat.set(20, 20);
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 외벽 생성
            const wallMat = createTexturedMaterial('#222', '#00ffcc');
            const createWall = (w, h, d, x, z) => {
                const geo = new THREE.BoxGeometry(w, h, d);
                const mesh = new THREE.Mesh(geo, wallMat);
                mesh.position.set(x, h/2, z);
                scene.add(mesh);
                walls.push(new THREE.Box3().setFromObject(mesh));
            };

            createWall(mapSize * 2, wallSize, 2, 0, -mapSize); // 북
            createWall(mapSize * 2, wallSize, 2, 0, mapSize);  // 남
            createWall(2, wallSize, mapSize * 2, -mapSize, 0); // 서
            createWall(2, wallSize, mapSize * 2, mapSize, 0);  // 동

            // 내부 장애물
            for(let i=0; i<15; i++) {
                const rx = (Math.random() - 0.5) * (mapSize * 1.5);
                const rz = (Math.random() - 0.5) * (mapSize * 1.5);
                if (Math.abs(rx) < 5 && Math.abs(rz) < 5) continue; // 중앙 비우기
                createWall(4, 4, 4, rx, rz);
            }
        }

        /**
         * 컨트롤 및 포인터 락
         */
        function setupControls() {
            document.addEventListener('keydown', (e) => state.keys[e.code] = true);
            document.addEventListener('keyup', (e) => state.keys[e.code] = false);

            const btnStart = document.getElementById('btn-start');
            const btnRestart = document.getElementById('btn-restart');

            const startAction = () => {
                document.body.requestPointerLock();
                resetGame();
            };

            btnStart.addEventListener('click', startAction);
            btnRestart.addEventListener('click', startAction);

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement) {
                    camera.rotation.y -= e.movementX * 0.002;
                    const nextPitch = camera.rotation.x - e.movementY * 0.002;
                    camera.rotation.x = Math.max(-Math.PI/2.5, Math.min(Math.PI/2.5, nextPitch));
                }
            });

            document.addEventListener('mousedown', (e) => {
                if (document.pointerLockElement && state.playing) shoot();
            });

            // ESC 등으로 포인터락 해제 시 처리
            document.addEventListener('pointerlockchange', () => {
                if (!document.pointerLockElement && state.playing) {
                    // 일시정지 로직 필요 시 여기에 추가
                }
            });
        }

        /**
         * 전투 로직
         */
        function shoot() {
            playSfx(440, 'square', 0.1); // 발사음
            
            const bullet = {
                mesh: new THREE.Mesh(
                    new THREE.SphereGeometry(0.1, 8, 8),
                    new THREE.MeshBasicMaterial({ color: 0xffff00 })
                ),
                dir: new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion),
                speed: 1.5,
                life: 100
            };
            bullet.mesh.position.copy(camera.position);
            scene.add(bullet.mesh);
            state.bullets.push(bullet);
        }

        function createEnemy() {
            const types = [
                { color: 0xff3333, speed: 0.05, hp: 1, scale: 0.8, score: 10, type: 'Grunt' },
                { color: 0x33ff33, speed: 0.12, hp: 1, scale: 0.5, score: 20, type: 'Fast' },
                { color: 0x3333ff, speed: 0.03, hp: 5, scale: 1.5, score: 50, type: 'Tank' }
            ];
            const t = types[Math.floor(Math.random() * types.length)];
            
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(1, 1, 1),
                new THREE.MeshStandardMaterial({ color: t.color, emissive: t.color, emissiveIntensity: 0.5 })
            );
            
            // 맵 끝부분에서 스폰
            const angle = Math.random() * Math.PI * 2;
            const dist = mapSize - 5;
            mesh.position.set(Math.cos(angle) * dist, 0.5 * t.scale, Math.sin(angle) * dist);
            mesh.scale.set(t.scale, t.scale, t.scale);
            
            scene.add(mesh);
            state.enemies.push({ mesh, ...t, currentHp: t.hp });
        }

        /**
         * 사운드 효과 (Web Audio API)
         */
        function playSfx(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        /**
         * 핵심 업데이트 루프
         */
        function update() {
            if (!state.playing) return;

            const delta = clock.getDelta();
            const moveSpeed = 0.15;
            
            // 1. 플레이어 이동 및 충돌
            const prevPos = camera.position.clone();
            if (state.keys['KeyW']) camera.translateZ(-moveSpeed);
            if (state.keys['KeyS']) camera.translateZ(moveSpeed);
            if (state.keys['KeyA']) camera.translateX(-moveSpeed);
            if (state.keys['KeyD']) camera.translateX(moveSpeed);
            camera.position.y = 1.6; // 눈높이 유지

            const playerBB = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1, 2, 1));
            for (let wall of walls) {
                if (playerBB.intersectsBox(wall)) {
                    camera.position.copy(prevPos);
                    break;
                }
            }

            // 2. 총알 업데이트
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];
                b.mesh.position.add(b.dir.clone().multiplyScalar(b.speed));
                b.life--;

                let hit = false;
                // 적 피격 판정
                for (let j = state.enemies.length - 1; j >= 0; j--) {
                    const e = state.enemies[j];
                    if (b.mesh.position.distanceTo(e.mesh.position) < e.scale) {
                        e.currentHp--;
                        playSfx(200, 'sine', 0.05);
                        if (e.currentHp <= 0) {
                            state.score += e.score;
                            scene.remove(e.mesh);
                            state.enemies.splice(j, 1);
                            playSfx(100, 'sawtooth', 0.2);
                        }
                        hit = true; break;
                    }
                }

                if (hit || b.life <= 0) {
                    scene.remove(b.mesh);
                    state.bullets.splice(i, 1);
                }
            }

            // 3. 적 AI 및 스폰
            const now = Date.now();
            if (now - state.lastSpawnTime > state.enemySpawnRate) {
                createEnemy();
                state.lastSpawnTime = now;
                // 난이도 상승
                state.enemySpawnRate = Math.max(800, state.enemySpawnRate * 0.98);
            }

            for (let i = state.enemies.length - 1; i >= 0; i--) {
                const e = state.enemies[i];
                const dir = new THREE.Vector3().subVectors(camera.position, e.mesh.position).normalize();
                e.mesh.position.add(dir.multiplyScalar(e.speed));
                e.mesh.lookAt(camera.position.x, e.mesh.position.y, camera.position.z);

                // 플레이어 피격
                if (e.mesh.position.distanceTo(camera.position) < 1.2) {
                    takeDamage(0.5);
                }
            }

            // 4. 웨이브 관리 (점수에 따른 시각적 표시)
            const nextWave = Math.floor(state.score / 500) + 1;
            if (nextWave > state.wave) {
                state.wave = nextWave;
                playSfx(600, 'triangle', 0.5);
            }

            updateUI();
            if (state.hp <= 0) gameOver();
        }

        function takeDamage(amt) {
            state.hp -= amt;
            document.getElementById('health-bar').style.width = `${Math.max(0, state.hp)}%`;
            if (Math.random() > 0.9) playSfx(150, 'sine', 0.1);
        }

        function updateUI() {
            document.getElementById('ui-wave').innerText = `${L.wave}${state.wave}`;
            document.getElementById('ui-score').innerText = `${L.score}${state.score}`;
            document.getElementById('ui-highscore').innerText = `${L.best}${state.highscore}`;
        }

        function gameOver() {
            state.playing = false;
            document.exitPointerLock();
            if (state.score > state.highscore) {
                state.highscore = state.score;
                localStorage.setItem('fps_highscore', state.highscore);
            }
            document.getElementById('txt-final-score').innerText = `${L.finalScore}${state.score}`;
            document.getElementById('game-over').style.display = 'flex';
        }

        function resetGame() {
            // 모든 상태 초기화
            state.playing = true;
            state.hp = 100;
            state.score = 0;
            state.wave = 1;
            state.enemySpawnRate = 3000;
            
            // 기존 오브젝트 제거
            state.enemies.forEach(e => scene.remove(e.mesh));
            state.bullets.forEach(b => scene.remove(b.mesh));
            state.enemies = [];
            state.bullets = [];

            camera.position.set(0, 1.6, 0);
            camera.rotation.set(0, 0, 0);

            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('health-bar').style.width = '100%';
            updateUI();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // 실행
        init();
        animate();

    </script>
</body>
</html>
