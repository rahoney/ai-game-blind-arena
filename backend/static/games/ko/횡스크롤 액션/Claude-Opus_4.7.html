<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그림자 모험</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 100%);
    display: flex; justify-content: center; align-items: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    color: #fff; overflow: hidden;
    user-select: none; -webkit-user-select: none;
  }
  #wrap {
    position: relative;
    box-shadow: 0 25px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
    border-radius: 10px; overflow: hidden;
  }
  canvas {
    display: block; background: #87CEEB;
    image-rendering: pixelated; image-rendering: crisp-edges;
  }
  #hint {
    position: absolute; bottom: -28px; left: 0; right: 0;
    text-align: center; font-size: 12px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="540"></canvas>
  <div id="hint">화면을 클릭하여 사운드를 활성화하세요</div>
</div>
<script>
/* ========================================================
 *  LANG_DATA — 화면 표시용 모든 문자열 (다국어 확장 용이)
 * ======================================================== */
const LANG_DATA = {
  title: "그림자 모험",
  subtitle: "PIXEL  PLATFORMER",
  startPrompt: "스페이스 또는 엔터로 시작",
  controlsTitle: "조작법",
  controlMove: "← →  또는  A / D     이동",
  controlJump: "스페이스 / W / ↑     점프 (길게 누르면 더 높이)",
  controlPause: "P     일시정지",
  controlRestart: "R     재시작",
  hudScore: "점수",
  hudLives: "목숨",
  hudCoins: "코인",
  hudProgress: "진행도",
  hudHigh: "최고",
  gameOverTitle: "게임 오버",
  clearTitle: "스테이지 클리어!",
  finalScore: "최종 점수",
  bestScore: "최고 기록",
  newRecord: "★  신기록 달성  ★",
  retryPrompt: "R 또는 엔터로 재시작",
  pausedTitle: "일시정지",
  resumePrompt: "P를 눌러 계속하기",
  ready: "준비",
  go: "출발!",
  hint: "방향키 또는 A/D, 점프는 스페이스",
};

/* ========================================================
 *  상수
 * ======================================================== */
const CANVAS_W = 900, CANVAS_H = 540;
const STAGE_W = 4800;          // 스테이지 길이 (화면 너비의 5.3배)
const DEATH_Y = 620;           // 낙사 판정 Y
const GRAVITY = 0.55;
const FRICTION = 0.82;
const PLAYER_ACCEL = 0.7;
const PLAYER_MAX_SPEED = 4.5;
const JUMP_POWER = 12.2;
const JUMP_CUT = 0.45;         // 점프 키 짧게 누름시 상승력 감쇠
const COYOTE_FRAMES = 6;       // 코요테 타임
const JUMP_BUFFER_FRAMES = 7;  // 점프 입력 버퍼링
const MAX_FALL_SPEED = 14;
const STAGE_GROUND_TOP = 480;
const COIN_VALUE = 100;
const STOMP_VALUE = 200;
const CLEAR_BONUS = 1000;

const STATES = { MENU: 0, PLAYING: 1, PAUSED: 2, GAMEOVER: 3, CLEAR: 4, DYING: 5, INTRO: 6 };

/* ========================================================
 *  LocalStorage 안전 래퍼 (사용 불가 환경에선 메모리로 폴백)
 * ======================================================== */
const storage = (() => {
  let mem = {};
  let canUse = false;
  try {
    localStorage.setItem("__t", "1");
    localStorage.removeItem("__t");
    canUse = true;
  } catch (e) { canUse = false; }
  return {
    get(k) { try { return canUse ? localStorage.getItem(k) : (mem[k] ?? null); } catch (e) { return mem[k] ?? null; } },
    set(k, v) { try { canUse ? localStorage.setItem(k, v) : (mem[k] = v); } catch (e) { mem[k] = v; } },
  };
})();

/* ========================================================
 *  사운드 (Web Audio API로 코드 생성)
 * ======================================================== */
const sfx = {
  ctx: null, enabled: true,
  init() {
    if (this.ctx) return;
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { this.enabled = false; }
  },
  resume() { if (this.ctx && this.ctx.state === "suspended") this.ctx.resume(); },
  // 단발 톤 헬퍼
  tone(freqStart, freqEnd, dur, type = "square", vol = 0.12, delay = 0) {
    if (!this.enabled) return;
    if (!this.ctx) this.init();
    if (!this.ctx) return;
    const t = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freqStart, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(1, freqEnd), t + dur);
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.ctx.destination);
    o.start(t); o.stop(t + dur + 0.02);
  },
  play(name) {
    switch (name) {
      case "jump":  this.tone(420, 760, 0.10, "square", 0.10); break;
      case "coin":  this.tone(880, 880, 0.05, "triangle", 0.15);
                    this.tone(1320, 1760, 0.10, "triangle", 0.15, 0.05); break;
      case "stomp": this.tone(280, 90, 0.12, "square", 0.18); break;
      case "hit":   this.tone(220, 70, 0.30, "sawtooth", 0.18); break;
      case "death": this.tone(440, 50, 0.70, "sawtooth", 0.20); break;
      case "goal":  [523, 659, 784, 1047].forEach((f, i) => this.tone(f, f, 0.18, "triangle", 0.16, i * 0.10)); break;
      case "select":this.tone(660, 880, 0.08, "square", 0.10); break;
    }
  },
};

/* ========================================================
 *  입력 처리 (키보드 + 게임패드)
 * ======================================================== */
const input = {
  left: false, right: false, jump: false, jumpPressed: false, jumpHeld: false,
  pausePressed: false, restartPressed: false, confirmPressed: false,
  _prevJump: false, _prevPause: false, _prevRestart: false, _prevConfirm: false,
};
const keys = {};
window.addEventListener("keydown", (e) => {
  keys[e.code] = true;
  // 스크롤 방지
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space"].includes(e.code)) e.preventDefault();
}, { passive: false });
window.addEventListener("keyup", (e) => { keys[e.code] = false; });
window.addEventListener("blur", () => { for (const k in keys) keys[k] = false; });

function pollInput() {
  // 키보드
  let left  = !!(keys.ArrowLeft  || keys.KeyA);
  let right = !!(keys.ArrowRight || keys.KeyD);
  let jump  = !!(keys.Space || keys.KeyW || keys.ArrowUp);
  let pause = !!keys.KeyP;
  let restart = !!keys.KeyR;
  let confirm = !!(keys.Enter || keys.Space);

  // 게임패드 (Gamepad API) - 키보드 우선이지만 보조로 읽음
  try {
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (const p of pads) {
      if (!p) continue;
      const ax = p.axes[0] || 0;
      if (ax < -0.3) left = true;
      if (ax >  0.3) right = true;
      if (p.buttons[14] && p.buttons[14].pressed) left = true;
      if (p.buttons[15] && p.buttons[15].pressed) right = true;
      if ((p.buttons[0] && p.buttons[0].pressed) || (p.buttons[1] && p.buttons[1].pressed)) jump = true;
      if (p.buttons[9] && p.buttons[9].pressed) pause = true;
      if (p.buttons[8] && p.buttons[8].pressed) restart = true;
      if (p.buttons[0] && p.buttons[0].pressed) confirm = true;
    }
  } catch (e) {}

  input.left = left; input.right = right;
  input.jumpPressed = jump && !input._prevJump;
  input.jumpHeld = jump;
  input.jump = jump;
  input.pausePressed = pause && !input._prevPause;
  input.restartPressed = restart && !input._prevRestart;
  input.confirmPressed = confirm && !input._prevConfirm;
  input._prevJump = jump;
  input._prevPause = pause;
  input._prevRestart = restart;
  input._prevConfirm = confirm;
}

/* ========================================================
 *  플레이어
 * ======================================================== */
class Player {
  constructor() {
    this.w = 26; this.h = 34;
    this.reset();
  }
  reset() {
    this.x = 60; this.y = 380;
    this.vx = 0; this.vy = 0;
    this.onGround = false;
    this.facing = 1;
    this.coyote = 0;
    this.jumpBuffer = 0;
    this.invuln = 60;          // 리스폰 직후 무적시간
    this.animT = 0;
    this.squashY = 1;
    this.squashX = 1;
    this.dead = false;
  }
  // 핵심 업데이트: 가속/마찰/중력/점프(가변+코요테+버퍼)/AABB 충돌
  update(platforms) {
    if (this.dead) return;
    if (this.invuln > 0) this.invuln--;

    // 1) 좌우 이동 - 가속과 마찰
    const dir = (input.right ? 1 : 0) - (input.left ? 1 : 0);
    if (dir !== 0) {
      this.vx += dir * PLAYER_ACCEL;
      this.vx = Math.max(-PLAYER_MAX_SPEED, Math.min(PLAYER_MAX_SPEED, this.vx));
      this.facing = dir;
    } else {
      this.vx *= FRICTION;
      if (Math.abs(this.vx) < 0.05) this.vx = 0;
    }

    // 2) 점프 입력 버퍼링
    if (input.jumpPressed) this.jumpBuffer = JUMP_BUFFER_FRAMES;
    if (this.jumpBuffer > 0) this.jumpBuffer--;

    // 3) 점프 실행 (코요테 타임 + 버퍼)
    if (this.jumpBuffer > 0 && this.coyote > 0) {
      this.vy = -JUMP_POWER;
      this.coyote = 0;
      this.jumpBuffer = 0;
      this.onGround = false;
      this.squashY = 0.7; this.squashX = 1.3;
      sfx.play("jump");
    }

    // 4) 가변 점프 높이 — 점프키 떼면 상승 감쇠
    if (!input.jumpHeld && this.vy < -3) this.vy *= JUMP_CUT;

    // 5) 중력
    this.vy += GRAVITY;
    if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

    // 6) 축 분리 충돌 처리 (X → Y)
    this.x += this.vx;
    this.collideAxis(platforms, "x");

    const wasOnGround = this.onGround;
    this.onGround = false;
    this.y += this.vy;
    this.collideAxis(platforms, "y");

    // 착지 스쿼시
    if (this.onGround && !wasOnGround) {
      this.squashY = 1.3; this.squashX = 0.8;
    }

    // 코요테 타임 갱신
    if (this.onGround) this.coyote = COYOTE_FRAMES;
    else if (this.coyote > 0) this.coyote--;

    // 스쿼시 회복
    this.squashY += (1 - this.squashY) * 0.25;
    this.squashX += (1 - this.squashX) * 0.25;

    // 애니메이션 타이밍
    if (Math.abs(this.vx) > 0.5 && this.onGround) this.animT += 0.25;
  }
  // AABB 충돌 (단일 축)
  collideAxis(platforms, axis) {
    for (const p of platforms) {
      if (this.x < p.x + p.w && this.x + this.w > p.x &&
          this.y < p.y + p.h && this.y + this.h > p.y) {
        if (axis === "x") {
          if (this.vx > 0) this.x = p.x - this.w;
          else if (this.vx < 0) this.x = p.x + p.w;
          this.vx = 0;
        } else {
          if (this.vy > 0) { this.y = p.y - this.h; this.onGround = true; }
          else if (this.vy < 0) { this.y = p.y + p.h; }
          this.vy = 0;
        }
      }
    }
  }
  draw(ctx, camX) {
    const x = Math.round(this.x - camX), y = Math.round(this.y);
    // 무적 깜빡임
    if (this.invuln > 0 && Math.floor(this.invuln / 4) % 2 === 0) return;

    const cx = x + this.w / 2;
    const w = this.w * this.squashX;
    const h = this.h * this.squashY;
    const dx = cx - w / 2;
    const dy = y + this.h - h;

    // 그림자
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(cx, y + this.h + 2, this.w * 0.5, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // 망토 (뒤쪽)
    ctx.fillStyle = "#7a3fbf";
    ctx.fillRect(dx - 2 * this.facing, dy + 8, w + 4, h - 12);

    // 몸통
    const bodyGrad = ctx.createLinearGradient(dx, dy, dx, dy + h);
    bodyGrad.addColorStop(0, "#5fb0ff");
    bodyGrad.addColorStop(1, "#2c6fc7");
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(dx, dy + 8, w, h - 8);

    // 머리
    ctx.fillStyle = "#ffd9a8";
    ctx.fillRect(dx + 2, dy, w - 4, 12);

    // 모자
    ctx.fillStyle = "#1f3a6e";
    ctx.fillRect(dx, dy - 3, w, 5);
    ctx.fillRect(dx + 4, dy - 6, w - 8, 4);

    // 눈
    ctx.fillStyle = "#fff";
    const eyeX = this.facing > 0 ? dx + w - 8 : dx + 4;
    ctx.fillRect(eyeX, dy + 4, 4, 4);
    ctx.fillStyle = "#222";
    ctx.fillRect(eyeX + (this.facing > 0 ? 1 : 1), dy + 5, 2, 2);

    // 다리 (걷기 애니메이션)
    ctx.fillStyle = "#1f3a6e";
    if (this.onGround && Math.abs(this.vx) > 0.5) {
      const phase = Math.sin(this.animT);
      ctx.fillRect(dx + 2, dy + h - 4 + (phase > 0 ? 0 : -2), 6, 4);
      ctx.fillRect(dx + w - 8, dy + h - 4 + (phase > 0 ? -2 : 0), 6, 4);
    } else {
      ctx.fillRect(dx + 2, dy + h - 4, 6, 4);
      ctx.fillRect(dx + w - 8, dy + h - 4, 6, 4);
    }
  }
}

/* ========================================================
 *  적 — 슬라임 (지상 패트롤)
 * ======================================================== */
class Slime {
  constructor(x, y, range = 90) {
    this.spawnX = x; this.spawnY = y; this.range = range;
    this.w = 30; this.h = 22;
    this.reset();
  }
  reset() {
    this.x = this.spawnX; this.y = this.spawnY;
    this.vx = -1; this.vy = 0;
    this.alive = true; this.deathTimer = 0;
    this.t = Math.random() * Math.PI * 2;
  }
  update(platforms) {
    if (!this.alive) {
      this.vy += GRAVITY * 0.6; this.y += this.vy;
      this.deathTimer++;
      return;
    }
    this.t += 0.1;
    this.vy += GRAVITY;
    if (this.vy > MAX_FALL_SPEED) this.vy = MAX_FALL_SPEED;

    this.x += this.vx;
    // 좌우 충돌 - 벽 닿으면 반대로
    for (const p of platforms) {
      if (this.x < p.x + p.w && this.x + this.w > p.x &&
          this.y < p.y + p.h && this.y + this.h > p.y) {
        if (this.vx > 0) this.x = p.x - this.w;
        else this.x = p.x + p.w;
        this.vx = -this.vx;
      }
    }
    // 순찰 범위 제한
    if (Math.abs(this.x - this.spawnX) > this.range) {
      this.x = this.spawnX + Math.sign(this.x - this.spawnX) * this.range;
      this.vx = -this.vx;
    }

    this.y += this.vy;
    let onGround = false;
    for (const p of platforms) {
      if (this.x < p.x + p.w && this.x + this.w > p.x &&
          this.y < p.y + p.h && this.y + this.h > p.y) {
        if (this.vy > 0) { this.y = p.y - this.h; this.vy = 0; onGround = true; }
        else if (this.vy < 0) { this.y = p.y + p.h; this.vy = 0; }
      }
    }
    // 절벽 감지 - 발판 끝이면 돌아섬
    if (onGround) {
      const ahead = this.vx > 0 ? this.x + this.w + 2 : this.x - 2;
      const below = this.y + this.h + 4;
      let footing = false;
      for (const p of platforms) {
        if (ahead >= p.x && ahead <= p.x + p.w && below >= p.y && below <= p.y + p.h) {
          footing = true; break;
        }
      }
      if (!footing) this.vx = -this.vx;
    }
  }
  stomp() { this.alive = false; this.vy = -6; }
  draw(ctx, camX) {
    const x = Math.round(this.x - camX), y = Math.round(this.y);
    if (!this.alive) {
      ctx.fillStyle = "#3e7a35";
      ctx.fillRect(x + 2, y + this.h - 4, this.w - 4, 4);
      return;
    }
    const bob = Math.sin(this.t) * 1.5;
    // 그림자
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.beginPath();
    ctx.ellipse(x + this.w / 2, y + this.h + 2, this.w * 0.45, 3, 0, 0, Math.PI * 2);
    ctx.fill();
    // 몸체
    const grad = ctx.createRadialGradient(x + this.w / 2, y + 8, 2, x + this.w / 2, y + this.h / 2, this.w / 2);
    grad.addColorStop(0, "#9fe57f");
    grad.addColorStop(1, "#4a9b3a");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(x + this.w / 2, y + this.h / 2 + bob, this.w / 2, this.h / 2, 0, 0, Math.PI * 2);
    ctx.fill();
    // 눈
    ctx.fillStyle = "#fff";
    ctx.fillRect(x + 8, y + 6 + bob, 4, 4);
    ctx.fillRect(x + this.w - 12, y + 6 + bob, 4, 4);
    ctx.fillStyle = "#000";
    const pupilOffset = this.vx > 0 ? 1 : 0;
    ctx.fillRect(x + 9 + pupilOffset, y + 7 + bob, 2, 2);
    ctx.fillRect(x + this.w - 11 + pupilOffset, y + 7 + bob, 2, 2);
  }
}

/* ========================================================
 *  적 — 박쥐 (공중 사인파 비행)
 * ======================================================== */
class Bat {
  constructor(x, y, range = 140) {
    this.spawnX = x; this.spawnY = y; this.range = range;
    this.w = 30; this.h = 20;
    this.reset();
  }
  reset() {
    this.x = this.spawnX; this.y = this.spawnY;
    this.vx = -1.4; this.vy = 0;
    this.alive = true; this.deathTimer = 0;
    this.t = Math.random() * Math.PI * 2;
    this.flap = 0;
  }
  update() {
    if (!this.alive) {
      this.vy += GRAVITY * 0.6; this.y += this.vy;
      this.deathTimer++;
      return;
    }
    this.t += 0.04;
    this.flap += 0.4;
    this.x += this.vx;
    if (Math.abs(this.x - this.spawnX) > this.range) this.vx = -this.vx;
    this.y = this.spawnY + Math.sin(this.t) * 26;
  }
  stomp() { this.alive = false; this.vy = -5; }
  draw(ctx, camX) {
    const x = Math.round(this.x - camX), y = Math.round(this.y);
    if (!this.alive) {
      ctx.fillStyle = "#2a2a44";
      ctx.fillRect(x + 8, y + 8, this.w - 16, 6);
      return;
    }
    const wing = Math.sin(this.flap) * 8;
    // 날개
    ctx.fillStyle = "#3a3a5e";
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 10);
    ctx.lineTo(x - 6, y + 6 - wing);
    ctx.lineTo(x - 2, y + 14 - wing * 0.3);
    ctx.lineTo(x + 8, y + 14);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + this.w - 8, y + 10);
    ctx.lineTo(x + this.w + 6, y + 6 - wing);
    ctx.lineTo(x + this.w + 2, y + 14 - wing * 0.3);
    ctx.lineTo(x + this.w - 8, y + 14);
    ctx.fill();
    // 몸체
    ctx.fillStyle = "#1f1f3a";
    ctx.beginPath();
    ctx.ellipse(x + this.w / 2, y + this.h / 2, 9, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    // 귀
    ctx.beginPath();
    ctx.moveTo(x + this.w / 2 - 5, y + 4);
    ctx.lineTo(x + this.w / 2 - 8, y - 2);
    ctx.lineTo(x + this.w / 2 - 2, y + 4);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x + this.w / 2 + 5, y + 4);
    ctx.lineTo(x + this.w / 2 + 8, y - 2);
    ctx.lineTo(x + this.w / 2 + 2, y + 4);
    ctx.fill();
    // 눈
    ctx.fillStyle = "#ff3355";
    ctx.fillRect(x + this.w / 2 - 4, y + 8, 2, 2);
    ctx.fillRect(x + this.w / 2 + 2, y + 8, 2, 2);
  }
}

/* ========================================================
 *  코인
 * ======================================================== */
class Coin {
  constructor(x, y) {
    this.x = x; this.y = y; this.w = 18; this.h = 18;
    this.collected = false; this.t = Math.random() * Math.PI * 2;
  }
  reset() { this.collected = false; }
  update() { this.t += 0.12; }
  draw(ctx, camX) {
    if (this.collected) return;
    const x = Math.round(this.x - camX), y = Math.round(this.y + Math.sin(this.t) * 2);
    const wScale = Math.abs(Math.cos(this.t * 1.2));    // 회전 효과
    const cw = Math.max(4, this.w * wScale);
    const dx = x + (this.w - cw) / 2;
    const grad = ctx.createLinearGradient(dx, y, dx + cw, y);
    grad.addColorStop(0, "#a86f00");
    grad.addColorStop(0.5, "#ffe066");
    grad.addColorStop(1, "#a86f00");
    ctx.fillStyle = grad;
    ctx.fillRect(dx, y, cw, this.h);
    if (cw > 10) {
      ctx.fillStyle = "rgba(255,255,255,0.6)";
      ctx.fillRect(dx + 2, y + 4, 2, this.h - 8);
    }
  }
}

/* ========================================================
 *  파티클
 * ======================================================== */
class Particle {
  constructor(x, y, vx, vy, color, life, size = 3) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = life; this.maxLife = life; this.size = size;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += 0.25; this.vx *= 0.97;
    this.life--;
  }
  draw(ctx, camX) {
    ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
    ctx.fillStyle = this.color;
    ctx.fillRect(Math.round(this.x - camX), Math.round(this.y), this.size, this.size);
    ctx.globalAlpha = 1;
  }
}

/* ========================================================
 *  떠오르는 점수 텍스트
 * ======================================================== */
class FloatText {
  constructor(x, y, text, color = "#ffe066") {
    this.x = x; this.y = y; this.text = text; this.color = color;
    this.life = 60; this.maxLife = 60;
  }
  update() { this.y -= 0.7; this.life--; }
  draw(ctx, camX) {
    ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
    ctx.font = "bold 16px sans-serif";
    ctx.textAlign = "center";
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillText(this.text, Math.round(this.x - camX) + 1, Math.round(this.y) + 1);
    ctx.fillStyle = this.color;
    ctx.fillText(this.text, Math.round(this.x - camX), Math.round(this.y));
    ctx.globalAlpha = 1;
    ctx.textAlign = "left";
  }
}

/* ========================================================
 *  메인 게임
 * ======================================================== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
ctx.imageSmoothingEnabled = false;

// 사운드 활성화 (브라우저 정책 - 클릭/키 후에)
const enableSound = () => { sfx.init(); sfx.resume(); };
window.addEventListener("click", enableSound, { once: false });
window.addEventListener("keydown", enableSound, { once: false });

const HIGHSCORE_KEY = "shadowAdventure_highScore_v1";

const game = {
  state: STATES.MENU,
  player: new Player(),
  platforms: [], enemies: [], coins: [], goal: null,
  particles: [], floats: [],
  cameraX: 0,
  shake: 0,
  score: 0, lives: 3, coinsCollected: 0, totalCoins: 0,
  highScore: parseInt(storage.get(HIGHSCORE_KEY) || "0", 10) || 0,
  newRecord: false,
  introT: 0,
  introMsg: "",
  bgT: 0,
  deathT: 0,
  pauseFlash: 0,

  // 완전 초기화 — 점수, 목숨, 위치, 스테이지, 적, 코인 등 모두 리셋
  fullReset() {
    const s = buildStage();
    this.platforms = s.platforms;
    this.enemies = s.enemies;
    this.coins = s.coins;
    this.goal = s.goal;
    this.totalCoins = this.coins.length;
    this.coinsCollected = 0;
    this.score = 0;
    this.lives = 3;
    this.cameraX = 0;
    this.shake = 0;
    this.particles.length = 0;
    this.floats.length = 0;
    this.newRecord = false;
    this.player.reset();
  },
  // 1죽음 후 리스폰 — 위치/적/카메라 리셋
  respawn() {
    this.player.reset();
    this.cameraX = 0;
    this.particles.length = 0;
    this.floats.length = 0;
    for (const e of this.enemies) e.reset();
    this.shake = 0;
  },

  // 시작
  startGame() {
    this.fullReset();
    this.state = STATES.INTRO;
    this.introT = 0;
    this.introMsg = LANG_DATA.ready;
  },

  // 클리어 처리 - 점수 보너스/최고점 갱신
  finishClear() {
    const bonus = CLEAR_BONUS + this.lives * 500;
    this.score += bonus;
    this.floats.push(new FloatText(this.player.x + 12, this.player.y - 10, "+" + bonus, "#ffe066"));
    if (this.score > this.highScore) {
      this.highScore = this.score;
      storage.set(HIGHSCORE_KEY, String(this.highScore));
      this.newRecord = true;
    }
    this.state = STATES.CLEAR;
    sfx.play("goal");
  },

  // 게임오버 처리
  finishGameOver() {
    if (this.score > this.highScore) {
      this.highScore = this.score;
      storage.set(HIGHSCORE_KEY, String(this.highScore));
      this.newRecord = true;
    }
    this.state = STATES.GAMEOVER;
  },
};

/* ========================================================
 *  파티클/이펙트 헬퍼
 * ======================================================== */
function spawnBurst(x, y, color, count = 8, speed = 3) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed + 1;
    game.particles.push(new Particle(x, y, Math.cos(a) * s, Math.sin(a) * s - 1, color, 30 + Math.random() * 20, 3));
  }
}

/* ========================================================
 *  메인 업데이트
 * ======================================================== */
function update() {
  pollInput();
  game.bgT += 0.005;

  // 메뉴 / 게임오버 / 클리어 처리
  if (game.state === STATES.MENU) {
    if (input.confirmPressed) { sfx.play("select"); game.startGame(); }
    return;
  }
  if (game.state === STATES.GAMEOVER || game.state === STATES.CLEAR) {
    if (input.restartPressed || input.confirmPressed) { sfx.play("select"); game.startGame(); }
    return;
  }
  if (game.state === STATES.PAUSED) {
    game.pauseFlash++;
    if (input.pausePressed) { sfx.play("select"); game.state = STATES.PLAYING; }
    if (input.restartPressed) { sfx.play("select"); game.startGame(); }
    return;
  }
  if (game.state === STATES.INTRO) {
    game.introT++;
    if (game.introT === 50) game.introMsg = LANG_DATA.go;
    if (game.introT > 90) game.state = STATES.PLAYING;
    return;
  }
  if (game.state === STATES.DYING) {
    game.deathT++;
    game.player.y += game.player.vy;
    game.player.vy += GRAVITY;
    if (game.deathT > 70) {
      if (game.lives <= 0) game.finishGameOver();
      else { game.state = STATES.PLAYING; game.respawn(); }
    }
    return;
  }

  // PLAYING ---------------------------------------------
  if (input.pausePressed) { sfx.play("select"); game.state = STATES.PAUSED; return; }
  if (input.restartPressed) { sfx.play("select"); game.startGame(); return; }

  // 플레이어 업데이트
  game.player.update(game.platforms);

  // 낙사
  if (game.player.y > DEATH_Y) {
    onPlayerDie();
    return;
  }

  // 적 업데이트 + 충돌
  for (const e of game.enemies) {
    e.update(game.platforms);
    if (!e.alive) continue;
    if (game.player.invuln > 0) continue;
    // AABB 충돌
    if (game.player.x < e.x + e.w && game.player.x + game.player.w > e.x &&
        game.player.y < e.y + e.h && game.player.y + game.player.h > e.y) {
      // 위에서 밟았는지 판정 (수직 속도 + 발 위치)
      const playerBottom = game.player.y + game.player.h;
      const isStomp = game.player.vy > 1 && playerBottom < e.y + e.h * 0.6;
      if (isStomp) {
        e.stomp();
        game.player.vy = -8;            // 바운스
        game.score += STOMP_VALUE;
        game.floats.push(new FloatText(e.x + e.w / 2, e.y, "+" + STOMP_VALUE, "#ff9966"));
        spawnBurst(e.x + e.w / 2, e.y + e.h / 2, "#88dd66", 10, 3);
        sfx.play("stomp");
      } else {
        onPlayerHit();
        return;
      }
    }
  }

  // 코인 충돌
  for (const c of game.coins) {
    if (c.collected) continue;
    c.update();
    if (game.player.x < c.x + c.w && game.player.x + game.player.w > c.x &&
        game.player.y < c.y + c.h && game.player.y + game.player.h > c.y) {
      c.collected = true;
      game.coinsCollected++;
      game.score += COIN_VALUE;
      game.floats.push(new FloatText(c.x + c.w / 2, c.y, "+" + COIN_VALUE, "#ffe066"));
      spawnBurst(c.x + c.w / 2, c.y + c.h / 2, "#ffe066", 8, 2.5);
      sfx.play("coin");
    }
  }

  // 골 깃발 충돌
  if (game.goal &&
      game.player.x < game.goal.x + game.goal.w + 30 &&
      game.player.x + game.player.w > game.goal.x &&
      game.player.y + game.player.h > game.goal.y) {
    game.finishClear();
    return;
  }

  // 파티클/플로트
  for (let i = game.particles.length - 1; i >= 0; i--) {
    game.particles[i].update();
    if (game.particles[i].life <= 0) game.particles.splice(i, 1);
  }
  for (let i = game.floats.length - 1; i >= 0; i--) {
    game.floats[i].update();
    if (game.floats[i].life <= 0) game.floats.splice(i, 1);
  }

  // 카메라 - 플레이어를 따라가되 부드럽게
  const targetX = game.player.x - CANVAS_W * 0.4;
  game.cameraX += (targetX - game.cameraX) * 0.12;
  game.cameraX = Math.max(0, Math.min(STAGE_W - CANVAS_W, game.cameraX));

  if (game.shake > 0) game.shake *= 0.85;
}

function onPlayerHit() {
  game.lives--;
  game.shake = 12;
  spawnBurst(game.player.x + game.player.w / 2, game.player.y + game.player.h / 2, "#ff5555", 14, 4);
  sfx.play("hit");
  if (game.lives <= 0) {
    sfx.play("death");
    game.player.dead = true;
    game.player.vy = -8;
    game.state = STATES.DYING;
    game.deathT = 0;
  } else {
    game.respawn();
  }
}
function onPlayerDie() {
  game.lives--;
  game.shake = 8;
  sfx.play("death");
  if (game.lives <= 0) {
    game.player.dead = true;
    game.state = STATES.DYING;
    game.deathT = 60;     // 즉시 게임오버 처리되도록
  } else {
    game.respawn();
  }
}

/* ========================================================
 *  렌더링
 * ======================================================== */
function drawBackground(ctx, camX) {
  // 하늘 그라데이션
  const sky = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  sky.addColorStop(0, "#5fb8e6");
  sky.addColorStop(0.6, "#a3d9f0");
  sky.addColorStop(1, "#dff1f7");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 구름 (느린 패럴럭스)
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  for (let i = 0; i < 8; i++) {
    const cx = ((i * 720) - camX * 0.15 + game.bgT * 30) % (CANVAS_W + 200) - 100;
    const cy = 60 + (i % 3) * 40;
    drawCloud(ctx, cx, cy, 1 + (i % 3) * 0.3);
  }
  // 먼 산 (중간 패럴럭스)
  ctx.fillStyle = "#6b8fb5";
  for (let i = 0; i < 8; i++) {
    const mx = (i * 600) - camX * 0.3;
    if (mx > -300 && mx < CANVAS_W + 100) {
      ctx.beginPath();
      ctx.moveTo(mx, 420);
      ctx.lineTo(mx + 200, 250);
      ctx.lineTo(mx + 400, 420);
      ctx.fill();
    }
  }
  // 가까운 언덕 (빠른 패럴럭스)
  ctx.fillStyle = "#5a8c4e";
  for (let i = 0; i < 12; i++) {
    const hx = (i * 400) - camX * 0.5;
    if (hx > -250 && hx < CANVAS_W + 100) {
      ctx.beginPath();
      ctx.arc(hx + 200, 480, 180, Math.PI, 0);
      ctx.fill();
    }
  }
}
function drawCloud(ctx, x, y, scale) {
  ctx.beginPath();
  ctx.arc(x, y, 18 * scale, 0, Math.PI * 2);
  ctx.arc(x + 20 * scale, y - 5, 22 * scale, 0, Math.PI * 2);
  ctx.arc(x + 40 * scale, y, 18 * scale, 0, Math.PI * 2);
  ctx.arc(x + 25 * scale, y + 8, 16 * scale, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlatform(ctx, p, camX) {
  const x = Math.round(p.x - camX), y = Math.round(p.y);
  if (x + p.w < -50 || x > CANVAS_W + 50) return;     // 컬링

  if (p.type === "ground") {
    // 흙 본체
    const grad = ctx.createLinearGradient(0, y, 0, y + p.h);
    grad.addColorStop(0, "#7d4f2a");
    grad.addColorStop(1, "#4a2e15");
    ctx.fillStyle = grad;
    ctx.fillRect(x, y + 12, p.w, p.h - 12);
    // 잔디 (윗면)
    ctx.fillStyle = "#5fae3a";
    ctx.fillRect(x, y, p.w, 12);
    ctx.fillStyle = "#7dc857";
    ctx.fillRect(x, y, p.w, 4);
    // 잔디 디테일
    ctx.fillStyle = "#3f8c25";
    for (let i = 0; i < p.w; i += 16) {
      ctx.fillRect(x + i + 2, y + 10, 2, 2);
    }
  } else {
    // 공중 발판
    const grad = ctx.createLinearGradient(0, y, 0, y + p.h);
    grad.addColorStop(0, "#a87144");
    grad.addColorStop(1, "#6b3e1f");
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = "#c89060";
    ctx.fillRect(x, y, p.w, 3);
    ctx.fillStyle = "#3f230f";
    ctx.fillRect(x, y + p.h - 2, p.w, 2);
  }
}

function drawGoal(ctx, g, camX) {
  const x = Math.round(g.x - camX), y = Math.round(g.y);
  // 깃대
  ctx.fillStyle = "#b8b8b8";
  ctx.fillRect(x, y, g.w, g.h);
  ctx.fillStyle = "#dadada";
  ctx.fillRect(x, y, 2, g.h);
  // 깃대 끝 공
  ctx.fillStyle = "#ffd700";
  ctx.beginPath();
  ctx.arc(x + g.w / 2, y - 2, 6, 0, Math.PI * 2);
  ctx.fill();
  // 깃발 (펄럭임)
  const wave = Math.sin(game.bgT * 80) * 3;
  ctx.fillStyle = "#ff3355";
  ctx.beginPath();
  ctx.moveTo(x + g.w, y + 6);
  ctx.lineTo(x + g.w + 50, y + 12 + wave);
  ctx.lineTo(x + g.w + 50, y + 36 + wave);
  ctx.lineTo(x + g.w, y + 36);
  ctx.fill();
  ctx.fillStyle = "#bb223e";
  ctx.beginPath();
  ctx.moveTo(x + g.w, y + 36);
  ctx.lineTo(x + g.w + 50, y + 36 + wave);
  ctx.lineTo(x + g.w, y + 38);
  ctx.fill();
  // 별 표시
  ctx.fillStyle = "#fff";
  ctx.font = "bold 16px sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("★", x + g.w + 25, y + 28 + wave);
  ctx.textAlign = "left";
}

function drawHUD(ctx) {
  // 상단 바 배경
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, CANVAS_W, 44);

  ctx.font = "bold 14px sans-serif";
  ctx.fillStyle = "#fff";
  ctx.textBaseline = "middle";
  ctx.textAlign = "left";

  // 목숨 (하트)
  ctx.fillText(LANG_DATA.hudLives, 14, 22);
  for (let i = 0; i < game.lives; i++) {
    drawHeart(ctx, 60 + i * 20, 22, 6, "#ff4477");
  }
  for (let i = game.lives; i < 3; i++) {
    drawHeart(ctx, 60 + i * 20, 22, 6, "#444");
  }

  // 코인
  ctx.fillStyle = "#ffe066";
  ctx.beginPath();
  ctx.arc(140, 22, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = "#a86f00";
  ctx.fillRect(138, 18, 1, 8);
  ctx.fillStyle = "#fff";
  ctx.fillText(`${game.coinsCollected} / ${game.totalCoins}`, 154, 22);

  // 점수
  ctx.fillText(LANG_DATA.hudScore, 240, 22);
  ctx.fillStyle = "#ffe066";
  ctx.fillText(String(game.score).padStart(6, "0"), 280, 22);

  // 최고
  ctx.fillStyle = "#fff";
  ctx.fillText(LANG_DATA.hudHigh, 380, 22);
  ctx.fillStyle = "#aaffaa";
  ctx.fillText(String(game.highScore).padStart(6, "0"), 414, 22);

  // 진행도 (오른쪽)
  const barX = 580, barY = 14, barW = 290, barH = 16;
  ctx.fillStyle = "#fff";
  ctx.fillText(LANG_DATA.hudProgress, 530, 22);
  ctx.fillStyle = "rgba(255,255,255,0.2)";
  ctx.fillRect(barX, barY, barW, barH);
  const prog = Math.min(1, Math.max(0, game.player.x / (game.goal ? game.goal.x : STAGE_W)));
  const grad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  grad.addColorStop(0, "#5fd0ff");
  grad.addColorStop(1, "#ffa3f7");
  ctx.fillStyle = grad;
  ctx.fillRect(barX, barY, barW * prog, barH);
  ctx.strokeStyle = "rgba(255,255,255,0.5)";
  ctx.strokeRect(barX, barY, barW, barH);
  // 진행 마커
  ctx.fillStyle = "#fff";
  ctx.beginPath();
  ctx.arc(barX + barW * prog, barY + barH / 2, 4, 0, Math.PI * 2);
  ctx.fill();
  // 골 표시
  ctx.fillStyle = "#ffd700";
  ctx.fillText("★", barX + barW + 4, barY + barH / 2);

  ctx.textBaseline = "alphabetic";
}

function drawHeart(ctx, cx, cy, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(cx - size * 0.5, cy - 1, size * 0.5, 0, Math.PI * 2);
  ctx.arc(cx + size * 0.5, cy - 1, size * 0.5, 0, Math.PI * 2);
  ctx.moveTo(cx - size, cy);
  ctx.lineTo(cx, cy + size);
  ctx.lineTo(cx + size, cy);
  ctx.closePath();
  ctx.fill();
}

function drawMenu(ctx) {
  // 게임 월드를 살짝 보여주기 위해 한번 그림
  drawWorld(ctx);

  // 어두운 오버레이
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // 타이틀
  ctx.textAlign = "center";
  const t = Date.now() * 0.003;
  ctx.save();
  ctx.translate(CANVAS_W / 2, 150 + Math.sin(t) * 4);
  ctx.font = "bold 64px sans-serif";
  ctx.fillStyle = "#000";
  ctx.fillText(LANG_DATA.title, 4, 4);
  const tg = ctx.createLinearGradient(0, -40, 0, 30);
  tg.addColorStop(0, "#ffe066");
  tg.addColorStop(1, "#ff6b9d");
  ctx.fillStyle = tg;
  ctx.fillText(LANG_DATA.title, 0, 0);
  ctx.restore();

  ctx.font = "bold 18px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.fillText(LANG_DATA.subtitle, CANVAS_W / 2, 188);

  // 시작 안내 (깜빡임)
  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.font = "bold 22px sans-serif";
    ctx.fillStyle = "#fff";
    ctx.fillText(LANG_DATA.startPrompt, CANVAS_W / 2, 280);
  }

  // 조작법
  ctx.font = "bold 16px sans-serif";
  ctx.fillStyle = "#ffe066";
  ctx.fillText(LANG_DATA.controlsTitle, CANVAS_W / 2, 350);
  ctx.font = "14px sans-serif";
  ctx.fillStyle = "rgba(255,255,255,0.85)";
  ctx.fillText(LANG_DATA.controlMove, CANVAS_W / 2, 380);
  ctx.fillText(LANG_DATA.controlJump, CANVAS_W / 2, 402);
  ctx.fillText(LANG_DATA.controlPause + "      " + LANG_DATA.controlRestart, CANVAS_W / 2, 424);

  // 최고 기록
  ctx.font = "bold 14px sans-serif";
  ctx.fillStyle = "rgba(170,255,170,0.9)";
  ctx.fillText(`${LANG_DATA.bestScore}: ${String(game.highScore).padStart(6, "0")}`, CANVAS_W / 2, 480);

  ctx.textAlign = "left";
}

function drawCenterPanel(ctx, title, titleColor, subtitle, subtitleColor) {
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  ctx.textAlign = "center";
  ctx.font = "bold 60px sans-serif";
  ctx.fillStyle = "#000";
  ctx.fillText(title, CANVAS_W / 2 + 3, 200 + 3);
  ctx.fillStyle = titleColor;
  ctx.fillText(title, CANVAS_W / 2, 200);

  ctx.font = "bold 22px sans-serif";
  ctx.fillStyle = "#fff";
  ctx.fillText(`${LANG_DATA.finalScore}: ${String(game.score).padStart(6, "0")}`, CANVAS_W / 2, 260);
  ctx.fillStyle = "#aaffaa";
  ctx.font = "16px sans-serif";
  ctx.fillText(`${LANG_DATA.bestScore}: ${String(game.highScore).padStart(6, "0")}`, CANVAS_W / 2, 290);

  if (game.newRecord) {
    ctx.font = "bold 20px sans-serif";
    const flash = Math.floor(Date.now() / 250) % 2 === 0;
    ctx.fillStyle = flash ? "#ffe066" : "#ffaa33";
    ctx.fillText(LANG_DATA.newRecord, CANVAS_W / 2, 325);
  }

  // 코인 수집 표시
  ctx.font = "16px sans-serif";
  ctx.fillStyle = "#ffe066";
  ctx.fillText(`${LANG_DATA.hudCoins}: ${game.coinsCollected} / ${game.totalCoins}`, CANVAS_W / 2, 360);

  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.font = "bold 18px sans-serif";
    ctx.fillStyle = subtitleColor || "#fff";
    ctx.fillText(subtitle, CANVAS_W / 2, 430);
  }
  ctx.textAlign = "left";
}

function drawPaused(ctx) {
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
  ctx.textAlign = "center";
  ctx.font = "bold 56px sans-serif";
  ctx.fillStyle = "#fff";
  ctx.fillText(LANG_DATA.pausedTitle, CANVAS_W / 2, 250);
  if (Math.floor(Date.now() / 500) % 2 === 0) {
    ctx.font = "bold 18px sans-serif";
    ctx.fillStyle = "#ffe066";
    ctx.fillText(LANG_DATA.resumePrompt, CANVAS_W / 2, 310);
  }
  ctx.textAlign = "left";
}

function drawIntro(ctx) {
  ctx.textAlign = "center";
  ctx.font = "bold 64px sans-serif";
  const alpha = game.introT < 30 ? game.introT / 30 : (game.introT > 70 ? (90 - game.introT) / 20 : 1);
  ctx.globalAlpha = Math.max(0, alpha);
  ctx.fillStyle = "#000";
  ctx.fillText(game.introMsg, CANVAS_W / 2 + 3, 280 + 3);
  ctx.fillStyle = game.introMsg === LANG_DATA.go ? "#ff6b9d" : "#ffe066";
  ctx.fillText(game.introMsg, CANVAS_W / 2, 280);
  ctx.globalAlpha = 1;
  ctx.textAlign = "left";
}

// 월드(스테이지) 렌더링 - 메뉴 배경에서도 재사용
function drawWorld(ctx) {
  drawBackground(ctx, game.cameraX);

  // 화면 셰이크
  ctx.save();
  if (game.shake > 0.1) {
    const sx = (Math.random() - 0.5) * game.shake;
    const sy = (Math.random() - 0.5) * game.shake;
    ctx.translate(sx, sy);
  }

  // 발판
  for (const p of game.platforms) drawPlatform(ctx, p, game.cameraX);

  // 코인
  for (const c of game.coins) c.draw(ctx, game.cameraX);

  // 골 깃발
  if (game.goal) drawGoal(ctx, game.goal, game.cameraX);

  // 적
  for (const e of game.enemies) e.draw(ctx, game.cameraX);

  // 플레이어
  if (!game.player.dead || game.state === STATES.DYING) game.player.draw(ctx, game.cameraX);

  // 파티클 + 플로트 텍스트
  for (const p of game.particles) p.draw(ctx, game.cameraX);
  for (const f of game.floats) f.draw(ctx, game.cameraX);

  ctx.restore();
}

function render() {
  // 메뉴 상태에서는 별도로 처리
  if (game.state === STATES.MENU) {
    drawMenu(ctx);
    return;
  }

  drawWorld(ctx);
  drawHUD(ctx);

  if (game.state === STATES.PAUSED) drawPaused(ctx);
  else if (game.state === STATES.INTRO) drawIntro(ctx);
  else if (game.state === STATES.GAMEOVER)
    drawCenterPanel(ctx, LANG_DATA.gameOverTitle, "#ff5577", LANG_DATA.retryPrompt, "#fff");
  else if (game.state === STATES.CLEAR)
    drawCenterPanel(ctx, LANG_DATA.clearTitle, "#ffe066", LANG_DATA.retryPrompt, "#aaffaa");
}

/* ========================================================
 *  게임 루프
 * ======================================================== */
let lastT = performance.now();
function loop(now) {
  // 프레임 보정 (60fps 가정)
  const dt = Math.min(40, now - lastT);
  lastT = now;
  // 작은 프레임 단위로 시뮬레이션 (안정적인 충돌)
  let acc = dt;
  while (acc > 0) {
    const step = Math.min(acc, 16.67);
    // 한 프레임 분량(16.67ms)당 1회 update — 단순 fixed-step 근사
    update();
    acc -= step;
    if (acc < 8) break;     // 한 루프에 1번까지만 (입력 중복 방지)
  }
  render();
  requestAnimationFrame(loop);
}

// 부팅
game.fullReset();           // 데이터 초기화 (메뉴 배경에 보일 월드)
requestAnimationFrame((t) => { lastT = t; loop(t); });

// 페이지 클릭시 캔버스 포커스 (게임패드/오디오 정책 보조)
canvas.addEventListener("click", () => { sfx.init(); sfx.resume(); });
</script>
