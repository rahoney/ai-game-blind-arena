<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Blind Arena - 2D Platformer</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        #game-container {
            box-shadow: 0 0 20px rgba(0,0,0,0,5);
            border: 4px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
/**
 * LANG_DATA: 게임 내 모든 텍스트를 관리하는 객체
 * 추후 다른 언어로 번역 시 이 객체만 수정하면 됩니다.
 */
const LANG_DATA = {
    TITLE: "AI BLIND ARENA",
    SUBTITLE: "The Brave Pixel",
    START: "게임 시작 (SPACE)",
    GAMEOVER: "게임 오버",
    RETRY: "다시 도전하시겠습니까? (SPACE)",
    CLEAR: "스테이지 클리어!",
    TOTAL_SCORE: "최종 점수: ",
    HIGH_SCORE: "최고 기록: ",
    LIVES: "남은 목숨: ",
    SCORE: "점수: ",
    PROGRESS: "진행도: ",
    GOAL: "목표 지점에 도달하세요!",
    CONGRATS: "축하합니다! 모든 시련을 통과했습니다."
};

// 게임 설정 상수
const CONFIG = {
    WIDTH: 800,
    HEIGHT: 600,
    WORLD_WIDTH: 4000, // 화면 너비의 5배
    GRAVITY: 1200,
    PLAYER_SPEED: 300,
    JUMP_FORCE: -550,
    COYOTE_TIME: 150, // ms
    JUMP_BUFFER: 150  // ms
};

class MainGame extends Phaser.Scene {
    constructor() {
        super('MainGame');
    }

    init() {
        // 게임 상태 초기화
        this.score = 0;
        this.lives = 3;
        this.isGameOver = false;
        this.isClear = false;
        this.canJump = true;
        this.lastOnGroundTime = 0;
        this.jumpBufferTime = 0;
    }

    preload() {
        // 별도의 이미지 파일 없이 그래픽 자산 생성
        this.createTextures();
    }

    createTextures() {
        // 플레이어 텍스처 (파란색 사각형 + 눈)
        let pGraphic = this.make.graphics({ x: 0, y: 0, add: false });
        pGraphic.fillStyle(0x3498db, 1);
        pGraphic.fillRect(0, 0, 32, 32);
        pGraphic.fillStyle(0xffffff, 1);
        pGraphic.fillRect(20, 5, 8, 8);
        pGraphic.generateTexture('player', 32, 32);

        // 타일 (지형)
        let tGraphic = this.make.graphics({ x: 0, y: 0, add: false });
        tGraphic.fillStyle(0x2ecc71, 1);
        tGraphic.fillRect(0, 0, 40, 40);
        tGraphic.lineStyle(2, 0x27ae60);
        tGraphic.strokeRect(0, 0, 40, 40);
        tGraphic.generateTexture('tile', 40, 40);

        // 적 1 (순찰형 - 빨간색)
        let e1Graphic = this.make.graphics({ x: 0, y: 0, add: false });
        e1Graphic.fillStyle(0xe74c3c, 1);
        e1Graphic.fillTriangle(0, 32, 16, 0, 32, 32);
        e1Graphic.generateTexture('enemy1', 32, 32);

        // 적 2 (점프형 - 주황색)
        let e2Graphic = this.make.graphics({ x: 0, y: 0, add: false });
        e2Graphic.fillStyle(0xe67e22, 1);
        e2Graphic.fillCircle(16, 16, 16);
        e2Graphic.generateTexture('enemy2', 32, 32);

        // 아이템 (코인)
        let cGraphic = this.make.graphics({ x: 0, y: 0, add: false });
        cGraphic.fillStyle(0xf1c40f, 1);
        cGraphic.fillCircle(10, 10, 10);
        cGraphic.generateTexture('coin', 20, 20);

        // 목표 지점 (깃발)
        let fGraphic = this.make.graphics({ x: 0, y: 0, add: false });
        fGraphic.fillStyle(0xffffff, 1);
        fGraphic.fillRect(0, 0, 5, 60);
        fGraphic.fillStyle(0xe74c3c, 1);
        fGraphic.fillRect(5, 0, 30, 20);
        fGraphic.generateTexture('flag', 40, 60);
    }

    create() {
        // 월드 경계 설정
        this.physics.world.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.HEIGHT);

        // 배경색
        this.cameras.main.setBackgroundColor('#2c3e50');

        // 플랫폼 그룹 생성
        this.platforms = this.physics.add.staticGroup();
        this.generateLevel();

        // 플레이어 설정
        this.player = this.physics.add.sprite(100, 400, 'player');
        this.player.setCollideWorldBounds(true);
        this.player.body.setGravityY(CONFIG.GRAVITY);
        
        // 카메라 설정
        this.cameras.main.startFollow(this.player, true, 0.1, 0.1);
        this.cameras.main.setBounds(0, 0, CONFIG.WORLD_WIDTH, CONFIG.HEIGHT);

        // 입력 설정
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.W,
            left: Phaser.Input.Keyboard.KeyCodes.A,
            right: Phaser.Input.Keyboard.KeyCodes.D
        });

        // 충돌 설정
        this.physics.add.collider(this.player, this.platforms);

        // 적 그룹
        this.enemies = this.physics.add.group();
        this.createEnemies();
        this.physics.add.collider(this.enemies, this.platforms);
        this.physics.add.overlap(this.player, this.enemies, this.handlePlayerHit, null, this);

        // 코인 그룹
        this.coins = this.physics.add.group();
        this.createCoins();
        this.physics.add.overlap(this.player, this.coins, this.collectCoin, null, this);

        // 골 지점
        this.goal = this.physics.add.sprite(CONFIG.WORLD_WIDTH - 100, 450, 'flag');
        this.physics.add.collider(this.goal, this.platforms);
        this.physics.add.overlap(this.player, this.goal, this.reachGoal, null, this);

        // UI 생성
        this.createUI();
        
        // 오디오 초기화 (Web Audio API 활용 간단한 사운드)
        this.initSounds();
    }

    generateLevel() {
        // 기본 바닥
        for(let x = 0; x < CONFIG.WORLD_WIDTH; x += 40) {
            // 군데군데 낭떠러지 생성
            if (x > 400 && x < 480) continue;
            if (x > 1200 && x < 1360) continue;
            if (x > 2200 && x < 2400) continue;
            if (x > 3200 && x < 3320) continue;
            this.platforms.create(x, 580, 'tile');
        }

        // 공중 발판 (절차적 배치 느낌의 고정 리스트)
        const platformsPos = [
            {x: 600, y: 450}, {x: 800, y: 350}, {x: 1000, y: 450},
            {x: 1450, y: 400}, {x: 1600, y: 300}, {x: 1800, y: 400},
            {x: 2100, y: 350}, {x: 2500, y: 450}, {x: 2700, y: 350},
            {x: 2900, y: 250}, {x: 3100, y: 350}, {x: 3500, y: 450}
        ];

        platformsPos.forEach(p => {
            for(let i=0; i<3; i++) {
                this.platforms.create(p.x + (i*40), p.y, 'tile');
            }
        });
    }

    createEnemies() {
        // 타입 1: 순찰형 적
        const patrolPoints = [900, 1700, 2600, 3600];
        patrolPoints.forEach(x => {
            let e = this.enemies.create(x, 500, 'enemy1');
            e.setBounce(0).setCollideWorldBounds(true).setVelocityX(-150);
            e.type = 'patrol';
        });

        // 타입 2: 점프형 적
        const jumperPoints = [1500, 2900];
        jumperPoints.forEach(x => {
            let e = this.enemies.create(x, 500, 'enemy2');
            e.setBounce(0.5).setCollideWorldBounds(true);
            e.type = 'jumper';
        });
    }

    createCoins() {
        for (let i = 0; i < 20; i++) {
            let x = Phaser.Math.Between(200, CONFIG.WORLD_WIDTH - 200);
            let y = Phaser.Math.Between(200, 500);
            this.coins.create(x, y, 'coin').setBounceY(0.4);
        }
        this.physics.add.collider(this.coins, this.platforms);
    }

    createUI() {
        this.uiContainer = this.add.container(0, 0).setScrollFactor(0);
        this.scoreText = this.add.text(20, 20, `${LANG_DATA.SCORE}0`, { fontSize: '24px', fill: '#fff', stroke: '#000', strokeThickness: 4 });
        this.livesText = this.add.text(20, 50, `${LANG_DATA.LIVES}${this.lives}`, { fontSize: '20px', fill: '#ff4d4d', stroke: '#000', strokeThickness: 3 });
        this.progressText = this.add.text(20, 80, `${LANG_DATA.PROGRESS}0%`, { fontSize: '18px', fill: '#2ecc71' });
        
        this.uiContainer.add([this.scoreText, this.livesText, this.progressText]);

        // 결과 화면 (숨김 상태)
        this.overlay = this.add.rectangle(CONFIG.WIDTH/2, CONFIG.HEIGHT/2, CONFIG.WIDTH, CONFIG.HEIGHT, 0x000000, 0.7)
            .setScrollFactor(0).setVisible(false).setDepth(100);
        this.resultText = this.add.text(CONFIG.WIDTH/2, CONFIG.HEIGHT/2 - 50, '', { fontSize: '48px', fill: '#fff' })
            .setOrigin(0.5).setScrollFactor(0).setVisible(false).setDepth(101);
        this.retryText = this.add.text(CONFIG.WIDTH/2, CONFIG.HEIGHT/2 + 50, LANG_DATA.RETRY, { fontSize: '24px', fill: '#fff' })
            .setOrigin(0.5).setScrollFactor(0).setVisible(false).setDepth(101);
    }

    initSounds() {
        // 간단한 비프음을 위한 오디오 컨텍스트
        this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    playSound(freq, type = 'square', duration = 0.1) {
        if (!this.audioCtx) return;
        const osc = this.audioCtx.createOscillator();
        const gain = this.audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(this.audioCtx.destination);
        osc.start();
        osc.stop(this.audioCtx.currentTime + duration);
    }

    update(time, delta) {
        if (this.isGameOver || this.isClear) {
            if (this.cursors.space.isDown) {
                this.scene.restart();
            }
            return;
        }

        // 진행도 업데이트
        let progress = Math.floor((this.player.x / CONFIG.WORLD_WIDTH) * 100);
        this.progressText.setText(`${LANG_DATA.PROGRESS}${progress}%`);

        // 이동 로직
        if (this.cursors.left.isDown || this.wasd.left.isDown) {
            this.player.setVelocityX(-CONFIG.PLAYER_SPEED);
            this.player.flipX = true;
        } else if (this.cursors.right.isDown || this.wasd.right.isDown) {
            this.player.setVelocityX(CONFIG.PLAYER_SPEED);
            this.player.flipX = false;
        } else {
            this.player.setVelocityX(0);
        }

        // 점프 로직 (코요테 타임 & 점프 버퍼)
        const onFloor = this.player.body.blocked.down;
        if (onFloor) {
            this.lastOnGroundTime = time;
        }

        const isJumpPressed = Phaser.Input.Keyboard.JustDown(this.cursors.up) || 
                             Phaser.Input.Keyboard.JustDown(this.cursors.space) || 
                             Phaser.Input.Keyboard.JustDown(this.wasd.up);

        if (isJumpPressed) {
            this.jumpBufferTime = time;
        }

        const canCoyoteJump = (time - this.lastOnGroundTime) < CONFIG.COYOTE_TIME;
        const hasJumpBuffer = (time - this.jumpBufferTime) < CONFIG.JUMP_BUFFER;

        if (hasJumpBuffer && canCoyoteJump && this.canJump) {
            this.player.setVelocityY(CONFIG.JUMP_FORCE);
            this.lastOnGroundTime = 0;
            this.jumpBufferTime = 0;
            this.playSound(440, 'sine'); // 점프 효과음
        }

        // 가변 점프 높이 (키를 떼면 위쪽 속도 감소)
        if (!this.cursors.up.isDown && !this.cursors.space.isDown && !this.wasd.up.isDown && this.player.body.velocity.y < 0) {
            this.player.body.velocity.y *= 0.8;
        }

        // 낙사 판정
        if (this.player.y > CONFIG.HEIGHT - 20) {
            this.handlePlayerHit();
        }

        // 적 AI 동작
        this.enemies.getChildren().forEach(e => {
            if (e.type === 'patrol') {
                if (e.body.blocked.left) e.setVelocityX(150);
                if (e.body.blocked.right) e.setVelocityX(-150);
            } else if (e.type === 'jumper') {
                if (e.body.blocked.down && Phaser.Math.Between(0, 100) > 98) {
                    e.setVelocityY(-400);
                }
            }
        });

        // 게임패드 지원 (연결된 경우)
        if (this.input.gamepad.total > 0) {
            const pad = this.input.gamepad.getPad(0);
            if (pad.left) this.player.setVelocityX(-CONFIG.PLAYER_SPEED);
            else if (pad.right) this.player.setVelocityX(CONFIG.PLAYER_SPEED);
            if (pad.A && onFloor) this.player.setVelocityY(CONFIG.JUMP_FORCE);
        }
    }

    collectCoin(player, coin) {
        coin.disableBody(true, true);
        this.score += 10;
        this.scoreText.setText(`${LANG_DATA.SCORE}${this.score}`);
        this.playSound(880, 'sine', 0.05);
    }

    handlePlayerHit() {
        if (this.player.alpha < 1) return; // 무적 시간 체크

        this.lives--;
        this.livesText.setText(`${LANG_DATA.LIVES}${this.lives}`);
        this.playSound(110, 'sawtooth', 0.2);

        if (this.lives <= 0) {
            this.gameOver();
        } else {
            // 데미지 입었을 때 일시적 무적 및 위치 초기화
            this.player.setAlpha(0.5);
            this.player.setPosition(this.player.x - 100, 400);
            this.time.addEvent({
                delay: 1000,
                callback: () => this.player.setAlpha(1),
                callbackScope: this
            });
        }
    }

    reachGoal() {
        if (this.isClear) return;
        this.isClear = true;
        this.player.setVelocity(0, 0);
        this.player.body.allowGravity = false;
        
        // 최고 기록 저장
        const best = localStorage.getItem('bestScore') || 0;
        if (this.score > best) localStorage.setItem('bestScore', this.score);

        this.showEndScreen(LANG_DATA.CLEAR, '#2ecc71');
        this.playSound(523.25, 'sine', 0.5); // 도-미-솔 느낌
        setTimeout(() => this.playSound(659.25, 'sine', 0.5), 100);
        setTimeout(() => this.playSound(783.99, 'sine', 0.5), 200);
    }

    gameOver() {
        this.isGameOver = true;
        this.physics.pause();
        this.player.setTint(0xff0000);
        this.showEndScreen(LANG_DATA.GAMEOVER, '#e74c3c');
    }

    showEndScreen(msg, color) {
        const best = localStorage.getItem('bestScore') || 0;
        this.overlay.setVisible(true);
        this.resultText.setText(msg).setFill(color).setVisible(true);
        this.retryText.setText(`${LANG_DATA.TOTAL_SCORE}${this.score}\n${LANG_DATA.HIGH_SCORE}${best}\n\n${LANG_DATA.RETRY}`).setVisible(true);
    }
}

// 시작 메뉴 씬
class StartMenu extends Phaser.Scene {
    constructor() {
        super('StartMenu');
    }
    create() {
        this.cameras.main.setBackgroundColor('#1a1a1a');
        this.add.text(CONFIG.WIDTH/2, CONFIG.HEIGHT/2 - 100, LANG_DATA.TITLE, { fontSize: '64px', fill: '#3498db', fontWeight: 'bold' }).setOrigin(0.5);
        this.add.text(CONFIG.WIDTH/2, CONFIG.HEIGHT/2 - 30, LANG_DATA.SUBTITLE, { fontSize: '24px', fill: '#bdc3c7' }).setOrigin(0.5);
        this.add.text(CONFIG.WIDTH/2, CONFIG.HEIGHT/2 + 80, LANG_DATA.START, { fontSize: '28px', fill: '#fff' }).setOrigin(0.5);
        
        this.input.keyboard.once('keydown-SPACE', () => {
            this.scene.start('MainGame');
        });
    }
}

const config = {
    type: Phaser.AUTO,
    width: CONFIG.WIDTH,
    height: CONFIG.HEIGHT,
    parent: 'game-container',
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: CONFIG.GRAVITY },
            debug: false
        }
    },
    input: {
        gamepad: true
    },
    scene: [StartMenu, MainGame]
};

const game = new Phaser.Game(config);
</script>

</body>
</html>
