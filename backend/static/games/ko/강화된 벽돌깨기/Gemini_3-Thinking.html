<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Brick Breaker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary-color: #38bdf8;
            --accent-color: #f43f5e;
            --text-color: #f8fafc;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; color: var(--primary-color); }
        p { font-size: 1.2rem; margin-bottom: 20px; opacity: 0.8; }

        button {
            padding: 12px 32px;
            font-size: 1.1rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #0ea5e9;
            transform: scale(1.05);
        }

        .hidden { display: none !important; }

        #score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="score-display">SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="start-screen" class="overlay">
        <h1>NEON BREAKER</h1>
        <p>방향키로 패들을 조작하세요</p>
        <button onclick="startGame()">게임 시작</button>
    </div>

    <div id="result-screen" class="overlay hidden">
        <h1 id="result-title">GAME OVER</h1>
        <p id="result-score">최종 점수: 0</p>
        <button onclick="startGame()">다시 시작</button>
    </div>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("score-display");
    const startScreen = document.getElementById("start-screen");
    const resultScreen = document.getElementById("result-screen");
    const resultTitle = document.getElementById("result-title");
    const resultScore = document.getElementById("result-score");

    // 게임 설정
    canvas.width = 800;
    canvas.height = 600;

    let score = 0;
    let gameRunning = false;
    
    // 객체 상태 변수
    let paddle, ball, bricks, particles, items;
    let rightPressed = false;
    let leftPressed = false;

    // 상수 설정
    const PADDLE_HEIGHT = 12;
    const INITIAL_PADDLE_WIDTH = 120;
    const BALL_RADIUS = 8;
    const BRICK_ROWS = 6;
    const BRICK_COLS = 9;
    const BRICK_PADDING = 10;
    const BRICK_OFFSET_TOP = 60;
    const BRICK_OFFSET_LEFT = 35;
    const BRICK_WIDTH = 75;
    const BRICK_HEIGHT = 24;

    // 색상 배열
    const COLORS = ['#f43f5e', '#fbbf24', '#34d399', '#38bdf8', '#a855f7', '#f472b6'];

    function initGame() {
        score = 0;
        scoreDisplay.innerText = `SCORE: ${score}`;
        gameRunning = true;
        
        paddle = {
            x: canvas.width / 2 - INITIAL_PADDLE_WIDTH / 2,
            y: canvas.height - 30,
            width: INITIAL_PADDLE_WIDTH,
            height: PADDLE_HEIGHT,
            dx: 8
        };

        ball = {
            x: canvas.width / 2,
            y: canvas.height - 50,
            dx: 4 * (Math.random() > 0.5 ? 1 : -1),
            dy: -4,
            radius: BALL_RADIUS
        };

        bricks = [];
        for (let c = 0; c < BRICK_COLS; c++) {
            bricks[c] = [];
            for (let r = 0; r < BRICK_ROWS; r++) {
                // 아이템 확률 (15%)
                const hasItem = Math.random() < 0.15;
                bricks[c][r] = { x: 0, y: 0, status: 1, color: COLORS[r], hasItem: hasItem };
            }
        }

        particles = [];
        items = [];
    }

    // 키보드 이벤트
    document.addEventListener("keydown", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
        if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
    });
    document.addEventListener("keyup", (e) => {
        if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
        if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
    });

    // 파티클 생성 로직
    function createParticles(x, y, color) {
        for (let i = 0; i < 8; i++) {
            particles.push({
                x: x,
                y: y,
                dx: (Math.random() - 0.5) * 6,
                dy: (Math.random() - 0.5) * 6,
                radius: Math.random() * 3 + 1,
                color: color,
                life: 1.0
            });
        }
    }

    // 아이템 생성
    function spawnItem(x, y) {
        items.push({
            x: x,
            y: y,
            width: 20,
            height: 20,
            dy: 3,
            type: Math.random() > 0.5 ? 'WIDE' : 'FAST' // 패들 확장 또는 공 속도 증가
        });
    }

    function collisionDetection() {
        for (let c = 0; c < BRICK_COLS; c++) {
            for (let r = 0; r < BRICK_ROWS; r++) {
                let b = bricks[c][r];
                if (b.status === 1) {
                    if (ball.x > b.x && ball.x < b.x + BRICK_WIDTH && ball.y > b.y && ball.y < b.y + BRICK_HEIGHT) {
                        ball.dy = -ball.dy;
                        b.status = 0;
                        score += 10;
                        scoreDisplay.innerText = `SCORE: ${score}`;
                        createParticles(b.x + BRICK_WIDTH / 2, b.y + BRICK_HEIGHT / 2, b.color);
                        
                        if (b.hasItem) spawnItem(b.x + BRICK_WIDTH / 2, b.y + BRICK_HEIGHT);

                        if (score === BRICK_ROWS * BRICK_COLS * 10) endGame(true);
                    }
                }
            }
        }
    }

    function update() {
        if (!gameRunning) return;

        // 패들 이동
        if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.dx;
        else if (leftPressed && paddle.x > 0) paddle.x -= paddle.dx;

        // 공 이동 및 벽 충돌
        ball.x += ball.dx;
        ball.y += ball.dy;

        if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) ball.dx = -ball.dx;
        if (ball.y - ball.radius < 0) ball.dy = -ball.dy;

        // 패들 충돌
        if (ball.y + ball.radius > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
            // 충돌 위치에 따른 각도 변화
            let hitPos = (ball.x - (paddle.x + paddle.width / 2)) / (paddle.width / 2);
            ball.dx = hitPos * 5;
            ball.dy = -Math.abs(ball.dy);
        } else if (ball.y + ball.radius > canvas.height) {
            endGame(false);
        }

        collisionDetection();

        // 파티클 업데이트
        particles.forEach((p, index) => {
            p.x += p.dx;
            p.y += p.dy;
            p.life -= 0.02;
            if (p.life <= 0) particles.splice(index, 1);
        });

        // 아이템 업데이트 및 획득
        items.forEach((item, index) => {
            item.y += item.dy;
            if (item.y > paddle.y && item.y < paddle.y + paddle.height && item.x > paddle.x && item.x < paddle.x + paddle.width) {
                applyItem(item.type);
                items.splice(index, 1);
            } else if (item.y > canvas.height) {
                items.splice(index, 1);
            }
        });
    }

    function applyItem(type) {
        if (type === 'WIDE') {
            paddle.width = 200;
            setTimeout(() => { paddle.width = INITIAL_PADDLE_WIDTH; }, 8000);
        } else if (type === 'FAST') {
            ball.dx *= 1.3;
            ball.dy *= 1.3;
            setTimeout(() => { ball.dx /= 1.3; ball.dy /= 1.3; }, 5000);
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 벽돌 그리기
        for (let c = 0; c < BRICK_COLS; c++) {
            for (let r = 0; r < BRICK_ROWS; r++) {
                if (bricks[c][r].status === 1) {
                    let bX = c * (BRICK_WIDTH + BRICK_PADDING) + BRICK_OFFSET_LEFT;
                    let bY = r * (BRICK_HEIGHT + BRICK_PADDING) + BRICK_OFFSET_TOP;
                    bricks[c][r].x = bX;
                    bricks[c][r].y = bY;
                    ctx.beginPath();
                    ctx.roundRect(bX, bY, BRICK_WIDTH, BRICK_HEIGHT, 4);
                    ctx.fillStyle = bricks[c][r].color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = bricks[c][r].color;
                    ctx.fill();
                    ctx.closePath();
                }
            }
        }
        ctx.shadowBlur = 0;

        // 패들 그리기
        ctx.beginPath();
        ctx.roundRect(paddle.x, paddle.y, paddle.width, paddle.height, 6);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.closePath();

        // 공 그리기
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#fff";
        ctx.fill();
        ctx.closePath();
        ctx.shadowBlur = 0;

        // 파티클 그리기
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${hexToRgb(p.color)}, ${p.life})`;
            ctx.fill();
            ctx.closePath();
        });

        // 아이템 그리기
        items.forEach(item => {
            ctx.beginPath();
            ctx.rect(item.x, item.y, item.width, item.height);
            ctx.fillStyle = item.type === 'WIDE' ? '#fbbf24' : '#f43f5e';
            ctx.fill();
            ctx.closePath();
        });

        update();
        if (gameRunning) requestAnimationFrame(draw);
    }

    function hexToRgb(hex) {
        let r = parseInt(hex.slice(1, 3), 16);
        let g = parseInt(hex.slice(3, 5), 16);
        let b = parseInt(hex.slice(5, 7), 16);
        return `${r}, ${g}, ${b}`;
    }

    function startGame() {
        startScreen.classList.add("hidden");
        resultScreen.classList.add("hidden");
        initGame();
        draw();
    }

    function endGame(isWin) {
        gameRunning = false;
        resultScreen.classList.remove("hidden");
        resultTitle.innerText = isWin ? "YOU WIN!" : "GAME OVER";
        resultTitle.style.color = isWin ? "#34d399" : "#f43f5e";
        resultScore.innerText = `최종 점수: ${score}`;
    }
</script>

</body>
</html>
