<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Neon Breaker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: radial-gradient(ellipse at center, #1a1a2e 0%, #07070f 100%);
    color: #fff;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .game-wrap {
    position: relative;
    width: 600px;
    height: 700px;
  }
  canvas {
    display: block;
    background:
      radial-gradient(ellipse at top, rgba(80,120,255,0.10) 0%, transparent 60%),
      linear-gradient(180deg, #0f0f1e 0%, #1a1a2e 100%);
    border: 1px solid rgba(120, 200, 255, 0.25);
    border-radius: 14px;
    box-shadow:
      0 0 60px rgba(100, 150, 255, 0.25),
      inset 0 0 80px rgba(50, 80, 150, 0.15);
  }
  .hud {
    position: absolute;
    top: 14px; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 22px;
    pointer-events: none;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #a0c8ff;
    text-shadow: 0 0 12px rgba(100, 150, 255, 0.7);
    font-weight: 600;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(8, 8, 18, 0.82);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 14px;
    text-align: center;
    padding: 40px;
    transition: opacity 0.25s ease;
  }
  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  h1 {
    font-size: 52px;
    background: linear-gradient(135deg, #00f0ff 0%, #ff00aa 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 18px;
    letter-spacing: 6px;
    font-weight: 800;
  }
  h2 {
    font-size: 40px;
    margin-bottom: 14px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #00d4ff 0%, #7a00ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p {
    font-size: 15px;
    color: #c0d0f0;
    margin-bottom: 20px;
    line-height: 1.7;
  }
  button {
    padding: 14px 40px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #fff;
    background: linear-gradient(135deg, #00d4ff 0%, #7a00ff 100%);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 24px rgba(100, 150, 255, 0.55);
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 36px rgba(150, 100, 255, 0.85);
  }
  .controls {
    margin-top: 22px;
    font-size: 12px;
    color: #6a85b8;
    letter-spacing: 2px;
  }
  .legend {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 14px;
    margin: 8px 0 22px;
    font-size: 11px;
    color: #b0c4e0;
    letter-spacing: 1px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-dot {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    box-shadow: 0 0 8px currentColor;
  }
</style>
</head>
<body>
<div class="game-wrap">
  <canvas id="game" width="600" height="700"></canvas>

  <div class="hud">
    <div>SCORE <span id="score">0</span></div>
    <div>LEVEL <span id="level">1</span></div>
    <div>LIVES <span id="lives">♥♥♥</span></div>
  </div>

  <div id="startScreen" class="overlay">
    <h1>NEON BREAKER</h1>
    <p>방향키로 패들을 움직이고 Space로 공을 발사하세요<br>아이템을 받으면 즉시 능력이 적용됩니다</p>
    <div class="legend">
      <div class="legend-item" style="color:#00ff88"><div class="legend-dot" style="background:#00ff88"></div>EXPAND</div>
      <div class="legend-item" style="color:#00d4ff"><div class="legend-dot" style="background:#00d4ff"></div>MULTI</div>
      <div class="legend-item" style="color:#ffaa00"><div class="legend-dot" style="background:#ffaa00"></div>SLOW</div>
      <div class="legend-item" style="color:#ff3366"><div class="legend-dot" style="background:#ff3366"></div>LIFE</div>
    </div>
    <button onclick="startGame()">시작하기</button>
    <div class="controls">← → 이동 · SPACE 발사</div>
  </div>

  <div id="winScreen" class="overlay hidden">
    <h2>VICTORY</h2>
    <p>모든 벽돌을 격파했습니다!<br>최종 점수 <span id="winScore">0</span></p>
    <button onclick="resetGame()">다시 시작</button>
  </div>

  <div id="loseScreen" class="overlay hidden">
    <h2>GAME OVER</h2>
    <p>다음에 다시 도전해 보세요<br>최종 점수 <span id="loseScore">0</span></p>
    <button onclick="resetGame()">다시 시작</button>
  </div>
</div>

<script>
// === 기본 설정 ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

const STATE = { START: 0, PLAYING: 1, WIN: 2, LOSE: 3 };
let state = STATE.START;
let score = 0;
let lives = 3;
let level = 1;

// === 패들 ===
const paddle = {};
function resetPaddle() {
  paddle.w = 100;
  paddle.h = 14;
  paddle.x = W/2 - paddle.w/2;
  paddle.y = H - 50;
  paddle.speed = 8;
  paddle.expandTimer = 0;
}

// === 공 ===
let balls = [];
function spawnBall(x, y) {
  // stuck 상태로 시작 → 패들 위에 부착, Space로 발사
  balls.push({ x, y, r: 8, vx: 0, vy: 0, stuck: true, trail: [] });
}

// === 벽돌 ===
let bricks = [];
const COLS = 10, ROWS = 6;
const BW = 52, BH = 22, GAP = 4;
const OX = (W - (COLS * (BW + GAP) - GAP)) / 2;
const OY = 70;

function buildBricks() {
  bricks = [];
  const palette = [
    ['#ff0080', '#ff6b9d'],
    ['#7a00ff', '#b066ff'],
    ['#00d4ff', '#66e8ff'],
    ['#00ff88', '#88ffaa'],
    ['#ffaa00', '#ffd166'],
    ['#ff3366', '#ff7799']
  ];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      bricks.push({
        x: OX + c * (BW + GAP),
        y: OY + r * (BH + GAP),
        w: BW, h: BH,
        hp: r === 0 ? 2 : 1, // 최상단 줄은 단단함
        color: palette[r % palette.length],
        powerup: Math.random() < 0.18 ? randomPower() : null,
        alive: true
      });
    }
  }
}

// === 파티클 ===
const particles = [];
function spawnParticles(x, y, color, count = 20) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 1 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s,
      life: 30 + Math.random() * 25,
      max: 55,
      color,
      size: 1.5 + Math.random() * 3
    });
  }
}

// === 아이템 ===
const POWER = {
  EXPAND: { color: '#00ff88', label: 'E' },
  MULTI:  { color: '#00d4ff', label: 'M' },
  SLOW:   { color: '#ffaa00', label: 'S' },
  LIFE:   { color: '#ff3366', label: '♥' }
};
const POWER_KEYS = Object.keys(POWER);
function randomPower() {
  return POWER_KEYS[Math.floor(Math.random() * POWER_KEYS.length)];
}
let powerups = [];
function spawnPowerup(x, y, type) {
  powerups.push({ x: x - 16, y, w: 32, h: 16, vy: 2.2, type });
}

// 즉시 적용
function applyPower(type) {
  if (type === 'EXPAND') {
    paddle.w = Math.min(180, paddle.w + 40);
    paddle.expandTimer = 600; // 약 10초
  } else if (type === 'MULTI') {
    const src = balls.find(b => !b.stuck) || balls[0];
    if (src) {
      for (let i = 0; i < 2; i++) {
        const baseAng = Math.atan2(src.vy || -1, src.vx || 0);
        const ang = baseAng + (i ? 0.45 : -0.45);
        const sp = Math.max(5, Math.hypot(src.vx, src.vy));
        balls.push({
          x: src.x, y: src.y, r: 8,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp,
          stuck: false, trail: []
        });
      }
    }
  } else if (type === 'SLOW') {
    for (const b of balls) {
      const sp = Math.hypot(b.vx, b.vy);
      const newSp = Math.max(3.5, sp * 0.65);
      const ang = Math.atan2(b.vy, b.vx);
      b.vx = Math.cos(ang) * newSp;
      b.vy = Math.sin(ang) * newSp;
    }
  } else if (type === 'LIFE') {
    lives = Math.min(5, lives + 1);
  }
  updateHUD();
}

// === 입력 ===
const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowLeft', 'ArrowRight', ' '].includes(e.key)) e.preventDefault();
  keys[e.key] = true;
  if (e.key === ' ' && state === STATE.PLAYING) launchBalls();
});
window.addEventListener('keyup', e => keys[e.key] = false);

function launchBalls() {
  for (const b of balls) {
    if (b.stuck) {
      b.stuck = false;
      const a = -Math.PI/2 + (Math.random() - 0.5) * 0.6;
      b.vx = Math.cos(a) * 6;
      b.vy = Math.sin(a) * 6;
    }
  }
}

// === HUD ===
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const levelEl = document.getElementById('level');
function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  livesEl.textContent = lives > 0 ? '♥'.repeat(lives) : '—';
}

// === 화면 전환 ===
function show(id) {
  ['startScreen', 'winScreen', 'loseScreen'].forEach(s =>
    document.getElementById(s).classList.add('hidden'));
  if (id) document.getElementById(id).classList.remove('hidden');
}
function startGame() {
  // 처음 시작 시에도 안전하게 풀 리셋
  fullReset();
  state = STATE.PLAYING;
  show(null);
}
function resetGame() {
  fullReset();
  state = STATE.PLAYING;
  show(null);
}
function fullReset() {
  score = 0;
  lives = 3;
  level = 1;
  resetPaddle();
  balls = [];
  particles.length = 0;
  powerups = [];
  buildBricks();
  spawnBall(W/2, paddle.y - 12);
  updateHUD();
}
function endLevel() {
  state = STATE.WIN;
  document.getElementById('winScore').textContent = score;
  show('winScreen');
}
function gameOver() {
  state = STATE.LOSE;
  document.getElementById('loseScore').textContent = score;
  show('loseScreen');
}

// === 충돌 ===
function rectCircle(cx, cy, cr, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx*dx + dy*dy < cr*cr;
}

// === 업데이트 ===
function update() {
  // 패들 이동
  if (keys['ArrowLeft']) paddle.x -= paddle.speed;
  if (keys['ArrowRight']) paddle.x += paddle.speed;
  paddle.x = Math.max(0, Math.min(W - paddle.w, paddle.x));

  // EXPAND 타이머
  if (paddle.expandTimer > 0) {
    paddle.expandTimer--;
    if (paddle.expandTimer === 0) {
      const cx = paddle.x + paddle.w/2;
      paddle.w = 100;
      paddle.x = Math.max(0, Math.min(W - paddle.w, cx - paddle.w/2));
    }
  }

  // 공 처리
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.stuck) {
      b.x = paddle.x + paddle.w/2;
      b.y = paddle.y - b.r - 2;
      continue;
    }

    // 잔상 효과
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 8) b.trail.shift();

    b.x += b.vx;
    b.y += b.vy;

    // 벽 충돌
    if (b.x - b.r < 0) { b.x = b.r; b.vx = -b.vx; }
    if (b.x + b.r > W) { b.x = W - b.r; b.vx = -b.vx; }
    if (b.y - b.r < 0) { b.y = b.r; b.vy = -b.vy; }

    // 바닥 통과 → 공 제거
    if (b.y - b.r > H) {
      balls.splice(i, 1);
      continue;
    }

    // 패들 충돌 (각도는 패들 중심 기준)
    if (rectCircle(b.x, b.y, b.r, paddle.x, paddle.y, paddle.w, paddle.h) && b.vy > 0) {
      const hit = (b.x - (paddle.x + paddle.w/2)) / (paddle.w/2);
      const ang = hit * (Math.PI / 3);
      const sp = Math.max(5, Math.hypot(b.vx, b.vy));
      b.vx = Math.sin(ang) * sp;
      b.vy = -Math.abs(Math.cos(ang) * sp);
      b.y = paddle.y - b.r - 1;
    }

    // 벽돌 충돌
    for (const br of bricks) {
      if (!br.alive) continue;
      if (!rectCircle(b.x, b.y, b.r, br.x, br.y, br.w, br.h)) continue;

      // 직전 위치를 기준으로 측면/상하 판별
      const prevX = b.x - b.vx;
      const prevY = b.y - b.vy;
      const fromSide = prevX < br.x || prevX > br.x + br.w;
      const fromTopBot = prevY < br.y || prevY > br.y + br.h;
      if (fromSide && !fromTopBot) b.vx = -b.vx;
      else if (fromTopBot && !fromSide) b.vy = -b.vy;
      else { b.vx = -b.vx; b.vy = -b.vy; }

      br.hp--;
      if (br.hp <= 0) {
        br.alive = false;
        score += 10 * level;
        spawnParticles(br.x + br.w/2, br.y + br.h/2, br.color[0]);
        if (br.powerup) spawnPowerup(br.x + br.w/2, br.y + br.h/2, br.powerup);
        updateHUD();
      } else {
        // 약한 타격에도 작은 파티클
        spawnParticles(b.x, b.y, br.color[1], 6);
      }
      break;
    }
  }

  // 모든 공 소멸 시 라이프 차감
  if (balls.length === 0 && state === STATE.PLAYING) {
    lives--;
    updateHUD();
    if (lives <= 0) { gameOver(); return; }
    resetPaddle();
    powerups = [];
    spawnBall(W/2, paddle.y - 12);
  }

  // 아이템 낙하 + 획득
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy;
    if (p.y > H) { powerups.splice(i, 1); continue; }
    if (p.x + p.w > paddle.x && p.x < paddle.x + paddle.w &&
        p.y + p.h > paddle.y && p.y < paddle.y + paddle.h) {
      applyPower(p.type);
      spawnParticles(p.x + p.w/2, p.y + p.h/2, POWER[p.type].color, 14);
      powerups.splice(i, 1);
    }
  }

  // 파티클
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12; // 중력
    p.vx *= 0.98;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // 클리어 체크
  if (state === STATE.PLAYING && bricks.every(br => !br.alive)) {
    endLevel();
  }
}

// === 그리기 ===
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawPaddle() {
  ctx.save();
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 22;
  const g = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
  g.addColorStop(0, '#9ff0ff');
  g.addColorStop(1, '#0080c0');
  ctx.fillStyle = g;
  roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
  ctx.fill();
  // 하이라이트
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  roundRect(paddle.x + 6, paddle.y + 2, paddle.w - 12, 3, 2);
  ctx.fill();
  ctx.restore();
}

function drawBall(b) {
  // 잔상
  for (let i = 0; i < b.trail.length; i++) {
    const t = b.trail[i];
    const a = (i + 1) / b.trail.length;
    ctx.fillStyle = `rgba(160, 220, 255, ${a * 0.35})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, b.r * a * 0.9, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.save();
  ctx.shadowColor = '#a0e0ff';
  ctx.shadowBlur = 18;
  const g = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, b.r);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(1, '#88ccff');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawBricks() {
  for (const br of bricks) {
    if (!br.alive) continue;
    ctx.save();
    ctx.shadowColor = br.color[0];
    ctx.shadowBlur = 12;
    const g = ctx.createLinearGradient(br.x, br.y, br.x, br.y + br.h);
    g.addColorStop(0, br.color[1]);
    g.addColorStop(1, br.color[0]);
    ctx.fillStyle = g;
    roundRect(br.x, br.y, br.w, br.h, 4);
    ctx.fill();
    // hp > 1 표시
    if (br.hp > 1) {
      ctx.shadowBlur = 0;
      ctx.strokeStyle = 'rgba(255,255,255,0.65)';
      ctx.lineWidth = 1.5;
      roundRect(br.x + 3, br.y + 3, br.w - 6, br.h - 6, 3);
      ctx.stroke();
    }
    // 아이템 마커
    if (br.powerup) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.95)';
      ctx.font = 'bold 11px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(POWER[br.powerup].label, br.x + br.w/2, br.y + br.h/2 + 1);
    }
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const a = Math.max(0, p.life / p.max);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawPowerups() {
  for (const p of powerups) {
    const c = POWER[p.type].color;
    ctx.save();
    ctx.shadowColor = c;
    ctx.shadowBlur = 16;
    const g = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    g.addColorStop(0, '#ffffff');
    g.addColorStop(1, c);
    ctx.fillStyle = g;
    roundRect(p.x, p.y, p.w, p.h, 8);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#0a0a14';
    ctx.font = 'bold 11px system-ui';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(POWER[p.type].label, p.x + p.w/2, p.y + p.h/2 + 1);
    ctx.restore();
  }
}

// === 메인 루프 ===
function loop() {
  ctx.clearRect(0, 0, W, H);
  if (state === STATE.PLAYING) update();
  drawBricks();
  drawPowerups();
  drawParticles();
  drawPaddle();
  for (const b of balls) drawBall(b);
  requestAnimationFrame(loop);
}

// 초기화 (시작 화면 미리보기용)
resetPaddle();
buildBricks();
spawnBall(W/2, paddle.y - 12);
updateHUD();
loop();
</script>
</body>
</html>
