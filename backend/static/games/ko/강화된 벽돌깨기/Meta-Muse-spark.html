<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEON BRICKS</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1000px 600px at 50% -20%, #312e81 0%, #020617 60%, #000 100%);
    font-family: system-ui, -apple-system, Segoe UI, Roboto, 'Noto Sans KR', sans-serif;
    color: #e2e8f0; overflow: hidden;
  }
  .wrap { width: 860px; display: flex; flex-direction: column; gap: 14px; }
  .hud {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px; border-radius: 16px;
    background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
    box-shadow: 0 0 20px rgba(124,58,237,.25), inset 0 1px 0 rgba(255,255,255,.1);
    backdrop-filter: blur(10px);
    font-variant-numeric: tabular-nums;
  }
  .hud b { color: #a5f3fc; text-shadow: 0 0 10px #06b6d4; }
  .game-box {
    position: relative; width: 860px; height: 620px; padding: 12px; border-radius: 24px;
    background: linear-gradient(180deg, rgba(139,92,246,.15), rgba(6,182,212,.08));
    box-shadow: 0 0 60px rgba(124,58,237,.35), inset 0 0 30px rgba(6,182,212,.12);
  }
  canvas { width: 100%; height: 100%; background: #030712; border-radius: 18px; display: block; }
  .screen {
    position: absolute; inset: 12px; border-radius: 18px;
    background: rgba(2,6,23,.88); backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 18px;
    z-index: 10;
  }
  .hidden { display: none !important; }
  h1 { font-size: 56px; letter-spacing: 2px; background: linear-gradient(90deg,#a78bfa,#22d3ee); -webkit-background-clip: text; color: transparent; text-shadow: 0 0 30px rgba(167,139,250,.4); }
  p { opacity: .85; line-height: 1.6; }
  button {
    padding: 14px 28px; font-size: 18px; font-weight: 700; color: #041017; border: 0; border-radius: 12px; cursor: pointer;
    background: linear-gradient(90deg,#22d3ee,#a78bfa); box-shadow: 0 0 25px rgba(34,211,238,.5), inset 0 -2px 0 rgba(0,0,0,.2);
    transition: transform .1s;
  }
  button:hover { transform: translateY(-1px) scale(1.02); }
  .pill { display: inline-flex; gap: 8px; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); font-size: 12px; }
  .hint { font-size: 13px; opacity: .7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hud">
    <div>SCORE <b id="score">0</b></div>
    <div>LIVES <b id="lives">3</b></div>
    <div>LEVEL <b id="level">1</b></div>
    <div class="pill">◀ ▶ 이동 · SPACE 레이저</div>
  </div>
  <div class="game-box">
    <canvas id="game" width="836" height="596"></canvas>
    
    <div id="startScreen" class="screen">
      <h1>NEON BRICKS</h1>
      <p>벽돌을 깨고 아이템을 획득하세요!<br>↔   패들확장 ➕멀티볼 🔫레이저 ❄️슬로우 ❤️+1UP</p>
      <button id="startBtn">게임 시작</button>
      <div class="hint">패들은 ← → 또는 마우스로 조작</div>
    </div>

    <div id="endScreen" class="screen hidden">
      <h1 id="endTitle">CLEAR!</h1>
      <p id="endDesc">최종 점수: 0</p>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>
</div>

<script>
(() => {
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const $score = document.getElementById('score');
const $lives = document.getElementById('lives');
const $level = document.getElementById('level');
const startScreen = document.getElementById('startScreen');
const endScreen = document.getElementById('endScreen');
const endTitle = document.getElementById('endTitle');
const endDesc = document.getElementById('endDesc');

let gameState = 'start'; // start, playing, gameover, win
let score=0, lives=3, level=1;
let keys = {};

const paddle = { w:110, h:14, x:W/2-55, y:H-40, speed:8, baseW:110 };
const balls = [];
const bricks = [];
const particles = [];
const items = [];
const lasers = [];
const effects = { expand:0, laser:0, slow:0 };

const colors = ['#f43f5e','#f97316','#eab308','#22c55e','#0ea5e9','#8b5cf6'];
const itemTypes = ['expand','multiball','laser','slow','life'];
const itemEmoji = {expand:'↔️',multiball:'➕',laser:'🔫',slow:'❄️',life:'❤️'};

function beep(f=600,d=0.04,v=0.03){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(); const g=a.createGain(); o.type='square'; o.frequency.value=f; g.gain.value=v; o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+d);}catch{} }

// 입력
window.addEventListener('keydown', e=>{ keys[e.key]=true; if(e.code==='Space' && effects.laser>0) fireLaser(); });
window.addEventListener('keyup', e=> keys[e.key]=false);
canvas.addEventListener('mousemove', e=>{ const r=canvas.getBoundingClientRect(); const mx=(e.clientX-r.left)*(W/r.width); paddle.x = Math.max(0,Math.min(W-paddle.w, mx - paddle.w/2)); });

// 초기화
function resetAll(){ score=0; lives=3; level=1; initLevel(); }
function initLevel(){
  $score.textContent=score; $lives.textContent=lives; $level.textContent=level;
  paddle.w = paddle.baseW; paddle.x = W/2 - paddle.w/2;
  balls.length=0; balls.push({x:paddle.x+paddle.w/2, y:paddle.y-10, vx:4.5*(Math.random()>.5?1:-1), vy:-5, r:8, trail:[]});
  bricks.length=0; particles.length=0; items.length=0; lasers.length=0;
  effects.expand=0; effects.laser=0; effects.slow=0;
  createBricks();
}
function createBricks(){
  const rows = 5 + level, cols=11, bw=68, bh=22, pad=6, top=80, left=24;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const hp = Math.random()<0.18 ? 2 : 1;
    const hasItem = Math.random()<0.22;
    bricks.push({ x:left+c*(bw+pad), y:top+r*(bh+pad), w:bw, h:bh, hp, maxHp:hp,
      color:colors[r%colors.length], item: hasItem ? itemTypes[(Math.random()*itemTypes.length)|0] : null });
  }
}

// 아이템 적용
function applyItem(t){
  beep(900,0.06,0.04);
  if(t==='expand'){ effects.expand=600; paddle.w = paddle.baseW*1.6; }
  else if(t==='multiball'){ for(let i=0;i<2;i++){ const b=balls[0]; balls.push({x:b.x,y:b.y,vx:(Math.random()*2-1)*5,vy:-5,r:8,trail:[]}); } }
  else if(t==='laser'){ effects.laser=600; }
  else if(t==='slow'){ effects.slow=360; balls.forEach(b=>{b.vx*=0.6;b.vy*=0.6}); }
  else if(t==='life'){ lives++; $lives.textContent=lives; }
}
function fireLaser(){ if(gameState!=='playing') return; lasers.push({x:paddle.x+12,y:paddle.y,w:3,h:18,vy:-12},{x:paddle.x+paddle.w-15,y:paddle.y,w:3,h:18,vy:-12}); beep(1200,0.03,0.02); }

// 파티클
function boom(x,y,color,n=24){ for(let i=0;i<n;i++){ particles.push({x,y,vx:(Math.random()*2-1)*4,vy:(Math.random()*2-1)*4,life:30+Math.random()*20, c:color, s:2+Math.random()*3}); } }

// 충돌
function circleRect(cx,cy,cr,rx,ry,rw,rh){ const tx=Math.max(rx,Math.min(cx,rx+rw)); const ty=Math.max(ry,Math.min(cy,ry+rh)); const dx=cx-tx, dy=cy-ty; return dx*dx+dy*dy <= cr*cr; }

// 업데이트
function update(){
  if(gameState!=='playing') return;
  // 패들 이동
  if(keys['ArrowLeft']||keys['a']) paddle.x-=paddle.speed;
  if(keys['ArrowRight']||keys['d']) paddle.x+=paddle.speed;
  paddle.x = Math.max(0, Math.min(W-paddle.w, paddle.x));
  // 효과 타이머
  if(effects.expand>0 && --effects.expand===0) paddle.w = paddle.baseW;
  if(effects.laser>0) effects.laser--;
  if(effects.slow>0 && --effects.slow===0) balls.forEach(b=>{b.vx/=0.6;b.vy/=0.6});

  // 공
  const spd = effects.slow>0?0.6:1;
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i]; b.trail.push({x:b.x,y:b.y}); if(b.trail.length>8) b.trail.shift();
    b.x+=b.vx*spd; b.y+=b.vy*spd;
    if(b.x<b.r||b.x>W-b.r){ b.vx*=-1; b.x=Math.max(b.r,Math.min(W-b.r,b.x)); beep(400); }
    if(b.y<b.r){ b.vy*=-1; b.y=b.r; beep(400); }
    if(b.y>H+30){ balls.splice(i,1); continue; }
    // 패들
    if(circleRect(b.x,b.y,b.r,paddle.x,paddle.y,paddle.w,paddle.h) && b.vy>0){
      const hit = (b.x - (paddle.x+paddle.w/2)) / (paddle.w/2);
      b.vy = -Math.abs(b.vy); b.vx = hit*5; b.y = paddle.y - b.r -1; beep(700);
    }
    // 벽돌
    for(let j=bricks.length-1;j>=0;j--){
      const br=bricks[j];
      if(circleRect(b.x,b.y,b.r,br.x,br.y,br.w,br.h)){
        const overlapX = b.x < br.x+br.w/2 ? b.x+ b.r - br.x : br.x+br.w - (b.x - b.r);
        const overlapY = b.y < br.y+br.h/2 ? b.y+ b.r - br.y : br.y+br.h - (b.y - b.r);
        if(overlapX < overlapY) b.vx*=-1; else b.vy*=-1;
        br.hp--; boom(b.x,b.y,br.color,18); beep(800,0.03);
        if(br.hp<=0){
          if(br.item) items.push({x:br.x+br.w/2-13,y:br.y+br.h/2-13,w:26,h:26,vy:2.2,type:br.item});
          bricks.splice(j,1); score+=10; $score.textContent=score;
        } else { br.color='#ffffff'; setTimeout(()=>br.color=colors[0],60); }
        break;
      }
    }
  }
  if(balls.length===0){ lives--; $lives.textContent=lives; beep(200,0.2,0.05); if(lives<=0) return gameOver(); else balls.push({x:paddle.x+paddle.w/2,y:paddle.y-10,vx:4.5,vy:-5,r:8,trail:[]}); }

  // 레이저
  for(let i=lasers.length-1;i>=0;i--){ const l=lasers[i]; l.y+=l.vy; if(l.y<0) lasers.splice(i,1); else { for(let j=bricks.length-1;j>=0;j--){ const br=bricks[j]; if(l.x>br.x && l.x<br.x+br.w && l.y>br.y && l.y<br.y+br.h){ boom(l.x,l.y,'#22d3ee',14); bricks.splice(j,1); lasers.splice(i,1); score+=10; $score.textContent=score; beep(1000,0.03); break; } } } }

  // 아이템
  for(let i=items.length-1;i>=0;i--){ const it=items[i]; it.y+=it.vy; it.vy+=0.05; if(it.y>paddle.y-5 && it.x>paddle.x-10 && it.x<paddle.x+paddle.w+10 && it.y < paddle.y+paddle.h+10){ applyItem(it.type); items.splice(i,1); } else if(it.y>H) items.splice(i,1); }

  // 파티클
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.x+=p.vx; p.y+=p.vy; p.vy+=0.08; p.life--; if(p.life<=0) particles.splice(i,1); }

  // 승리
  if(bricks.length===0){ level++; if(level>3) return winGame(); else { $level.textContent=level; initLevel(); } }
}

// 그리기
function draw(){
  ctx.clearRect(0,0,W,H);
  // 배경 별
  ctx.globalAlpha=0.3; for(let i=0;i<50;i++){ ctx.fillStyle='#a5b4fc'; ctx.fillRect((i*131)%W, (i*73)%H*0.4+20, 1,1); } ctx.globalAlpha=1;
  // 패들
  ctx.shadowColor='#22d3ee'; ctx.shadowBlur=20; ctx.fillStyle='#0ea5e9'; roundRect(paddle.x,paddle.y,paddle.w,paddle.h,8,true); ctx.shadowBlur=0;
  if(effects.laser>0){ ctx.fillStyle='#a78bfa'; ctx.fillRect(paddle.x+10,paddle.y-6,4,6); ctx.fillRect(paddle.x+paddle.w-14,paddle.y-6,4,6); }
  // 공
  balls.forEach(b=>{ b.trail.forEach((t,i)=>{ ctx.globalAlpha=i/b.trail.length*0.3; ctx.beginPath(); ctx.arc(t.x,t.y,b.r*0.6,0,Math.PI*2); ctx.fillStyle='#67e8f9'; ctx.fill(); }); ctx.globalAlpha=1; ctx.shadowColor='#67e8f9'; ctx.shadowBlur=18; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fillStyle='#e0f2fe'; ctx.fill(); ctx.shadowBlur=0; });
  // 벽돌
  bricks.forEach(br=>{ ctx.shadowColor=br.color; ctx.shadowBlur=12; ctx.fillStyle=br.color; roundRect(br.x,br.y,br.w,br.h,6,true); ctx.shadowBlur=0; if(br.maxHp>1){ ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(br.x+4,br.y+4,br.w-8,3); } });
  // 아이템
  items.forEach(it=>{ ctx.shadowColor='#fbbf24'; ctx.shadowBlur=15; ctx.fillStyle='rgba(0,0,0,.6)'; roundRect(it.x,it.y,it.w,it.h,6,true); ctx.shadowBlur=0; ctx.font='18px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(itemEmoji[it.type], it.x+it.w/2, it.y+it.h/2+1); });
  // 레이저
  ctx.shadowColor='#c084fc'; ctx.shadowBlur=12; ctx.fillStyle='#e9d5ff'; lasers.forEach(l=>ctx.fillRect(l.x,l.y,l.w,l.h)); ctx.shadowBlur=0;
  // 파티클
  particles.forEach(p=>{ ctx.globalAlpha=Math.max(0,p.life/40); ctx.fillStyle=p.c; ctx.beginPath(); ctx.arc(p.x,p.y,p.s,0,Math.PI*2); ctx.fill(); }); ctx.globalAlpha=1;
}
function roundRect(x,y,w,h,r,fill){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); if(fill) ctx.fill(); else ctx.stroke(); }

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();

// 화면 전환
function gameOver(){ gameState='gameover'; endTitle.textContent='GAME OVER'; endDesc.textContent=`최종 점수: ${score}`; endScreen.classList.remove('hidden'); }
function winGame(){ gameState='win'; endTitle.textContent='YOU WIN!'; endDesc.textContent=`완벽 클리어! 점수: ${score}`; endScreen.classList.remove('hidden'); boom(W/2,H/2,'#a78bfa',120); }

document.getElementById('startBtn').onclick = ()=>{ resetAll(); startScreen.classList.add('hidden'); endScreen.classList.add('hidden'); gameState='playing'; };
document.getElementById('restartBtn').onclick = ()=>{ resetAll(); endScreen.classList.add('hidden'); startScreen.classList.add('hidden'); gameState='playing'; };

// 초기 대기 화면
draw();
})();
</script>
</body>
</html>
