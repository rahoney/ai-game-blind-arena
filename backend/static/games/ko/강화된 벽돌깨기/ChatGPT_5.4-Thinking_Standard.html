<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>강화된 벽돌깨기 게임</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background:
      radial-gradient(circle at top, #26324a 0%, #111827 40%, #090d16 100%);
    color: #eef3ff;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .game-shell {
    position: relative;
    width: 920px;
    max-width: calc(100vw - 24px);
    height: 700px;
    max-height: calc(100vh - 24px);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    box-shadow:
      0 24px 80px rgba(0,0,0,0.45),
      inset 0 1px 0 rgba(255,255,255,0.10),
      inset 0 -1px 0 rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 900px;
    height: 680px;
    max-width: 100%;
    max-height: 100%;
    border-radius: 18px;
    background:
      radial-gradient(circle at top, rgba(255,255,255,0.10), transparent 30%),
      linear-gradient(180deg, #162032 0%, #0f1626 55%, #0a0f18 100%);
    box-shadow:
      inset 0 0 30px rgba(255,255,255,0.03),
      inset 0 -30px 80px rgba(0,0,0,0.35);
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(6, 10, 18, 0.62);
    backdrop-filter: blur(5px);
    transition: opacity 0.25s ease;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .panel {
    width: min(560px, calc(100% - 40px));
    padding: 28px 28px 24px;
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(27,35,52,0.92), rgba(13,18,29,0.92));
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow:
      0 20px 60px rgba(0,0,0,0.38),
      inset 0 1px 0 rgba(255,255,255,0.08);
    text-align: center;
  }

  .panel h1 {
    margin: 0 0 12px;
    font-size: 36px;
    letter-spacing: -0.02em;
  }

  .panel p {
    margin: 8px 0;
    color: #d7e2ff;
    line-height: 1.6;
    font-size: 15px;
  }

  .panel .highlight {
    color: #9ed0ff;
    font-weight: 700;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 22px;
  }

  button {
    border: 0;
    cursor: pointer;
    border-radius: 14px;
    padding: 13px 22px;
    font-size: 15px;
    font-weight: 700;
    color: #eef6ff;
    background: linear-gradient(180deg, #4f8cff, #2962ff);
    box-shadow:
      0 10px 24px rgba(41,98,255,0.30),
      inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform 0.12s ease, filter 0.12s ease;
  }

  button:hover { transform: translateY(-1px); filter: brightness(1.05); }
  button:active { transform: translateY(1px) scale(0.995); }

  .ghost {
    background: linear-gradient(180deg, #364153, #212a38);
    box-shadow:
      0 10px 24px rgba(0,0,0,0.22),
      inset 0 1px 0 rgba(255,255,255,0.10);
  }
</style>
</head>
<body>
  <div class="game-shell">
    <canvas id="gameCanvas" width="900" height="680"></canvas>

    <div class="overlay" id="startOverlay">
      <div class="panel">
        <h1>강화된 벽돌깨기</h1>
        <p>방향키 <span class="highlight">← →</span> 로 패들을 움직이세요.</p>
        <p>공으로 벽돌을 부수고, 떨어지는 아이템을 받아 즉시 강화 효과를 얻으세요.</p>
        <p>모든 벽돌을 부수면 승리, 공을 모두 잃으면 패배합니다.</p>
        <div class="btn-row">
          <button id="startBtn">게임 시작</button>
        </div>
      </div>
    </div>

    <div class="overlay hidden" id="endOverlay">
      <div class="panel">
        <h1 id="endTitle">게임 종료</h1>
        <p id="endMessage">결과 메시지</p>
        <p id="endScore">점수: 0</p>
        <div class="btn-row">
          <button id="restartBtn">다시 시작</button>
          <button class="ghost" id="closeEndBtn">닫기</button>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  const startOverlay = document.getElementById("startOverlay");
  const endOverlay = document.getElementById("endOverlay");
  const startBtn = document.getElementById("startBtn");
  const restartBtn = document.getElementById("restartBtn");
  const closeEndBtn = document.getElementById("closeEndBtn");
  const endTitle = document.getElementById("endTitle");
  const endMessage = document.getElementById("endMessage");
  const endScore = document.getElementById("endScore");

  const W = canvas.width;
  const H = canvas.height;

  const game = {
    running: false,
    gameOver: false,
    victory: false,
    score: 0,
    lives: 3,
    levelCleared: false,
    paddle: null,
    ball: null,
    bricks: [],
    particles: [],
    items: [],
    stars: [],
    keys: { left: false, right: false },
    effectTimers: {
      widePaddle: 0,
      slowBall: 0
    }
  };

  function rand(min, max) {
    return Math.random() * (max - min) + min;
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function circleRectCollision(ball, rect) {
    const closestX = clamp(ball.x, rect.x, rect.x + rect.w);
    const closestY = clamp(ball.y, rect.y, rect.y + rect.h);
    const dx = ball.x - closestX;
    const dy = ball.y - closestY;
    return dx * dx + dy * dy <= ball.r * ball.r;
  }

  function resetStars() {
    game.stars = [];
    for (let i = 0; i < 70; i++) {
      game.stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 2 + 0.4,
        a: Math.random() * 0.6 + 0.15,
        speed: Math.random() * 0.15 + 0.03
      });
    }
  }

  function createPaddle() {
    return {
      x: W / 2 - 70,
      y: H - 44,
      w: 140,
      h: 16,
      speed: 8,
      glow: 0
    };
  }

  function createBall() {
    return {
      x: W / 2,
      y: H - 68,
      r: 9,
      vx: 4.4 * (Math.random() > 0.5 ? 1 : -1),
      vy: -4.8,
      speedCap: 9.5,
      trail: []
    };
  }

  function buildBricks() {
    const rows = 6;
    const cols = 11;
    const gap = 8;
    const top = 92;
    const side = 42;
    const brickW = (W - side * 2 - gap * (cols - 1)) / cols;
    const brickH = 28;

    const colors = [
      "#60a5fa", "#818cf8", "#c084fc", "#f472b6", "#fb7185", "#f59e0b"
    ];

    game.bricks = [];

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const x = side + col * (brickW + gap);
        const y = top + row * (brickH + gap);

        // 일부 벽돌에 아이템 부여
        let itemType = null;
        const roll = Math.random();
        if (roll < 0.08) itemType = "expand";
        else if (roll < 0.14) itemType = "multiball";
        else if (roll < 0.20) itemType = "slow";
        else if (roll < 0.27) itemType = "life";

        // 상단일수록 내구도 증가
        const hp = row < 2 ? 2 : 1;

        game.bricks.push({
          x, y,
          w: brickW,
          h: brickH,
          hp,
          maxHp: hp,
          alive: true,
          color: colors[row % colors.length],
          itemType
        });
      }
    }
  }

  function createParticles(x, y, color, amount = 16) {
    for (let i = 0; i < amount; i++) {
      game.particles.push({
        x,
        y,
        vx: rand(-3.6, 3.6),
        vy: rand(-3.8, 3.8),
        r: rand(1.8, 4.8),
        life: rand(28, 46),
        maxLife: 46,
        color
      });
    }
  }

  function spawnItem(x, y, type) {
    if (!type) return;
    game.items.push({
      x,
      y,
      w: 22,
      h: 22,
      vy: 2.2,
      type,
      pulse: rand(0, Math.PI * 2)
    });
  }

  function applyItem(type) {
    if (type === "expand") {
      game.paddle.w = Math.min(game.paddle.w + 42, 230);
      game.effectTimers.widePaddle = 900;
      game.score += 25;
    } else if (type === "multiball") {
      // 멀티볼: 기존 공 기준으로 추가 공 2개 생성
      const base = game.ball;
      if (base) {
        const extra1 = { ...createBall(), x: base.x, y: base.y, vx: -Math.abs(base.vx || 4.2), vy: base.vy };
        const extra2 = { ...createBall(), x: base.x, y: base.y, vx: Math.abs(base.vx || 4.2), vy: base.vy * 1.02 };
        game.extraBalls.push(extra1, extra2);
      }
      game.score += 40;
    } else if (type === "slow") {
      reduceBallSpeed(game.ball, 0.82);
      game.extraBalls.forEach(ball => reduceBallSpeed(ball, 0.82));
      game.effectTimers.slowBall = 700;
      game.score += 20;
    } else if (type === "life") {
      game.lives = Math.min(game.lives + 1, 5);
      game.score += 30;
    }
  }

  function reduceBallSpeed(ball, factor) {
    if (!ball) return;
    ball.vx *= factor;
    ball.vy *= factor;
  }

  function normalizeBallSpeed(ball) {
    const speed = Math.hypot(ball.vx, ball.vy);
    const minSpeed = 4.8;
    const maxSpeed = ball.speedCap;
    if (speed < minSpeed) {
      const ratio = minSpeed / (speed || 1);
      ball.vx *= ratio;
      ball.vy *= ratio;
    }
    if (speed > maxSpeed) {
      const ratio = maxSpeed / speed;
      ball.vx *= ratio;
      ball.vy *= ratio;
    }
  }

  function resetBallAndPaddle() {
    game.paddle = createPaddle();
    game.ball = createBall();
    game.extraBalls = [];
  }

  function fullyResetGame() {
    game.running = false;
    game.gameOver = false;
    game.victory = false;
    game.levelCleared = false;
    game.score = 0;
    game.lives = 3;
    game.particles = [];
    game.items = [];
    game.effectTimers = { widePaddle: 0, slowBall: 0 };
    resetStars();
    resetBallAndPaddle();
    buildBricks();
  }

  function startGame() {
    fullyResetGame();
    game.running = true;
    startOverlay.classList.add("hidden");
    endOverlay.classList.add("hidden");
  }

  function restartGame() {
    fullyResetGame();
    game.running = true;
    endOverlay.classList.add("hidden");
    startOverlay.classList.add("hidden");
  }

  function showEndScreen(victory) {
    game.running = false;
    game.gameOver = !victory;
    game.victory = victory;

    endTitle.textContent = victory ? "승리!" : "패배";
    endMessage.textContent = victory
      ? "모든 벽돌을 부쉈습니다. 멋진 플레이였어요."
      : "공을 모두 잃었습니다. 다시 도전해보세요.";
    endScore.textContent = `점수: ${game.score}`;
    endOverlay.classList.remove("hidden");
  }

  function updatePaddle() {
    if (game.keys.left) game.paddle.x -= game.paddle.speed;
    if (game.keys.right) game.paddle.x += game.paddle.speed;
    game.paddle.x = clamp(game.paddle.x, 18, W - game.paddle.w - 18);

    if (game.effectTimers.widePaddle > 0) {
      game.effectTimers.widePaddle--;
      game.paddle.glow = 1;
    } else {
      // 넓어진 패들을 원래 길이로 서서히 복구
      if (game.paddle.w > 140) game.paddle.w -= 0.25;
      game.paddle.glow = 0;
    }

    if (game.effectTimers.slowBall > 0) {
      game.effectTimers.slowBall--;
    }
  }

  function updateBall(ball, isMainBall = false) {
    // 공 잔상 기록
    ball.trail.push({ x: ball.x, y: ball.y, a: 1 });
    if (ball.trail.length > 12) ball.trail.shift();

    ball.x += ball.vx;
    ball.y += ball.vy;

    // 벽 충돌
    if (ball.x - ball.r <= 0) {
      ball.x = ball.r;
      ball.vx *= -1;
    }
    if (ball.x + ball.r >= W) {
      ball.x = W - ball.r;
      ball.vx *= -1;
    }
    if (ball.y - ball.r <= 0) {
      ball.y = ball.r;
      ball.vy *= -1;
    }

    // 바닥 판정
    if (ball.y - ball.r > H) {
      return false;
    }

    // 패들 충돌
    if (circleRectCollision(ball, game.paddle) && ball.vy > 0) {
      const hitPos = (ball.x - (game.paddle.x + game.paddle.w / 2)) / (game.paddle.w / 2);
      ball.y = game.paddle.y - ball.r;
      ball.vx = hitPos * 6.4;
      ball.vy = -Math.abs(ball.vy) - 0.15;
      normalizeBallSpeed(ball);
      createParticles(ball.x, ball.y, "#bde0ff", 12);
    }

    // 벽돌 충돌
    for (const brick of game.bricks) {
      if (!brick.alive) continue;
      if (!circleRectCollision(ball, brick)) continue;

      brick.hp--;

      // 충돌 방향 계산
      const prevX = ball.x - ball.vx;
      const prevY = ball.y - ball.vy;

      const hitFromLeft = prevX + ball.r <= brick.x;
      const hitFromRight = prevX - ball.r >= brick.x + brick.w;
      const hitFromTop = prevY + ball.r <= brick.y;
      const hitFromBottom = prevY - ball.r >= brick.y + brick.h;

      if (hitFromLeft || hitFromRight) ball.vx *= -1;
      else if (hitFromTop || hitFromBottom) ball.vy *= -1;
      else ball.vy *= -1;

      createParticles(ball.x, ball.y, brick.color, brick.hp <= 0 ? 20 : 8);

      if (brick.hp <= 0) {
        brick.alive = false;
        game.score += 100;
        spawnItem(brick.x + brick.w / 2 - 11, brick.y + brick.h / 2 - 11, brick.itemType);
      } else {
        game.score += 25;
      }

      break;
    }

    normalizeBallSpeed(ball);
    return true;
  }

  function updateBalls() {
    const mainAlive = updateBall(game.ball, true);
    if (!mainAlive) {
      if (game.extraBalls.length > 0) {
        game.ball = game.extraBalls.shift();
      } else {
        game.lives--;
        if (game.lives <= 0) {
          showEndScreen(false);
          return;
        }
        resetBallAndPaddle();
        return;
      }
    }

    game.extraBalls = game.extraBalls.filter(ball => updateBall(ball, false));
  }

  function updateItems() {
    for (let i = game.items.length - 1; i >= 0; i--) {
      const item = game.items[i];
      item.y += item.vy;
      item.pulse += 0.08;

      const caught =
        item.x < game.paddle.x + game.paddle.w &&
        item.x + item.w > game.paddle.x &&
        item.y < game.paddle.y + game.paddle.h &&
        item.y + item.h > game.paddle.y;

      if (caught) {
        applyItem(item.type);
        createParticles(item.x + item.w / 2, item.y + item.h / 2, "#ffffff", 24);
        game.items.splice(i, 1);
        continue;
      }

      if (item.y > H + 30) {
        game.items.splice(i, 1);
      }
    }
  }

  function updateParticles() {
    for (let i = game.particles.length - 1; i >= 0; i--) {
      const p = game.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.vy += 0.025;
      p.life--;

      if (p.life <= 0) game.particles.splice(i, 1);
    }
  }

  function updateStars() {
    for (const star of game.stars) {
      star.y += star.speed;
      if (star.y > H + 3) {
        star.y = -3;
        star.x = Math.random() * W;
      }
    }
  }

  function checkVictory() {
    if (game.bricks.every(brick => !brick.alive)) {
      showEndScreen(true);
    }
  }

  function update() {
    updateStars();

    if (!game.running) return;

    updatePaddle();
    updateBalls();
    updateItems();
    updateParticles();
    checkVictory();
  }

  function drawBackground() {
    // 상단 은은한 광원
    const grd = ctx.createRadialGradient(W / 2, 40, 20, W / 2, 40, 340);
    grd.addColorStop(0, "rgba(180,220,255,0.18)");
    grd.addColorStop(1, "rgba(180,220,255,0)");
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, W, H);

    // 배경 별
    for (const star of game.stars) {
      ctx.globalAlpha = star.a;
      ctx.beginPath();
      ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
      ctx.fillStyle = "#dbeafe";
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 테두리
    ctx.save();
    ctx.strokeStyle = "rgba(255,255,255,0.08)";
    ctx.lineWidth = 2;
    ctx.strokeRect(12, 12, W - 24, H - 24);
    ctx.restore();
  }

  function drawHUD() {
    ctx.save();

    // 상단 정보 패널
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    roundRect(ctx, 18, 16, W - 36, 54, 16, true, false);

    ctx.fillStyle = "#eef6ff";
    ctx.font = "bold 22px Segoe UI";
    ctx.fillText(`점수 ${game.score}`, 34, 49);

    ctx.font = "bold 20px Segoe UI";
    ctx.fillText(`목숨 ${game.lives}`, 210, 49);

    ctx.font = "15px Segoe UI";
    ctx.fillStyle = "#b6c8e8";
    ctx.fillText("조작: ← →", W - 155, 49);

    // 아이템 상태
    let effectText = [];
    if (game.effectTimers.widePaddle > 0) effectText.push("확장 패들");
    if (game.effectTimers.slowBall > 0) effectText.push("슬로우 볼");

    if (effectText.length) {
      ctx.font = "14px Segoe UI";
      ctx.fillStyle = "#9ed0ff";
      ctx.fillText(`효과: ${effectText.join(", ")}`, 330, 49);
    }

    ctx.restore();
  }

  function drawPaddle() {
    const p = game.paddle;

    ctx.save();
    const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    grad.addColorStop(0, p.glow ? "#90caf9" : "#cbd5e1");
    grad.addColorStop(1, p.glow ? "#3b82f6" : "#7c8aa0");

    ctx.shadowBlur = p.glow ? 18 : 8;
    ctx.shadowColor = p.glow ? "rgba(96,165,250,0.75)" : "rgba(255,255,255,0.15)";
    ctx.fillStyle = grad;
    roundRect(ctx, p.x, p.y, p.w, p.h, 10, true, false);

    ctx.restore();
  }

  function drawBall(ball, alpha = 1) {
    ctx.save();

    for (let i = 0; i < ball.trail.length; i++) {
      const t = ball.trail[i];
      const a = ((i + 1) / ball.trail.length) * 0.25 * alpha;
      ctx.globalAlpha = a;
      ctx.beginPath();
      ctx.arc(t.x, t.y, ball.r * 0.9, 0, Math.PI * 2);
      ctx.fillStyle = "#9ed0ff";
      ctx.fill();
    }

    ctx.globalAlpha = alpha;
    ctx.shadowBlur = 18;
    ctx.shadowColor = "rgba(180,220,255,0.9)";
    const grad = ctx.createRadialGradient(ball.x - 2, ball.y - 3, 2, ball.x, ball.y, ball.r + 4);
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(0.45, "#b8e1ff");
    grad.addColorStop(1, "#5ba7ff");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawBricks() {
    for (const brick of game.bricks) {
      if (!brick.alive) continue;

      ctx.save();

      const damageFactor = brick.hp / brick.maxHp;
      const fill = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.h);
      fill.addColorStop(0, shadeColor(brick.color, 30));
      fill.addColorStop(1, shadeColor(brick.color, -20));

      ctx.shadowBlur = 14;
      ctx.shadowColor = hexToRgba(brick.color, 0.35);
      ctx.fillStyle = fill;
      roundRect(ctx, brick.x, brick.y, brick.w, brick.h, 8, true, false);

      // 상단 하이라이트
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      roundRect(ctx, brick.x + 3, brick.y + 3, brick.w - 6, 7, 5, true, false);

      // 내구도 표시
      if (brick.maxHp > 1 && brick.hp > 0) {
        ctx.globalAlpha = 0.85;
        ctx.fillStyle = "rgba(255,255,255,0.75)";
        ctx.font = "bold 13px Segoe UI";
        ctx.fillText(String(brick.hp), brick.x + brick.w - 15, brick.y + 19);
      }

      // 아이템 예고 표시
      if (brick.itemType) {
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = "bold 12px Segoe UI";
        ctx.fillText(itemSymbol(brick.itemType), brick.x + 8, brick.y + 19);
      }

      ctx.restore();
    }
  }

  function drawItems() {
    for (const item of game.items) {
      ctx.save();
      const pulse = 1 + Math.sin(item.pulse) * 0.08;
      const cx = item.x + item.w / 2;
      const cy = item.y + item.h / 2;
      const baseColor = itemColor(item.type);

      ctx.translate(cx, cy);
      ctx.scale(pulse, pulse);

      ctx.shadowBlur = 16;
      ctx.shadowColor = hexToRgba(baseColor, 0.65);
      ctx.fillStyle = baseColor;
      roundRect(ctx, -item.w / 2, -item.h / 2, item.w, item.h, 7, true, false);

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 13px Segoe UI";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(itemSymbol(item.type), 0, 1);

      ctx.restore();
    }
    ctx.textAlign = "start";
    ctx.textBaseline = "alphabetic";
  }

  function drawParticles() {
    for (const p of game.particles) {
      const alpha = p.life / p.maxLife;
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 10;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  function drawCenterHint() {
    if (!game.running) return;
    ctx.save();
    ctx.font = "13px Segoe UI";
    ctx.fillStyle = "rgba(220,230,255,0.48)";
    ctx.textAlign = "center";
    ctx.fillText("벽돌을 모두 부수면 승리합니다", W / 2, H - 18);
    ctx.restore();
    ctx.textAlign = "start";
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawHUD();
    drawBricks();
    drawItems();
    drawPaddle();
    drawBall(game.ball);

    for (const extra of game.extraBalls) {
      drawBall(extra, 0.92);
    }

    drawParticles();
    drawCenterHint();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  function roundRect(ctx, x, y, w, h, r, fill, stroke) {
    const radius = Math.min(r, w / 2, h / 2);
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.arcTo(x + w, y, x + w, y + h, radius);
    ctx.arcTo(x + w, y + h, x, y + h, radius);
    ctx.arcTo(x, y + h, x, y, radius);
    ctx.arcTo(x, y, x + w, y, radius);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function shadeColor(hex, percent) {
    const num = parseInt(hex.slice(1), 16);
    let r = (num >> 16);
    let g = (num >> 8) & 0x00FF;
    let b = num & 0x0000FF;

    r = clamp(Math.round(r * (100 + percent) / 100), 0, 255);
    g = clamp(Math.round(g * (100 + percent) / 100), 0, 255);
    b = clamp(Math.round(b * (100 + percent) / 100), 0, 255);

    return `rgb(${r}, ${g}, ${b})`;
  }

  function hexToRgba(hex, alpha) {
    const num = parseInt(hex.slice(1), 16);
    const r = num >> 16;
    const g = (num >> 8) & 255;
    const b = num & 255;
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }

  function itemSymbol(type) {
    if (type === "expand") return "E";
    if (type === "multiball") return "M";
    if (type === "slow") return "S";
    if (type === "life") return "L";
    return "?";
  }

  function itemColor(type) {
    if (type === "expand") return "#60a5fa";
    if (type === "multiball") return "#a78bfa";
    if (type === "slow") return "#34d399";
    if (type === "life") return "#f87171";
    return "#ffffff";
  }

  // 키 입력 처리
  window.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft") game.keys.left = true;
    if (e.key === "ArrowRight") game.keys.right = true;

    // 엔터로 시작/재시작
    if (e.key === "Enter") {
      if (!game.running && !game.victory && !game.gameOver) startGame();
      else if (!game.running && (game.victory || game.gameOver)) restartGame();
    }
  });

  window.addEventListener("keyup", (e) => {
    if (e.key === "ArrowLeft") game.keys.left = false;
    if (e.key === "ArrowRight") game.keys.right = false;
  });

  startBtn.addEventListener("click", startGame);
  restartBtn.addEventListener("click", restartGame);
  closeEndBtn.addEventListener("click", () => {
    endOverlay.classList.add("hidden");
    startOverlay.classList.remove("hidden");
    game.running = false;
    game.victory = false;
    game.gameOver = false;
  });

  // 초기 상태 구성
  fullyResetGame();
  loop();
})();
</script>
</body>
