<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>큐트 카드 배틀</title>
<style>
    /* 전체 화면 중앙 정렬 및 파스텔 배경 */
    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #FFD6E8, #BDE0FE);
        font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
        user-select: none;
    }

    /* 게임 컨테이너 (고정 크기, 중앙 정렬) */
    #game-container {
        width: 800px;
        max-width: 95vw;
        height: 600px;
        background-color: #FFF1B6;
        border-radius: 25px;
        box-shadow: 0 15px 35px rgba(43, 45, 66, 0.2);
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
        color: #2B2D42;
    }

    /* 캐릭터 영역 공통 */
    .character-area {
        display: flex;
        align-items: center;
        padding: 30px 50px;
        position: relative;
    }
    #enemy-area {
        justify-content: flex-end;
        border-bottom: 3px dashed #FDE2E4;
        background: rgba(255, 255, 255, 0.4);
    }
    #player-area {
        justify-content: flex-start;
    }

    /* 아바타 스타일 */
    .avatar {
        font-size: 70px;
        background: white;
        border-radius: 50%;
        width: 110px; height: 110px;
        display: flex; justify-content: center; align-items: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        margin: 0 20px;
    }

    /* 상태바(체력, 방어력 등) 스타일 */
    .status-box { width: 250px; }
    .name-tag { font-weight: bold; font-size: 18px; margin-bottom: 8px; }
    .hp-bar-bg {
        width: 100%; height: 22px; background: #fff; border-radius: 11px;
        border: 2px solid #2B2D42; overflow: hidden; margin-bottom: 8px;
    }
    .hp-bar-fill {
        height: 100%; background: #FF77AA; width: 100%;
        transition: width 0.3s ease-out;
    }
    .stats { display: flex; gap: 15px; font-weight: bold; font-size: 16px; }

    /* 하단 손패 및 버튼 영역 */
    #bottom-area {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 40px;
        background: rgba(255, 255, 255, 0.5);
        height: 160px;
    }
    #hand {
        display: flex;
        gap: 15px;
        flex: 1;
        justify-content: center;
    }

    /* 턴 종료 버튼 */
    #end-turn-btn {
        background: #FF77AA;
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 12px;
        cursor: pointer;
        box-shadow: 0 5px 0 #CC5F88;
        transition: transform 0.1s, opacity 0.3s;
    }
    #end-turn-btn:active {
        transform: translateY(5px);
        box-shadow: none;
    }
    #end-turn-btn:disabled {
        background: #b5a7c0;
        box-shadow: 0 5px 0 #8b8094;
        cursor: not-allowed;
    }

    /* 카드 스타일 */
    .card {
        width: 120px; height: 160px;
        border-radius: 15px;
        padding: 10px;
        box-sizing: border-box;
        display: flex; flex-direction: column;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        border: 3px solid rgba(255,255,255,0.8);
        transition: transform 0.2s;
    }
    .card:hover { transform: translateY(-10px); }
    .card .cost {
        background: #2B2D42; color: white;
        width: 26px; height: 26px; border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        font-weight: bold; margin-bottom: 5px;
    }
    .card .name { font-weight: bold; text-align: center; font-size: 15px; margin-bottom: 8px; }
    .card .desc { font-size: 12px; text-align: center; color: #333; flex: 1; }

    /* 애니메이션: 데미지 및 힐 수치 상승 */
    @keyframes floatUp {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-60px) scale(1.2); opacity: 0; }
    }
    .floating-text {
        position: absolute;
        font-size: 26px; font-weight: 900;
        animation: floatUp 1s ease-out forwards;
        pointer-events: none; z-index: 100;
        text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff;
    }

    /* 애니메이션: 카드 사용 및 에러 흔들림 */
    @keyframes cardPlay {
        0% { transform: translateY(0) scale(1); opacity: 1; }
        100% { transform: translateY(-150px) scale(1.1); opacity: 0; }
    }
    .card.playing { animation: cardPlay 0.4s ease-out forwards; pointer-events: none; }
    
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }
    .card.shake { animation: shake 0.2s ease-in-out; }

    /* 게임 종료 모달 */
    #game-over-modal {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(43, 45, 66, 0.85);
        display: none; flex-direction: column;
        justify-content: center; align-items: center;
        color: white; z-index: 200;
    }
    #game-over-modal h2 { font-size: 40px; margin-bottom: 20px; }
    #game-over-modal button {
        padding: 12px 35px; font-size: 20px; font-weight: bold;
        border: none; border-radius: 12px; background: #FFD6E8; color: #2B2D42;
        cursor: pointer; transition: background 0.2s;
    }
    #game-over-modal button:hover { background: #FFF1B6; }
</style>
</head>
<body>

<div id="game-container">
    <div class="character-area" id="enemy-area">
        <div class="status-box" style="text-align: right;">
            <div class="name-tag">슬라임 킹</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" id="enemy-hp-fill" style="float: right;"></div></div>
            <div class="stats" style="justify-content: flex-end;">
                <span class="def-text" id="enemy-def-text">🛡️ 0</span>
                <span class="hp-text" id="enemy-hp-text">60 / 60</span>
            </div>
        </div>
        <div class="avatar">👑</div>
        <div id="enemy-dmg-zone" style="position: absolute; right: 150px; top: 60px;"></div>
    </div>

    <div class="character-area" id="player-area">
        <div class="avatar">🧙‍♀️</div>
        <div class="status-box">
            <div class="name-tag">마법사(나)</div>
            <div class="hp-bar-bg"><div class="hp-bar-fill" id="player-hp-fill" style="background-color: #A7D6AF;"></div></div>
            <div class="stats">
                <span class="hp-text" id="player-hp-text">50 / 50</span>
                <span class="def-text" id="player-def-text">🛡️ 0</span>
                <span class="energy-text" id="player-energy-text">⚡ 3 / 3</span>
            </div>
        </div>
        <div id="player-dmg-zone" style="position: absolute; left: 150px; top: 60px;"></div>
    </div>

    <div id="bottom-area">
        <div id="hand"></div>
        <button id="end-turn-btn" onclick="endTurn()">턴 종료</button>
    </div>

    <div id="game-over-modal">
        <h2 id="modal-title">승리!</h2>
        <button onclick="restartGame()">다시 시작하기</button>
    </div>
</div>

<script>
    // --- 핵심 게임 상태 (State) ---
    const MAX_PLAYER_HP = 50;
    const MAX_ENEMY_HP = 60;
    const MAX_ENERGY = 3;

    let playerHp, enemyHp;
    let playerDef, enemyDef;
    let playerEnergy;
    let isPlayerTurn;
    let hand = [];

    // 카드 템플릿 정의 (파스텔 톤 색상 적용)
    const deckTemplate = [
        { name: "가벼운 공격", type: "attack", cost: 1, val: 6, desc: "적에게 6의 피해", color: "#FFB3C6" },
        { name: "마력 폭발", type: "attack", cost: 2, val: 14, desc: "적에게 14의 피해", color: "#FFAFCC" },
        { name: "마법 방패", type: "defend", cost: 1, val: 6, desc: "방어도를 6 얻음", color: "#A2D2FF" },
        { name: "치유 물약", type: "heal", cost: 1, val: 5, desc: "체력을 5 회복", color: "#B9FBC0" }
    ];

    // --- 게임 초기화 및 흐름 제어 ---
    function initGame() {
        playerHp = MAX_PLAYER_HP;
        enemyHp = MAX_ENEMY_HP;
        playerDef = 0;
        enemyDef = 0;
        
        startPlayerTurn();
    }

    function startPlayerTurn() {
        isPlayerTurn = true;
        playerEnergy = MAX_ENERGY;
        playerDef = 0; // 규칙: 다음 플레이어 턴 시작 시 방어 수치 초기화
        drawCards(3);
        updateUI();
    }

    // 카드 드로우 (손패 생성)
    function drawCards(count) {
        hand = [];
        const handDiv = document.getElementById('hand');
        handDiv.innerHTML = ''; 
        
        for(let i=0; i<count; i++) {
            // 무작위 카드 선택 및 고유 ID 부여
            let randCard = deckTemplate[Math.floor(Math.random() * deckTemplate.length)];
            let cardInstance = { ...randCard, id: Date.now() + i + Math.random() };
            hand.push(cardInstance);
            
            // DOM(문서 객체 모델) 즉시 생성
            const c = document.createElement('div');
            c.className = 'card';
            c.style.backgroundColor = cardInstance.color;
            c.innerHTML = `
                <div class="cost">${cardInstance.cost}</div>
                <div class="name">${cardInstance.name}</div>
                <div class="desc">${cardInstance.desc}</div>
            `;
            // 카드 클릭 이벤트 바인딩
            c.onclick = () => useCard(cardInstance.id, c);
            handDiv.appendChild(c);
        }
    }

    // --- 전투 로직 ---
    function useCard(cardId, cardElement) {
        if(!isPlayerTurn) return;
        
        const cardIndex = hand.findIndex(c => c.id === cardId);
        if(cardIndex === -1) return;
        const card = hand[cardIndex];

        // 비용 검사
        if(playerEnergy < card.cost) {
            cardElement.classList.add('shake');
            setTimeout(() => cardElement.classList.remove('shake'), 200);
            return;
        }

        // 상태 업데이트
        playerEnergy -= card.cost;
        cardElement.classList.add('playing'); // 위로 날아가는 연출
        
        if(card.type === 'attack') {
            let actualDmg = card.val;
            let originalDmg = card.val;
            // 적의 방어도 우선 차감
            if(enemyDef > 0) {
                if(enemyDef >= actualDmg) {
                    enemyDef -= actualDmg; actualDmg = 0;
                } else {
                    actualDmg -= enemyDef; enemyDef = 0;
                }
            }
            enemyHp -= actualDmg;
            showFloatingText('enemy-dmg-zone', `-${originalDmg}`, '#FF4444');
        } else if (card.type === 'defend') {
            playerDef += card.val;
            showFloatingText('player-dmg-zone', `🛡️+${card.val}`, '#4287F5');
        } else if (card.type === 'heal') {
            playerHp = Math.min(MAX_PLAYER_HP, playerHp + card.val);
            showFloatingText('player-dmg-zone', `💚+${card.val}`, '#2BD65C');
        }

        // 손패 배열에서 제거 및 DOM 타이머 삭제
        hand.splice(cardIndex, 1);
        setTimeout(() => {
            if(cardElement.parentNode) cardElement.parentNode.removeChild(cardElement);
        }, 400);

        updateUI();
        
        // 승리 조건 체크
        if(enemyHp <= 0) {
            setTimeout(() => endGame(true), 500);
        }
    }

    // 턴 종료 버튼 동작
    function endTurn() {
        if(!isPlayerTurn) return;
        isPlayerTurn = false;
        
        // 남은 카드 모두 제거
        document.getElementById('hand').innerHTML = '';
        updateUI();
        
        // 1초 대기 후 적의 턴 시작
        setTimeout(enemyAction, 1000);
    }

    function enemyAction() {
        if(enemyHp <= 0) return;
        enemyDef = 0; // 적 행동 전 방어력 초기화
        
        // 적 패턴: 70% 공격, 30% 방어
        const isAttacking = Math.random() < 0.7;
        
        if(isAttacking) {
            let originalDmg = 8 + Math.floor(Math.random() * 5); // 8~12 랜덤 피해
            let actualDmg = originalDmg;
            
            // 플레이어 방어도 계산
            if(playerDef > 0) {
                if(playerDef >= actualDmg) {
                    playerDef -= actualDmg; actualDmg = 0;
                } else {
                    actualDmg -= playerDef; playerDef = 0;
                }
            }
            playerHp -= actualDmg;
            showFloatingText('player-dmg-zone', `-${originalDmg}`, '#FF4444');
        } else {
            enemyDef += 10;
            showFloatingText('enemy-dmg-zone', `🛡️+10`, '#4287F5');
        }
        
        updateUI();
        
        // 패배 혹은 다음 턴 진행
        if(playerHp <= 0) {
            setTimeout(() => endGame(false), 500);
        } else {
            setTimeout(startPlayerTurn, 1000);
        }
    }

    // --- UI 보조 함수 ---
    function updateUI() {
        // 플레이어 정보 갱신
        document.getElementById('player-hp-text').innerText = `${playerHp} / ${MAX_PLAYER_HP}`;
        document.getElementById('player-hp-fill').style.width = `${(playerHp/MAX_PLAYER_HP)*100}%`;
        document.getElementById('player-def-text').innerText = `🛡️ ${playerDef}`;
        document.getElementById('player-energy-text').innerText = `⚡ ${playerEnergy} / ${MAX_ENERGY}`;
        
        // 적 정보 갱신
        document.getElementById('enemy-hp-text').innerText = `${enemyHp} / ${MAX_ENEMY_HP}`;
        document.getElementById('enemy-hp-fill').style.width = `${Math.max(0, enemyHp/MAX_ENEMY_HP)*100}%`;
        document.getElementById('enemy-def-text').innerText = `🛡️ ${enemyDef}`;
        
        // 버튼 상태 갱신
        const endBtn = document.getElementById('end-turn-btn');
        endBtn.disabled = !isPlayerTurn;
        endBtn.innerText = isPlayerTurn ? '턴 종료' : '적의 턴...';
    }

    // 이펙트 연출용 플로팅 텍스트
    function showFloatingText(elementId, text, color) {
        const zone = document.getElementById(elementId);
        const floatEl = document.createElement('div');
        floatEl.className = 'floating-text';
        floatEl.style.color = color;
        floatEl.innerText = text;
        zone.appendChild(floatEl);
        
        setTimeout(() => {
            if(zone.contains(floatEl)) zone.removeChild(floatEl);
        }, 1000);
    }

    function endGame(isWin) {
        isPlayerTurn = false;
        const modal = document.getElementById('game-over-modal');
        document.getElementById('modal-title').innerText = isWin ? '🎉 승리했습니다! 🎉' : '💀 패배했습니다... 💀';
        modal.style.display = 'flex';
    }

    function restartGame() {
        document.getElementById('game-over-modal').style.display = 'none';
        initGame();
    }

    // 로드 시 게임 시작
    window.onload = initGame;
</script>
</body>
</html>
