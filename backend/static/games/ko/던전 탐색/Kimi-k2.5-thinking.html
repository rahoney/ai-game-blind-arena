<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8x8 로그라이크 던전</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f1e;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            text-align: center;
            padding: 20px;
            background: #1a1a2e;
            border: 3px solid #444;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        h1 {
            color: #e94560;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            font-size: 24px;
        }

        #status-bar {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            font-size: 14px;
            background: #0f0f1e;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
        }

        .stat {
            color: #ffd700;
        }

        .hp-bar {
            color: #ff4444;
        }

        #grid {
            display: inline-grid;
            grid-template-columns: repeat(8, 40px);
            gap: 2px;
            background: #000;
            padding: 10px;
            border: 2px solid #444;
            border-radius: 5px;
            margin: 10px 0;
        }

        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: #2d2d44;
            border: 1px solid #333;
            transition: all 0.2s;
        }

        .wall {
            background: #1a1a2e;
            color: #555;
        }

        .fog {
            background: #000;
            color: #111;
            opacity: 0.3;
        }

        .visible {
            background: #3d3d5c;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
        }

        .player { color: #4ecca3; font-weight: bold; }
        .enemy { color: #e94560; }
        .item { color: #ffd700; }
        .exit { color: #00adb5; }

        #message {
            height: 30px;
            color: #fff;
            font-size: 14px;
            margin: 10px 0;
            font-weight: bold;
        }

        #controls {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .hidden { display: none !important; }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
            font-family: inherit;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            background: #ff6b6b;
        }

        .title-text {
            font-size: 32px;
            color: #4ecca3;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }

        .game-over-text {
            font-size: 28px;
            margin-bottom: 15px;
        }

        .win { color: #4ecca3; }
        .lose { color: #e94560; }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>⚔️ 8x8 던전 ⚔️</h1>
        
        <div id="status-bar">
            <span class="hp-bar">❤️ HP: <span id="hp">20</span>/20</span>
            <span class="stat">🗡️ ATK: <span id="atk">5</span></span>
            <span class="stat">🛡️ DEF: <span id="def">0</span></span>
            <span class="stat">🎲 Turn: <span id="turn">0</span></span>
        </div>

        <div id="grid"></div>
        <div id="message">던전 탐험을 시작하세요...</div>
        <div id="controls">WASD 또는 방향키로 이동 | 적과 전투 | 🚪 탈출구 찾기</div>
    </div>

    <!-- 시작 화면 -->
    <div id="start-screen" class="screen">
        <div class="title-text">🏰 던전 크롤러</div>
        <p style="margin-bottom: 20px; color: #888;">8x8 격자의 미궁에서
