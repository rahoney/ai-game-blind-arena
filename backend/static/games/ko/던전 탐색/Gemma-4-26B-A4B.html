<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Roguelike</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #333;
            --text-color: #eee;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
        }
        #game-container {
            position: relative;
            text-align: center;
        }
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 40px);
            grid-template-rows: repeat(8, 40px);
            gap: 2px;
            border: 4px solid #555;
            background-color: #000;
        }
        .cell {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            background-color: #222;
        }
        .hidden { background-color: #000 !important; color: transparent !important; }
        .fog { background-color: #111 !important; }
        
        #ui-panel {
            margin-top: 15px;
            padding: 10px;
            background: var(--panel-color);
            border-radius: 5px;
            display: flex;
            justify-content: space-around;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        button:hover { background: #45a049; }
        .hidden-element { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="game-board"></div>
    
    <div id="ui-panel">
        <div>HP: <span id="hp-val">0</span></div>
        <div>Score: <span id="score-val">0</span></div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="overlay">
        <h1>Emoji Dungeon</h1>
        <p>WASD / 방향키로 이동</p>
        <p>👹 적과 부딪히면 전투! 🍎 회복!</p>
        <button onclick="startGame()">게임 시작</button>
    </div>

    <!-- Win/Loss Screen -->
    <div id="end-screen" class="overlay hidden-element">
        <h1 id="end-title">GAME OVER</h1>
        <p id="end-msg">최종 점수: 0</p>
        <button onclick="startGame()">다시 시작</button>
    </div>
</div>

<script>
    const GRID_SIZE = 8;
    const boardEl = document.getElementById('game-board');
    const hpEl = document.getElementById('hp-val');
    const scoreEl = document.getElementById('score-val');
    const startScreen = document.getElementById('start-screen');
    const endScreen = document.getElementById('end-screen');
    const endTitle = document.getElementById('end-title');
    const endMsg = document.getElementById('end-msg');

    // Game State
    let player, enemy, item, exit, walls, map, score, gameState;

    const TILES = {
        WALL: '🧱',
        FLOOR: '⬛',
        PLAYER: '🧙‍♂️',
        ENEMY: '👹',
        ITEM: '🍎',
        EXIT: '🚪'
    };

    function startGame() {
        // Initialize state
        gameState = 'PLAYING';
        score = 0;
        player = { x: 0, y: 0, hp: 10, maxHp: 10 };
        enemy = { x: 0, y: 0, hp: 5 };
        item = { x: 0, y: 0 };
        exit = { x: 7, y: 7 };
        walls = [];
        map = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0)); // 0: floor, 1: wall

        startScreen.classList.add('hidden-element');
        endScreen.classList.add('hidden-element');
        
        generateMap();
        render();
    }

    function generateMap() {
        // 1. Create simple path to guarantee reachability
        // Fill with walls first
        for(let y=0; y<GRID_SIZE; y++) {
            for(let x=0; x<GRID_SIZE; x++) {
                map[y][x] = 1; 
            }
        }

        // 2. Carve a random path from (0,0) to (7,7)
        let currX = 0, currY = 0;
        map[currY][currX] = 0;
        while(currX < GRID_SIZE - 1 || currY < GRID_SIZE - 1) {
            if(Math.random() > 0.5 && currX < GRID_SIZE - 1) currX++;
            else if(currY < GRID_SIZE - 1) currY++;
            map[currY][currX] = 0;
        }

        // 3. Add random floors and walls
        for(let i=0; i<15; i++) {
            let rx = Math.floor(Math.random()*GRID_SIZE);
            let ry = Math.floor(Math.random()*GRID_SIZE);
            if(map[ry][rx] === 1) map[ry][rx] = 0; // Add some extra space
        }

        // 4. Place Entities (only on floors)
        const getEmptyFloor = () => {
            let rx, ry;
            do {
                rx = Math.floor(Math.random()*GRID_SIZE);
                ry = Math.floor(Math.random()*GRID_SIZE);
            } while (map[ry][rx] === 1 || (rx === 0 && ry === 0) || (rx === 7 && ry === 7));
            return {x: rx, y: ry};
        };

        let ePos = getEmptyFloor();
        enemy = { x: ePos.x, y: ePos.y, hp: 5 };
        
        let iPos = getEmptyFloor();
        item = { x: iPos.x, y: iPos.y };
    }

    function render() {
        boardEl.innerHTML = '';
        hpEl.textContent = player.hp;
        scoreEl.textContent = score;

        for (let y = 0; y < GRID_SIZE; y++) {
            for (let x = 0; x < GRID_SIZE; x++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // Fog of War Logic (Distance check)
                const dist = Math.abs(player.x - x) + Math.abs(player.y - y);
                const isVisible = dist <= 2; // Visible within 2 Manhattan distance

                if (!isVisible) {
                    cell.classList.add('hidden');
                } else {
                    // Render Content
                    if (x === player.x && y === player.y) cell.textContent = TILES.PLAYER;
                    else if (x === enemy.x && y === enemy.y) cell.textContent = TILES.ENEMY;
                    else if (x === item.x && y === item.y) cell.textContent = TILES.ITEM;
                    else if (x === exit.x && y === exit.y) cell.textContent = TILES.EXIT;
                    else if (map[y][x] === 1) cell.textContent = TILES.WALL;
                    else cell.textContent = TILES.FLOOR;
                }
                boardEl.appendChild(cell);
            }
        }
    }

    function movePlayer(dx, dy) {
        if (gameState !== 'PLAYING') return;

        let nextX = player.x + dx;
        let nextY = player.y + dy;

        // Boundary check
        if (nextX < 0 || nextX >= GRID_SIZE || nextY < 0 || nextY >= GRID_SIZE) return;

        // Wall check
        if (map[nextY][nextX] === 1) return;

        // Combat Check (Enemy)
        if (nextX === enemy.x && nextY === enemy.y) {
            enemy.hp -= 2;
            player.hp -= 2;
            score += 10;
            if (enemy.hp <= 0) {
                enemy.x = -1; // Remove enemy
                score += 50;
            }
            if (player.hp <= 0) endGame(false);
        } else {
            // Normal Move
            player.x = nextX;
            player.y = nextY;
        }

        // Item Check
        if (player.x === item.x && player.y === item.y) {
            player.hp = Math.min(player.maxHp, player.hp + 5);
            item.x = -1; // Remove item
            score += 20;
        }

        // Exit Check
        if (player.x === exit.x && player.y === exit.y) {
            endGame(true);
        }

        render();
    }

    function endGame(win) {
        gameState = 'FINISHED';
        endScreen.classList.remove('hidden-element');
        if (win) {
            endTitle.textContent = "VICTORY! 🎉";
            endTitle.style.color = "#4CAF50";
        } else {
            endTitle.textContent = "GAME OVER 💀";
            endTitle.style.color = "#ff4444";
        }
        endMsg.textContent = `최종 점수: ${score}`;
    }

    window.addEventListener('keydown', (e) => {
        switch(e.key.toUpperCase()) {
            case 'W': case 'ARROWUP':    movePlayer(0, -1); break;
            case 'S': case 'ARROWDOWN':  movePlayer(0, 1);  break;
            case 'A': case 'ARROWLEFT':  movePlayer(-1, 0); break;
            case 'D': case 'ARROWRIGHT': movePlayer(1, 0);  break;
        }
    });

</script>
</body>
</html>
