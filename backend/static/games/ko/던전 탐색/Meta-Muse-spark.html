<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8x8 던전 로그라이크</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #0b0b12; color: #e6e6e6; font-family: 'Malgun Gothic', monospace;
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
  }
  #container {
    position: relative; width: 420px; padding: 20px; background: #16161f; border-radius: 16px;
    border: 2px solid #3a2e5a; box-shadow: 0 0 30px #000a;
  }
  h1 { margin: 0 0 10px; text-align: center; color: #c9b3ff; text-shadow: 0 0 8px #7a5cff; }
  #hud { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; }
  #grid {
    display: grid; grid-template-columns: repeat(8, 1fr); gap: 2px;
    background: #000; border: 3px solid #2b2340; padding: 3px; border-radius: 8px;
  }
  .cell {
    width: 46px; height: 46px; display: flex; justify-content: center; align-items: center;
    font-size: 28px; background: #1a1a24; user-select: none; transition: 0.1s;
  }
  .cell.visible { background: #252538; box-shadow: inset 0 0 10px #0008; }
  .cell.memory { opacity: 0.35; filter: grayscale(0.8); }
  .cell.fog { background: #050507; font-size: 20px; }
  #log { height: 60px; margin-top: 10px; padding: 6px; background: #0f0f16; border-radius: 6px; font-size: 13px; overflow-y: auto; color: #aaa; }
  #start-screen, #overlay {
    position: absolute; inset: 0; background: #0b0b12ee; display: flex; flex-direction: column;
    justify-content: center; align-items: center; text-align: center; border-radius: 14px; z-index: 10;
  }
  .hidden { display: none !important; }
  button {
    margin-top: 15px; padding: 10px 20px; font-size: 16px; background: #7a5cff; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-weight: bold;
  }
  button:hover { background: #977dff; }
  .hp-bar { width: 100px; height: 8px; background: #300; border-radius: 4px; overflow: hidden; display: inline-block; vertical-align: middle; margin-left: 5px; }
  .hp-fill { height: 100%; background: #e44; transition: width 0.2s; }
  .dpad { display: grid; grid-template-columns: repeat(3, 44px); gap: 4px; margin: 12px auto 0; justify-content: center; }
  .dpad button { margin: 0; padding: 0; width: 44px; height: 44px; font-size: 20px; background: #2a2a3a; }
</style>
</head>
<body>
<div id="container">
  <div id="start-screen">
    <h1>🕯️ 8x8 DUNGEON</h1>
    <p>WASD / 방향키로 이동</p>
    <p>🧙 P / 👹 E / 🧪 I / 🚪 O</p>
    <p style="color:#999">주변 2칸만 보입니다. 턴제 진행</p>
    <button id="startBtn">입장하기</button>
  </div>

  <div id="game-ui" class="hidden">
    <div id="hud">
      <div>HP: <span id="hpTxt">20</span> <div class="hp-bar"><div id="hpFill" class="hp-fill"></div></div></div>
      <div>점수: <span id="score">0</span></div>
      <div>층: <span id="floor">1</span></div>
    </div>
    <div id="grid"></div>
    <div id="log"></div>
    <div class="dpad">
      <div></div><button data-dx="0" data-dy="-1">↑</button><div></div>
      <button data-dx="-1" data-dy="0">←</button><button data-dx="0" data-dy="1">↓</button><button data-dx="1" data-dy="0">→</button>
    </div>
  </div>

  <div id="overlay" class="hidden">
    <h1 id="endTitle">승리!</h1>
    <p id="endMsg"></p>
    <button id="restartBtn">다시 시작</button>
  </div>
</div>

<script>
(() => {
  const SIZE = 8;
  const VISION = 2;
  const TILES = { WALL:'🧱', FLOOR:'·', PLAYER:'🧙', ENEMY:'👹', ITEM:'🧪', EXIT:'🚪', FOG:'🌫️' };

  let map, seen, player, enemies, items, exit, score, floor, gameOver;

  const gridEl = document.getElementById('grid');
  const logEl = document.getElementById('log');
  const hpTxt = document.getElementById('hpTxt');
  const hpFill = document.getElementById('hpFill');
  const scoreEl = document.getElementById('score');
  const floorEl = document.getElementById('floor');

  function log(msg) { logEl.innerHTML = msg + '<br>' + logEl.innerHTML; }

  function initGame() {
    score = 0; floor = 1; gameOver = false;
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('overlay').classList.add('hidden');
    document.getElementById('game-ui').classList.remove('hidden');
    logEl.innerHTML = '';
    generateLevel();
    render();
    log('던전에 입장했습니다. 🚪를 찾으세요!');
  }

  // 맵 생성 - 시작점~출구 도달 보장
  function generateLevel() {
    let tries = 0;
    do {
      map = Array.from({length: SIZE}, () => Array(SIZE).fill(0)); // 0 바닥, 1 벽
      seen = Array.from({length: SIZE}, () => Array(SIZE).fill(false));
      // 랜덤 벽
      for (let y=0; y<SIZE; y++) for (let x=0; x<SIZE; x++) {
        if ((x<2 && y<2) || (x>SIZE-3 && y>SIZE-3)) continue; // 시작/출구 주변 비우기
        if (Math.random() < 0.20) map[y][x] = 1;
      }
      player = {x:1, y:1, hp:20, maxHp:20};
      exit = {x: SIZE-2, y: SIZE-2};
      map[player.y][player.x] = 0; map[exit.y][exit.x] = 0;
      tries++;
    } while (!isReachable(player, exit) && tries < 100);

    // 적 배치
    enemies = [];
    for (let i=0; i<4; i++) {
      let p = randomEmpty(); enemies.push({x:p.x, y:p.y, hp:8});
    }
    // 아이템 배치
    items = [];
    for (let i=0; i<2; i++) {
      let p = randomEmpty(); items.push(p);
    }
  }

  function randomEmpty() {
    while(true) {
      let x = Math.floor(Math.random()*SIZE);
      let y = Math.floor(Math.random()*SIZE);
      if (map[y][x]===1) continue;
      if (x===player.x && y===player.y) continue;
      if (x===exit.x && y===exit.y) continue;
      if (enemies?.some(e=>e.x===x&&e.y===y)) continue;
      if (items?.some(it=>it.x===x&&it.y===y)) continue;
      return {x,y};
    }
  }

  // BFS로 경로 확인
  function isReachable(s, e) {
    const q = [s], v = Array.from({length:SIZE},()=>Array(SIZE).fill(false)); v[s.y][s.x]=true;
    const dirs = [[1,0],[-1,0],[0,1],[0,-1]];
    while(q.length) {
      const c = q.shift();
      if (c.x===e.x && c.y===e.y) return true;
      for(const [dx,dy] of dirs) {
        const nx=c.x+dx, ny=c.y+dy;
        if(nx<0||ny<0||nx>=SIZE||ny>=SIZE||v[ny][nx]||map[ny][nx]===1) continue;
        v[ny][nx]=true; q.push({x:nx,y:ny});
      }
    }
    return false;
  }

  function render() {
    gridEl.innerHTML = '';
    hpTxt.textContent = player.hp;
    hpFill.style.width = (player.hp/player.maxHp*100)+'%';
    scoreEl.textContent = score; floorEl.textContent = floor;

    for (let y=0; y<SIZE; y++) {
      for (let x=0; x<SIZE; x++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const dist = Math.abs(player.x-x) + Math.abs(player.y-y);
        const visible = dist <= VISION;
        if (visible) seen[y][x] = true;

        if (!seen[y][x]) { cell.textContent = TILES.FOG; cell.classList.add('fog'); }
        else {
          if (visible) cell.classList.add('visible'); else cell.classList.add('memory');
          let ch = map[y][x]===1 ? TILES.WALL : TILES.FLOOR;
          if (x===exit.x && y===exit.y) ch = TILES.EXIT;
          if (items.some(it=>it.x===x&&it.y===y)) ch = TILES.ITEM;
          if (enemies.some(e=>e.x===x&&e.y===y)) ch = TILES.ENEMY;
          if (x===player.x && y===player.y) ch = TILES.PLAYER;
          cell.textContent = ch;
        }
        gridEl.appendChild(cell);
      }
    }
  }

  // 플레이어 이동
  function movePlayer(dx,dy) {
    if (gameOver) return;
    const nx = player.x + dx, ny = player.y + dy;
    if (nx<0||ny<0||nx>=SIZE||ny>=SIZE||map[ny][nx]===1) return;

    const enemy = enemies.find(e=>e.x===nx&&e.y===ny);
    if (enemy) { combat(enemy); }
    else {
      player.x = nx; player.y = ny;
      // 아이템 획득
      const idx = items.findIndex(it=>it.x===nx&&it.y===ny);
      if (idx>-1) { items.splice(idx,1); player.hp = Math.min(player.maxHp, player.hp+8); score+=5; log('🧪 회복 물약! HP +8'); }
      // 출구
      if (nx===exit.x && ny===exit.y) { win(); return; }
    }
    enemyTurn();
    render();
  }

  // 전투 - 서로 체력 감소
  function combat(e) {
    const pdmg = 3 + Math.floor(Math.random()*3);
    const edmg = 2 + Math.floor(Math.random()*3);
    e.hp -= pdmg; player.hp -= edmg;
    log(`👹 전투! 당신이 ${pdmg}, 적이 ${edmg} 피해`);
    if (e.hp <= 0) { enemies = enemies.filter(en=>en!==e); score+=10; log('적을 처치했습니다!'); }
    if (player.hp <= 0) lose();
  }

  // 적 턴 - 플레이어 추적 또는 랜덤
  function enemyTurn() {
    for (const e of [...enemies]) {
      const dist = Math.abs(e.x-player.x)+Math.abs(e.y-player.y);
      let dx=0, dy=0;
      if (dist <= 3) { // 추적
        dx = Math.sign(player.x - e.x); dy = Math.sign(player.y - e.y);
        if (Math.random()<0.5) dx=0; else dy=0; // 한 축만
      } else { // 랜덤
        [dx,dy] = [[1,0],[-1,0],[0,1],[0,-1]][Math.floor(Math.random()*4)];
      }
      const nx = e.x+dx, ny = e.y+dy;
      if (nx<0||ny<0||nx>=SIZE||ny>=SIZE||map[ny][nx]===1) continue;
      if (enemies.some(o=>o!==e&&o.x===nx&&o.y===ny)) continue;
      if (nx===player.x && ny===player.y) { combat(e); }
      else { e.x=nx; e.y=ny; }
    }
  }

  function win() {
    gameOver = true;
    document.getElementById('endTitle').textContent = '탈출 성공!';
    document.getElementById('endMsg').textContent = `점수 ${score} - 다음 층으로...`;
    document.getElementById('overlay').classList.remove('hidden');
    floor++; score+=50; setTimeout(()=>{ gameOver=false; generateLevel(); render(); document.getElementById('overlay').classList.add('hidden'); log(`--- ${floor}층 ---`); }, 1200);
  }
  function lose() {
    gameOver = true;
    document.getElementById('endTitle').textContent = '사망';
    document.getElementById('endMsg').textContent = `최종 점수: ${score}`;
    document.getElementById('overlay').classList.remove('hidden');
  }

  // 입력
  window.addEventListener('keydown', e => {
    const k = e.key.toLowerCase();
    if (['arrowup','w'].includes(k)) movePlayer(0,-1);
    if (['arrowdown','s'].includes(k)) movePlayer(0,1);
    if (['arrowleft','a'].includes(k)) movePlayer(-1,0);
    if (['arrowright','d'].includes(k)) movePlayer(1,0);
  });
  document.querySelectorAll('.dpad button').forEach(b=> b.onclick = ()=> movePlayer(+b.dataset.dx, +b.dataset.dy));
  document.getElementById('startBtn').onclick = initGame;
  document.getElementById('restartBtn').onclick = initGame;
})();
</script>
</body>
</html>
